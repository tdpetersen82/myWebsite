<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #bbada0;
            display: block;
            margin: 20px auto;
            touch-action: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 2048</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>Best: <span id="highScore">0</span></p>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>Swipe or use Arrow Keys to slide tiles</p>
            <button id="restartBtn" class="play-button">New Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        // ── Constants ──
        const SIZE = 4;
        const TILE_SIZE = 86;
        const GAP = 10;
        const PADDING = 13;
        const ANIM_DURATION = 120;

        // ── Tile Colors ──
        const TILE_COLORS = {
            0: '#cdc1b4',
            2: '#eee4da', 4: '#ede0c8', 8: '#f2b179',
            16: '#f59563', 32: '#f67c5f', 64: '#f65e3b',
            128: '#edcf72', 256: '#edcc61', 512: '#edc850',
            1024: '#edc53f', 2048: '#edc22e',
            4096: '#3c3a32', 8192: '#3c3a32'
        };
        const DARK_TEXT = [2, 4];

        // ── Sound ──
        function playSound(freq, type, duration) {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type || 'square';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.15, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (duration || 0.1));
                o.start(); o.stop(c.currentTime + (duration || 0.1));
            } catch(e) {}
        }

        // ── Game State ──
        let grid, score, highScore, gameOver, won, continuePlaying;
        let animating = false;
        let animations = []; // {fromR, fromC, toR, toC, value, merging}
        let spawnAnims = []; // {r, c, progress}
        let animStart = 0;

        highScore = parseInt(localStorage.getItem('2048HighScore')) || 0;
        highScoreElement.textContent = highScore;

        function init() {
            grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
            score = 0;
            gameOver = false;
            won = false;
            continuePlaying = false;
            animations = [];
            spawnAnims = [];
            animating = false;
            scoreElement.textContent = '0';
            spawnTile();
            spawnTile();
            draw();
        }

        function spawnTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] === 0) empty.push({r, c});
            if (empty.length === 0) return;
            const cell = empty[Math.floor(Math.random() * empty.length)];
            grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
            spawnAnims.push({r: cell.r, c: cell.c, start: performance.now()});
        }

        // ── Tile Position Helpers ──
        function tileX(c) { return PADDING + c * (TILE_SIZE + GAP); }
        function tileY(r) { return PADDING + r * (TILE_SIZE + GAP); }

        // ── Drawing ──
        function roundRect(x, y, w, h, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
            ctx.lineTo(x + radius, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        function drawTile(x, y, value, scale) {
            scale = scale || 1;
            const color = TILE_COLORS[value] || TILE_COLORS[8192];
            ctx.fillStyle = color;
            const s = TILE_SIZE * scale;
            const ox = x + (TILE_SIZE - s) / 2;
            const oy = y + (TILE_SIZE - s) / 2;
            roundRect(ox, oy, s, s, 6);

            if (value > 0) {
                ctx.fillStyle = DARK_TEXT.includes(value) ? '#776e65' : '#f9f6f2';
                let fontSize = value >= 1024 ? 28 : value >= 128 ? 34 : 42;
                fontSize *= scale;
                ctx.font = 'bold ' + fontSize + 'px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(value, x + TILE_SIZE / 2, y + TILE_SIZE / 2 + 2);
            }
        }

        function draw(timestamp) {
            ctx.fillStyle = '#bbada0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw empty cells
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++) {
                    ctx.fillStyle = TILE_COLORS[0];
                    roundRect(tileX(c), tileY(r), TILE_SIZE, TILE_SIZE, 6);
                }

            const now = timestamp || performance.now();

            if (animating && animations.length > 0) {
                const elapsed = now - animStart;
                const t = Math.min(elapsed / ANIM_DURATION, 1);
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                // Draw animating tiles
                for (const a of animations) {
                    const x = tileX(a.fromC) + (tileX(a.toC) - tileX(a.fromC)) * ease;
                    const y = tileY(a.fromR) + (tileY(a.toR) - tileY(a.fromR)) * ease;
                    const mergeScale = a.merging && t > 0.8 ? 1 + 0.15 * Math.sin((t - 0.8) / 0.2 * Math.PI) : 1;
                    drawTile(x, y, a.value, mergeScale);
                }

                if (t >= 1) {
                    animating = false;
                    animations = [];
                }
            }

            if (!animating) {
                // Draw static tiles
                for (let r = 0; r < SIZE; r++)
                    for (let c = 0; c < SIZE; c++)
                        if (grid[r][c] > 0) drawTile(tileX(c), tileY(r), grid[r][c]);
            }

            // Spawn animations
            for (let i = spawnAnims.length - 1; i >= 0; i--) {
                const sa = spawnAnims[i];
                const elapsed = now - sa.start;
                const t = Math.min(elapsed / 150, 1);
                if (!animating || true) {
                    const scale = t < 1 ? 0.2 + 0.8 * t : 1;
                    if (t < 1) drawTile(tileX(sa.c), tileY(sa.r), grid[sa.r][sa.c], scale);
                }
                if (t >= 1) spawnAnims.splice(i, 1);
            }

            // Overlays
            if (gameOver) {
                ctx.fillStyle = 'rgba(238, 228, 218, 0.73)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#776e65';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
            } else if (won && !continuePlaying) {
                ctx.fillStyle = 'rgba(237, 194, 46, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f9f6f2';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('You Win!', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Arial';
                ctx.fillText('Tap to continue', canvas.width / 2, canvas.height / 2 + 25);
            }

            if (animating || spawnAnims.length > 0) {
                requestAnimationFrame(draw);
            }
        }

        // ── Move Logic ──
        function move(direction) {
            if (gameOver) return;
            if (won && !continuePlaying) {
                continuePlaying = true;
                draw();
                return;
            }
            if (animating) return;

            const oldGrid = grid.map(r => [...r]);
            let moved = false;
            animations = [];

            // Rotate grid so we always process as "move left"
            let rotated = rotateGrid(grid, direction);
            let newGrid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));

            for (let r = 0; r < SIZE; r++) {
                let writeCol = 0;
                let lastMerged = false;
                for (let c = 0; c < SIZE; c++) {
                    if (rotated[r][c] === 0) continue;
                    if (writeCol > 0 && newGrid[r][writeCol - 1] === rotated[r][c] && !lastMerged) {
                        // Merge
                        newGrid[r][writeCol - 1] *= 2;
                        score += newGrid[r][writeCol - 1];
                        lastMerged = true;
                        // Track animation in rotated space
                        const from = unrotatePos(r, c, direction);
                        const to = unrotatePos(r, writeCol - 1, direction);
                        animations.push({fromR: from.r, fromC: from.c, toR: to.r, toC: to.c, value: rotated[r][c], merging: true});
                        if (newGrid[r][writeCol - 1] === 2048 && !won) won = true;
                    } else {
                        newGrid[r][writeCol] = rotated[r][c];
                        const from = unrotatePos(r, c, direction);
                        const to = unrotatePos(r, writeCol, direction);
                        if (from.r !== to.r || from.c !== to.c) {
                            animations.push({fromR: from.r, fromC: from.c, toR: to.r, toC: to.c, value: rotated[r][c], merging: false});
                        }
                        writeCol++;
                        lastMerged = false;
                    }
                }
            }

            grid = unrotateGrid(newGrid, direction);

            // Check if anything changed
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (grid[r][c] !== oldGrid[r][c]) moved = true;

            if (moved) {
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('2048HighScore', highScore);
                }

                if (animations.length > 0) {
                    animating = true;
                    animStart = performance.now();

                    // Clear grid of destination tiles during animation
                    // (tiles will be drawn by animation system)
                    setTimeout(() => {
                        spawnTile();
                        if (!canMove()) {
                            gameOver = true;
                            playSound(200, 'sawtooth', 0.3);
                        } else {
                            playSound(300, 'sine', 0.05);
                        }
                        if (won && !continuePlaying) {
                            playSound(523, 'sine', 0.15);
                            setTimeout(() => playSound(659, 'sine', 0.15), 100);
                            setTimeout(() => playSound(784, 'sine', 0.2), 200);
                        }
                        draw();
                    }, ANIM_DURATION);
                    draw(performance.now());
                } else {
                    spawnTile();
                    if (!canMove()) gameOver = true;
                    draw();
                }
            }
        }

        // Grid rotation helpers (to simplify move logic)
        function rotateGrid(g, dir) {
            // 0=left, 1=up, 2=right, 3=down
            if (dir === 0) return g.map(r => [...r]);
            if (dir === 2) return g.map(r => [...r].reverse());
            if (dir === 1) {
                // Transpose
                return Array.from({length: SIZE}, (_, r) =>
                    Array.from({length: SIZE}, (_, c) => g[c][r]));
            }
            // dir === 3: transpose + reverse rows
            return Array.from({length: SIZE}, (_, r) =>
                Array.from({length: SIZE}, (_, c) => g[SIZE - 1 - c][r]));
        }

        function unrotateGrid(g, dir) {
            if (dir === 0) return g.map(r => [...r]);
            if (dir === 2) return g.map(r => [...r].reverse());
            if (dir === 1) {
                return Array.from({length: SIZE}, (_, r) =>
                    Array.from({length: SIZE}, (_, c) => g[c][r]));
            }
            // dir === 3
            return Array.from({length: SIZE}, (_, r) =>
                Array.from({length: SIZE}, (_, c) => g[c][SIZE - 1 - r]));
        }

        function unrotatePos(r, c, dir) {
            if (dir === 0) return {r, c};
            if (dir === 2) return {r, c: SIZE - 1 - c};
            if (dir === 1) return {r: c, c: r};
            // dir === 3
            return {r: SIZE - 1 - c, c: r};
        }

        function canMove() {
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return true;
                    if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
                    if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
                }
            return false;
        }

        // ── Input ──
        document.addEventListener('keydown', function(e) {
            const map = {ArrowLeft: 0, ArrowUp: 1, ArrowRight: 2, ArrowDown: 3};
            if (map[e.key] !== undefined) {
                e.preventDefault();
                move(map[e.key]);
            }
        });

        // Touch swipe
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            if (touchStartX === undefined) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const MIN_SWIPE = 30;
            if (Math.abs(dx) < MIN_SWIPE && Math.abs(dy) < MIN_SWIPE) {
                // Tap — allow continue on win
                if (won && !continuePlaying) {
                    continuePlaying = true;
                    draw();
                }
                return;
            }
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 2 : 0);
            } else {
                move(dy > 0 ? 3 : 1);
            }
        });

        restartBtn.addEventListener('click', init);

        // ── Auto-Scale ──
        (function() {
            const c = document.getElementById('gameCanvas');
            const baseWidth = c.width, baseHeight = c.height;
            function scale() {
                const parent = c.parentElement;
                const ps = getComputedStyle(parent);
                const maxWidth = parent.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const maxHeight = window.innerHeight * 0.75;
                const scaleFactor = Math.min(maxWidth / baseWidth, maxHeight / baseHeight, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + scaleFactor + ')';
                c.style.marginBottom = (-(baseHeight * (1 - scaleFactor))) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();

        init();
    </script>
    <script src="../nav.js"></script>
</body>
</html>
