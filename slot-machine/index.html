<style>
  :root{
    --felt-1:#0e3a2e;
    --felt-2:#0a2a21;
    --felt-rail:#3a2418;
    --brass:#c9a26a;
    --brass-2:#e6c590;
    --brass-deep:#8c6a3f;
    --ivory:#f4ecd8;
    --ivory-dim:#d9cfb8;
    --red:#c0392b;
    --ink:#0c1611;
    --ink-2:#1a2820;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0805;color:var(--ivory);font-family:'Inter',system-ui,sans-serif;overflow:hidden}
  body{
    background:
      radial-gradient(1200px 700px at 50% 30%, rgba(89,60,30,.45), transparent 70%),
      radial-gradient(900px 600px at 50% 90%, rgba(0,0,0,.7), transparent 70%),
      #0a0805;
  }
  #root{width:100%;height:100%}
  #game-wrapper{width:1380px;height:860px;transform-origin:top center;margin:0 auto;position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:disabled{cursor:not-allowed;opacity:.55}
  a{color:inherit;text-decoration:none}

  /* Layout */
  .slot-root{
    width:1380px;height:860px;position:relative;
    padding:24px 60px 16px;
    display:flex;flex-direction:column;
  }

  /* Top bar */
  .slot-topbar{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:0 4px 14px;border-bottom:1px solid rgba(201,162,106,.18);
  }
  .slot-back{
    justify-self:start;
    color:var(--ivory-dim);font-size:14px;letter-spacing:.04em;
    padding:8px 14px;border-radius:8px;
    border:1px solid rgba(201,162,106,.25);
    background:rgba(0,0,0,.25);
    transition:all .2s;
  }
  .slot-back:hover{color:var(--brass);border-color:var(--brass);background:rgba(201,162,106,.08)}
  .slot-title{
    font-family:'Bricolage Grotesque','Playfair Display',serif;
    font-weight:500;font-size:30px;letter-spacing:.02em;
    color:var(--ivory);
    display:flex;align-items:baseline;gap:14px;
  }
  .slot-title-sub{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--brass);font-weight:500;
    padding:3px 10px;border:1px solid rgba(201,162,106,.4);border-radius:4px;
  }
  .slot-bank{
    justify-self:end;display:flex;align-items:center;gap:14px;
  }
  .slot-bank-amt{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:22px;font-weight:700;color:var(--brass-2);
    padding:8px 16px;border-radius:8px;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(201,162,106,.3);
    transition:color .3s;
  }
  .slot-reload{
    font-size:12px;font-weight:600;letter-spacing:.05em;
    padding:9px 14px;border-radius:8px;
    background:rgba(201,162,106,.12);
    border:1px solid rgba(201,162,106,.35);
    color:var(--ivory-dim);
    transition:all .2s;
    text-decoration:none;
    display:inline-block;
    cursor:pointer;
  }
  .slot-reload:hover{background:rgba(201,162,106,.22);color:var(--ivory)}

  /* Theme tabs */
  .slot-tabs{
    display:flex;justify-content:center;gap:10px;
    padding:18px 0 14px;
  }
  .slot-tab{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:500;
    font-size:15px;letter-spacing:.04em;
    padding:10px 28px;
    border:1px solid rgba(201,162,106,.25);border-radius:999px;
    background:rgba(0,0,0,.2);color:var(--ivory-dim);
    transition:all .2s;
    min-width:140px;
  }
  .slot-tab:hover:not(:disabled){color:var(--ivory);border-color:rgba(201,162,106,.5)}
  .slot-tab.active{
    background:rgba(0,0,0,.4);
    font-weight:700;
  }

  /* Cabinet frame */
  .slot-frame{
    position:relative;
    width:592px;height:528px;
    margin:8px auto 0;
    border:8px solid var(--brass-deep);
    border-radius:18px;
    background:
      radial-gradient(80% 60% at 50% 30%, rgba(255,255,255,.03), transparent 60%),
      linear-gradient(180deg, #0a2018 0%, #050d09 100%);
    box-shadow:
      inset 0 0 60px rgba(0,0,0,.7),
      inset 0 2px 0 rgba(255,255,255,.06),
      0 18px 38px rgba(0,0,0,.55);
    overflow:hidden;
  }
  .slot-frame-shine{
    position:absolute;inset:8px;border-radius:10px;
    pointer-events:none;
    box-shadow:inset 0 0 0 1px rgba(201,162,106,.25);
  }
  .slot-reels{
    display:flex;justify-content:center;gap:24px;
    padding:24px;
    height:100%;
  }
  .slot-reel-window{
    position:relative;
    border-radius:8px;
    background:#000;
    overflow:hidden;
    box-shadow:
      inset 0 8px 14px rgba(0,0,0,.7),
      inset 0 -8px 14px rgba(0,0,0,.7),
      0 0 0 1px rgba(201,162,106,.25);
  }
  .slot-reel-strip{
    position:absolute;top:0;left:0;width:100%;
    will-change:transform;
  }
  .slot-cell{
    position:absolute;left:0;
    width:160px;height:160px;
    background-image:url('../assets/slot.png');
    background-repeat:no-repeat;
    background-color:rgba(255,255,255,.025);
  }
  /* Top/bottom shadow gradients to fake a 3D barrel */
  .slot-reel-window::before,
  .slot-reel-window::after{
    content:'';position:absolute;left:0;right:0;height:80px;z-index:3;pointer-events:none;
  }
  .slot-reel-window::before{top:0;background:linear-gradient(180deg, rgba(0,0,0,.85), transparent)}
  .slot-reel-window::after{bottom:0;background:linear-gradient(0deg, rgba(0,0,0,.85), transparent)}

  /* Payline */
  .slot-payline{
    position:absolute;left:0;right:0;
    top:50%;transform:translateY(-50%);
    height:0;
    pointer-events:none;
    display:flex;align-items:center;
    z-index:4;
  }
  .slot-payline-line{
    flex:1;height:2px;
    background:linear-gradient(90deg, transparent 0%, currentColor 8%, currentColor 92%, transparent 100%);
    box-shadow:0 0 12px currentColor;
    opacity:.85;
  }
  .slot-payline-arrow{
    width:0;height:0;
    border-top:8px solid transparent;
    border-bottom:8px solid transparent;
    margin:0 4px;
  }
  .slot-payline-arrow.left{border-left:12px solid currentColor}
  .slot-payline-arrow.right{border-right:12px solid currentColor}

  /* Win banner */
  .slot-win-banner{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;
    padding:8px 20px;
    border:1px solid currentColor;border-radius:999px;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(2px);
    z-index:6;
    animation:winPulse .55s cubic-bezier(.2,.8,.25,1) backwards;
  }
  .slot-win-banner.jackpot{
    animation:jackpotPulse 1s ease-in-out infinite alternate, winPulse .55s cubic-bezier(.2,.8,.25,1) backwards;
  }
  .slot-win-tag{
    font-family:'Bricolage Grotesque',sans-serif;
    font-weight:700;font-size:13px;letter-spacing:.2em;
  }
  .slot-win-amt{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-weight:700;font-size:18px;
  }
  .slot-noresult{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    font-size:11px;color:rgba(244,236,216,.4);
    letter-spacing:.18em;text-transform:uppercase;
    z-index:6;
  }
  @keyframes winPulse{
    0%{transform:translateX(-50%) scale(.6);opacity:0;letter-spacing:.4em}
    100%{transform:translateX(-50%) scale(1);opacity:1;letter-spacing:.2em}
  }
  @keyframes jackpotPulse{
    0%{box-shadow:0 0 0 0 currentColor, 0 0 14px currentColor}
    100%{box-shadow:0 0 0 6px transparent, 0 0 26px currentColor}
  }

  /* Controls (bet + spin) */
  .slot-controls{
    display:flex;align-items:center;justify-content:center;gap:32px;
    padding:18px 0 8px;
  }
  .slot-bet-group{display:flex;align-items:center;gap:14px}
  .slot-bet-label{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ivory-dim);
  }
  .slot-bets{display:flex;gap:8px}
  .slot-chip{
    width:60px;height:60px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 35%, #2a4a3a, #102218);
    color:var(--ivory-dim);
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:14px;font-weight:700;
    border:2px dashed rgba(201,162,106,.3);
    transition:all .15s;
    box-shadow:0 4px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .slot-chip:hover:not(:disabled){transform:translateY(-2px);border-color:var(--brass)}
  .slot-chip.active{
    border-color:var(--brass);
    color:var(--brass-2);
    background:radial-gradient(circle at 50% 35%, #3a3020, #1a1208);
    box-shadow:0 6px 14px rgba(0,0,0,.6), 0 0 0 2px rgba(201,162,106,.3), inset 0 1px 0 rgba(255,255,255,.12);
  }
  .slot-spin{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:140px;height:78px;
    border-radius:14px;
    color:var(--ink);font-weight:700;
    box-shadow:
      0 6px 0 rgba(0,0,0,.45),
      0 12px 24px rgba(0,0,0,.5),
      inset 0 2px 0 rgba(255,255,255,.4),
      inset 0 -3px 0 rgba(0,0,0,.2);
    transition:transform .12s, box-shadow .12s;
    border:2px solid rgba(0,0,0,.25);
  }
  .slot-spin:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 0 rgba(0,0,0,.45), 0 14px 28px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.4), inset 0 -3px 0 rgba(0,0,0,.2)}
  .slot-spin:active:not(:disabled){transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.45), 0 6px 12px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.3), inset 0 -2px 0 rgba(0,0,0,.2)}
  .slot-spin-label{
    font-family:'Bricolage Grotesque',sans-serif;
    font-size:18px;letter-spacing:.06em;
  }
  .slot-spin-bet{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:13px;opacity:.75;
  }

  /* Paytable */
  .slot-paytable{
    margin-top:8px;
    padding:10px 16px 4px;
    border-top:1px solid rgba(201,162,106,.18);
  }
  .slot-paytable-title{
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ivory-dim);
    margin-bottom:6px;text-align:center;
  }
  .slot-paytable-grid{
    display:flex;justify-content:center;gap:18px;flex-wrap:wrap;
  }
  .slot-pt-row{
    display:flex;align-items:center;gap:6px;
    padding:2px 8px;
    border-radius:6px;
    background:rgba(0,0,0,.25);
    border:1px solid rgba(201,162,106,.15);
  }
  .slot-pt-row.wild{
    border-color:rgba(201,162,106,.45);
    background:rgba(201,162,106,.08);
  }
  .slot-pt-sym{
    display:inline-block;
    background-image:url('../assets/slot.png');
    background-repeat:no-repeat;
    background-color:rgba(255,255,255,.04);
    border-radius:4px;
  }
  .slot-pt-name{
    font-size:12px;color:var(--ivory-dim);
    min-width:60px;
  }
  .slot-pt-mult{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:13px;font-weight:700;
  }
  .slot-paytable-foot{
    font-size:10px;letter-spacing:.05em;
    color:rgba(244,236,216,.45);
    text-align:center;
    margin-top:6px;
  }

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(201,162,106,.3);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
