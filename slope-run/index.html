<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slope Run — Arcade Game Hub</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .embed-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        .embed-game-frame {
            display: block;
            width: 100%;
            height: 70vh;
            min-height: 400px;
            max-height: 700px;
            border: none;
            border-radius: 10px;
        }
        .source-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 16px;
            color: #667eea;
            font-size: 0.8em;
            text-decoration: none;
        }
        .source-badge:hover {
            background: rgba(102, 126, 234, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏔️ Slope Run</h1>
        <p class="subtitle">Guide the ball down an endless slope — dodge obstacles and stay on track!</p>
        <div class="embed-wrapper">
            <iframe
                class="embed-game-frame"
                src="https://html5.gamedistribution.com/b82efa0f9d7648beb126d62c0fb9363d/"
                scrolling="no"
                allowfullscreen>
            </iframe>
        </div>
        <a href="https://gamedistribution.com" target="_blank" rel="noopener" class="source-badge">Powered by GameDistribution</a>
    </div>
    <script src="../nav.js"></script>
</body>
</html>
