<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Trail Rider</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        canvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F0FF 60%, #90EE90 60%, #228B22 100%);
            border: 2px solid #333;
            cursor: default;
        }
        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 10px 0;
            font-size: 1.1em;
            flex-wrap: wrap;
        }
        .game-info span {
            font-weight: bold;
            color: #667eea;
        }
        .controls {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
        }
        .controls kbd {
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 2px 8px;
            font-family: monospace;
            font-size: 0.95em;
        }
        #restartBtn {
            margin-top: 10px;
            padding: 10px 25px;
            font-size: 1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #restartBtn:hover { transform: scale(1.05); }
        #restartBtn:active { transform: scale(0.98); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🏍️ Motorcycle Trail Rider</h1>
        <div class="game-info">
            <div>Distance: <span id="distance">0</span>m</div>
            <div>Speed: <span id="speed">0</span> km/h</div>
            <div>Flips: <span id="flips">0</span></div>
            <div>Best: <span id="highScore">0</span>m</div>
        </div>
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div class="controls">
            <p>
                <kbd>→</kbd> / <kbd>W</kbd> Accelerate &nbsp;
                <kbd>←</kbd> / <kbd>S</kbd> Brake &nbsp;
                <kbd>↑</kbd> Lean Back &nbsp;
                <kbd>↓</kbd> Lean Forward &nbsp;
                <kbd>Space</kbd> Start / Restart
            </p>
            <button id="restartBtn">Restart</button>
        </div>
        <a href="index.html" class="back-button">← Back to Game Hub</a>
    </div>

    <script>
        // ============================
        // Canvas & DOM Setup
        // ============================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const distanceDisplay = document.getElementById('distance');
        const speedDisplay = document.getElementById('speed');
        const flipsDisplay = document.getElementById('flips');
        const highScoreDisplay = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        const W = canvas.width;
        const H = canvas.height;

        // ============================
        // Sound Effects (Web Audio API)
        // ============================
        function playSound(freq, type = 'square', duration = 0.1) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }

        function playEngineSound() { playSound(80 + Math.random() * 30, 'sawtooth', 0.05); }
        function playLandSound() { playSound(100, 'triangle', 0.15); }
        function playCrashSound() { playSound(60, 'sawtooth', 0.5); playSound(40, 'square', 0.6); }
        function playFlipSound() { playSound(600, 'sine', 0.2); playSound(800, 'sine', 0.15); }
        function playBoostSound() { playSound(400, 'square', 0.1); playSound(500, 'square', 0.08); }

        // ============================
        // Matter.js Aliases
        // ============================
        const { Engine, Render, Runner, Bodies, Body, Composite, Constraint, Events, Vector } = Matter;

        // ============================
        // Game Constants
        // ============================
        const WHEEL_RADIUS = 18;
        const CHASSIS_WIDTH = 70;
        const CHASSIS_HEIGHT = 14;
        const MAX_SPEED = 22;
        const ACCELERATION = 0.014;
        const BRAKE_FORCE = 0.004;
        const LEAN_TORQUE = 0.04;
        const TERRAIN_SEGMENT_WIDTH = 40;
        const TERRAIN_AHEAD = 80;
        const TERRAIN_BEHIND = 20;
        const GROUND_Y = H - 80;
        const CAMERA_OFFSET_X = 250;
        const CAMERA_OFFSET_Y = 200;
        const CRASH_ANGLE = Math.PI * 0.55;

        // ============================
        // Game State
        // ============================
        let engine, motorcycle, terrainBodies, terrainPoints;
        let cameraX = 0, cameraY = 0;
        let gameRunning = false;
        let crashed = false;
        let distance = 0;
        let flipCount = 0;
        let totalRotation = 0;
        let lastAngle = 0;
        let wasAirborne = false;
        let airborneRotation = 0;
        let bestDistance = parseInt(localStorage.getItem('motorcycleHighScore')) || 0;
        let engineSoundTimer = 0;
        let keys = {};
        let lastFrameTime = 0;
        const targetFPS = 60;
        const frameDelay = 1000 / targetFPS;
        let generatedUpTo = 0;
        let generatedFrom = 0;

        highScoreDisplay.textContent = bestDistance;

        // ============================
        // Terrain Generation
        // ============================
        function generateTerrainHeight(x) {
            // Multi-layered procedural terrain with hills, valleys, ramps
            const scale1 = 0.003, scale2 = 0.008, scale3 = 0.02, scale4 = 0.05;

            // Simple seeded noise using sin
            function noise(val) {
                return Math.sin(val * 127.1 + 311.7) * 0.5 + 0.5;
            }

            function smoothNoise(x, scale) {
                const i = Math.floor(x * scale);
                const f = (x * scale) - i;
                const smooth = f * f * (3 - 2 * f); // smoothstep
                return noise(i) * (1 - smooth) + noise(i + 1) * smooth;
            }

            let height = GROUND_Y;

            // Gentle rolling hills
            height -= smoothNoise(x, scale1) * 80;
            // Medium bumps
            height -= smoothNoise(x + 5000, scale2) * 35;
            // Small features
            height -= smoothNoise(x + 10000, scale3) * 20;

            // Ramps / jumps at intervals
            const jumpInterval = 800 + Math.floor(noise(Math.floor(x / 1000)) * 600);
            const jumpPos = x % jumpInterval;
            if (jumpPos < 120 && x > 300) {
                const rampProgress = jumpPos / 120;
                const rampHeight = 35 + noise(Math.floor(x / jumpInterval)) * 30;
                if (rampProgress < 0.5) {
                    // Going up
                    height -= Math.sin(rampProgress * Math.PI) * rampHeight;
                } else {
                    // Going down (gap)
                    height -= Math.sin(rampProgress * Math.PI) * rampHeight * 0.3;
                }
            }

            // Difficulty increases with distance - more dramatic terrain
            const difficultyScale = Math.min(1, x / 15000);
            height -= smoothNoise(x + 20000, scale4) * 15 * difficultyScale;

            // Keep terrain within bounds
            height = Math.max(100, Math.min(H - 30, height));

            // Flat starting area
            if (x < 600) {
                const blend = Math.min(1, x / 600);
                height = GROUND_Y * (1 - blend) + height * blend;
            }

            return height;
        }

        function buildTerrainSegments(fromX, toX) {
            const newBodies = [];
            const segW = TERRAIN_SEGMENT_WIDTH;

            for (let x = fromX; x < toX; x += segW) {
                const y1 = generateTerrainHeight(x);
                const y2 = generateTerrainHeight(x + segW);

                // Create angled ground segment
                const cx = x + segW / 2;
                const cy = (y1 + y2) / 2;
                const angle = Math.atan2(y2 - y1, segW);
                const length = Math.sqrt(segW * segW + (y2 - y1) * (y2 - y1));

                const seg = Bodies.rectangle(cx, cy + 15, length + 2, 30, {
                    isStatic: true,
                    angle: angle,
                    friction: 0.8,
                    restitution: 0.1,
                    render: { visible: false },
                    label: 'terrain'
                });
                newBodies.push(seg);

                terrainPoints.push({ x: x, y: y1 });
            }
            terrainPoints.push({ x: toX, y: generateTerrainHeight(toX) });

            Composite.add(engine.world, newBodies);
            terrainBodies.push(...newBodies);
        }

        function cleanupTerrain(bikeX) {
            const minX = bikeX - TERRAIN_BEHIND * TERRAIN_SEGMENT_WIDTH;
            const toRemove = [];

            for (let i = terrainBodies.length - 1; i >= 0; i--) {
                if (terrainBodies[i].position.x < minX) {
                    toRemove.push(terrainBodies[i]);
                    terrainBodies.splice(i, 1);
                }
            }
            if (toRemove.length > 0) {
                Composite.remove(engine.world, toRemove);
            }

            terrainPoints = terrainPoints.filter(p => p.x >= minX - TERRAIN_SEGMENT_WIDTH);
        }

        function ensureTerrain(bikeX) {
            const neededTo = bikeX + TERRAIN_AHEAD * TERRAIN_SEGMENT_WIDTH;
            if (neededTo > generatedUpTo) {
                buildTerrainSegments(generatedUpTo, neededTo);
                generatedUpTo = neededTo;
            }
            cleanupTerrain(bikeX);
        }

        // ============================
        // Motorcycle Creation
        // ============================
        function createMotorcycle(x, y) {
            const rearWheel = Bodies.circle(x - 22, y, WHEEL_RADIUS, {
                friction: 0.9,
                restitution: 0.1,
                density: 0.002,
                label: 'rearWheel'
            });

            const frontWheel = Bodies.circle(x + 28, y, WHEEL_RADIUS, {
                friction: 0.9,
                restitution: 0.1,
                density: 0.0015,
                label: 'frontWheel'
            });

            const chassis = Bodies.rectangle(x, y - 25, CHASSIS_WIDTH, CHASSIS_HEIGHT, {
                friction: 0.5,
                restitution: 0.05,
                density: 0.003,
                label: 'chassis',
                chamfer: { radius: 4 }
            });

            // Suspension constraints (spring-like)
            const rearSuspension = Constraint.create({
                bodyA: chassis,
                pointA: { x: -22, y: 12 },
                bodyB: rearWheel,
                stiffness: 0.4,
                damping: 0.1,
                length: 8
            });

            const frontSuspension = Constraint.create({
                bodyA: chassis,
                pointA: { x: 28, y: 12 },
                bodyB: frontWheel,
                stiffness: 0.35,
                damping: 0.1,
                length: 10
            });

            // Anti-sag cross brace
            const crossBrace = Constraint.create({
                bodyA: rearWheel,
                bodyB: frontWheel,
                stiffness: 0.15,
                damping: 0.05,
                length: 55
            });

            Composite.add(engine.world, [rearWheel, frontWheel, chassis, rearSuspension, frontSuspension, crossBrace]);

            return { rearWheel, frontWheel, chassis, rearSuspension, frontSuspension, crossBrace };
        }

        // ============================
        // Check Airborne State
        // ============================
        function isAirborne() {
            const bodies = Composite.allBodies(engine.world);
            const rearPos = motorcycle.rearWheel.position;
            const frontPos = motorcycle.frontWheel.position;

            for (const body of bodies) {
                if (body.label !== 'terrain') continue;
                // Check if either wheel is near any terrain body
                const dx1 = rearPos.x - body.position.x;
                const dy1 = rearPos.y - body.position.y;
                const dx2 = frontPos.x - body.position.x;
                const dy2 = frontPos.y - body.position.y;

                const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

                if (dist1 < WHEEL_RADIUS + 25 || dist2 < WHEEL_RADIUS + 25) {
                    return false;
                }
            }
            return true;
        }

        // ============================
        // Drawing Functions
        // ============================
        function drawSky() {
            // Gradient sky
            const grad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
            grad.addColorStop(0, '#4A90D9');
            grad.addColorStop(0.5, '#87CEEB');
            grad.addColorStop(1, '#C8E6FF');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Clouds (parallax)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            for (let i = 0; i < 8; i++) {
                const cx = ((i * 250 + 100 - cameraX * 0.1) % (W + 200)) - 100;
                const cy = 40 + (i * 37) % 100;
                drawCloud(cx, cy, 30 + (i * 13) % 30);
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.4, y, size * 0.6, 0, Math.PI * 2);
            ctx.arc(x - size * 0.5, y + size * 0.1, size * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMountains() {
            // Background mountains (parallax)
            ctx.fillStyle = '#6B8E6B';
            ctx.beginPath();
            ctx.moveTo(0, H);
            for (let x = 0; x <= W; x += 5) {
                const worldX = x + cameraX * 0.15;
                const mh = Math.sin(worldX * 0.002) * 80 + Math.sin(worldX * 0.005 + 2) * 40 + Math.sin(worldX * 0.001) * 50;
                ctx.lineTo(x, H * 0.35 - mh);
            }
            ctx.lineTo(W, H);
            ctx.closePath();
            ctx.fill();

            // Closer hills
            ctx.fillStyle = '#4A7A4A';
            ctx.beginPath();
            ctx.moveTo(0, H);
            for (let x = 0; x <= W; x += 5) {
                const worldX = x + cameraX * 0.3;
                const mh = Math.sin(worldX * 0.004 + 1) * 50 + Math.sin(worldX * 0.008) * 25;
                ctx.lineTo(x, H * 0.5 - mh);
            }
            ctx.lineTo(W, H);
            ctx.closePath();
            ctx.fill();
        }

        function drawTerrain() {
            if (terrainPoints.length < 2) return;

            // Main terrain fill
            const grad = ctx.createLinearGradient(0, H * 0.5, 0, H);
            grad.addColorStop(0, '#3D8B37');
            grad.addColorStop(0.3, '#2D6B27');
            grad.addColorStop(1, '#1A4A15');
            ctx.fillStyle = grad;

            ctx.beginPath();
            const sorted = terrainPoints.slice().sort((a, b) => a.x - b.x);

            // Start from bottom left
            const firstScreen = sorted[0].x - cameraX;
            const lastScreen = sorted[sorted.length - 1].x - cameraX;

            ctx.moveTo(firstScreen, H + 10);
            for (const p of sorted) {
                ctx.lineTo(p.x - cameraX, p.y - cameraY);
            }
            ctx.lineTo(lastScreen, H + 10);
            ctx.closePath();
            ctx.fill();

            // Terrain surface line
            ctx.strokeStyle = '#2A5A24';
            ctx.lineWidth = 3;
            ctx.beginPath();
            let first = true;
            for (const p of sorted) {
                const sx = p.x - cameraX;
                const sy = p.y - cameraY;
                if (sx < -50 || sx > W + 50) continue;
                if (first) { ctx.moveTo(sx, sy); first = false; }
                else ctx.lineTo(sx, sy);
            }
            ctx.stroke();

            // Grass tufts
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 2;
            for (let i = 0; i < sorted.length - 1; i += 3) {
                const sx = sorted[i].x - cameraX;
                const sy = sorted[i].y - cameraY;
                if (sx < -20 || sx > W + 20) continue;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx - 3, sy - 8);
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + 3, sy - 7);
                ctx.stroke();
            }
        }

        function drawWheel(wheel, isFront) {
            const pos = wheel.position;
            const sx = pos.x - cameraX;
            const sy = pos.y - cameraY;
            const R = WHEEL_RADIUS;
            const angle = wheel.angle;

            // Outer tire with knobby tread
            ctx.beginPath();
            ctx.arc(sx, sy, R + 2, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();

            // Tire body
            ctx.beginPath();
            ctx.arc(sx, sy, R, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a';
            ctx.fill();

            // Knobby tread pattern
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                const a = angle + (i * Math.PI / 6);
                const innerR = R - 3;
                const outerR = R + 1;
                ctx.beginPath();
                ctx.moveTo(sx + Math.cos(a) * innerR, sy + Math.sin(a) * innerR);
                ctx.lineTo(sx + Math.cos(a + 0.12) * outerR, sy + Math.sin(a + 0.12) * outerR);
                ctx.stroke();
            }

            // Rim
            ctx.beginPath();
            ctx.arc(sx, sy, R * 0.58, 0, Math.PI * 2);
            ctx.fillStyle = '#B0B0B0';
            ctx.fill();
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Inner rim detail
            ctx.beginPath();
            ctx.arc(sx, sy, R * 0.48, 0, Math.PI * 2);
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Spokes (rotating)
            ctx.strokeStyle = '#C0C0C0';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                const a = angle + (i * Math.PI / 4);
                ctx.beginPath();
                ctx.moveTo(sx + Math.cos(a) * 4, sy + Math.sin(a) * 4);
                ctx.lineTo(sx + Math.cos(a) * R * 0.52, sy + Math.sin(a) * R * 0.52);
                ctx.stroke();
            }

            // Hub
            ctx.beginPath();
            ctx.arc(sx, sy, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#DDD';
            ctx.fill();
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Axle bolt
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#777';
            ctx.fill();

            // Disc brake (front wheel)
            if (isFront) {
                ctx.beginPath();
                ctx.arc(sx, sy, R * 0.38, 0, Math.PI * 2);
                ctx.strokeStyle = '#AAA';
                ctx.lineWidth = 2;
                ctx.stroke();
                // Brake holes
                for (let i = 0; i < 4; i++) {
                    const a = angle + (i * Math.PI / 2) + 0.3;
                    ctx.beginPath();
                    ctx.arc(sx + Math.cos(a) * R * 0.3, sy + Math.sin(a) * R * 0.3, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#888';
                    ctx.fill();
                }
            }
        }

        function drawMotorcycle() {
            if (!motorcycle) return;

            const chassis = motorcycle.chassis;
            const rw = motorcycle.rearWheel.position;
            const fw = motorcycle.frontWheel.position;
            const rwScreen = { x: rw.x - cameraX, y: rw.y - cameraY };
            const fwScreen = { x: fw.x - cameraX, y: fw.y - cameraY };
            const cx = chassis.position.x - cameraX;
            const cy = chassis.position.y - cameraY;
            const angle = chassis.angle;

            // Helper to transform chassis-local to screen coords
            function local(lx, ly) {
                return {
                    x: cx + Math.cos(angle) * lx - Math.sin(angle) * ly,
                    y: cy + Math.sin(angle) * lx + Math.cos(angle) * ly
                };
            }

            // Draw wheels first (behind frame)
            drawWheel(motorcycle.rearWheel, false);
            drawWheel(motorcycle.frontWheel, true);

            // === Rear sprocket (small circle near rear axle) ===
            ctx.beginPath();
            ctx.arc(rwScreen.x, rwScreen.y, 7, 0, Math.PI * 2);
            ctx.fillStyle = '#666';
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.stroke();

            // === Chain (rear sprocket to engine area) ===
            const engineBottom = local(-2, 10);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 2;
            ctx.setLineDash([3, 2]);
            ctx.beginPath();
            ctx.moveTo(rwScreen.x - 2, rwScreen.y - 5);
            ctx.lineTo(engineBottom.x, engineBottom.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(rwScreen.x + 2, rwScreen.y + 5);
            ctx.lineTo(engineBottom.x + 3, engineBottom.y + 3);
            ctx.stroke();
            ctx.setLineDash([]);

            // === Swingarm (rear axle to chassis pivot) ===
            const swingPivot = local(-10, 5);
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(swingPivot.x, swingPivot.y);
            ctx.lineTo(rwScreen.x, rwScreen.y);
            ctx.stroke();
            // Swingarm highlight
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(swingPivot.x, swingPivot.y);
            ctx.lineTo(rwScreen.x, rwScreen.y);
            ctx.stroke();

            // === Front fork tubes (twin tubes with rake) ===
            const headstock = local(24, -8);
            const forkOffset1 = 3;
            const forkOffset2 = -3;
            // Calculate perpendicular direction for fork spread
            const forkDx = fwScreen.x - headstock.x;
            const forkDy = fwScreen.y - headstock.y;
            const forkLen = Math.sqrt(forkDx * forkDx + forkDy * forkDy);
            const perpX = -forkDy / forkLen * forkOffset1;
            const perpY = forkDx / forkLen * forkOffset1;

            // Fork outer tubes (chrome)
            ctx.strokeStyle = '#AAA';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(headstock.x + perpX, headstock.y + perpY);
            ctx.lineTo(fwScreen.x + perpX * 0.5, fwScreen.y + perpY * 0.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(headstock.x - perpX, headstock.y - perpY);
            ctx.lineTo(fwScreen.x - perpX * 0.5, fwScreen.y - perpY * 0.5);
            ctx.stroke();

            // Fork inner tubes (gold - like inverted forks)
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 3;
            const forkMidX = (headstock.x + fwScreen.x) / 2;
            const forkMidY = (headstock.y + fwScreen.y) / 2;
            ctx.beginPath();
            ctx.moveTo(headstock.x + perpX, headstock.y + perpY);
            ctx.lineTo(forkMidX + perpX * 0.7, forkMidY + perpY * 0.7);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(headstock.x - perpX, headstock.y - perpY);
            ctx.lineTo(forkMidX - perpX * 0.7, forkMidY - perpY * 0.7);
            ctx.stroke();

            // === Rear shock absorber ===
            const shockTop = local(-8, -4);
            const shockBottom = local(-18, 8);
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(shockTop.x, shockTop.y);
            ctx.lineTo(shockBottom.x, shockBottom.y);
            ctx.stroke();
            // Spring coil
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1.5;
            const shockSteps = 6;
            for (let i = 0; i < shockSteps; i++) {
                const t1 = i / shockSteps;
                const t2 = (i + 0.5) / shockSteps;
                const x1 = shockTop.x + (shockBottom.x - shockTop.x) * t1;
                const y1 = shockTop.y + (shockBottom.y - shockTop.y) * t1;
                const x2 = shockTop.x + (shockBottom.x - shockTop.x) * t2;
                const y2 = shockTop.y + (shockBottom.y - shockTop.y) * t2;
                const offset = (i % 2 === 0 ? 3 : -3);
                ctx.beginPath();
                ctx.moveTo(x1 + perpX * offset * 0.3, y1 + perpY * offset * 0.3);
                ctx.lineTo(x2 - perpX * offset * 0.3, y2 - perpY * offset * 0.3);
                ctx.stroke();
            }

            // Now draw chassis-relative parts
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);

            // === Main frame tubes ===
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            // Downtube
            ctx.beginPath();
            ctx.moveTo(24, -8);   // headstock
            ctx.lineTo(5, 8);    // bottom bracket
            ctx.lineTo(-10, 5);  // swing pivot
            ctx.stroke();
            // Top tube
            ctx.beginPath();
            ctx.moveTo(24, -8);
            ctx.lineTo(5, -12);
            ctx.lineTo(-12, -6);
            ctx.stroke();
            // Subframe (seat support)
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-12, -6);
            ctx.lineTo(-28, -2);
            ctx.lineTo(-32, 4);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-10, 5);
            ctx.lineTo(-28, -2);
            ctx.stroke();

            // === Engine block ===
            ctx.fillStyle = '#3a3a3a';
            ctx.beginPath();
            ctx.moveTo(-4, 2);
            ctx.lineTo(12, 2);
            ctx.lineTo(14, 14);
            ctx.lineTo(-6, 14);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Cylinder fins
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            for (let i = 0; i < 4; i++) {
                const fy = 4 + i * 2.5;
                ctx.beginPath();
                ctx.moveTo(-5, fy);
                ctx.lineTo(14, fy);
                ctx.stroke();
            }

            // Cylinder head
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.moveTo(2, -1);
            ctx.lineTo(10, -1);
            ctx.lineTo(12, 3);
            ctx.lineTo(0, 3);
            ctx.closePath();
            ctx.fill();

            // Front sprocket
            ctx.beginPath();
            ctx.arc(2, 12, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#666';
            ctx.fill();

            // === Exhaust pipe ===
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(8, 12);
            ctx.quadraticCurveTo(2, 18, -12, 16);
            ctx.quadraticCurveTo(-24, 14, -34, 10);
            ctx.stroke();
            // Chrome pipe highlight
            ctx.strokeStyle = '#BBB';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(8, 11);
            ctx.quadraticCurveTo(2, 16, -12, 14);
            ctx.stroke();
            // Silencer end
            ctx.fillStyle = '#777';
            ctx.beginPath();
            ctx.ellipse(-34, 10, 5, 3, angle, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.stroke();

            // === Fuel tank ===
            const tankGrad = ctx.createLinearGradient(-2, -16, -2, -6);
            tankGrad.addColorStop(0, '#E83020');
            tankGrad.addColorStop(0.4, '#CC2200');
            tankGrad.addColorStop(1, '#991800');
            ctx.fillStyle = tankGrad;
            ctx.beginPath();
            ctx.moveTo(18, -10);
            ctx.quadraticCurveTo(14, -18, 4, -18);
            ctx.quadraticCurveTo(-6, -18, -8, -12);
            ctx.lineTo(-8, -8);
            ctx.quadraticCurveTo(-4, -6, 8, -6);
            ctx.quadraticCurveTo(16, -6, 18, -10);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#881400';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Tank highlight stripe
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(14, -15);
            ctx.quadraticCurveTo(6, -17, -4, -15);
            ctx.stroke();
            // Tank graphic stripe
            ctx.strokeStyle = '#FFaa00';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(16, -12);
            ctx.quadraticCurveTo(6, -14, -6, -12);
            ctx.stroke();

            // === Seat ===
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.moveTo(-8, -10);
            ctx.quadraticCurveTo(-12, -16, -20, -12);
            ctx.quadraticCurveTo(-28, -10, -30, -6);
            ctx.lineTo(-28, -4);
            ctx.quadraticCurveTo(-16, -5, -8, -7);
            ctx.closePath();
            ctx.fill();
            // Seat stitch line
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(-10, -9);
            ctx.quadraticCurveTo(-18, -11, -26, -7);
            ctx.stroke();

            // === Rear fender ===
            ctx.fillStyle = '#CC2200';
            ctx.beginPath();
            ctx.moveTo(-30, -2);
            ctx.quadraticCurveTo(-34, 2, -32, 8);
            ctx.quadraticCurveTo(-28, 6, -24, 2);
            ctx.closePath();
            ctx.fill();

            // === Front fender ===
            ctx.fillStyle = '#CC2200';
            ctx.beginPath();
            ctx.moveTo(30, -4);
            ctx.quadraticCurveTo(36, 2, 34, 8);
            ctx.quadraticCurveTo(30, 6, 28, 0);
            ctx.closePath();
            ctx.fill();

            // === Number plate (front) ===
            ctx.fillStyle = '#F5F5F5';
            ctx.beginPath();
            ctx.moveTo(26, -14);
            ctx.lineTo(32, -14);
            ctx.lineTo(33, -6);
            ctx.lineTo(25, -6);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Number
            ctx.fillStyle = '#222';
            ctx.font = 'bold 6px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('7', 29, -8);
            ctx.textAlign = 'left';

            // === Headlight ===
            ctx.fillStyle = '#FFF8CC';
            ctx.beginPath();
            ctx.arc(30, -2, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(30, -2, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // === Handlebars ===
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(22, -12);
            ctx.lineTo(20, -22);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(20, -22);
            ctx.lineTo(16, -24);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(20, -22);
            ctx.lineTo(24, -24);
            ctx.stroke();
            // Grips
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(16, -24, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(24, -24, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // === Foot pegs ===
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-6, 12);
            ctx.lineTo(-10, 15);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(4, 12);
            ctx.lineTo(0, 15);
            ctx.stroke();

            // === Rider ===
            drawRider();

            ctx.restore();
        }

        function drawRider() {
            // === Boots ===
            ctx.fillStyle = '#1a1a1a';
            // Rear foot on peg
            ctx.beginPath();
            ctx.moveTo(-12, 8);
            ctx.lineTo(-8, 14);
            ctx.lineTo(-4, 14);
            ctx.lineTo(-4, 10);
            ctx.lineTo(-10, 6);
            ctx.closePath();
            ctx.fill();

            // === Legs (thick, with knee bend) ===
            ctx.strokeStyle = '#2B4F8C';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            // Shin
            ctx.beginPath();
            ctx.moveTo(-8, 12);
            ctx.lineTo(-14, 2);
            ctx.stroke();
            // Thigh
            ctx.beginPath();
            ctx.moveTo(-14, 2);
            ctx.lineTo(-6, -8);
            ctx.stroke();

            // Knee pad
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(-14, 2, 3.5, 0, Math.PI * 2);
            ctx.fill();

            // === Torso ===
            ctx.fillStyle = '#D43030';
            ctx.beginPath();
            ctx.moveTo(-6, -8);
            ctx.lineTo(2, -8);
            ctx.quadraticCurveTo(8, -10, 10, -16);
            ctx.lineTo(6, -18);
            ctx.quadraticCurveTo(0, -14, -6, -10);
            ctx.closePath();
            ctx.fill();
            // Jersey detail - chest stripe
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-2, -9);
            ctx.quadraticCurveTo(4, -12, 8, -16);
            ctx.stroke();

            // === Arms (bent to handlebars) ===
            ctx.strokeStyle = '#D43030';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            // Upper arm
            ctx.beginPath();
            ctx.moveTo(8, -16);
            ctx.lineTo(14, -20);
            ctx.stroke();
            // Forearm
            ctx.strokeStyle = '#C02828';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(14, -20);
            ctx.lineTo(20, -22);
            ctx.stroke();

            // Glove
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(20, -22, 3, 0, Math.PI * 2);
            ctx.fill();

            // === Helmet ===
            // Main helmet shell
            const helmetGrad = ctx.createRadialGradient(11, -24, 2, 11, -24, 9);
            helmetGrad.addColorStop(0, '#E83020');
            helmetGrad.addColorStop(0.7, '#CC2200');
            helmetGrad.addColorStop(1, '#991800');
            ctx.fillStyle = helmetGrad;
            ctx.beginPath();
            ctx.arc(11, -24, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#881400';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Helmet chin guard
            ctx.fillStyle = '#AA1C00';
            ctx.beginPath();
            ctx.moveTo(16, -20);
            ctx.quadraticCurveTo(20, -22, 18, -26);
            ctx.lineTo(16, -24);
            ctx.quadraticCurveTo(18, -22, 16, -20);
            ctx.closePath();
            ctx.fill();

            // Visor
            ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
            ctx.beginPath();
            ctx.moveTo(14, -28);
            ctx.quadraticCurveTo(20, -26, 19, -22);
            ctx.quadraticCurveTo(17, -22, 15, -24);
            ctx.quadraticCurveTo(13, -26, 14, -28);
            ctx.closePath();
            ctx.fill();
            // Visor glare
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(15, -27);
            ctx.quadraticCurveTo(18, -26, 18, -24);
            ctx.stroke();

            // Helmet stripe
            ctx.strokeStyle = '#FFaa00';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(11, -24, 7, -2.5, -0.8);
            ctx.stroke();

            // Goggle strap
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(11, -24, 8.5, -1.0, 0.5);
            ctx.stroke();
        }

        function drawHUD() {
            // Speed indicator
            const speed = getSpeed();
            const speedPct = Math.min(1, speed / MAX_SPEED);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(W - 160, 10, 150, 25);
            ctx.fillStyle = speedPct > 0.8 ? '#FF4444' : speedPct > 0.5 ? '#FFAA00' : '#44FF44';
            ctx.fillRect(W - 158, 12, 146 * speedPct, 21);
            ctx.fillStyle = '#FFF';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${Math.round(speed * 15)} km/h`, W - 85, 27);

            // Airborne indicator
            if (isAirborne()) {
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('AIRBORNE!', W / 2, 40);

                if (Math.abs(airborneRotation) > Math.PI * 0.5) {
                    ctx.fillStyle = '#FF6600';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText(`${Math.abs(Math.floor(airborneRotation / Math.PI))}x FLIP!`, W / 2, 65);
                }
            }

            ctx.textAlign = 'left';
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🏍️ Motorcycle Trail Rider', W / 2, H / 2 - 60);

            ctx.font = '20px Arial';
            ctx.fillStyle = '#CCC';
            ctx.fillText('Race across procedurally generated terrain!', W / 2, H / 2 - 20);
            ctx.fillText('Land jumps, do flips, set distance records!', W / 2, H / 2 + 10);

            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('Press SPACE to Start', W / 2, H / 2 + 60);

            ctx.font = '14px Arial';
            ctx.fillStyle = '#999';
            ctx.fillText('Arrow Keys / WASD to control', W / 2, H / 2 + 95);

            ctx.textAlign = 'left';
        }

        function drawCrashScreen() {
            ctx.fillStyle = 'rgba(200, 0, 0, 0.3)';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('CRASHED!', W / 2, H / 2 - 40);

            ctx.font = '22px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText(`Distance: ${Math.round(distance)}m  |  Flips: ${flipCount}`, W / 2, H / 2 + 10);

            if (Math.round(distance) >= bestDistance && distance > 0) {
                ctx.fillStyle = '#00FF88';
                ctx.fillText('NEW BEST!', W / 2, H / 2 + 45);
            }

            ctx.font = '18px Arial';
            ctx.fillStyle = '#CCC';
            ctx.fillText('Press SPACE to Restart', W / 2, H / 2 + 80);

            ctx.textAlign = 'left';
        }

        // ============================
        // Game Logic
        // ============================
        function getSpeed() {
            if (!motorcycle) return 0;
            const v = motorcycle.chassis.velocity;
            return Math.sqrt(v.x * v.x + v.y * v.y);
        }

        function updateMotorcycle() {
            if (!motorcycle || crashed) return;

            const chassis = motorcycle.chassis;
            const rearWheel = motorcycle.rearWheel;
            const frontWheel = motorcycle.frontWheel;
            const angle = chassis.angle;

            // Acceleration (both wheels for hill climbing power)
            if (keys['ArrowRight'] || keys['KeyW'] || keys['KeyD']) {
                const force = ACCELERATION;
                Body.applyForce(rearWheel, rearWheel.position, {
                    x: Math.cos(angle) * force,
                    y: Math.sin(angle) * force
                });
                Body.applyForce(frontWheel, frontWheel.position, {
                    x: Math.cos(angle) * force * 0.6,
                    y: Math.sin(angle) * force * 0.6
                });
                engineSoundTimer++;
                if (engineSoundTimer % 8 === 0) playEngineSound();
            }

            // Brake
            if (keys['ArrowLeft'] || keys['KeyS'] || keys['KeyA']) {
                const v = rearWheel.velocity;
                const speed = Math.sqrt(v.x * v.x + v.y * v.y);
                if (speed > 0.5) {
                    Body.applyForce(rearWheel, rearWheel.position, {
                        x: -v.x * BRAKE_FORCE,
                        y: -v.y * BRAKE_FORCE
                    });
                    Body.applyForce(frontWheel, frontWheel.position, {
                        x: -frontWheel.velocity.x * BRAKE_FORCE * 0.5,
                        y: -frontWheel.velocity.y * BRAKE_FORCE * 0.5
                    });
                }
            }

            // Lean back
            if (keys['ArrowUp']) {
                Body.setAngularVelocity(chassis, chassis.angularVelocity - LEAN_TORQUE);
            }

            // Lean forward
            if (keys['ArrowDown']) {
                Body.setAngularVelocity(chassis, chassis.angularVelocity + LEAN_TORQUE);
            }

            // Speed limit
            const v = chassis.velocity;
            const speed = Math.sqrt(v.x * v.x + v.y * v.y);
            if (speed > MAX_SPEED) {
                const scale = MAX_SPEED / speed;
                Body.setVelocity(chassis, { x: v.x * scale, y: v.y * scale });
            }

            // Track airborne state & flips
            const airborne = isAirborne();
            if (airborne) {
                const angleDiff = chassis.angle - lastAngle;
                // Normalize angle difference
                let normDiff = angleDiff;
                if (normDiff > Math.PI) normDiff -= Math.PI * 2;
                if (normDiff < -Math.PI) normDiff += Math.PI * 2;
                airborneRotation += normDiff;

                if (!wasAirborne) {
                    airborneRotation = 0;
                }
            } else {
                if (wasAirborne && Math.abs(airborneRotation) >= Math.PI * 1.8) {
                    const flips = Math.floor(Math.abs(airborneRotation) / (Math.PI * 1.8));
                    flipCount += flips;
                    flipsDisplay.textContent = flipCount;
                    playFlipSound();
                }
                if (wasAirborne) {
                    playLandSound();
                }
                airborneRotation = 0;
            }
            wasAirborne = airborne;
            lastAngle = chassis.angle;

            // Crash detection
            const chassisAngle = Math.abs(chassis.angle % (Math.PI * 2));
            const normalizedAngle = chassisAngle > Math.PI ? Math.PI * 2 - chassisAngle : chassisAngle;
            if (normalizedAngle > CRASH_ANGLE && !airborne) {
                crashMotorcycle();
            }

            // Check if fallen off the map
            if (chassis.position.y > H + 200) {
                crashMotorcycle();
            }

            // Update distance
            distance = Math.max(0, (chassis.position.x - 200) / 30);
            distanceDisplay.textContent = Math.round(distance);
            speedDisplay.textContent = Math.round(getSpeed() * 15);
        }

        function crashMotorcycle() {
            if (crashed) return;
            crashed = true;
            gameRunning = false;
            playCrashSound();

            if (Math.round(distance) > bestDistance) {
                bestDistance = Math.round(distance);
                localStorage.setItem('motorcycleHighScore', bestDistance);
                highScoreDisplay.textContent = bestDistance;
            }
        }

        function updateCamera() {
            if (!motorcycle) return;
            const target_x = motorcycle.chassis.position.x - CAMERA_OFFSET_X;
            const target_y = motorcycle.chassis.position.y - CAMERA_OFFSET_Y;

            // Smooth camera follow
            cameraX += (target_x - cameraX) * 0.08;
            cameraY += (target_y - cameraY) * 0.05;

            // Clamp vertical
            cameraY = Math.max(-100, Math.min(H * 0.3, cameraY));
        }

        // ============================
        // Game Loop
        // ============================
        function gameLoop(timestamp) {
            if (timestamp - lastFrameTime < frameDelay) {
                requestAnimationFrame(gameLoop);
                return;
            }
            lastFrameTime = timestamp - ((timestamp - lastFrameTime) % frameDelay);

            if (gameRunning && !crashed) {
                Engine.update(engine, frameDelay);
                updateMotorcycle();
                updateCamera();
                ensureTerrain(motorcycle.chassis.position.x);
            }

            // Draw
            ctx.clearRect(0, 0, W, H);
            drawSky();
            drawMountains();
            drawTerrain();

            if (motorcycle) {
                drawMotorcycle();
                drawHUD();
            }

            if (crashed) {
                drawCrashScreen();
            } else if (!gameRunning) {
                drawStartScreen();
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================
        // Game Initialization
        // ============================
        function startGame() {
            // Create / reset physics engine
            if (engine) {
                Engine.clear(engine);
                Composite.clear(engine.world, false);
            }

            engine = Engine.create({
                gravity: { x: 0, y: 0.9 }
            });

            terrainBodies = [];
            terrainPoints = [];
            generatedUpTo = 0;
            generatedFrom = 0;

            // Generate initial terrain
            buildTerrainSegments(-200, TERRAIN_AHEAD * TERRAIN_SEGMENT_WIDTH);
            generatedUpTo = TERRAIN_AHEAD * TERRAIN_SEGMENT_WIDTH;

            // Create motorcycle at start
            motorcycle = createMotorcycle(200, GROUND_Y - 60);

            // Reset state
            cameraX = 0;
            cameraY = 0;
            distance = 0;
            flipCount = 0;
            totalRotation = 0;
            lastAngle = 0;
            wasAirborne = false;
            airborneRotation = 0;
            crashed = false;
            gameRunning = true;
            engineSoundTimer = 0;

            distanceDisplay.textContent = '0';
            speedDisplay.textContent = '0';
            flipsDisplay.textContent = '0';

            playBoostSound();
        }

        // ============================
        // Event Listeners
        // ============================
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning) {
                    startGame();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        restartBtn.addEventListener('click', () => {
            startGame();
        });

        // Prevent arrow key scrolling
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        // ============================
        // Initial Draw
        // ============================
        engine = Engine.create({ gravity: { x: 0, y: 0.9 } });
        terrainBodies = [];
        terrainPoints = [];
        buildTerrainSegments(-200, TERRAIN_AHEAD * TERRAIN_SEGMENT_WIDTH);
        generatedUpTo = TERRAIN_AHEAD * TERRAIN_SEGMENT_WIDTH;
        motorcycle = createMotorcycle(200, GROUND_Y - 60);
        cameraX = 0;
        cameraY = 0;

        // Draw initial frame then show start screen
        ctx.clearRect(0, 0, W, H);
        drawSky();
        drawMountains();
        drawTerrain();
        drawMotorcycle();
        drawStartScreen();

        requestAnimationFrame(gameLoop);

        // Auto-scale canvas to fit viewport
        (function() {
            const c = document.getElementById('gameCanvas');
            const bw = c.width, bh = c.height;
            function sc() {
                const par = c.parentElement;
                const ps = getComputedStyle(par);
                const mw = par.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const mh = window.innerHeight * 0.75;
                const s = Math.min(mw / bw, mh / bh, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + s + ')';
                c.style.marginBottom = (-(bh * (1 - s))) + 'px';
            }
            window.addEventListener('resize', sc);
            sc();
        })();
    </script>
</body>
