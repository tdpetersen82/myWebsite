                    ctx.fillText(`You: ${p1.score}  •  AI: ${p2.score}`, cx, 130);
                } else if (isSoloType) {
                    ctx.fillText(`Your Score: ${p1.score}`, cx, 130);
                } else {
                    ctx.fillText(`P1: ${p1.score}  •  P2: ${p2.score}`, cx, 130);
                }
                if (currentMode === 'zen') {
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = '#94A3B8';
                    ctx.fillText(`Best: ${zenHighScore}`, cx, 154);
                } else if (currentMode === 'survival') {
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = '#94A3B8';
                    ctx.fillText(`Best Round: ${survivalHighScore}`, cx, 154);
                }
                ctx.globalAlpha = 1;
            }

            // Stats
            const trueSolo = currentMode === 'zen' || currentMode === 'survival';
            const stats = trueSolo ? [
                ['Fruits Caught', p1.fruitsOnly,     null],
                ['Total Items',   p1.totalCaught,    null],
                ['Max Combo',     p1.maxCombo,       null],
                ['Power-Ups',     p1.powerUpsCaught, null],
                ['Stars/Golden',  p1.starsGolden,    null],
                ['Bombs Hit',     p1.bombsCaught,    null],
            ] : [
                ['Fruits Caught', p1.fruitsOnly,     p2.fruitsOnly    ],
                ['Total Items',   p1.totalCaught,    p2.totalCaught   ],
                ['Max Combo',     p1.maxCombo,       p2.maxCombo      ],
                ['Power-Ups',     p1.powerUpsCaught, p2.powerUpsCaught],
                ['Stars/Golden',  p1.starsGolden,    p2.starsGolden   ],
                ['Bombs Hit',     p1.bombsCaught,    p2.bombsCaught   ],
            ];

            const colX1 = cx - (trueSolo ? 70 : 170);
            const colX2 = cx + 170;
            const startY = 180;
            const lineH  = 27;

            // Column headers — fade in at 600ms
            if (!trueSolo && elapsed >= 600) {
                const a = Math.min(1, (elapsed - 600) / 280);
                ctx.globalAlpha = a;
                ctx.font = 'bold 15px sans-serif';
                const lbl1 = currentMode === 'solo' ? 'You' : 'P1';
                const lbl2 = currentMode === 'solo' ? 'AI'  : 'P2';
                ctx.fillStyle = '#3B82F6'; ctx.fillText(lbl1,   colX1, startY - 12);
                ctx.fillStyle = '#94A3B8'; ctx.fillText('Stat', cx,    startY - 12);
                ctx.fillStyle = '#EF4444'; ctx.fillText(lbl2,   colX2, startY - 12);
                ctx.globalAlpha = 1;
            } else if (trueSolo && elapsed >= 600) {
                const a = Math.min(1, (elapsed - 600) / 280);
                ctx.globalAlpha = a;
                ctx.font = 'bold 15px sans-serif';
                ctx.fillStyle = '#94A3B8'; ctx.fillText('Stat', cx, startY - 12);
                ctx.globalAlpha = 1;
            }

            // Stats rows — each fades in 200ms apart, starting at 700ms
            ctx.font = '15px sans-serif';
            stats.forEach((row, i) => {
                const fadeStart = 700 + i * 200;
                const a = Math.min(1, Math.max(0, (elapsed - fadeStart) / 220));
                if (a <= 0) return;
                ctx.globalAlpha = a;
                const y = startY + 16 + i * lineH;

                if (trueSolo) {
                    ctx.fillStyle = '#60A5FA'; ctx.fillText(String(row[1]), colX1, y);
                    ctx.fillStyle = '#CBD5E1'; ctx.fillText(row[0], cx, y);
                } else {
                    const p1w = row[1] > row[2], p2w = row[2] > row[1];
                    ctx.fillStyle = p1w ? '#60A5FA' : '#94A3B8'; ctx.fillText(String(row[1]), colX1, y);
                    ctx.fillStyle = '#CBD5E1'; ctx.fillText(row[0], cx, y);
                    ctx.fillStyle = p2w ? '#F87171' : '#94A3B8'; ctx.fillText(String(row[2]), colX2, y);
                }
                ctx.globalAlpha = 1;
            });

            // Restart prompt — appears after all stats
            const promptStart = 700 + stats.length * 200 + 350;
            if (elapsed >= promptStart) {
                const a = Math.min(1, (elapsed - promptStart) / 400);
                ctx.globalAlpha = a;
                ctx.font = '16px sans-serif';
                ctx.fillStyle = '#94A3B8';
                ctx.fillText('ENTER = Play Again    SPACE = Choose Mode', cx, H - 38);
                ctx.globalAlpha = 1;
            }
        }

        function drawModeSelect() {
            // Dark overlay behind mode cards (items fall through it)
            ctx.fillStyle = 'rgba(10,15,42,0.74)';
            ctx.fillRect(0, 0, W, H);

            // Animated bouncing title
            const title  = '🍎 FRUIT CATCHER 🍊';
            const chars  = [...title];
            ctx.font = 'bold 50px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const totalW2 = ctx.measureText(title).width;
            let charX    = W / 2 - totalW2 / 2;
            chars.forEach((ch, i) => {
                const bounce = Math.sin(currentTs * 0.003 + i * 0.55) * 9;
                const hue    = (i * 22 + currentTs * 0.04) % 360;
                ctx.shadowColor = `hsl(${hue},90%,60%)`;
                ctx.shadowBlur  = 14;
                ctx.fillStyle   = `hsl(${hue},90%,72%)`;
                ctx.fillText(ch, charX, 60 + bounce);
                charX += ctx.measureText(ch).width;
            });
            ctx.shadowBlur = 0;

            // Subtitle
            ctx.font = '17px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#94A3B8';
            ctx.fillText('Choose your game mode', W / 2, 102);

            // Mode cards — 5 modes, smaller cards
            const modeCount = MODE_KEYS.length;
            const cardW = 142, cardH = 132, cardGap = 10;
            const totalCards = modeCount * cardW + (modeCount - 1) * cardGap;
            const startX     = (W - totalCards) / 2;
            const cardY      = 118;

            MODE_KEYS.forEach((mk, i) => {
                const mode = MODES[mk];
                const cx2  = startX + i * (cardW + cardGap);
                const sel  = i === selectedModeIdx;

                ctx.save();
                roundRect(ctx, cx2, cardY, cardW, cardH, 14);
                ctx.shadowColor = sel ? mode.color : 'transparent';
                ctx.shadowBlur  = sel ? 22 : 0;
                ctx.fillStyle   = sel ? 'rgba(28,40,88,0.96)' : 'rgba(18,26,56,0.82)';
                ctx.fill();
                ctx.strokeStyle = sel ? mode.color : 'rgba(255,255,255,0.14)';
                ctx.lineWidth   = sel ? 2.5 : 1;
                ctx.stroke();
                ctx.shadowBlur  = 0;

                const cx3 = cx2 + cardW / 2;

                // Icon
                ctx.font = '32px serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                ctx.fillText(mode.icon, cx3, cardY + 32);

                // Label
                ctx.font = `bold 16px sans-serif`;
                ctx.fillStyle = sel ? mode.color : '#e2e8f0';
                ctx.fillText(mode.label, cx3, cardY + 64);

                // Description
                ctx.font = '11px sans-serif';
                ctx.fillStyle = '#94A3B8';
                ctx.fillText(mode.desc, cx3, cardY + 84);

                // Key hint
                ctx.font = 'bold 11px sans-serif';
                ctx.fillStyle = sel ? mode.color : '#475569';
                ctx.fillText(`Press ${i + 1}`, cx3, cardY + 108);

                ctx.restore();
            });

            // High score badges
            const badgeY = cardY + cardH + 18;
            ctx.font = '13px sans-serif';
            ctx.textAlign = 'center';
            const badges = [];
            if (soloHighScore > 0) badges.push(`🏆 Solo: ${soloHighScore}`);
            if (zenHighScore > 0)  badges.push(`🧘 Zen: ${zenHighScore}`);
            if (survivalHighScore > 0) badges.push(`💀 Survival: R${survivalHighScore}`);
            if (badges.length > 0) {
                ctx.fillStyle = '#10B981';
                ctx.fillText(badges.join('    '), W / 2, badgeY);
            }

            // Nav hint
            ctx.font = '13px sans-serif';
            ctx.fillStyle = '#374151';
            ctx.fillText('← →  navigate    Enter or 1-5  select    ❓ Help', W / 2, H - 28);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Screen shake
            let sx = 0, sy = 0;
            if (shakeFrames > 0) {
                sx = (Math.random() - 0.5) * shakeFrames * 1.2;
                sy = (Math.random() - 0.5) * shakeFrames * 1.2;
            }
            ctx.save();
            ctx.translate(sx, sy);

            drawBackground();

            if (gameState === 'modeselect') {
                drawItemTrails();
                drawItems();
                drawModeSelect();
                ctx.restore();
                return;
            }

            drawFeverBorder(p1);
            if (currentMode !== 'zen' && currentMode !== 'survival') drawFeverBorder(p2);
            drawItemShadows();
            drawItemTrails();
            drawItems();
            drawParticles();
            if (currentMode === 'zen' || currentMode === 'survival') {
                drawBasket(p1, '#10B981', '🟢 YOU');
            } else if (currentMode === 'solo') {
                drawBasket(p1, '#3B82F6', '🔵 YOU');
                drawBasket(p2, '#EF4444', '🤖 AI');
            } else {
                drawBasket(p1, '#3B82F6', '🔵 P1');
                drawBasket(p2, '#EF4444', '🔴 P2');
            }

            // Zen lives display
            if (currentMode === 'zen' && gameState === 'playing') {
                ctx.font = '18px serif';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillStyle = '#EF4444';
                ctx.fillText('❤️'.repeat(zenLives), 10, 22);
            }

            // Survival missed counter
            if (currentMode === 'survival' && gameState === 'playing') {
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                ctx.fillStyle = survivalMissed >= 3 ? '#EF4444' : '#94A3B8';
                ctx.fillText(`Missed: ${survivalMissed}/${SURVIVAL_MAX_MISSES}`, W - 10, 22);
            }
            drawPopups();
            drawWaveIndicator();

            // Lightning zap effects
            lightningZaps.forEach(z => {
                ctx.save();
                ctx.globalAlpha = z.life;
                ctx.strokeStyle = '#FF6B35';
                ctx.lineWidth = 2 + z.life * 3;
                ctx.shadowColor = '#FF6B35';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.moveTo(z.fx, z.fy);
                // Jagged lightning path
                const midX = (z.fx + z.tx) / 2 + (Math.random() - 0.5) * 30;
                const midY = (z.fy + z.ty) / 2 + (Math.random() - 0.5) * 20;
                ctx.lineTo(midX, midY);
                ctx.lineTo(z.tx, z.ty);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.restore();
            });

            // Bomb flash overlay
            if (bombFlashTimer > currentTs) {
                const flashProgress = (bombFlashTimer - currentTs) / 250;
                ctx.save();
                ctx.fillStyle = `rgba(255,60,60,${flashProgress * 0.25})`;
                ctx.fillRect(0, 0, W, H);
                // Red vignette
                const vig = ctx.createRadialGradient(W/2, H/2, H * 0.2, W/2, H/2, H * 0.7);
                vig.addColorStop(0, 'rgba(255,0,0,0)');
                vig.addColorStop(1, `rgba(255,0,0,${flashProgress * 0.3})`);
                ctx.fillStyle = vig;
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
            }

            if (gameState === 'countdown') {
                drawCountdown();
            } else if (gameState === 'gameover') {
                drawGameOverStats();
            } else if (gameState === 'paused') {
                drawPauseOverlay();
            }

            // Transition fade overlay
            if (transitionAlpha > 0.01) {
                ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Tutorial overlay
            if (showTutorial && gameState === 'modeselect') {
                drawTutorial();
            }

            ctx.restore();
        }

        // ── Pause overlay ────────────────────────────────────────────────────
        function drawPauseOverlay() {
            ctx.fillStyle = 'rgba(15,23,42,0.72)';
            ctx.fillRect(0, 0, W, H);
            ctx.font = 'bold 60px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#A78BFA'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#fff';
            ctx.fillText('⏸️ PAUSED', W / 2, H / 2 - 25);
            ctx.shadowBlur = 0;
            ctx.font = '20px sans-serif';
            ctx.fillStyle = '#94A3B8';
            ctx.fillText('Press P or Esc to resume', W / 2, H / 2 + 25);
        }

        // ── Tutorial overlay ─────────────────────────────────────────────────
        function drawTutorial() {
            ctx.fillStyle = 'rgba(15,23,42,0.88)';
            ctx.fillRect(0, 0, W, H);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            ctx.font = 'bold 36px sans-serif';
            ctx.fillStyle = '#FDE047';
            ctx.shadowColor = '#FDE047'; ctx.shadowBlur = 15;
            ctx.fillText('🍎 How to Play 🍊', W / 2, 55);
            ctx.shadowBlur = 0;

            const lines = [
                ['🧑 Controls', '#60A5FA', 18],
                ['Player 1: A / D keys    Player 2: ← / → keys', '#CBD5E1', 15],
                ['On mobile: touch left/right side of screen', '#94A3B8', 13],
                ['', '', 8],
                ['🍎🍌🍒 Catch fruits for points!', '#4ADE80', 16],
                ['⭐🌟💰 Rare items = more points', '#FFD700', 16],
                ['💣☠️ Avoid bombs! They cost points', '#EF4444', 16],
                ['', '', 8],
                ['⚡ Power-ups', '#A78BFA', 18],
                ['🧊 Freeze  ⚡ Speed  🧲 Magnet  🛡️ Shield', '#CBD5E1', 14],
                ['📏 Wide  🎁 Mystery  ⏱️ Slow  🔥 Zap  🧺 MegaCatch', '#CBD5E1', 14],
                ['', '', 8],
                ['🔥 Get 8+ combo for FEVER MODE (2x points!)', '#FF6B35', 15],
                ['P or Esc to pause during game', '#94A3B8', 13],
            ];

            let y = 100;
            lines.forEach(([text, color, size]) => {
                if (!text) { y += size; return; }
                ctx.font = `${size > 16 ? 'bold ' : ''}${size}px sans-serif`;
                ctx.fillStyle = color;
                ctx.fillText(text, W / 2, y);
                y += size + 10;
            });

            ctx.font = '18px sans-serif';
            ctx.fillStyle = '#FDE047';
            const blink = Math.sin(currentTs * 0.005) > 0 ? 1 : 0.4;
            ctx.globalAlpha = blink;
            ctx.fillText('Press any key to continue', W / 2, H - 35);
            ctx.globalAlpha = 1;
        }

        // ── Game loop ─────────────────────────────────────────────────────────
        function gameLoop(ts) {
            const delta = ts - lastTime;
            if (delta >= FI) {
                lastTime = ts - (delta % FI);
                update(ts);
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        // ── Mute button ───────────────────────────────────────────────────────
        // Load saved settings
        musicMuted = musicMutedSaved;
        document.getElementById('muteBtn').textContent = musicMuted ? '🔇 Music' : '🔊 Music';
        if (savedMode && MODE_KEYS.indexOf(savedMode) >= 0) {
            selectedModeIdx = MODE_KEYS.indexOf(savedMode);
        }

        document.getElementById('muteBtn').addEventListener('click', () => {
            musicMuted = !musicMuted;
            document.getElementById('muteBtn').textContent = musicMuted ? '🔇 Music' : '🔊 Music';
            if (musicGain) musicGain.gain.value = musicMuted ? 0 : 0.055;
            localStorage.setItem('fruitCatcherMusicMuted', musicMuted);
        });

        // ── Input ─────────────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            keys[e.key] = true;

            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
                e.preventDefault();
            }

            // Dismiss tutorial on any key
            if (showTutorial && gameState === 'modeselect') {
                showTutorial = false;
                localStorage.setItem('fruitCatcherTutorialSeen', 'true');
                return;
            }

            // Pause toggle
            if ((e.key === 'p' || e.key === 'P' || e.key === 'Escape') && (gameState === 'playing' || gameState === 'paused')) {
                if (gameState === 'playing') {
                    gameState = 'paused';
                    pausedTs = currentTs;
                    if (musicGain) musicGain.gain.value = 0;
                } else {
                    gameState = 'playing';
                    if (musicGain && !musicMuted) musicGain.gain.value = 0.055;
                }
                return;
            }

            const modeCount = MODE_KEYS.length;
            if (gameState === 'modeselect') {
                if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { selectedModeIdx = (selectedModeIdx + modeCount - 1) % modeCount; }
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { selectedModeIdx = (selectedModeIdx + 1) % modeCount; }
                if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
                    currentMode = MODE_KEYS[selectedModeIdx];
                    playModeConfirm();
                    startGame();
                }
                for (let i = 0; i < modeCount; i++) {
                    if (e.key === String(i + 1)) {
                        selectedModeIdx = i;
                        currentMode = MODE_KEYS[i];
                        playModeConfirm();
                        startGame();
                    }
                }
                return;
            }

            if (gameState === 'gameover') {
                if (e.key === ' ' || e.key === 'Spacebar') resetToModeSelect();
                if (e.key === 'Enter') { startGame(); } // quick restart same mode
            }
        });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        // ── Touch controls ───────────────────────────────────────────────────
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            isTouchDevice = true;
            if (showTutorial && gameState === 'modeselect') {
                showTutorial = false;
                localStorage.setItem('fruitCatcherTutorialSeen', 'true');
                return;
            }
            if (gameState === 'modeselect') {
                // Tap to select mode: check if tap is on a card
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                for (const touch of e.changedTouches) {
                    const tx = (touch.clientX - rect.left) * scaleX;
                    const ty = (touch.clientY - rect.top) * (H / rect.height);
                    const cardW2 = 142, cardGap2 = 10;
                    const totalCards2 = MODE_KEYS.length * cardW2 + (MODE_KEYS.length - 1) * cardGap2;
                    const startX2 = (W - totalCards2) / 2;
                    for (let i = 0; i < MODE_KEYS.length; i++) {
                        const cx = startX2 + i * (cardW2 + cardGap2);
                        if (tx >= cx && tx <= cx + cardW2 && ty >= 118 && ty <= 118 + 132) {
                            selectedModeIdx = i;
                            currentMode = MODE_KEYS[i];
                            playModeConfirm();
                            startGame();
                            return;
                        }
                    }
                }
                return;
            }
            if (gameState === 'gameover') {
                resetToModeSelect();
                return;
            }
            for (const touch of e.changedTouches) {
                const rect = canvas.getBoundingClientRect();
                const tx = (touch.clientX - rect.left) / rect.width;
                touchActive[touch.identifier] = { side: tx < 0.5 ? 'left' : 'right' };
            }
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                const rect = canvas.getBoundingClientRect();
                const tx = (touch.clientX - rect.left) / rect.width;
                if (touchActive[touch.identifier]) {
                    touchActive[touch.identifier].side = tx < 0.5 ? 'left' : 'right';
                }
            }
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            for (const touch of e.changedTouches) {
                delete touchActive[touch.identifier];
            }
        });
        canvas.addEventListener('touchcancel', e => {
            for (const touch of e.changedTouches) {
                delete touchActive[touch.identifier];
            }
        });

        // ── Help & Mute button handlers ──────────────────────────────────────
        document.getElementById('helpBtn').addEventListener('click', () => {
            showTutorial = true;
        });

        // ── Start / restart ───────────────────────────────────────────────────
        function startGame() {
            const mode = MODES[currentMode];
            p1 = makePlayer(165);
            p2 = makePlayer(635);
            if (currentMode === 'solo') p2.isAI = true;
            timeLeft    = currentMode === 'zen' ? 0 : (currentMode === 'survival' ? 0 : mode.duration);
            musicTempo  = 480;
            timeSlow    = 0;
            isNewHighScore = false;
            bombFlashTimer = 0;
            lightningZaps = [];
            zenLives = 3;
            survivalRound = 1;
            survivalMissed = 0;
            survivalRoundTimer = SURVIVAL_ROUND_DURATION;
            items = []; particles = []; popups = []; confettiParticles = [];
            countdownVal = 3; lastCountdown = 0;
            lastSpawn = 0; lastTimerTick = 0; nextSpawnMs = 1500;
            shakeFrames = 0;
            currentWave = 1;
            waveAnnounceTimer = 0;
            transitionAlpha = 0.6; transitionTarget = 0; transitionSpeed = 0.03;

            // Save last mode preference
            localStorage.setItem('fruitCatcherLastMode', currentMode);

            const isOnlyP1Mode = currentMode === 'zen' || currentMode === 'survival';
            const showP2 = !isOnlyP1Mode;
            p1ScoreEl.textContent = (!showP2 ? 'Score: ' : (currentMode === 'solo' ? 'You: ' : 'P1: ')) + '0';
            p2ScoreEl.textContent = currentMode === 'solo' ? 'AI: 0' : 'P2: 0';
            p2ScoreEl.style.visibility = showP2 ? '' : 'hidden';
            document.getElementById('scorebar-wrap').style.display = showP2 ? '' : 'none';
            if (currentMode === 'zen') {
                timerEl.textContent = '0s';
            } else if (currentMode === 'survival') {
                timerEl.textContent = `R1 · ${SURVIVAL_ROUND_DURATION}`;
            } else {
                timerEl.textContent = mode.duration;
            }
            timerEl.classList.remove('urgent');
            p1barEl.style.width = '50%';
            p2barEl.style.width = '50%';
            gameState = 'countdown';
            playCount();
        }

        function resetToModeSelect() {
            stopMusic();
            gameState = 'modeselect';
            items = []; particles = []; popups = []; confettiParticles = [];
            lastSpawn   = 0;
            nextSpawnMs = 1500;
            // Restore HUD visibility
            p2ScoreEl.style.visibility = '';
            document.getElementById('scorebar-wrap').style.display = '';
        }

        requestAnimationFrame(gameLoop);

        // Auto-scale canvas to fit viewport
        (function() {
            const c = document.getElementById('gameCanvas');
            const bw = c.width, bh = c.height;
            function sc() {
                const par = c.parentElement;
                const ps = getComputedStyle(par);
                const mw = par.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const mh = window.innerHeight * 0.75;
                const s = Math.min(mw / bw, mh / bh, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + s + ')';
                c.style.marginBottom = (-(bh * (1 - s))) + 'px';
            }
            window.addEventListener('resize', sc);
            sc();
        })();
    </script>
    <script src="nav.js"></script>
</body>
</html>
