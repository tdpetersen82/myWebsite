<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Catcher</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        canvas {
            border: 3px solid #333;
            border-radius: 12px;
            display: block;
            margin: 6px auto;
            max-width: 100%;
            touch-action: none;
        }
        #p1score { color: #3B82F6; font-size: 1.5em; font-weight: bold; }
        #p2score { color: #EF4444; font-size: 1.5em; font-weight: bold; }
        #timer    { font-size: 1.5em; font-weight: bold; color: #333; transition: color 0.3s; }
        #timer.urgent { color: #EF4444; animation: pulse 0.5s ease-in-out infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        #scorebar-wrap {
            width: 800px;
            max-width: 100%;
            margin: 4px auto;
            height: 10px;
            border-radius: 5px;
            background: #e5e7eb;
            overflow: hidden;
            display: flex;
        }
        #p1bar { background: #3B82F6; width: 50%; transition: width 0.3s ease; }
        #p2bar { background: #EF4444; width: 50%; transition: width 0.3s ease; }
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .player-controls { text-align: center; font-size: 0.95em; color: #555; }
        .player-controls strong { display: block; margin-bottom: 3px; font-size: 1em; }
        .p1-label { color: #3B82F6; }
        .p2-label { color: #EF4444; }
        #muteBtn, #helpBtn {
            background: rgba(30,41,82,0.85);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.82em;
            margin-top: 4px;
            transition: background 0.15s;
        }
        #muteBtn:hover, #helpBtn:hover { background: rgba(59,82,170,0.95); }
        #helpBtn { margin-left: 6px; }
        @media (max-width: 820px) {
            .controls-row { gap: 20px; }
            #scorebar-wrap { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 Fruit Catcher</h1>
        <div class="game-info">
            <span id="p1score">P1: 0</span>
            <span id="timer">60</span>
            <span id="p2score">P2: 0</span>
        </div>
        <div id="scorebar-wrap">
            <div id="p1bar"></div>
            <div id="p2bar"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div class="controls-row">
            <div class="player-controls">
                <strong class="p1-label">Player 1 (Blue)</strong>
                <span>A = Left &nbsp; D = Right</span>
            </div>
            <div class="player-controls">
                <strong style="color:#333">Enter / 1 2 3 = Select mode</strong>
                <span>🧊 Freeze &nbsp;⚡ Speed &nbsp;🧲 Magnet &nbsp;🛡️ Shield &nbsp;📏 Wide &nbsp;🎁 Mystery &nbsp;⏱️ Slow &nbsp;🔥 Zap &nbsp;🧺 MegaCatch</span>
                <br><button id="muteBtn">🔊 Music</button><button id="helpBtn">❓ Help</button>
            </div>
            <div class="player-controls">
                <strong class="p2-label">Player 2 (Red)</strong>
                <span>← = Left &nbsp; → = Right</span>
            </div>
        </div>
    </div>

    <script>
        // ── Canvas & DOM ───────────────────────────────────────────────────────
        const canvas = document.getElementById('gameCanvas');
        const ctx    = canvas.getContext('2d');
        const p1ScoreEl = document.getElementById('p1score');
        const p2ScoreEl = document.getElementById('p2score');
        const timerEl   = document.getElementById('timer');
        const p1barEl   = document.getElementById('p1bar');
        const p2barEl   = document.getElementById('p2bar');

        const W = canvas.width, H = canvas.height;

        // ── Audio ─────────────────────────────────────────────────────────────
        let _ac = null;
        function ac() { return _ac || (_ac = new (window.AudioContext || window.webkitAudioContext)()); }

        function playTone(freq, type = 'square', dur = 0.1, vol = 0.25, delay = 0) {
            const a = ac();
            const osc  = a.createOscillator();
            const gain = a.createGain();
            osc.connect(gain); gain.connect(a.destination);
            osc.type = type; osc.frequency.value = freq;
            const t = a.currentTime + delay;
            gain.gain.setValueAtTime(vol, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.start(t); osc.stop(t + dur);
        }

        const playCatch  = () => playTone(700, 'square', 0.09, 0.22);
        const playStar   = () => [600, 820, 1060].forEach((f, i) => playTone(f, 'sine', 0.1, 0.3, i * 0.08));
        const playBomb   = () => { playTone(90, 'sawtooth', 0.35, 0.5); playTone(60, 'sawtooth', 0.25, 0.3, 0.05); };
        const playFreeze = () => [900, 700, 500].forEach((f, i) => playTone(f, 'sine', 0.1, 0.28, i * 0.07));
        const playSpeed  = () => [400, 600, 800, 1050].forEach((f, i) => playTone(f, 'square', 0.07, 0.18, i * 0.05));
        const playCombo  = (n) => playTone(440 + n * 80, 'sine', 0.18, 0.35);
        const playCount  = () => playTone(440, 'sine', 0.15);
        const playGo     = () => [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.16, 0.35, i * 0.08));
        const playWin    = () => [523, 659, 784, 1047, 1319].forEach((f, i) => playTone(f, 'sine', 0.22, 0.38, i * 0.1));
        const playTie    = () => [440, 440].forEach((f, i) => playTone(f, 'sine', 0.2, 0.3, i * 0.25));
        const playMagnet = () => [300, 450, 600].forEach((f, i) => playTone(f, 'triangle', 0.12, 0.2, i * 0.06));
        const playShield = () => [500, 700, 500].forEach((f, i) => playTone(f, 'sine', 0.08, 0.25, i * 0.06));
        const playShieldBlock = () => { playTone(800, 'sine', 0.15, 0.3); playTone(600, 'sine', 0.15, 0.25, 0.08); };
        const playWide   = () => [350, 500, 700].forEach((f, i) => playTone(f, 'square', 0.08, 0.2, i * 0.05));
        const playFever  = () => [523, 659, 784, 880, 1047].forEach((f, i) => playTone(f, 'sine', 0.12, 0.3, i * 0.06));
        const playWave   = () => [440, 554, 659].forEach((f, i) => playTone(f, 'triangle', 0.15, 0.2, i * 0.1));
        const playGolden = () => [880, 1100, 1320, 1540].forEach((f, i) => playTone(f, 'sine', 0.1, 0.25, i * 0.06));
        const playRainbow = () => [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => playTone(f, 'sine', 0.08, 0.2, i * 0.05));
        const playCoin     = () => { playTone(880, 'square', 0.05, 0.3); playTone(1100, 'square', 0.05, 0.25, 0.04); };
        const playMystery  = () => [500, 700, 400, 900, 300].forEach((f, i) => playTone(f, 'sine', 0.08, 0.22, i * 0.06));
        const playTimeSlow = () => [600, 450, 300, 180].forEach((f, i) => playTone(f, 'sine', 0.18, 0.28, i * 0.1));
        const playWatermelon = () => [392, 523, 659].forEach((f, i) => playTone(f, 'triangle', 0.1, 0.28, i * 0.07));
        const playModeConfirm = () => [440, 554, 659, 880].forEach((f, i) => playTone(f, 'sine', 0.12, 0.25, i * 0.07));

        // ── Music ─────────────────────────────────────────────────────────────
        const MELODY  = [329, 392, 440, 392, 523, 440, 392, 329, 294, 329, 392, 440, 329, 294, 261, 294];
        const BASS    = [130, 130, 164, 164, 196, 196, 164, 130, 130, 130, 164, 164, 130, 130, 130, 130];
        let musicGain     = null;
        let musicMuted    = false;
        let musicPlaying  = false;
        let musicTempo    = 480;   // ms per beat
        let musicTimerId  = null;
        let musicBeatIdx  = 0;
        let musicNextNote = 0;     // AudioContext time for next note

        function startMusic() {
            if (musicPlaying) return;
            musicPlaying = true;
            musicBeatIdx = 0;
            const a = ac();
            if (a.state === 'suspended') a.resume();
            musicGain = a.createGain();
            musicGain.gain.value = musicMuted ? 0 : 0.055;
            musicGain.connect(a.destination);
            musicNextNote = a.currentTime + 0.05;
            scheduleMusic();
        }

        function scheduleMusic() {
            const a = ac();
            const lookahead = 0.22;
            while (musicNextNote < a.currentTime + lookahead) {
                const idx  = musicBeatIdx % MELODY.length;
                const dur  = (musicTempo / 1000) * 0.78;
                const freq = MELODY[idx];
                const bass = BASS[idx];
                const t    = musicNextNote;

                const osc = a.createOscillator(), g = a.createGain();
                osc.connect(g); g.connect(musicGain);
                osc.type = 'triangle'; osc.frequency.value = freq;
                g.gain.setValueAtTime(0.45, t);
                g.gain.exponentialRampToValueAtTime(0.001, t + dur);
                osc.start(t); osc.stop(t + dur + 0.02);

                if (musicBeatIdx % 2 === 0) {
                    const bo = a.createOscillator(), bg = a.createGain();
                    bo.connect(bg); bg.connect(musicGain);
                    bo.type = 'sine'; bo.frequency.value = bass;
                    bg.gain.setValueAtTime(0.55, t);
                    bg.gain.exponentialRampToValueAtTime(0.001, t + dur * 1.6);
                    bo.start(t); bo.stop(t + dur * 1.6 + 0.02);
                }

                if (musicBeatIdx % 4 === 0) {
                    const ch = a.createOscillator(), cg = a.createGain();
                    ch.connect(cg); cg.connect(musicGain);
                    ch.type = 'square'; ch.frequency.value = freq * 2;
                    cg.gain.setValueAtTime(0.08, t);
                    cg.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.5);
                    ch.start(t); ch.stop(t + dur * 0.5 + 0.02);
                }

                musicNextNote += musicTempo / 1000;
                musicBeatIdx++;
            }
            musicTimerId = setTimeout(scheduleMusic, 80);
        }

        function stopMusic() {
            clearTimeout(musicTimerId);
            musicTimerId = null;
            musicPlaying = false;
            if (musicGain) { musicGain.disconnect(); musicGain = null; }
        }

        // ── Constants ─────────────────────────────────────────────────────────
        const MODES = {
            classic:  { label: 'Classic',  icon: '🎮', duration: 60, players: 2, desc: '2 players  •  60 seconds',  color: '#3B82F6' },
            blitz:    { label: 'Blitz',    icon: '⚡', duration: 30, players: 2, desc: '2 players  •  30s turbo!',   color: '#F59E0B' },
            solo:     { label: 'Solo',     icon: '🏆', duration: 60, players: 1, desc: '1 player  •  vs AI',        color: '#10B981' },
            zen:      { label: 'Zen',      icon: '🧘', duration: 0,  players: 1, desc: '1 player  •  3 lives',      color: '#8B5CF6' },
            survival: { label: 'Survival', icon: '💀', duration: 0,  players: 1, desc: '1 player  •  endless rounds', color: '#EF4444' },
        };
        const MODE_KEYS = ['classic', 'blitz', 'solo', 'zen', 'survival'];

        const BW = 104, BH = 28;         // basket width / height
        const WIDE_BW = 156;             // wide basket width
        const BASE_SPEED = 6;
        const BOOST_SPEED = 10;
        const ITEM_FS = 30;              // item font size
        const ITEM_R  = 16;              // item collision radius
        const GAME_DURATION = 60;
        const FI = 1000 / 60;            // frame interval ms
        const MAX_ITEMS = 14;
        const BASKET_Y = H - 38;
        const MAGNET_RANGE = 120;        // magnet attraction range
        const MAGNET_FORCE = 1.8;        // magnet pull strength
        const FEVER_COMBO_THRESHOLD = 8; // combo needed for fever mode
        const FEVER_DURATION = 5000;     // fever mode lasts 5s
        const WAVE_DURATION = 15;        // seconds per wave

        const ITEM_TYPES = [
            { label: '🍎', color: '#EF4444', points: 1,  weight: 10 },
            { label: '🍌', color: '#FCD34D', points: 1,  weight: 10 },
            { label: '🍒', color: '#F472B6', points: 1,  weight: 10 },
            { label: '🍊', color: '#FB923C', points: 1,  weight: 10 },
            { label: '🍇', color: '#A855F7', points: 1,  weight: 10 },
            { label: '🍑', color: '#FDBA74', points: 1,  weight: 10 },
            { label: '🥝', color: '#86EFAC', points: 1,  weight: 8  },
            { label: '🍓', color: '#FB7185', points: 2,  weight: 6  },
            { label: '🍍', color: '#FDE047', points: 2,  weight: 5  },
            { label: '🥭', color: '#FDBA74', points: 2,  weight: 5  },
            { label: '⭐', color: '#FBBF24', points: 3,  weight: 6  },
            { label: '🌟', color: '#FFD700', points: 5,  weight: 2  },
            { label: '🌈', color: '#EC4899', points: 4,  weight: 2  },
            { label: '💣', color: '#374151', points: -2, weight: 10 },
            { label: '☠️', color: '#1F2937', points: -4, weight: 3  },
            { label: '🧊', color: '#BAE6FD', points: 0,  weight: 4, special: 'freeze' },
            { label: '⚡', color: '#FDE047', points: 0,  weight: 4, special: 'speed'  },
            { label: '🧲', color: '#94A3B8', points: 0,  weight: 3, special: 'magnet' },
            { label: '🛡️', color: '#60A5FA', points: 0,  weight: 3, special: 'shield'   },
            { label: '📏', color: '#A78BFA', points: 0,  weight: 3, special: 'wide'     },
            { label: '🍉', color: '#86EFAC', points: 3,  weight: 3                      },
            { label: '💰', color: '#FCD34D', points: 3,  weight: 5                      },
            { label: '🎁', color: '#A78BFA', points: 0,  weight: 3, special: 'mystery'  },
            { label: '⏱️', color: '#67E8F9', points: 0,  weight: 3, special: 'timeslow' },
            { label: '🔥', color: '#FF6B35', points: 0,  weight: 2, special: 'lightning' },
            { label: '🧺', color: '#D97706', points: 0,  weight: 2, special: 'megawide' },
        ];

        // ── Clouds ────────────────────────────────────────────────────────────
        const CLOUDS = [
            { x: 90,  y: 55,  r: 38, speed: 0.18 },
            { x: 270, y: 80,  r: 30, speed: 0.12 },
            { x: 500, y: 45,  r: 45, speed: 0.22 },
            { x: 700, y: 75,  r: 34, speed: 0.14 },
            { x: 380, y: 100, r: 24, speed: 0.09 },
        ];

        // ── Scenery ───────────────────────────────────────────────────────────
        const TREES = [
            { x: 45,  trunkH: 50, canopyR: 32 },
            { x: 180, trunkH: 40, canopyR: 26 },
            { x: 620, trunkH: 55, canopyR: 35 },
            { x: 760, trunkH: 42, canopyR: 28 },
        ];
        const BUSHES = [
            { x: 110, r: 18 },
            { x: 320, r: 14 },
            { x: 500, r: 16 },
            { x: 690, r: 15 },
        ];
        const FLOWERS = [];
        for (let i = 0; i < 12; i++) {
            FLOWERS.push({
                x: 30 + Math.random() * (W - 60),
                color: ['#F472B6', '#FCD34D', '#C084FC', '#FB923C', '#60A5FA', '#EF4444'][Math.floor(Math.random() * 6)],
                size: 3 + Math.random() * 3,
                swayOffset: Math.random() * Math.PI * 2,
            });
        }

        // ── Stars (for night sky) ─────────────────────────────────────────────
        const STARS = [];
        for (let i = 0; i < 42; i++) {
            STARS.push({
                x: Math.random() * W,
                y: 8 + Math.random() * (H * 0.52),
                r: 0.5 + Math.random() * 1.8,
                twinkle: Math.random() * Math.PI * 2,
            });
        }

        // ── State ─────────────────────────────────────────────────────────────
        let gameState    = 'modeselect';
        let currentMode  = 'classic';
        let selectedModeIdx = 0;
        let timeLeft     = 60;
        let lastTime     = 0;
        let lastSpawn    = 0;
        let nextSpawnMs  = 1500;
        let lastTimerTick = 0;
        let countdownVal  = 3;
        let lastCountdown = 0;
        let shakeFrames   = 0;
        let currentTs     = 0;
        let currentWave   = 1;
        let waveAnnounceTimer = 0;
        let frameCount    = 0;
        let timeSlow      = 0;     // timestamp when time-slow expires
        let gameOverTs    = 0;     // timestamp when endGame was called
        let isNewHighScore = false;
        let soloHighScore  = parseInt(localStorage.getItem('fruitCatcherSoloHigh') || '0');
        let zenHighScore   = parseInt(localStorage.getItem('fruitCatcherZenHigh') || '0');
        let survivalHighScore = parseInt(localStorage.getItem('fruitCatcherSurvivalHigh') || '0');

        // Zen mode state
        let zenLives       = 3;

        // Survival mode state
        let survivalRound  = 1;
        let survivalMissed = 0;
        let survivalRoundTimer = 0;
        const SURVIVAL_ROUND_DURATION = 15;
        const SURVIVAL_MAX_MISSES = 5;

        // Pause state
        let pausedTs       = 0;     // timestamp when paused

        // Bomb flash effect
        let bombFlashTimer = 0;

        // Transition
        let transitionAlpha = 1;
        let transitionTarget = 0;
        let transitionSpeed = 0.04;

        // Lightning zap effect
        let lightningZaps  = [];    // {from, to, life}

        // Tutorial
        let showTutorial   = !localStorage.getItem('fruitCatcherTutorialSeen');

        // Settings persistence
        let savedMode      = localStorage.getItem('fruitCatcherLastMode');
        let musicMutedSaved = localStorage.getItem('fruitCatcherMusicMuted') === 'true';

        // Touch state
        let touchActive    = {};    // touchId -> {side}
        let isTouchDevice  = false;

        // AI state
        let aiTargetX      = W / 2;
        let aiReactionTimer = 0;
        const AI_REACTION_MS = 180;
        const AI_SPEED       = 5.5;
        const AI_JITTER      = 12;

        let items            = [];
        let particles        = [];
        let popups           = [];
        let confettiParticles = [];

        const keys = {};

        function makePlayer(x) {
            return {
                x, y: BASKET_Y, score: 0, combo: 0, maxCombo: 0,
                frozen: 0, speedBoost: 0, magnet: 0, shield: false, wide: 0,
                megaWide: 0,
                catchAnim: 0, fever: 0, feverActive: false,
                totalCaught: 0, fruitsOnly: 0, bombsCaught: 0,
                powerUpsCaught: 0, starsGolden: 0,
                expression: 'normal', expressionTimer: 0,
                isAI: false,
            };
        }

        let p1 = makePlayer(165);
        let p2 = makePlayer(635);

        // ── Utility helpers ───────────────────────────────────────────────────
        function lerpHex(c1, c2, t) {
            const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
            const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
            return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
        }
        function roundRect(ctx2, x, y, w, h, r) {
            ctx2.beginPath();
            ctx2.moveTo(x+r, y);
            ctx2.lineTo(x+w-r, y);
            ctx2.quadraticCurveTo(x+w, y, x+w, y+r);
            ctx2.lineTo(x+w, y+h-r);
            ctx2.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            ctx2.lineTo(x+r, y+h);
            ctx2.quadraticCurveTo(x, y+h, x, y+h-r);
            ctx2.lineTo(x, y+r);
            ctx2.quadraticCurveTo(x, y, x+r, y);
            ctx2.closePath();
        }

        // ── Helpers ───────────────────────────────────────────────────────────
        function pickItem() {
            // Late-game higher chance of rare items
            let types = ITEM_TYPES;
            if (currentWave >= 3) {
                // Slightly boost rare item weights in later waves
                types = types.map(t => {
                    if (t.points >= 3 || t.special) return { ...t, weight: t.weight + 1 };
                    if (t.points < 0) return { ...t, weight: t.weight + 2 };
                    return t;
                });
            }
            const total = types.reduce((s, t) => s + t.weight, 0);
            let r = Math.random() * total;
            for (const t of types) { r -= t.weight; if (r <= 0) return t; }
            return ITEM_TYPES[0];
        }

        function getDiff() {
            const wave  = currentWave;
            const blitz = currentMode === 'blitz';
            // Survival mode: escalating difficulty based on round
            if (currentMode === 'survival') {
                const r = Math.min(survivalRound, 10);
                return {
                    sMin: 1.5 + r * 0.35,
                    sMax: 3.0 + r * 0.45,
                    iMin: Math.max(300, 1200 - r * 90),
                    iMax: Math.max(500, 1800 - r * 120),
                };
            }
            // Zen mode: gradual difficulty increase over time
            if (currentMode === 'zen') {
                const t = Math.min(timeLeft / 60, 5); // ramps over 5 minutes
                return {
                    sMin: 1.2 + t * 0.4,
                    sMax: 2.5 + t * 0.6,
                    iMin: Math.max(400, 1400 - t * 180),
                    iMax: Math.max(700, 2000 - t * 220),
                };
            }
            if (wave <= 1) return { sMin: blitz ? 2.5 : 1.5, sMax: blitz ? 4.5 : 3.0, iMin: blitz ? 600 : 1400, iMax: blitz ? 950 : 2000 };
            if (wave <= 2) return { sMin: blitz ? 3.2 : 2.0, sMax: blitz ? 5.5 : 4.2, iMin: blitz ? 420 : 950,  iMax: blitz ? 680 : 1450 };
            if (wave <= 3) return { sMin: 2.6, sMax: 5.0, iMin: 700,  iMax: 1100 };
            return               { sMin: 3.0, sMax: 5.8, iMin: 550,  iMax: 900  };
        }

        function spawnItem(ts) {
            const itemCap = gameState === 'modeselect' ? 7 : (currentMode === 'blitz' ? 20 : MAX_ITEMS);
            if (items.length >= itemCap) return;
            const d = getDiff();
            items.push({
                x:        ITEM_R + Math.random() * (W - ITEM_R * 2),
                y:        -ITEM_R,
                speed:    d.sMin + Math.random() * (d.sMax - d.sMin),
                rot:      Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.10,
                wobble:   Math.random() * Math.PI * 2,
                wobbleAmp: (Math.random() < 0.4) ? 0.6 + Math.random() * 0.8 : 0,
                type:     pickItem(),
                trail:    [],
                spawnTime: ts || currentTs,
            });
            lastSpawn = ts;
            const d2 = getDiff();
            nextSpawnMs = d2.iMin + Math.random() * (d2.iMax - d2.iMin);
        }

        function spawnParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
                const spd   = 2.5 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - 1.5,
                    color,
                    life: 1,
                    size: 3 + Math.random() * 5,
                });
            }
        }

        function spawnPopup(x, y, text, color) {
            popups.push({ x, y, vy: -1.8, text, color, life: 1 });
        }

        // ── Power-up helpers ──────────────────────────────────────────────────
        function applyFreeze(caster, target, ix, iy) {
            target.frozen = currentTs + 2600;
            playFreeze();
            spawnPopup(caster.x, caster.y - 40, '🧊 FREEZE!', '#38BDF8');
            spawnParticles(ix, iy, '#BAE6FD', 14);
        }
        function applySpeed(player, ix, iy) {
            player.speedBoost = currentTs + 3200;
            playSpeed();
            spawnPopup(player.x, player.y - 40, '⚡ SPEED!', '#FDE047');
            spawnParticles(ix, iy, '#FDE047', 14);
        }
        function applyMagnet(player, ix, iy) {
            player.magnet = currentTs + 4000;
            playMagnet();
            spawnPopup(player.x, player.y - 40, '🧲 MAGNET!', '#94A3B8');
            spawnParticles(ix, iy, '#94A3B8', 14);
        }
        function applyShield(player, ix, iy) {
            player.shield = true;
            playShield();
            spawnPopup(player.x, player.y - 40, '🛡️ SHIELD!', '#60A5FA');
            spawnParticles(ix, iy, '#60A5FA', 14);
        }
        function applyWide(player, ix, iy) {
            player.wide = currentTs + 5000;
            playWide();
            spawnPopup(player.x, player.y - 40, '📏 WIDE!', '#A78BFA');
            spawnParticles(ix, iy, '#A78BFA', 14);
        }
        function applyLightning(player, ix, iy) {
            playTone(200, 'sawtooth', 0.3, 0.4);
            playTone(800, 'square', 0.15, 0.3, 0.05);
            playTone(1200, 'sine', 0.1, 0.25, 0.1);
            player.catchAnim = 1;
            spawnPopup(player.x, player.y - 40, '🔥 ZAP!', '#FF6B35');
            spawnParticles(ix, iy, '#FF6B35', 18);
            // Zap the 3 nearest non-bomb items, or destroy bombs
            const sorted = [...items].sort((a, b) => {
                const da = Math.hypot(a.x - ix, a.y - iy);
                const db = Math.hypot(b.x - ix, b.y - iy);
                return da - db;
            });
            let zapped = 0;
            for (const target of sorted) {
                if (zapped >= 3) break;
                lightningZaps.push({ fx: ix, fy: iy, tx: target.x, ty: target.y, life: 1 });
                if (target.type.points > 0) {
                    player.score += target.type.points;
                    player.fruitsOnly++;
                    player.combo++;
                    spawnPopup(target.x, target.y - 10, `+${target.type.points}`, '#FF6B35');
                } else if (target.type.points < 0) {
                    spawnPopup(target.x, target.y - 10, '💥', '#FF6B35');
                }
                spawnParticles(target.x, target.y, '#FF6B35', 8);
                target.zapped = true;
                zapped++;
            }
            items = items.filter(i => !i.zapped);
            if (player.combo > player.maxCombo) player.maxCombo = player.combo;
            updateHUD(player); updateScoreBar();
        }
        function applyMegaWide(player, ix, iy) {
            player.megaWide = currentTs + 2000;
            playTone(300, 'triangle', 0.15, 0.3);
            playTone(500, 'triangle', 0.15, 0.25, 0.06);
            playTone(700, 'triangle', 0.15, 0.2, 0.12);
            player.catchAnim = 1;
            spawnPopup(player.x, player.y - 40, '🧺 MEGA CATCH!', '#D97706');
            spawnParticles(ix, iy, '#D97706', 16);
        }

        // ── Confetti ──────────────────────────────────────────────────────────
        function spawnConfetti() {
            confettiParticles = [];
            const winColor = p1.score > p2.score ? '#3B82F6' : p2.score > p1.score ? '#EF4444' : '#FCD34D';
            const palette = [winColor, '#FFD700', '#ffffff', '#FCD34D', '#86EFAC', '#F472B6', '#A78BFA'];
            for (let i = 0; i < 110; i++) {
                confettiParticles.push({
                    x: Math.random() * W,
                    y: -15 - Math.random() * 60,
                    vx: (Math.random() - 0.5) * 6,
                    vy: 1.5 + Math.random() * 4,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.22,
                    w: 5 + Math.random() * 8,
                    h: 3 + Math.random() * 5,
                    circle: Math.random() < 0.35,
                });
            }
        }
        function updateConfetti() {
            confettiParticles = confettiParticles.filter(c => {
                c.x += c.vx; c.y += c.vy;
                c.vy += 0.14; c.vx *= 0.99;
                c.rot += c.rotSpeed;
                return c.y < H + 20;
            });
        }
        function drawConfetti() {
            confettiParticles.forEach(c => {
                const fade = Math.max(0, 1 - Math.max(0, c.y - H * 0.75) / (H * 0.3));
                ctx.save();
                ctx.globalAlpha = fade;
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rot);
                ctx.fillStyle = c.color;
                if (c.circle) {
                    ctx.beginPath();
                    ctx.arc(0, 0, c.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);
                }
                ctx.restore();
            });
            ctx.globalAlpha = 1;
        }

        // ── Catch & scoring ───────────────────────────────────────────────────
        function getBasketWidth(player) {
            if (player.megaWide > currentTs) return W * 0.85;
            if (player.wide > currentTs) return WIDE_BW;
            return BW;
        }

        function checkCatch(basket, item) {
            const bw = getBasketWidth(basket);
            return (
                item.y + ITEM_R >= basket.y - BH / 2 &&
                item.y + ITEM_R <= basket.y + BH / 2 + 10 &&
                item.x >= basket.x - bw / 2 &&
                item.x <= basket.x + bw / 2
            );
        }

        function handleCatch(player, other, item) {
            const { type } = item;
            player.totalCaught++;

            // --- Power-ups ---
            if (type.special === 'freeze') {
                applyFreeze(player, other, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }
            if (type.special === 'speed') {
                applySpeed(player, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }
            if (type.special === 'magnet') {
                applyMagnet(player, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }
            if (type.special === 'shield') {
                applyShield(player, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }
            if (type.special === 'wide') {
                applyWide(player, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }
            if (type.special === 'mystery') {
                const outcomes = ['freeze_opp','speed','magnet','shield','wide','points_bonus','bomb_penalty','lightning','megawide'];
                const outcome  = outcomes[Math.floor(Math.random() * outcomes.length)];
                playMystery();
                player.catchAnim = 1;
                player.powerUpsCaught++;
                if (outcome === 'points_bonus') {
                    player.score += 5;
                    spawnPopup(item.x, item.y - 10, '🎁 LUCKY! +5', '#A78BFA');
                    spawnParticles(item.x, item.y, '#A78BFA', 18);
                    updateHUD(player); updateScoreBar();
                } else if (outcome === 'bomb_penalty') {
                    if (player.shield) {
                        player.shield = false;
                        playShieldBlock();
                        spawnPopup(item.x, item.y - 10, '🛡️ BLOCKED!', '#60A5FA');
                        spawnParticles(item.x, item.y, '#60A5FA', 12);
                    } else {
                        player.score = Math.max(0, player.score - 3);
                        shakeFrames = 10;
                        spawnPopup(item.x, item.y - 10, '🎁 OOPS! -3', '#EF4444');
                        spawnParticles(item.x, item.y, '#6B7280', 12);
                        updateHUD(player); updateScoreBar();
                    }
                } else if (outcome === 'freeze_opp') { applyFreeze(player, other, item.x, item.y); }
                else if (outcome === 'speed')        { applySpeed(player, item.x, item.y); }
                else if (outcome === 'magnet')       { applyMagnet(player, item.x, item.y); }
                else if (outcome === 'shield')       { applyShield(player, item.x, item.y); }
                else if (outcome === 'wide')         { applyWide(player, item.x, item.y); }
                else if (outcome === 'lightning')    { applyLightning(player, item.x, item.y); }
                else if (outcome === 'megawide')     { applyMegaWide(player, item.x, item.y); }
                return;
            }
            if (type.special === 'timeslow') {
                timeSlow = currentTs + 3200;
                playTimeSlow();
                player.catchAnim = 1;
                player.powerUpsCaught++;
                spawnPopup(player.x, player.y - 40, '⏱️ TIME SLOW!', '#67E8F9');
                spawnParticles(item.x, item.y, '#67E8F9', 18);
                return;
            }
            if (type.special === 'lightning') {
                applyLightning(player, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }
            if (type.special === 'megawide') {
                applyMegaWide(player, item.x, item.y);
                player.powerUpsCaught++;
                return;
            }

            // --- Bomb with shield check ---
            if (type.points < 0) {
                if (player.shield) {
                    player.shield = false;
                    playShieldBlock();
                    spawnPopup(item.x, item.y - 10, '🛡️ BLOCKED!', '#60A5FA');
                    spawnParticles(item.x, item.y, '#60A5FA', 12);
                    player.catchAnim = 1;
                    player.bombsCaught++;
                    return;
                }
                player.combo = 0;
                player.feverActive = false;
                player.score = Math.max(0, player.score + type.points);
                player.catchAnim = 1;
                player.bombsCaught++;
                player.expression = 'shocked'; player.expressionTimer = currentTs + 800;
                playBomb();
                shakeFrames = 12;
                bombFlashTimer = currentTs + 250;
                const txt = type.points === -4 ? '-4 ☠️' : '-2 💣';
                spawnPopup(item.x, item.y - 10, txt, '#EF4444');
                spawnParticles(item.x, item.y, '#6B7280', 14);
                // Zen mode: lose a life
                if (currentMode === 'zen') {
                    zenLives--;
                    spawnPopup(player.x, player.y - 60, `❤️ ${zenLives} left`, '#EF4444');
                    if (zenLives <= 0) { endGame(); return; }
                }
                updateHUD(player);
                updateScoreBar();
                return;
            }

            // --- Scoring ---
            let pts = type.points;
            // Fever mode doubles points
            if (player.feverActive) pts *= 2;

            player.score += pts;
            player.catchAnim = 1;
            player.fruitsOnly++;
            player.expression = 'happy'; player.expressionTimer = currentTs + 500;

            if (type.points >= 5) {
                // Golden star / rainbow
                player.combo++;
                player.starsGolden++;
                playGolden();
                spawnPopup(item.x, item.y - 10, `+${pts} 🌟`, '#FFD700');
                spawnParticles(item.x, item.y, '#FFD700', 20);
            } else if (type.points >= 3) {
                player.combo++;
                player.starsGolden++;
                if (type.label === '🌈') {
                    playRainbow();
                    spawnPopup(item.x, item.y - 10, `+${pts} 🌈`, '#EC4899');
                    spawnParticles(item.x, item.y, '#EC4899', 16);
                } else if (type.label === '🍉') {
                    playWatermelon();
                    spawnPopup(item.x, item.y - 10, `+${pts} 🍉`, '#86EFAC');
                    spawnParticles(item.x, item.y, '#86EFAC', 16);
                } else if (type.label === '💰') {
                    playCoin();
                    spawnPopup(item.x, item.y - 10, `+${pts} 💰`, '#FCD34D');
                    spawnParticles(item.x, item.y, '#FCD34D', 16);
                } else {
                    playStar();
                    spawnPopup(item.x, item.y - 10, `+${pts} ⭐`, '#FBBF24');
                    spawnParticles(item.x, item.y, '#FBBF24', 16);
                }
            } else if (type.points === 2) {
                player.combo++;
                playCatch();
                spawnPopup(item.x, item.y - 10, `+${pts}`, '#FDE68A');
                spawnParticles(item.x, item.y, type.color, 10);
            } else {
                player.combo++;
                playCatch();
                spawnPopup(item.x, item.y - 10, `+${pts}`, '#fff');
                spawnParticles(item.x, item.y, type.color, 8);
            }

            // Track max combo
            if (player.combo > player.maxCombo) player.maxCombo = player.combo;

            // Combo reward at 4+
            if (player.combo >= 4 && type.points > 0) {
                const bonus = Math.min(Math.floor(player.combo / 4), 3);
                player.score += bonus;
                playCombo(player.combo);
                spawnPopup(player.x, player.y - 70, `COMBO ×${player.combo}! +${bonus}`, '#FFD700');
                spawnParticles(player.x, player.y - 30, '#FFD700', 12);
            }

            // Combo milestones
            const milestones = { 5: ['NICE!', 1, '#4ADE80'], 10: ['AMAZING!', 2, '#60A5FA'], 15: ['INCREDIBLE!', 3, '#A78BFA'], 20: ['LEGENDARY!', 5, '#FFD700'] };
            const ms = milestones[player.combo];
            if (ms) {
                player.score += ms[1];
                [600, 800, 1000, 1200, 1400].forEach((f, i) => playTone(f, 'sine', 0.12, 0.3, i * 0.06));
                spawnPopup(player.x, player.y - 100, `🏅 ${ms[0]} +${ms[1]}`, ms[2]);
                spawnParticles(player.x, player.y - 60, ms[2], 20);
                updateHUD(player); updateScoreBar();
            }

            // Fever mode trigger
            if (player.combo >= FEVER_COMBO_THRESHOLD && !player.feverActive) {
                player.feverActive = true;
                player.fever = currentTs + FEVER_DURATION;
                playFever();
                spawnPopup(player.x, player.y - 100, '🔥 FEVER MODE! 🔥', '#FF6B35');
                spawnParticles(player.x, player.y - 50, '#FF6B35', 20);
                spawnParticles(player.x, player.y - 50, '#FCD34D', 15);
            }

            updateHUD(player);
            updateScoreBar();
        }

        function updateHUD(player) {
            const isOnlyP1Mode = currentMode === 'zen' || currentMode === 'survival';
            if (player === p1) {
                const prefix = isOnlyP1Mode ? 'Score: ' : (currentMode === 'solo' ? 'You: ' : 'P1: ');
                p1ScoreEl.textContent = prefix + p1.score;
            } else if (!isOnlyP1Mode) {
                const prefix = currentMode === 'solo' ? 'AI: ' : 'P2: ';
                p2ScoreEl.textContent = prefix + p2.score;
            }
        }

        function updateScoreBar() {
            const total = p1.score + p2.score;
            if (total === 0) {
                p1barEl.style.width = '50%';
                p2barEl.style.width = '50%';
            } else {
                p1barEl.style.width = (p1.score / total * 100) + '%';
                p2barEl.style.width = (p2.score / total * 100) + '%';
            }
        }

        // ── Update ────────────────────────────────────────────────────────────
        function update(ts) {
            currentTs = ts;
            frameCount++;

            // Transition alpha
            if (transitionAlpha !== transitionTarget) {
                if (transitionAlpha < transitionTarget) transitionAlpha = Math.min(transitionTarget, transitionAlpha + transitionSpeed);
                else transitionAlpha = Math.max(transitionTarget, transitionAlpha - transitionSpeed);
            }

            // Lightning zaps decay
            lightningZaps = lightningZaps.filter(z => { z.life -= 0.08; return z.life > 0; });

            // Expression timer decay
            [p1, p2].forEach(p => {
                if (p.expressionTimer && ts > p.expressionTimer) p.expression = 'normal';
            });

            // Always drift clouds
            CLOUDS.forEach(c => {
                c.x += c.speed;
                if (c.x - c.r * 2.5 > W) c.x = -c.r * 2.5;
            });

            // Pause state — skip all gameplay updates
            if (gameState === 'paused') return;

            if (gameState === 'modeselect') {
                if (ts - lastSpawn >= nextSpawnMs) spawnItem(ts);
                items = items.filter(item => {
                    item.wobble += 0.08;
                    item.x += Math.sin(item.wobble) * (item.wobbleAmp || 0);
                    item.y += item.speed;
                    item.rot += item.rotSpeed;
                    if (frameCount % 3 === 0) {
                        item.trail.push({ x: item.x, y: item.y, life: 1 });
                        if (item.trail.length > 5) item.trail.shift();
                    }
                    item.trail.forEach(t => t.life -= 0.06);
                    return item.y - ITEM_R < H;
                });
                return;
            }

            if (gameState === 'gameover') {
                updateConfetti();
                return;
            }

            if (gameState === 'countdown') {
                if (lastCountdown === 0) lastCountdown = ts;
                if (ts - lastCountdown >= 1000) {
                    lastCountdown = ts;
                    countdownVal--;
                    if (countdownVal > 0) {
                        playCount();
                    } else {
                        playGo();
                        gameState     = 'playing';
                        lastTimerTick = ts;
                        lastSpawn     = ts;
                        startMusic();
                    }
                }
                return;
            }

            if (gameState !== 'playing') return;

            // Timer tick
            if (ts - lastTimerTick >= 1000) {
                lastTimerTick = ts;
                if (currentMode === 'zen') {
                    // Zen: count up elapsed time
                    timeLeft++;
                    timerEl.textContent = timeLeft + 's';
                    timerEl.classList.remove('urgent');
                } else if (currentMode === 'survival') {
                    // Survival: countdown per round
                    survivalRoundTimer--;
                    timerEl.textContent = `R${survivalRound} · ${survivalRoundTimer}`;
                    if (survivalRoundTimer <= 0) {
                        survivalRound++;
                        survivalRoundTimer = SURVIVAL_ROUND_DURATION;
                        playWave();
                        spawnPopup(W / 2, H / 3, `💀 ROUND ${survivalRound} 💀`, '#EF4444');
                        spawnParticles(W / 2, H / 3, '#EF4444', 18);
                    }
                    timerEl.classList.toggle('urgent', survivalRoundTimer <= 5);
                } else {
                    timeLeft--;
                    timerEl.textContent = timeLeft;
                    timerEl.classList.toggle('urgent', timeLeft <= 10);
                    if (timeLeft <= 0) { endGame(); return; }
                }
            }

            // Speed up music in final 10 seconds
            if (timeLeft <= 10 && musicTempo > 280) musicTempo = 280;

            // Wave system
            const modeDur = MODES[currentMode].duration;
            const elapsed = modeDur > 0 ? (modeDur - timeLeft) : timeLeft;
            const newWave = Math.min(4, Math.floor(elapsed / WAVE_DURATION) + 1);
            if (newWave > currentWave) {
                currentWave = newWave;
                waveAnnounceTimer = ts + 2000;
                playWave();
                spawnPopup(W / 2, H / 3, `⚡ WAVE ${currentWave} ⚡`, '#FDE047');
                spawnParticles(W / 2, H / 3, '#FDE047', 18);
            }

            // Fever mode expiry
            [p1, p2].forEach(p => {
                if (p.feverActive && ts > p.fever) p.feverActive = false;
            });

            // Move baskets
            const p1Frozen = p1.frozen > ts;
            const p2Frozen = p2.frozen > ts;
            const p1Spd = (p1.speedBoost > ts) ? BOOST_SPEED : BASE_SPEED;
            const p2Spd = (p2.speedBoost > ts) ? BOOST_SPEED : BASE_SPEED;

            if (!p1Frozen) {
                if (keys['a'] || keys['A']) p1.x -= p1Spd;
                if (keys['d'] || keys['D']) p1.x += p1Spd;
                // Touch controls for P1
                for (const tid in touchActive) {
                    const t = touchActive[tid];
                    if (t.side === 'left') p1.x -= p1Spd;
                    else p1.x += p1Spd;
                }
            }
            if (currentMode === 'solo') {
                // AI controls p2
                updateAI(ts, p2, p2Frozen, p2Spd);
            } else if (currentMode !== 'zen' && currentMode !== 'survival' && !p2Frozen) {
                if (keys['ArrowLeft'])  p2.x -= p2Spd;
                if (keys['ArrowRight']) p2.x += p2Spd;
            }

            const isOnlyP1 = currentMode === 'zen' || currentMode === 'survival';
            const activePlayers = isOnlyP1 ? [p1] : [p1, p2];
            activePlayers.forEach(p => {
                const hw = getBasketWidth(p) / 2;
                p.x = Math.max(hw, Math.min(W - hw, p.x));
            });

            // Catch animations decay
            p1.catchAnim = Math.max(0, p1.catchAnim - 0.12);
            p2.catchAnim = Math.max(0, p2.catchAnim - 0.12);

            // Spawn items
            if (ts - lastSpawn >= nextSpawnMs) spawnItem(ts);

            // Magnet attraction
            activePlayers.forEach(player => {
                if (player.magnet > ts) {
                    items.forEach(item => {
                        if (item.type.points < 0 || item.type.special) return;
                        const dx = player.x - item.x;
                        const dy = player.y - item.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MAGNET_RANGE && dist > 5) {
                            item.x += (dx / dist) * MAGNET_FORCE;
                            item.y += (dy / dist) * MAGNET_FORCE * 0.5;
                        }
                    });
                }
            });

            // Update items (with time-slow physics)
            const speedMult = timeSlow > ts ? 0.38 : 1;
            items = items.filter(item => {
                item.wobble += 0.08;
                item.x += Math.sin(item.wobble) * (item.wobbleAmp || 0);
                item.y += item.speed * speedMult;
                item.rot += item.rotSpeed;

                // Trail
                if (frameCount % 3 === 0) {
                    item.trail.push({ x: item.x, y: item.y, life: 1 });
                    if (item.trail.length > 5) item.trail.shift();
                }
                item.trail.forEach(t => t.life -= 0.06);

                // Golden sparkle trails for high-value items
                if (item.type.points >= 3 && frameCount % 4 === 0) {
                    const sparkleColor = item.type.label === '💰' ? '#FCD34D' : item.type.label === '🌈' ? '#EC4899' : '#FFD700';
                    particles.push({
                        x: item.x + (Math.random() - 0.5) * 14,
                        y: item.y + (Math.random() - 0.5) * 8,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: -0.5 - Math.random(),
                        color: sparkleColor,
                        life: 0.7,
                        size: 1.5 + Math.random() * 2.5,
                    });
                }

                if (checkCatch(p1, item)) { handleCatch(p1, p2, item); return false; }
                if (!isOnlyP1 && checkCatch(p2, item)) { handleCatch(p2, p1, item); return false; }

                // Near-miss feedback
                if (item.y - ITEM_R >= H) {
                    const closeDist = 40;
                    activePlayers.forEach(ap => {
                        if (Math.abs(item.x - ap.x) < closeDist + getBasketWidth(ap) / 2) {
                            spawnPopup(item.x, H - 60, 'CLOSE!', '#F59E0B');
                        }
                    });
                    // Survival: count missed fruits
                    if (currentMode === 'survival' && item.type.points > 0) {
                        survivalMissed++;
                        if (survivalMissed >= SURVIVAL_MAX_MISSES) { endGame(); }
                    }
                    return false;
                }
                return item.y - ITEM_R < H;
            });

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.18;
                p.vx *= 0.96;
                p.life -= 0.025;
                return p.life > 0;
            });

            // Update popups
            popups = popups.filter(p => {
                p.y += p.vy;
                p.life -= 0.022;
                return p.life > 0;
            });

            // Screen shake decay
            if (shakeFrames > 0) shakeFrames--;
        }

        // ── AI Opponent ──────────────────────────────────────────────────────
        function updateAI(ts, ai, frozen, speed) {
            if (frozen) return;
            if (ts - aiReactionTimer < AI_REACTION_MS) {
                // Move toward last computed target
                const dx = aiTargetX - ai.x;
                if (Math.abs(dx) > 4) ai.x += Math.sign(dx) * Math.min(AI_SPEED, Math.abs(dx));
                return;
            }
            aiReactionTimer = ts;
            // Find best target: prioritize close, high-value items; avoid bombs
            let bestScore = -Infinity;
            let bestX = ai.x;
            items.forEach(item => {
                if (item.y < -ITEM_R || item.y > H * 0.85) return;
                const dist = Math.hypot(item.x - ai.x, item.y - ai.y);
                const timeToReach = dist / AI_SPEED;
                const timeToFall = (ai.y - item.y) / Math.max(0.5, item.speed);
                if (timeToFall < 0) return; // already past
                let value = item.type.points * 10;
                if (item.type.special) value = 8;
                if (item.type.points < 0) value = -20; // avoid bombs
                value -= dist * 0.03; // prefer closer
                value += (1 - item.y / H) * 5; // prefer items higher up (more time)
                if (value > bestScore) { bestScore = value; bestX = item.x; }
            });
            aiTargetX = bestX + (Math.random() - 0.5) * AI_JITTER;
            const dx = aiTargetX - ai.x;
            if (Math.abs(dx) > 4) ai.x += Math.sign(dx) * Math.min(AI_SPEED, Math.abs(dx));
        }

        function endGame() {
            gameState  = 'gameover';
            gameOverTs = currentTs;
            transitionAlpha = 1; transitionTarget = 0; transitionSpeed = 0.03;
            items = [];
            stopMusic();
            if (currentMode === 'solo') {
                isNewHighScore = p1.score > soloHighScore;
                if (isNewHighScore) {
                    soloHighScore = p1.score;
                    localStorage.setItem('fruitCatcherSoloHigh', soloHighScore);
                }
                playWin();
            } else if (currentMode === 'zen') {
                isNewHighScore = p1.score > zenHighScore;
                if (isNewHighScore) {
                    zenHighScore = p1.score;
                    localStorage.setItem('fruitCatcherZenHigh', zenHighScore);
                }
                playWin();
            } else if (currentMode === 'survival') {
                const survScore = survivalRound;
                isNewHighScore = survScore > survivalHighScore;
                if (isNewHighScore) {
                    survivalHighScore = survScore;
                    localStorage.setItem('fruitCatcherSurvivalHigh', survivalHighScore);
                }
                playWin();
            } else {
                if (p1.score !== p2.score) playWin(); else playTie();
            }
            spawnConfetti();
        }

        // ── Draw ──────────────────────────────────────────────────────────────
        function drawBackground() {
            // Night transition (last 20s of game only)
            const nightProgress = (gameState === 'playing') ? Math.max(0, Math.min(1, (20 - timeLeft) / 20)) : 0;

            // Sky gradient (day → night)
            const sky0 = lerpHex('#60A5FA', '#0F0A1E', nightProgress);
            const sky1 = lerpHex('#93C5FD', '#1E1B4B', nightProgress);
            const sky2 = lerpHex('#DBEAFE', '#312E81', nightProgress);
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.8);
            skyGrad.addColorStop(0,   sky0);
            skyGrad.addColorStop(0.5, sky1);
            skyGrad.addColorStop(1,   sky2);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // Stars (fade in as night progresses)
            if (nightProgress > 0.25) {
                const starAlphaBase = Math.min(1, (nightProgress - 0.25) / 0.5);
                STARS.forEach(s => {
                    const twinkle = 0.6 + Math.sin(currentTs * 0.003 + s.twinkle) * 0.4;
                    ctx.globalAlpha = starAlphaBase * twinkle;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            const sunX = 60, sunY = 60;

            // Sun (fades out in first half of night transition)
            if (nightProgress < 0.55) {
                const sunAlpha = 1 - nightProgress / 0.55;
                ctx.globalAlpha = sunAlpha;
                const sunGrad = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 50);
                sunGrad.addColorStop(0, '#FEF08A');
                sunGrad.addColorStop(0.5, '#FDE047');
                sunGrad.addColorStop(1, 'rgba(253,224,71,0)');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 50, 0, Math.PI * 2);
                ctx.fill();
                ctx.save();
                ctx.translate(sunX, sunY);
                ctx.rotate(frameCount * 0.003);
                ctx.strokeStyle = `rgba(253,224,71,${0.2 * sunAlpha})`;
                ctx.lineWidth = 2;
                for (let i = 0; i < 12; i++) {
                    const angle = (Math.PI * 2 / 12) * i;
                    ctx.beginPath();
                    ctx.moveTo(Math.cos(angle) * 25, Math.sin(angle) * 25);
                    ctx.lineTo(Math.cos(angle) * 55, Math.sin(angle) * 55);
                    ctx.stroke();
                }
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            // Moon (fades in second half of night transition)
            if (nightProgress > 0.45) {
                const moonAlpha = Math.min(1, (nightProgress - 0.45) / 0.35);
                ctx.globalAlpha = moonAlpha;
                ctx.fillStyle = '#E8E0C8';
                ctx.beginPath();
                ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
                ctx.fill();
                // Craters
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                [[8, -5, 5], [-6, 3, 3.5], [3, 10, 4]].forEach(([cx2, cy2, cr]) => {
                    ctx.beginPath(); ctx.arc(sunX + cx2, sunY + cy2, cr, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            // Clouds (dimmed at night)
            const cloudAlpha = 0.88 - nightProgress * 0.5;
            CLOUDS.forEach(c => {
                ctx.fillStyle = `rgba(255,255,255,${cloudAlpha})`;
                ctx.beginPath();
                ctx.ellipse(c.x,               c.y,               c.r * 1.8, c.r * 0.9,  0, 0, Math.PI * 2);
                ctx.ellipse(c.x - c.r * 0.8,   c.y + c.r * 0.3,   c.r * 1.1, c.r * 0.75, 0, 0, Math.PI * 2);
                ctx.ellipse(c.x + c.r * 0.8,   c.y + c.r * 0.3,   c.r * 1.1, c.r * 0.75, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // Ground gradient
            const groundY = H - 55;
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
            groundGrad.addColorStop(0,    '#4ADE80');
            groundGrad.addColorStop(0.35, '#22C55E');
            groundGrad.addColorStop(1,    '#15803D');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, W, 55);

            // Trees
            TREES.forEach(t => {
                ctx.fillStyle = '#92400E';
                ctx.fillRect(t.x - 6, groundY - t.trunkH, 12, t.trunkH + 5);
                const canopyY = groundY - t.trunkH - t.canopyR * 0.5;
                const cGrad = ctx.createRadialGradient(t.x, canopyY, 2, t.x, canopyY, t.canopyR);
                cGrad.addColorStop(0,   '#4ADE80');
                cGrad.addColorStop(0.6, '#22C55E');
                cGrad.addColorStop(1,   '#16A34A');
                ctx.fillStyle = cGrad;
                ctx.beginPath(); ctx.arc(t.x, canopyY, t.canopyR, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(t.x - t.canopyR * 0.6, canopyY + t.canopyR * 0.3, t.canopyR * 0.7, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(t.x + t.canopyR * 0.6, canopyY + t.canopyR * 0.3, t.canopyR * 0.7, 0, Math.PI * 2); ctx.fill();
            });

            // Bushes
            BUSHES.forEach(b => {
                ctx.fillStyle = '#16A34A';
                ctx.beginPath(); ctx.arc(b.x, groundY + 2, b.r, Math.PI, 0); ctx.fill();
                ctx.fillStyle = '#22C55E';
                ctx.beginPath(); ctx.arc(b.x - b.r * 0.5, groundY + 2, b.r * 0.7, Math.PI, 0); ctx.fill();
                ctx.beginPath(); ctx.arc(b.x + b.r * 0.5, groundY + 2, b.r * 0.7, Math.PI, 0); ctx.fill();
            });

            // Grass blades
            ctx.fillStyle = '#4ADE80';
            for (let gx = 0; gx < W; gx += 14) {
                ctx.beginPath();
                ctx.moveTo(gx, groundY);
                ctx.quadraticCurveTo(gx + 4, groundY - 13, gx + 7, groundY);
                ctx.fill();
            }

            // Flowers
            const swayT = currentTs * 0.001;
            FLOWERS.forEach(f => {
                const sway  = Math.sin(swayT + f.swayOffset) * 2;
                const fx    = f.x + sway;
                const fy    = groundY - 2;
                const petalY = fy - f.size * 3;
                ctx.strokeStyle = '#16A34A'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx + sway * 0.5, petalY); ctx.stroke();
                ctx.fillStyle = f.color;
                for (let p = 0; p < 5; p++) {
                    const a = (Math.PI * 2 / 5) * p;
                    ctx.beginPath();
                    ctx.arc(fx + sway * 0.5 + Math.cos(a) * f.size, petalY + Math.sin(a) * f.size, f.size * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#FDE047';
                ctx.beginPath(); ctx.arc(fx + sway * 0.5, petalY, f.size * 0.4, 0, Math.PI * 2); ctx.fill();
            });

            // Night overlay tint (drawn last — before items/baskets)
            if (nightProgress > 0) {
                ctx.fillStyle = `rgba(10,10,40,${nightProgress * 0.52})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Time-slow vignette
            if (timeSlow > currentTs) {
                const remaining = (timeSlow - currentTs) / 3200;
                ctx.save();
                const vig = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.75);
                vig.addColorStop(0, 'rgba(103,232,249,0)');
                vig.addColorStop(1, `rgba(103,232,249,${0.18 * remaining})`);
                ctx.fillStyle = vig;
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
            }
        }

        function drawItemTrails() {
            items.forEach(item => {
                item.trail.forEach(t => {
                    if (t.life <= 0) return;
                    ctx.globalAlpha = t.life * 0.3;
                    ctx.font = `${ITEM_FS * t.life}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.type.label, t.x, t.y);
                });
            });
            ctx.globalAlpha = 1;
        }

        function drawItemShadows() {
            const groundY = H - 55;
            items.forEach(item => {
                if (item.y < 0) return;
                const progress = Math.min(1, item.y / groundY);
                const shadowSize = 4 + progress * 12;
                const alpha = 0.1 + progress * 0.15;
                ctx.fillStyle = `rgba(0,0,0,${alpha})`;
                ctx.beginPath();
                ctx.ellipse(item.x, groundY + 3, shadowSize, shadowSize * 0.3, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawBasket(b, color, label) {
            const anim = b.catchAnim;
            const frozen = b.frozen > currentTs;
            const boosted = b.speedBoost > currentTs;
            const magnetActive = b.magnet > currentTs;
            const wideActive = b.wide > currentTs;
            const bw = getBasketWidth(b);

            ctx.save();
            ctx.translate(b.x, b.y);
            ctx.scale(1 + anim * 0.12, 1 - anim * 0.18);

            const hw = bw / 2, hh = BH / 2;
            const bottomW = bw * 0.68;

            // Fever glow
            if (b.feverActive) {
                ctx.shadowColor = '#FF6B35';
                ctx.shadowBlur = 22 + Math.sin(currentTs * 0.008) * 8;
            }
            // Speed glow
            else if (boosted) {
                ctx.shadowColor = '#FDE047';
                ctx.shadowBlur = 18;
            }
            // Freeze glow
            else if (frozen) {
                ctx.shadowColor = '#BAE6FD';
                ctx.shadowBlur = 16;
            }
            // Magnet glow
            else if (magnetActive) {
                ctx.shadowColor = '#94A3B8';
                ctx.shadowBlur = 14;
            }

            // Trapezoid body
            const bodyGrad = ctx.createLinearGradient(0, -hh, 0, hh);
            const lightColor = frozen  ? '#93C5FD' :
                               boosted ? '#FEF08A' :
                               b.feverActive ? '#FF6B35' :
                               magnetActive ? '#CBD5E1' : color;
            bodyGrad.addColorStop(0, lightColor);
            bodyGrad.addColorStop(1, color);
            ctx.fillStyle = bodyGrad;

            ctx.beginPath();
            ctx.moveTo(-hw, -hh);
            ctx.lineTo( hw, -hh);
            ctx.lineTo( bottomW / 2,  hh);
            ctx.lineTo(-bottomW / 2,  hh);
            ctx.closePath();
            ctx.fill();

            if (frozen) {
                ctx.fillStyle = 'rgba(186,230,253,0.45)';
                ctx.fill();
            }

            ctx.strokeStyle = 'rgba(0,0,0,0.25)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Rim highlight
            ctx.beginPath();
            ctx.moveTo(-hw, -hh);
            ctx.lineTo( hw, -hh);
            ctx.strokeStyle = 'rgba(255,255,255,0.65)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Vertical dividers inside basket
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1.5;
            const divCount = wideActive ? 5 : 4;
            for (let i = 1; i < divCount; i++) {
                const t = i / divCount;
                const tx = -hw + bw * t;
                const bx = -bottomW / 2 + bottomW * t;
                ctx.beginPath();
                ctx.moveTo(tx, -hh + 2);
                ctx.lineTo(bx,  hh - 2);
                ctx.stroke();
            }

            // Character face — eyes and mouth
            const expr = b.expression || 'normal';
            const eyeY = -2;
            const eyeSpacing = bw * 0.18;
            const eyeSize = 4;

            // Find nearest item for eye tracking
            let lookX = 0;
            const nearestItem = items.reduce((best, it) => {
                const d = Math.hypot(it.x - b.x, it.y - b.y);
                return (!best || d < best.d) ? { d, x: it.x } : best;
            }, null);
            if (nearestItem) lookX = Math.sign(nearestItem.x - b.x) * 1.5;

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-eyeSpacing + lookX, eyeY, eyeSize, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(eyeSpacing + lookX, eyeY, eyeSize, 0, Math.PI * 2); ctx.fill();
            // Pupils
            ctx.fillStyle = frozen ? '#93C5FD' : '#1a1a2e';
            const pupilSize = expr === 'shocked' ? 2 : 2.5;
            ctx.beginPath(); ctx.arc(-eyeSpacing + lookX * 1.3, eyeY + 0.5, pupilSize, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(eyeSpacing + lookX * 1.3, eyeY + 0.5, pupilSize, 0, Math.PI * 2); ctx.fill();

            // Mouth
            ctx.strokeStyle = frozen ? '#93C5FD' : '#1a1a2e';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            if (expr === 'happy') {
                ctx.arc(0, 5, 5, 0.1 * Math.PI, 0.9 * Math.PI);
            } else if (expr === 'shocked') {
                ctx.arc(0, 7, 3.5, 0, Math.PI * 2);
            } else if (frozen) {
                ctx.moveTo(-5, 7); ctx.lineTo(5, 7); // flat line when frozen
            } else {
                ctx.arc(0, 5, 4, 0.15 * Math.PI, 0.85 * Math.PI);
            }
            ctx.stroke();

            ctx.restore();
            ctx.shadowBlur = 0;

            // Shield indicator
            if (b.shield) {
                ctx.save();
                ctx.strokeStyle = 'rgba(96,165,250,0.6)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.beginPath();
                ctx.arc(b.x, b.y, hw + 8, Math.PI, 0);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            // Magnet range indicator
            if (magnetActive) {
                ctx.save();
                ctx.strokeStyle = `rgba(148,163,184,${0.15 + Math.sin(currentTs * 0.005) * 0.1})`;
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.arc(b.x, b.y, MAGNET_RANGE, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            // Player label above basket
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillStyle = color;
            ctx.fillText(label, b.x, b.y - BH / 2 - 4);

            // Status icons
            let iconY = b.y - BH / 2 - 20;
            const icons = [];
            if (frozen) icons.push('❄️');
            if (boosted) icons.push('⚡');
            if (magnetActive) icons.push('🧲');
            if (b.shield) icons.push('🛡️');
            if (wideActive) icons.push('📏');
            if (megaWideActive) icons.push('🧺');
            if (b.feverActive) icons.push('🔥');

            if (icons.length > 0) {
                ctx.font = '14px serif';
                const iconsStr = icons.join('');
                ctx.fillText(iconsStr, b.x, iconY);
            }

            // Combo counter
            if (b.combo >= 3) {
                ctx.font = 'bold 11px sans-serif';
                ctx.fillStyle = b.feverActive ? '#FF6B35' : '#FFD700';
                ctx.fillText(`×${b.combo}`, b.x + (getBasketWidth(b) / 2) + 12, b.y - 5);
            }

            // Power-up timer bars
            const megaWideActive = b.megaWide > currentTs;
            const barDefs = [
                { active: boosted,      expiry: b.speedBoost, dur: 3200,  color: '#FDE047' },
                { active: magnetActive, expiry: b.magnet,     dur: 4000,  color: '#94A3B8' },
                { active: wideActive,   expiry: b.wide,       dur: 5000,  color: '#A78BFA' },
                { active: megaWideActive, expiry: b.megaWide,  dur: 2000,  color: '#D97706' },
                { active: frozen,       expiry: b.frozen,     dur: 2600,  color: '#BAE6FD' },
            ];
            const barW = 38, barH = 4;
            let barY = b.y - BH / 2 - 46;
            barDefs.forEach(bd => {
                if (!bd.active) return;
                const prog = Math.max(0, (bd.expiry - currentTs) / bd.dur);
                ctx.fillStyle = 'rgba(0,0,0,0.35)';
                ctx.fillRect(b.x - barW / 2, barY, barW, barH);
                ctx.fillStyle = bd.color;
                ctx.fillRect(b.x - barW / 2, barY, barW * prog, barH);
                barY -= 7;
            });
        }

        function drawItems() {
            items.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.rotate(item.rot);
                // Spawn bounce animation (elastic scale-up over 300ms)
                const age = currentTs - (item.spawnTime || 0);
                if (age < 300) {
                    const t = age / 300;
                    const elastic = 1 + Math.sin(t * Math.PI * 2.5) * (1 - t) * 0.4;
                    ctx.scale(elastic, elastic);
                }
                ctx.font = `${ITEM_FS}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 4;

                // Special glow for high-value items
                if (item.type.points >= 5) {
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 12 + Math.sin(currentTs * 0.01) * 4;
                } else if (item.type.label === '💰') {
                    ctx.shadowColor = '#FCD34D';
                    ctx.shadowBlur = 10 + Math.abs(Math.sin(currentTs * 0.015)) * 8;
                } else if (item.type.label === '🍉') {
                    ctx.shadowColor = '#86EFAC';
                    ctx.shadowBlur = 8;
                } else if (item.type.label === '🎁') {
                    ctx.shadowColor = '#A78BFA';
                    ctx.shadowBlur = 6 + Math.abs(Math.sin(currentTs * 0.007)) * 6;
                } else if (item.type.label === '⏱️') {
                    ctx.shadowColor = '#67E8F9';
                    ctx.shadowBlur = 8 + Math.abs(Math.sin(currentTs * 0.006)) * 6;
                } else if (item.type.points >= 3) {
                    ctx.shadowColor = item.type.color;
                    ctx.shadowBlur = 8;
                }

                ctx.fillText(item.type.label, 0, 0);
                ctx.restore();
            });
            ctx.shadowBlur = 0;
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle   = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawPopups() {
            popups.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = `bold ${14 + Math.floor((1 - p.life) * 4)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeStyle = 'rgba(0,0,0,0.6)';
                ctx.lineWidth = 3;
                ctx.strokeText(p.text, p.x, p.y);
                ctx.fillStyle = p.color;
                ctx.fillText(p.text, p.x, p.y);
            });
            ctx.globalAlpha = 1;
        }

        function drawWaveIndicator() {
            if (gameState !== 'playing') return;

            // Wave progress bar at top of canvas
            const modeDur    = MODES[currentMode].duration;
            const waveElapsed = (modeDur - timeLeft) % WAVE_DURATION;
            const waveProg   = Math.min(1, waveElapsed / WAVE_DURATION);
            const barGrad    = ctx.createLinearGradient(0, 0, W, 0);
            barGrad.addColorStop(0,   '#FDE047');
            barGrad.addColorStop(0.6, '#FB923C');
            barGrad.addColorStop(1,   '#EF4444');
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, W, 5);
            ctx.fillStyle = barGrad;
            ctx.fillRect(0, 0, W * waveProg, 5);

            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fillText(`Wave ${currentWave}`, 10, 10);

            // Wave announce flash
            if (currentTs < waveAnnounceTimer && currentWave > 1) {
                const progress = (waveAnnounceTimer - currentTs) / 2000;
                ctx.globalAlpha = progress;
                ctx.font = 'bold 36px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#FDE047';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#FDE047';
                ctx.fillText(`⚡ WAVE ${currentWave} ⚡`, W / 2, H / 4);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        function drawFeverBorder(player) {
            if (!player.feverActive) return;
            const side = player === p1 ? 'left' : 'right';
            const pulse = 0.3 + Math.sin(currentTs * 0.008) * 0.2;
            ctx.save();
            if (side === 'left') {
                const grad = ctx.createLinearGradient(0, 0, 40, 0);
                grad.addColorStop(0, `rgba(255,107,53,${pulse})`);
                grad.addColorStop(1, 'rgba(255,107,53,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 40, H);
            } else {
                const grad = ctx.createLinearGradient(W, 0, W - 40, 0);
                grad.addColorStop(0, `rgba(255,107,53,${pulse})`);
                grad.addColorStop(1, 'rgba(255,107,53,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(W - 40, 0, 40, H);
            }
            ctx.restore();
        }

        function drawCountdown() {
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, W, H);

            const label = countdownVal > 0 ? String(countdownVal) : 'GO!';
            const size  = countdownVal > 0 ? 110 : 90;
            ctx.font = `bold ${size}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            ctx.shadowColor = countdownVal > 0 ? '#FDE047' : '#4ADE80';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#fff';
            ctx.fillText(label, W / 2, H / 2);
            ctx.shadowBlur = 0;
        }

        function drawOverlay(lines, colors) {
            ctx.fillStyle = 'rgba(15,23,42,0.72)';
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2, cy = H / 2;
            lines.forEach((line, i) => {
                ctx.font = i === 0 ? 'bold 52px sans-serif' : (i === lines.length - 1 ? '20px sans-serif' : '27px sans-serif');
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const color = colors[i] || '#fff';
                ctx.shadowColor = color;
                ctx.shadowBlur  = i === 0 ? 20 : 0;
                ctx.fillStyle   = color;
                ctx.fillText(line, cx, cy - 55 + i * 55);
            });
            ctx.shadowBlur = 0;
        }

        function drawGameOverStats() {
            const elapsed  = currentTs - gameOverTs;
            const isSoloType = currentMode === 'solo' || currentMode === 'zen' || currentMode === 'survival';
            const cx       = W / 2;

            // Dark overlay
            ctx.fillStyle = 'rgba(15,23,42,0.84)';
            ctx.fillRect(0, 0, W, H);

            // Confetti on top of overlay, behind text
            drawConfetti();

            // Determine winner/result
            let winLine, winColor;
            if (currentMode === 'zen') {
                if (isNewHighScore) { winLine = '🎉 New High Score!'; winColor = '#FCD34D'; }
                else                { winLine = '🧘 Zen Over!';       winColor = '#8B5CF6'; }
            } else if (currentMode === 'survival') {
                if (isNewHighScore) { winLine = '🎉 New Record!';     winColor = '#FCD34D'; }
                else                { winLine = '💀 Game Over!';       winColor = '#EF4444'; }
            } else if (currentMode === 'solo') {
                if (p1.score > p2.score)       { winLine = '🎉 You Win!';      winColor = '#60A5FA'; }
                else if (p2.score > p1.score)  { winLine = '🤖 AI Wins!';      winColor = '#F87171'; }
                else                           { winLine = "🤝 It's a Tie!";   winColor = '#FCD34D'; }
            } else {
                if (p1.score > p2.score)      { winLine = '🎉 Player 1 Wins!'; winColor = '#60A5FA'; }
                else if (p2.score > p1.score) { winLine = '🎉 Player 2 Wins!'; winColor = '#F87171'; }
                else                          { winLine = "🤝 It's a Tie!";    winColor = '#FCD34D'; }
            }

            // Trophy / stars (appears immediately)
            const trophyScale = 1 + Math.sin(currentTs * 0.006) * 0.08;
            ctx.save();
            ctx.translate(cx, 42);
            ctx.scale(trophyScale, trophyScale);
            ctx.font = '44px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = winColor;
            ctx.shadowBlur  = 22;
            if (trueSolo) {
                const stars = p1.score >= 50 ? 3 : p1.score >= 25 ? 2 : 1;
                ctx.fillText('⭐'.repeat(stars), 0, 0);
            } else {
                ctx.fillText('🏆', 0, 0);
            }
            ctx.restore();
            ctx.shadowBlur = 0;

            // Winner headline (appears immediately)
            ctx.font = 'bold 42px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = winColor; ctx.shadowBlur = 18;
            ctx.fillStyle   = winColor;
            ctx.fillText(winLine, cx, 88);
            ctx.shadowBlur  = 0;

            // Score line — fades in at 350ms
            if (elapsed >= 350) {
                const a = Math.min(1, (elapsed - 350) / 300);
                ctx.globalAlpha = a;
                ctx.font = 'bold 26px sans-serif';
                ctx.fillStyle = '#fff';
                if (currentMode === 'survival') {
                    ctx.fillText(`Rounds Survived: ${survivalRound}  •  Score: ${p1.score}`, cx, 130);
                } else if (currentMode === 'solo') {
