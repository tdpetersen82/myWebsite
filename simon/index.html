<body class="ch-game" data-category="arcade"
      data-eyebrow="Cabinet · Simon"
      data-title="Simon"
      data-hint-1="Click pads"
      data-hint-2="Repeat the sequence"
      data-hint-3="R restart">
    <div id="game-container"></div>

    <!-- Config -->
    <script src="js/config.js"></script>

    <!-- Audio -->
    <script src="js/AudioManager.js"></script>

    <!-- Entities -->
    <script src="js/entities/ColorPad.js"></script>

    <!-- Scenes -->
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/GameOverScene.js"></script>

    <!-- Game initialization -->
    <script>
        const game = new Phaser.Game({
            type: Phaser.AUTO,
            width: SIMON_CONFIG.WIDTH,
            height: SIMON_CONFIG.HEIGHT,
            parent: 'game-container',
            backgroundColor: SIMON_CONFIG.BG_COLOR,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
            },
            scene: [MenuScene, GameScene, GameOverScene],
            audio: {
                disableWebAudio: false,
            },
        });

        window.gameAPI = {
            pause: () => {
                const s = game.scene.scenes.find(x => x.scene.isActive());
                if (!s) return;
                s.scene.isPaused() ? s.scene.resume() : s.scene.pause();
            },
            restart: () => {
                const s = game.scene.scenes.find(x => x.scene.isActive());
                if (s) s.scene.restart();
            },
            mute: () => { game.sound.mute = !game.sound.mute; }
        };
    </script>
