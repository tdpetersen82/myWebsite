<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon — Free Online Game | Arcade Game Hub</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            max-width: 100vw;
        }
        #game-container canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
    <meta name="description" content="Play Simon free in your browser. Watch the color pattern, then repeat it back. How long can you keep the sequence going? No downloads, no installs.">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"VideoGame","name":"Simon","description":"Play Simon free in your browser. Watch the color pattern, then repeat it back. How long can you keep the sequence going? No downloads, no installs.","playMode":"SinglePlayer","applicationCategory":"Game","operatingSystem":"Web Browser","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"Arcade Game Hub"}}</script>
</head>
<body>
    <div id="game-container"></div>

    <!-- Config -->
    <script src="js/config.js"></script>

    <!-- Audio -->
    <script src="js/AudioManager.js"></script>

    <!-- Entities -->
    <script src="js/entities/ColorPad.js"></script>

    <!-- Scenes -->
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/GameOverScene.js"></script>

    <!-- Game initialization -->
    <script>
        const game = new Phaser.Game({
            type: Phaser.AUTO,
            width: SIMON_CONFIG.WIDTH,
            height: SIMON_CONFIG.HEIGHT,
            parent: 'game-container',
            backgroundColor: SIMON_CONFIG.BG_COLOR,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
            },
            scene: [MenuScene, GameScene, GameOverScene],
            audio: {
                disableWebAudio: false,
            },
        });
    </script>

    <script src="../nav.js"></script>

</html>
