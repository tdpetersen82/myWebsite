<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #111;
            display: block;
            margin: 16px auto;
            cursor: pointer;
        }
        .turn-indicator {
            font-size: 1.2em;
            font-weight: bold;
            margin: 8px 0;
            min-height: 1.5em;
        }
        .player-selectors {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .player-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .player-selector label {
            font-weight: bold;
            font-size: 0.95em;
        }
        .player-selector select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 2px solid #555;
            background: #222;
            color: #fff;
            font-size: 0.9em;
            cursor: pointer;
        }
        .p1-label { color: #e74c3c; }
        .p2-label { color: #4a9eff; }
        .auto-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0;
        }
        .stats-panel {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 16px;
            margin: 10px auto;
            max-width: 490px;
            font-size: 0.85em;
            color: #aaa;
            min-height: 36px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .nn-panel {
            background: #0f1f0f;
            border: 1px solid #2a4a2a;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 10px auto;
            max-width: 490px;
            font-size: 0.85em;
        }
        .nn-panel .nn-status {
            margin-bottom: 8px;
            color: #8ab88a;
        }
        .nn-panel progress {
            width: 100%;
            height: 10px;
            margin: 6px 0;
        }
        .nn-panel button {
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#x1F534; Connect 4</h1>

        <div class="player-selectors">
            <div class="player-selector">
                <label class="p1-label">&#x1F534; Red (Player 1)</label>
                <select id="p1Select">
                    <option value="human">Human</option>
                    <option value="random">Lv1: Random</option>
                    <option value="greedy">Lv2: Greedy</option>
                    <option value="heuristic">Lv3: Heuristic</option>
                    <option value="minimax">Lv4: Minimax</option>
                    <option value="neural">Lv5: Neural Net</option>
                    <option value="mcts">Lv6: MCTS</option>
                </select>
            </div>
            <div class="player-selector">
                <label class="p2-label">&#x1F535; Blue (Player 2)</label>
                <select id="p2Select">
                    <option value="human">Human</option>
                    <option value="random">Lv1: Random</option>
                    <option value="greedy">Lv2: Greedy</option>
                    <option value="heuristic">Lv3: Heuristic</option>
                    <option value="minimax" selected>Lv4: Minimax</option>
                    <option value="neural">Lv5: Neural Net</option>
                    <option value="mcts">Lv6: MCTS</option>
                </select>
            </div>
        </div>

        <div class="game-info">
            <p>&#x1F534; <span id="p1WinLabel">Red</span> Wins: <span id="redWins">0</span></p>
            <p>&#x1F535; <span id="p2WinLabel">Blue</span> Wins: <span id="blueWins">0</span></p>
        </div>

        <p class="turn-indicator" id="turnIndicator">Red's turn</p>

        <canvas id="gameCanvas" width="490" height="490"></canvas>

        <div class="auto-controls" id="autoControls" style="display:none">
            <button id="autoPlayBtn" class="play-button">&#x25B6; Auto Play</button>
            <button id="pauseBtn" class="play-button" style="display:none">&#x23F8; Pause</button>
        </div>

        <div class="controls">
            <p>Click a column to drop your piece. Get 4 in a row to win!</p>
            <button id="restartBtn" class="play-button">New Game</button>
        </div>

        <div class="stats-panel" id="statsPanel">
            <span id="statTime"></span>
            <span id="statExtra"></span>
        </div>

        <div class="nn-panel" id="nnPanel" style="display:none">
            <div class="nn-status" id="nnStatus">Neural Net: Untrained (random play)</div>
            <button id="trainBtn" class="play-button">Train Model (2000 games)</button>
            <progress id="trainProgress" value="0" max="2000" style="display:none"></progress>
        </div>

        <a href="index.html" class="back-button">&#x2190; Back to Game Hub</a>
    </div>

    <script>
        // =============================================
        // DOM REFS
        // =============================================
        const canvas       = document.getElementById('gameCanvas');
        const ctx          = canvas.getContext('2d');
        const turnIndicator = document.getElementById('turnIndicator');
        const redWinsEl    = document.getElementById('redWins');
        const blueWinsEl   = document.getElementById('blueWins');
        const p1WinLabel   = document.getElementById('p1WinLabel');
        const p2WinLabel   = document.getElementById('p2WinLabel');
        const restartBtn   = document.getElementById('restartBtn');
        const p1Select     = document.getElementById('p1Select');
        const p2Select     = document.getElementById('p2Select');
        const autoControls = document.getElementById('autoControls');
        const autoPlayBtn  = document.getElementById('autoPlayBtn');
        const pauseBtn     = document.getElementById('pauseBtn');
        const statTime     = document.getElementById('statTime');
        const statExtra    = document.getElementById('statExtra');
        const nnPanel      = document.getElementById('nnPanel');
        const nnStatus     = document.getElementById('nnStatus');
        const trainBtn     = document.getElementById('trainBtn');
        const trainProgress = document.getElementById('trainProgress');

        // =============================================
        // CONSTANTS
        // =============================================
        const COLS       = 7;
        const ROWS       = 6;
        const CELL       = 70;
        const RADIUS     = 28;
        const BOARD_TOP  = CELL;

        const EMPTY = 0;
        const RED   = 1;
        const BLUE  = 2;

        const COLORS = { [EMPTY]: '#111', [RED]: '#e74c3c', [BLUE]: '#2563eb' };

        const PLAYER_NAMES = {
            human: 'Human', random: 'Random', greedy: 'Greedy',
            heuristic: 'Heuristic', minimax: 'Minimax',
            neural: 'Neural Net', mcts: 'MCTS'
        };

        const MINIMAX_DEPTH = 7;
        const MCTS_SIMS     = 500;
        const TRAIN_TOTAL   = 2000;

        // =============================================
        // STATE
        // =============================================
        let board         = [];
        let currentPlayer = RED;
        let gameOver      = false;
        let hoverCol      = -1;
        let redWins       = 0;
        let blueWins      = 0;
        let p1Type        = 'human';
        let p2Type        = 'minimax';
        let autoPlaying   = false;
        let autoTimer     = null;
        let aiThinking    = false;

        // =============================================
        // AUDIO
        // =============================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine') {
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playDrop() { playSound(300, 0.1); }
        function playWin()  { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.25), i * 120)); }
        function playDraw() { playSound(200, 0.4, 'sawtooth'); }

        // =============================================
        // BOARD UTILITIES
        // =============================================
        function opponent(player) { return player === RED ? BLUE : RED; }

        function getValidCols(b) {
            const cols = [];
            for (let c = 0; c < COLS; c++) {
                if (b[0][c] === EMPTY) cols.push(c);
            }
            return cols;
        }

        // Mutates board in-place. Returns dropped row, or -1 if full.
        function dropMut(b, col, player) {
            for (let row = ROWS - 1; row >= 0; row--) {
                if (b[row][col] === EMPTY) { b[row][col] = player; return row; }
            }
            return -1;
        }

        function undoMut(b, row, col) { b[row][col] = EMPTY; }

        // Returns a deep copy of the board with the piece dropped.
        function dropCopy(b, col, player) {
            const nb = b.map(r => r.slice());
            const row = dropMut(nb, col, player);
            return row >= 0 ? { board: nb, row } : null;
        }

        function checkWinAt(b, row, col) {
            const player = b[row][col];
            if (player === EMPTY) return null;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (const [dr, dc] of dirs) {
                let count = 1;
                for (let d = 1; d < 4; d++) {
                    const r = row + dr*d, c = col + dc*d;
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== player) break;
                    count++;
                }
                for (let d = 1; d < 4; d++) {
                    const r = row - dr*d, c = col - dc*d;
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== player) break;
                    count++;
                }
                if (count >= 4) return player;
            }
            return null;
        }

        function isFull(b) { return b[0].every(c => c !== EMPTY); }

        // =============================================
        // SHARED WINDOW SCORING (Levels 3 & 4)
        // =============================================
        function getAllWindows(b) {
            const wins = [];
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c <= COLS-4; c++)
                    wins.push([b[r][c], b[r][c+1], b[r][c+2], b[r][c+3]]);
            for (let c = 0; c < COLS; c++)
                for (let r = 0; r <= ROWS-4; r++)
                    wins.push([b[r][c], b[r+1][c], b[r+2][c], b[r+3][c]]);
            for (let r = 3; r < ROWS; r++)
                for (let c = 0; c <= COLS-4; c++)
                    wins.push([b[r][c], b[r-1][c+1], b[r-2][c+2], b[r-3][c+3]]);
            for (let r = 0; r <= ROWS-4; r++)
                for (let c = 0; c <= COLS-4; c++)
                    wins.push([b[r][c], b[r+1][c+1], b[r+2][c+2], b[r+3][c+3]]);
            return wins;
        }

        function scoreWindow(w, player) {
            const mine = w.filter(c => c === player).length;
            const empty = w.filter(c => c === EMPTY).length;
            if (4 - mine - empty > 0) return 0; // blocked by opponent
            if (mine === 4) return 100;
            if (mine === 3) return 5;
            if (mine === 2) return 2;
            return 0;
        }

        // =============================================
        // LEVEL 1: RANDOM
        // =============================================
        function randomMove(b) {
            const v = getValidCols(b);
            return v[Math.floor(Math.random() * v.length)];
        }

        // =============================================
        // LEVEL 2: GREEDY
        // =============================================
        function greedyMove(player, b) {
            const valid = getValidCols(b);
            const opp   = opponent(player);
            for (const col of valid) {
                const r = dropMut(b, col, player);
                const win = checkWinAt(b, r, col);
                undoMut(b, r, col);
                if (win) return col;
            }
            for (const col of valid) {
                const r = dropMut(b, col, opp);
                const win = checkWinAt(b, r, col);
                undoMut(b, r, col);
                if (win) return col;
            }
            const center = [3, 2, 4, 1, 5, 0, 6];
            for (const col of center) if (valid.includes(col)) return col;
            return valid[0];
        }

        // =============================================
        // LEVEL 3: ADVANCED HEURISTIC
        // =============================================
        function heuristicMove(player, b) {
            const valid = getValidCols(b);
            const opp   = opponent(player);
            for (const col of valid) {
                const r = dropMut(b, col, player);
                const win = checkWinAt(b, r, col);
                undoMut(b, r, col);
                if (win) return col;
            }
            for (const col of valid) {
                const r = dropMut(b, col, opp);
                const win = checkWinAt(b, r, col);
                undoMut(b, r, col);
                if (win) return col;
            }
            let bestCol = valid[0], bestScore = -Infinity;
            for (const col of valid) {
                const r = dropMut(b, col, player);
                let score = 0;
                const windows = getAllWindows(b);
                for (const w of windows) {
                    score += scoreWindow(w, player);
                    score -= scoreWindow(w, opp) * 1.1;
                }
                for (let row = 0; row < ROWS; row++) if (b[row][3] === player) score += 3;
                undoMut(b, r, col);
                if (score > bestScore) { bestScore = score; bestCol = col; }
            }
            return bestCol;
        }

        // =============================================
        // LEVEL 4: MINIMAX + ALPHA-BETA
        // =============================================
        let minimaxNodes = 0;
        const COL_ORDER  = [3, 2, 4, 1, 5, 0, 6];

        function minimaxMove(player, b) {
            minimaxNodes = 0;
            // Work on a copy so we can safely mutate
            const wb    = b.map(r => r.slice());
            const valid = getValidCols(wb).sort((a, z) => COL_ORDER.indexOf(a) - COL_ORDER.indexOf(z));
            let bestCol = valid[0], bestScore = -Infinity;
            for (const col of valid) {
                const row = dropMut(wb, col, player);
                const score = minimax(wb, row, col, MINIMAX_DEPTH - 1, -Infinity, Infinity, false, player);
                undoMut(wb, row, col);
                if (score > bestScore) { bestScore = score; bestCol = col; }
            }
            return bestCol;
        }

        function minimax(b, lastRow, lastCol, depth, alpha, beta, maximizing, player) {
            minimaxNodes++;
            const winner = checkWinAt(b, lastRow, lastCol);
            if (winner === player)          return 10000 + depth;
            if (winner === opponent(player)) return -10000 - depth;
            if (isFull(b))                  return 0;
            if (depth === 0)                return evalBoard(b, player);

            const valid = getValidCols(b).sort((a, z) => COL_ORDER.indexOf(a) - COL_ORDER.indexOf(z));

            if (maximizing) {
                let maxScore = -Infinity;
                for (const col of valid) {
                    const row = dropMut(b, col, player);
                    const score = minimax(b, row, col, depth - 1, alpha, beta, false, player);
                    undoMut(b, row, col);
                    maxScore = Math.max(maxScore, score);
                    alpha    = Math.max(alpha, score);
                    if (beta <= alpha) break;
                }
                return maxScore;
            } else {
                const opp = opponent(player);
                let minScore = Infinity;
                for (const col of valid) {
                    const row = dropMut(b, col, opp);
                    const score = minimax(b, row, col, depth - 1, alpha, beta, true, player);
                    undoMut(b, row, col);
                    minScore = Math.min(minScore, score);
                    beta     = Math.min(beta, score);
                    if (beta <= alpha) break;
                }
                return minScore;
            }
        }

        function evalBoard(b, player) {
            const opp = opponent(player);
            let score = 0;
            for (const w of getAllWindows(b)) {
                score += scoreWindow(w, player);
                score -= scoreWindow(w, opp) * 1.2;
            }
            for (let row = 0; row < ROWS; row++) if (b[row][3] === player) score += 3;
            return score;
        }

        // =============================================
        // LEVEL 5: NEURAL NET
        // =============================================
        class NeuralNet {
            constructor() {
                this.w1 = this._rand(64, 42);
                this.b1 = new Float64Array(64);
                this.w2 = this._rand(32, 64);
                this.b2 = new Float64Array(32);
                this.w3 = this._rand(7, 32);
                this.b3 = new Float64Array(7);
                this.trainedEpisodes = 0;
            }

            _rand(rows, cols) {
                const m = new Float64Array(rows * cols);
                const scale = Math.sqrt(2 / cols);
                for (let i = 0; i < m.length; i++) m[i] = (Math.random() * 2 - 1) * scale;
                return m;
            }

            _matVec(w, rows, cols, x) {
                const out = new Float64Array(rows);
                for (let i = 0; i < rows; i++) {
                    let s = 0;
                    for (let j = 0; j < cols; j++) s += w[i * cols + j] * x[j];
                    out[i] = s;
                }
                return out;
            }

            _softmax(x) {
                const max = Math.max(...x);
                const exp = Array.from(x, v => Math.exp(v - max));
                const sum = exp.reduce((a, b) => a + b, 0);
                return exp.map(v => v / sum);
            }

            forward(input) {
                // 42 -> 64 ReLU
                const h1Pre = this._matVec(this.w1, 64, 42, input);
                const h1    = h1Pre.map((v, i) => Math.max(0, v + this.b1[i]));
                // 64 -> 32 ReLU
                const h2Pre = this._matVec(this.w2, 32, 64, h1);
                const h2    = h2Pre.map((v, i) => Math.max(0, v + this.b2[i]));
                // 32 -> 7
                const logits = this._matVec(this.w3, 7, 32, h2);
                for (let i = 0; i < 7; i++) logits[i] += this.b3[i];
                return { h1, h2, probs: this._softmax(logits) };
            }

            // Policy gradient (REINFORCE) update
            update(input, actionIdx, reward, lr = 0.001) {
                const { h1, h2, probs } = this.forward(input);

                // Output gradient
                const dOut = new Float64Array(7);
                for (let i = 0; i < 7; i++) {
                    dOut[i] = reward * ((i === actionIdx ? 1 : 0) - probs[i]);
                }

                // Gradient w.r.t. h2 (before updating w3)
                const dH2 = new Float64Array(32);
                for (let i = 0; i < 7; i++) {
                    for (let j = 0; j < 32; j++) dH2[j] += dOut[i] * this.w3[i * 32 + j];
                }
                // Update w3, b3
                for (let i = 0; i < 7; i++) {
                    for (let j = 0; j < 32; j++) this.w3[i * 32 + j] += lr * dOut[i] * h2[j];
                    this.b3[i] += lr * dOut[i];
                }

                // ReLU deriv through h2
                const dH2Act = dH2.map((v, i) => h2[i] > 0 ? v : 0);

                // Gradient w.r.t. h1 (before updating w2)
                const dH1 = new Float64Array(64);
                for (let i = 0; i < 32; i++) {
                    for (let j = 0; j < 64; j++) dH1[j] += dH2Act[i] * this.w2[i * 64 + j];
                }
                // Update w2, b2
                for (let i = 0; i < 32; i++) {
                    for (let j = 0; j < 64; j++) this.w2[i * 64 + j] += lr * dH2Act[i] * h1[j];
                    this.b2[i] += lr * dH2Act[i];
                }

                // ReLU deriv through h1
                const dH1Act = dH1.map((v, i) => h1[i] > 0 ? v : 0);

                // Update w1, b1
                for (let i = 0; i < 64; i++) {
                    for (let j = 0; j < 42; j++) this.w1[i * 42 + j] += lr * dH1Act[i] * input[j];
                    this.b1[i] += lr * dH1Act[i];
                }
            }

            save() {
                const data = {
                    w1: Array.from(this.w1), b1: Array.from(this.b1),
                    w2: Array.from(this.w2), b2: Array.from(this.b2),
                    w3: Array.from(this.w3), b3: Array.from(this.b3),
                    episodes: this.trainedEpisodes
                };
                localStorage.setItem('c4NeuralNetWeights', JSON.stringify(data));
            }

            load() {
                const raw = localStorage.getItem('c4NeuralNetWeights');
                if (!raw) return false;
                try {
                    const d = JSON.parse(raw);
                    this.w1 = new Float64Array(d.w1); this.b1 = new Float64Array(d.b1);
                    this.w2 = new Float64Array(d.w2); this.b2 = new Float64Array(d.b2);
                    this.w3 = new Float64Array(d.w3); this.b3 = new Float64Array(d.b3);
                    this.trainedEpisodes = d.episodes || 0;
                    return true;
                } catch { return false; }
            }
        }

        const neuralNet = new NeuralNet();
        neuralNet.load();

        function boardToInput(b, player) {
            const input = new Float64Array(42);
            const opp   = opponent(player);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const v = b[r][c];
                    input[r * COLS + c] = v === player ? 1 : v === opp ? -1 : 0;
                }
            }
            return input;
        }

        function neuralNetMove(player, b) {
            const { probs } = neuralNet.forward(boardToInput(b, player));
            const valid = getValidCols(b);
            return valid.reduce((best, c) => probs[c] > probs[best] ? c : best, valid[0]);
        }

        // --- Neural Net Training ---
        let trainingInProgress = false;

        function runTrainingGame() {
            let tb = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
            let tp = RED;
            const history = [];

            while (true) {
                const valid = getValidCols(tb);
                if (valid.length === 0) break;

                const input = boardToInput(tb, tp);
                const { probs } = neuralNet.forward(input);

                // Epsilon-greedy
                const col = Math.random() < 0.2
                    ? valid[Math.floor(Math.random() * valid.length)]
                    : valid.reduce((best, c) => probs[c] > probs[best] ? c : best, valid[0]);

                history.push({ player: tp, input, col });

                const row = dropMut(tb, col, tp);
                const winner = checkWinAt(tb, row, col);

                if (winner) {
                    for (const h of history) {
                        neuralNet.update(h.input, h.col, h.player === winner ? 1 : -1);
                    }
                    return;
                }
                if (isFull(tb)) {
                    for (const h of history) neuralNet.update(h.input, h.col, -0.1);
                    return;
                }
                tp = opponent(tp);
            }
        }

        function trainBatch(remaining) {
            if (!trainingInProgress) return;
            const batchSize = 50;
            for (let i = 0; i < batchSize && remaining > 0; i++, remaining--) {
                runTrainingGame();
                neuralNet.trainedEpisodes++;
            }
            trainProgress.value = TRAIN_TOTAL - remaining;
            updateNNStatus();
            if (remaining <= 0) {
                trainingInProgress    = false;
                trainProgress.style.display = 'none';
                trainBtn.disabled     = false;
                neuralNet.save();
                return;
            }
            setTimeout(() => trainBatch(remaining), 0);
        }

        function updateNNStatus() {
            const ep = neuralNet.trainedEpisodes;
            nnStatus.textContent = ep > 0
                ? `Neural Net: Trained on ${ep.toLocaleString()} episodes`
                : 'Neural Net: Untrained (plays randomly until trained)';
        }

        trainBtn.addEventListener('click', () => {
            if (trainingInProgress) return;
            trainingInProgress = true;
            trainBtn.disabled  = true;
            trainProgress.style.display = 'block';
            trainProgress.value = 0;
            trainProgress.max   = TRAIN_TOTAL;
            trainBatch(TRAIN_TOTAL);
        });

        // =============================================
        // LEVEL 6: MCTS
        // =============================================
        let mctsSimsRun = 0;

        class MCTSNode {
            constructor(b, lastPlayer, col, row, parent) {
                this.board       = b;
                this.lastPlayer  = lastPlayer;
                this.col         = col;
                this.row         = row;
                this.parent      = parent;
                this.children    = [];
                this.wins        = 0;
                this.visits      = 0;
                this.untriedCols = getValidCols(b);
            }

            ucb1(C = 1.41) {
                if (this.visits === 0) return Infinity;
                return this.wins / this.visits + C * Math.sqrt(Math.log(this.parent.visits) / this.visits);
            }

            isFullyExpanded() { return this.untriedCols.length === 0; }

            bestChild() {
                return this.children.reduce((best, c) => c.ucb1() > best.ucb1() ? c : best, this.children[0]);
            }
        }

        function mctsMove(player, b) {
            mctsSimsRun = 0;
            const root = new MCTSNode(b.map(r => r.slice()), opponent(player), -1, -1, null);

            for (let sim = 0; sim < MCTS_SIMS; sim++) {
                mctsSimsRun++;

                // Selection
                let node = root;
                while (node.isFullyExpanded() && node.children.length > 0) {
                    node = node.bestChild();
                }

                // Expansion
                let winner = null;
                if (node.row >= 0) winner = checkWinAt(node.board, node.row, node.col);

                if (!winner && !isFull(node.board) && node.untriedCols.length > 0) {
                    const nextPlayer = opponent(node.lastPlayer);
                    const col = node.untriedCols.splice(Math.floor(Math.random() * node.untriedCols.length), 1)[0];
                    const res = dropCopy(node.board, col, nextPlayer);
                    if (res) {
                        const child = new MCTSNode(res.board, nextPlayer, col, res.row, node);
                        node.children.push(child);
                        node = child;
                        winner = checkWinAt(node.board, node.row, node.col);
                    }
                }

                // Rollout from new node
                if (!winner && !isFull(node.board)) {
                    const rb = node.board.map(r => r.slice());
                    let rp = opponent(node.lastPlayer);
                    let lastR = -1, lastC = -1;
                    while (!isFull(rb)) {
                        const valid = getValidCols(rb);
                        const c = valid[Math.floor(Math.random() * valid.length)];
                        const row = dropMut(rb, c, rp);
                        lastR = row; lastC = c;
                        winner = checkWinAt(rb, row, c);
                        if (winner) break;
                        rp = opponent(rp);
                    }
                }

                // Backprop
                let n = node;
                while (n !== null) {
                    n.visits++;
                    if (winner === player)         n.wins += 1;
                    else if (winner !== null)       n.wins -= 0.5;
                    n = n.parent;
                }
            }

            if (root.children.length === 0) return randomMove(b);
            return root.children.reduce((a, c) => c.visits > a.visits ? c : a).col;
        }

        // =============================================
        // AI DISPATCHER
        // =============================================
        function getAIMove(player, b) {
            const type = player === RED ? p1Type : p2Type;
            switch (type) {
                case 'random':    return randomMove(b);
                case 'greedy':    return greedyMove(player, b);
                case 'heuristic': return heuristicMove(player, b);
                case 'minimax':   return minimaxMove(player, b);
                case 'neural':    return neuralNetMove(player, b);
                case 'mcts':      return mctsMove(player, b);
                default:          return randomMove(b);
            }
        }

        // =============================================
        // GAME LOGIC
        // =============================================
        function initBoard() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
        }

        function currentType() { return currentPlayer === RED ? p1Type : p2Type; }
        function isHumanTurn() { return currentType() === 'human'; }

        function startGame() {
            initBoard();
            currentPlayer = RED;
            gameOver      = false;
            hoverCol      = -1;
            aiThinking    = false;
            stopAutoPlay();
            updateTurnIndicator();
            clearStats();
            draw();
            if (!isHumanTurn()) scheduleAIMove();
        }

        function dropPiece(col) {
            if (gameOver || aiThinking) return false;
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row][col] !== EMPTY) continue;
                board[row][col] = currentPlayer;
                playDrop();

                const winner = checkWinAt(board, row, col);
                if (winner) {
                    gameOver = true;
                    stopAutoPlay();
                    if (winner === RED) {
                        redWins++;
                        redWinsEl.textContent = redWins;
                        turnIndicator.textContent = `Red (${PLAYER_NAMES[p1Type]}) wins!`;
                    } else {
                        blueWins++;
                        blueWinsEl.textContent = blueWins;
                        turnIndicator.textContent = `Blue (${PLAYER_NAMES[p2Type]}) wins!`;
                    }
                    playWin();
                    draw();
                    return true;
                }

                if (isFull(board)) {
                    gameOver = true;
                    stopAutoPlay();
                    turnIndicator.textContent = "It's a draw!";
                    playDraw();
                    draw();
                    return true;
                }

                currentPlayer = opponent(currentPlayer);
                updateTurnIndicator();
                draw();

                // Schedule AI move only when NOT in auto-play (auto-play drives itself)
                if (!autoPlaying && !isHumanTurn() && !gameOver) {
                    scheduleAIMove();
                }
                return true;
            }
            return false;
        }

        function scheduleAIMove() {
            aiThinking = true;
            setTimeout(doAITurn, 300);
        }

        function doAITurn() {
            if (gameOver || isHumanTurn()) { aiThinking = false; return; }
            const type    = currentType();
            const t0      = performance.now();
            const col     = getAIMove(currentPlayer, board);
            const elapsed = Math.round(performance.now() - t0);
            aiThinking = false;
            showStats(elapsed, type);
            dropPiece(col);
        }

        // =============================================
        // AUTO PLAY
        // =============================================
        function stopAutoPlay() {
            autoPlaying = false;
            if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
            autoPlayBtn.style.display = 'inline-block';
            pauseBtn.style.display    = 'none';
        }

        autoPlayBtn.addEventListener('click', () => {
            if (gameOver) { startGame(); return; }
            autoPlaying = true;
            autoPlayBtn.style.display = 'none';
            pauseBtn.style.display    = 'inline-block';
            runAutoStep();
        });

        pauseBtn.addEventListener('click', stopAutoPlay);

        function runAutoStep() {
            if (!autoPlaying || gameOver) {
                if (gameOver) stopAutoPlay();
                return;
            }
            if (isHumanTurn()) { stopAutoPlay(); return; }
            const type    = currentType();
            const t0      = performance.now();
            const col     = getAIMove(currentPlayer, board);
            const elapsed = Math.round(performance.now() - t0);
            showStats(elapsed, type);
            dropPiece(col);
            if (!gameOver && autoPlaying) {
                autoTimer = setTimeout(runAutoStep, 600);
            }
        }

        // =============================================
        // UI UPDATES
        // =============================================
        function updateTurnIndicator() {
            const name = PLAYER_NAMES[currentType()];
            turnIndicator.textContent = currentPlayer === RED
                ? `Red (${name})'s turn`
                : `Blue (${name})'s turn`;
        }

        function showStats(ms, type) {
            statTime.textContent = `Time: ${ms}ms`;
            if (type === 'minimax')
                statExtra.textContent = `Nodes evaluated: ${minimaxNodes.toLocaleString()}`;
            else if (type === 'mcts')
                statExtra.textContent = `MCTS simulations: ${mctsSimsRun}`;
            else if (type === 'neural')
                statExtra.textContent = `Neural Net (${neuralNet.trainedEpisodes > 0 ? neuralNet.trainedEpisodes.toLocaleString() + ' ep trained' : 'untrained'})`;
            else
                statExtra.textContent = '';
        }

        function clearStats() {
            statTime.textContent  = '';
            statExtra.textContent = '';
        }

        function updateAutoControlsVisibility() {
            autoControls.style.display = (p1Type !== 'human' && p2Type !== 'human') ? 'flex' : 'none';
        }

        function updateNNPanelVisibility() {
            nnPanel.style.display = (p1Type === 'neural' || p2Type === 'neural') ? 'block' : 'none';
        }

        function updateWinLabels() {
            p1WinLabel.textContent = `Red (${PLAYER_NAMES[p1Type]})`;
            p2WinLabel.textContent = `Blue (${PLAYER_NAMES[p2Type]})`;
        }

        // =============================================
        // DRAWING
        // =============================================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPreviewRow();
            drawBoard();
        }

        function drawPreviewRow() {
            if (hoverCol < 0 || gameOver || !isHumanTurn()) return;
            const x = hoverCol * CELL + CELL / 2;
            ctx.beginPath();
            ctx.arc(x, CELL / 2, RADIUS, 0, Math.PI * 2);
            ctx.fillStyle  = COLORS[currentPlayer];
            ctx.globalAlpha = 0.5;
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }

        function drawBoard() {
            ctx.fillStyle = '#1d4ed8';
            ctx.fillRect(0, BOARD_TOP, canvas.width, ROWS * CELL);
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const x = col * CELL + CELL / 2;
                    const y = BOARD_TOP + row * CELL + CELL / 2;
                    ctx.beginPath();
                    ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
                    if (board[row][col] === EMPTY) {
                        ctx.fillStyle = hoverCol === col && !gameOver && isHumanTurn() ? '#1a1a2e' : '#111';
                    } else {
                        ctx.fillStyle = COLORS[board[row][col]];
                    }
                    ctx.fill();
                    ctx.strokeStyle = '#1e40af';
                    ctx.lineWidth   = 2;
                    ctx.stroke();
                }
            }
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================
        canvas.addEventListener('mousemove', (e) => {
            if (gameOver || !isHumanTurn()) return;
            const rect = canvas.getBoundingClientRect();
            hoverCol = Math.floor((e.clientX - rect.left) / CELL);
            if (hoverCol < 0 || hoverCol >= COLS) hoverCol = -1;
            draw();
        });

        canvas.addEventListener('mouseleave', () => { hoverCol = -1; draw(); });

        canvas.addEventListener('click', (e) => {
            if (gameOver || !isHumanTurn() || aiThinking) return;
            const col = Math.floor((e.clientX - canvas.getBoundingClientRect().left) / CELL);
            if (col >= 0 && col < COLS) dropPiece(col);
        });

        restartBtn.addEventListener('click', startGame);

        p1Select.addEventListener('change', () => {
            p1Type = p1Select.value;
            updateWinLabels();
            updateAutoControlsVisibility();
            updateNNPanelVisibility();
            startGame();
        });

        p2Select.addEventListener('change', () => {
            p2Type = p2Select.value;
            updateWinLabels();
            updateAutoControlsVisibility();
            updateNNPanelVisibility();
            startGame();
        });

        // =============================================
        // INIT
        // =============================================
        p1Type = p1Select.value;
        p2Type = p2Select.value;
        updateWinLabels();
        updateAutoControlsVisibility();
        updateNNPanelVisibility();
        updateNNStatus();
        startGame();
    </script>
</body>
</html>
