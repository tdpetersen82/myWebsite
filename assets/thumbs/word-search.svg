<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Word Search board">
  <defs>
    <linearGradient id="wsbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF4E6"/>
      <stop offset="1" stop-color="#EFE0C6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#wsbg)"/>
  <!-- highlight pills: FIND across, WORD down -->
  <rect x="24" y="68" width="440" height="104" rx="52" fill="#FFD9A0"/>
  <rect x="472" y="68" width="104" height="444" rx="52" fill="#A8E0C8"/>
  <g font-family="'Bricolage Grotesque','Inter',sans-serif" font-weight="800" font-size="76" text-anchor="middle">
    <!-- row 0 -->
    <text x="76" y="146" fill="#2A2017">F</text><text x="188" y="146" fill="#2A2017">I</text><text x="300" y="146" fill="#2A2017">N</text><text x="412" y="146" fill="#2A2017">D</text><text x="524" y="146" fill="#2A2017">W</text>
    <!-- row 1 -->
    <text x="76" y="258" fill="#A98F6A">A</text><text x="188" y="258" fill="#A98F6A">E</text><text x="300" y="258" fill="#A98F6A">O</text><text x="412" y="258" fill="#A98F6A">Q</text><text x="524" y="258" fill="#2A2017">O</text>
    <!-- row 2 -->
    <text x="76" y="370" fill="#A98F6A">B</text><text x="188" y="370" fill="#A98F6A">C</text><text x="300" y="370" fill="#A98F6A">R</text><text x="412" y="370" fill="#A98F6A">T</text><text x="524" y="370" fill="#2A2017">R</text>
    <!-- row 3 -->
    <text x="76" y="482" fill="#A98F6A">K</text><text x="188" y="482" fill="#A98F6A">L</text><text x="300" y="482" fill="#A98F6A">S</text><text x="412" y="482" fill="#A98F6A">M</text><text x="524" y="482" fill="#2A2017">D</text>
  </g>
</svg>
