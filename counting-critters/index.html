    <style>
      :root {
        --ink: #1F1A2E;
        --bg-1: #FFF8DC;
        --bg-2: #FFE4F0;
        --bg-3: #DCEEFF;
        --accent: #FF4F8B;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
        color: var(--ink);
        min-height: 100vh;
        display: flex; flex-direction: column; align-items: center;
        padding: 20px 16px 32px;
      }
      .game-shell { width: 100%; max-width: 760px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
      .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 14px; flex-wrap: wrap; }
      .top-bar a { color: var(--ink); text-decoration: none; font-weight: 600; opacity: 0.7; }
      .top-bar a:hover { opacity: 1; }
      h1 {
        font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
        background: linear-gradient(135deg, #FFA751, #FF4F8B);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .stats {
        display: flex; gap: 18px; font-size: 14px; font-weight: 600;
        background: rgba(255, 255, 255, 0.6);
        padding: 10px 18px; border-radius: 999px;
        box-shadow: 0 4px 12px rgba(31, 26, 46, 0.06);
        flex-wrap: wrap; justify-content: center;
      }
      .stats div { display: flex; gap: 6px; align-items: baseline; }
      .stats .l { color: rgba(31, 26, 46, 0.55); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
      .stats .v { font-size: 18px; font-weight: 800; color: var(--accent); }
      .stage {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 24px;
        padding: 24px 18px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(31, 26, 46, 0.08);
        display: flex; flex-direction: column; gap: 18px; align-items: center;
      }
      .question {
        font-size: 22px; font-weight: 700; text-align: center;
        color: rgba(31, 26, 46, 0.85);
      }
      .critter-area {
        width: 100%; min-height: 240px;
        background: linear-gradient(180deg, #DDF1FF 0%, #FFE4F0 100%);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
      }
      .critter {
        position: absolute;
        font-size: 56px;
        line-height: 1;
        animation: bob 2.2s ease-in-out infinite alternate;
        user-select: none;
      }
      @keyframes bob {
        0%   { transform: translateY(0)   rotate(-3deg); }
        100% { transform: translateY(-8px) rotate(3deg); }
      }
      .answers {
        display: grid; grid-template-columns: repeat(4, minmax(70px, 1fr)); gap: 12px;
        width: 100%; max-width: 560px;
      }
      .answers button {
        font: inherit; font-weight: 800; font-size: 32px;
        padding: 24px 12px;
        border-radius: 18px;
        border: 3px solid rgba(31, 26, 46, 0.12);
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
        cursor: pointer;
        transition: transform 0.1s, background 0.15s, border-color 0.15s;
        box-shadow: 0 4px 12px rgba(31, 26, 46, 0.06);
      }
      .answers button:hover { transform: translateY(-2px); border-color: var(--accent); }
      .answers button.correct { background: #B8F2C0; border-color: #4DAF5C; }
      .answers button.wrong { background: #FFD0DA; border-color: #FF4F8B; }
      .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
      button.action {
        font: inherit; font-weight: 700;
        padding: 12px 22px; border-radius: 999px;
        border: 2px solid transparent;
        background: var(--accent); color: #fff;
        cursor: pointer; transition: transform 0.1s;
        box-shadow: 0 4px 12px rgba(255, 79, 139, 0.3);
      }
      button.action.ghost { background: transparent; color: var(--ink); border-color: rgba(31, 26, 46, 0.2); box-shadow: none; }
      button.action:hover { transform: translateY(-1px); }
      .progress {
        height: 8px; width: 100%; max-width: 560px;
        background: rgba(31, 26, 46, 0.1);
        border-radius: 999px; overflow: hidden;
      }
      .progress-bar {
        height: 100%; background: linear-gradient(90deg, #FFA751, var(--accent));
        transition: width 0.3s;
      }
      .hint { font-size: 13px; color: rgba(31, 26, 46, 0.6); text-align: center; max-width: 540px; }
      .end-card { text-align: center; padding: 12px; }
      .end-card h2 { font-size: 32px; color: var(--accent); margin-bottom: 8px; }
      .end-card p { font-size: 16px; color: rgba(31, 26, 46, 0.7); margin-bottom: 14px; }

<body>
    <div class="game-shell">
        <div class="top-bar">
            <a href="../">← Limestone Games</a>
            <a href="../kids/">All Kids games</a>
        </div>
        <h1>Counting Critters</h1>
        <div class="stats">
            <div><span class="l">Question</span><span class="v" id="qNum">1/20</span></div>
            <div><span class="l">Correct</span><span class="v" id="correct">0</span></div>
            <div><span class="l">Best accuracy</span><span class="v" id="best">—</span></div>
        </div>
        <div class="progress"><div id="progressBar" class="progress-bar" style="width:5%"></div></div>
        <div class="stage" id="stage">
            <div class="question" id="question">How many critters?</div>
            <div class="critter-area" id="critterArea"></div>
            <div class="answers" id="answers"></div>
        </div>
        <div class="controls">
            <button class="action" onclick="restart()">New round</button>
            <a href="../kids/"><button class="action ghost">More kids games</button></a>
        </div>
        <p class="hint">Each round has 20 questions. Take all the time you need — there's no timer.</p>
    </div>

    <script>
        const KEY = 'kids-counting-critters-best';
        const CRITTERS = ['🐸','🐱','🐶','🦊','🐻','🐼','🐭','🐹','🐰','🦄','🐢','🐠'];
        const TOTAL_QS = 20;

        let q = 0, correct = 0;
        let answer = 0;
        let questionLevel = 1; // increases for harder distractors
        let answeredThis = false;

        const qNumEl = document.getElementById('qNum');
        const correctEl = document.getElementById('correct');
        const bestEl = document.getElementById('best');
        const questionEl = document.getElementById('question');
        const critterAreaEl = document.getElementById('critterArea');
        const answersEl = document.getElementById('answers');
        const progressEl = document.getElementById('progressBar');

        let best = parseInt(localStorage.getItem(KEY) || '0', 10);
        bestEl.textContent = best > 0 ? (best + '%') : '—';

        function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function nextQuestion() {
            if (q >= TOTAL_QS) return finish();
            answeredThis = false;
            // difficulty scales: q 0-6 use 1-5; 7-13 use 1-8; 14-19 use 1-10
            const max = q < 7 ? 5 : (q < 14 ? 8 : 10);
            answer = rand(1, max);
            const useDistractors = q >= 14;
            const critter = pick(CRITTERS);
            const useMixed = q >= 7;

            critterAreaEl.innerHTML = '';
            // place critters in non-overlapping random positions
            const placed = [];
            const aw = critterAreaEl.clientWidth || 640;
            const ah = critterAreaEl.clientHeight || 240;
            for (let i = 0; i < answer; i++) {
                let x, y, ok = false, tries = 0;
                while (!ok && tries < 60) {
                    x = 14 + Math.random() * (aw - 80);
                    y = 14 + Math.random() * (ah - 80);
                    ok = placed.every(p => Math.hypot(p.x - x, p.y - y) > 70);
                    tries++;
                }
                placed.push({ x, y });
                const el = document.createElement('div');
                el.className = 'critter';
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.animationDelay = (Math.random() * 1.5) + 's';
                el.textContent = useMixed && Math.random() < 0.4 ? pick(CRITTERS) : critter;
                critterAreaEl.appendChild(el);
            }

            // 4 answer choices including correct
            const opts = new Set([answer]);
            while (opts.size < 4) {
                let candidate;
                if (useDistractors) {
                    // closer distractors (off by 1-2)
                    candidate = answer + (Math.random() < 0.5 ? -1 : 1) * rand(1, 2);
                } else {
                    candidate = rand(1, max + 2);
                }
                if (candidate >= 1 && candidate <= 12 && candidate !== answer) opts.add(candidate);
            }
            const choices = [...opts].sort(() => Math.random() - 0.5);

            answersEl.innerHTML = '';
            choices.forEach(n => {
                const b = document.createElement('button');
                b.textContent = n;
                b.addEventListener('click', () => onAnswer(n, b));
                answersEl.appendChild(b);
            });

            qNumEl.textContent = (q + 1) + '/' + TOTAL_QS;
            progressEl.style.width = ((q / TOTAL_QS) * 100) + '%';
        }

        function onAnswer(n, btn) {
            if (answeredThis) return;
            answeredThis = true;
            if (n === answer) {
                btn.classList.add('correct');
                correct++;
                correctEl.textContent = correct;
            } else {
                btn.classList.add('wrong');
                // show correct
                [...answersEl.children].forEach(c => {
                    if (parseInt(c.textContent, 10) === answer) c.classList.add('correct');
                });
            }
            setTimeout(() => {
                q++;
                nextQuestion();
            }, 900);
        }

        function finish() {
            const accuracy = Math.round((correct / TOTAL_QS) * 100);
            progressEl.style.width = '100%';
            qNumEl.textContent = TOTAL_QS + '/' + TOTAL_QS;
            let isNewBest = false;
            if (accuracy > best) {
                best = accuracy;
                localStorage.setItem(KEY, String(best));
                bestEl.textContent = best + '%';
                isNewBest = true;
            }
            critterAreaEl.innerHTML = '';
            answersEl.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'end-card';
            card.innerHTML =
                '<h2>' + (isNewBest ? 'New best!' : 'Round complete!') + '</h2>'
                + '<p>You got ' + correct + ' of ' + TOTAL_QS + ' right (' + accuracy + '%).</p>'
                + '<button class="action" onclick="restart()">Play another round</button>';
            answersEl.appendChild(card);
            questionEl.textContent = isNewBest ? 'Best round yet — well done!' : 'Nice work — try again to beat your record.';
        }

        function restart() {
            q = 0; correct = 0;
            correctEl.textContent = 0;
            questionEl.textContent = 'How many critters?';
            nextQuestion();
        }

        restart();
    </script>
</body>
