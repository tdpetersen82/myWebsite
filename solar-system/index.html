<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System — Phase 1</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;overflow:hidden;}
  canvas{display:block;}
  #hud{
    position:fixed;top:14px;left:16px;
    font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;
    color:#cfd6e6;pointer-events:none;text-shadow:0 1px 3px #000;
  }
  #hud h1{font:600 15px/1.4 system-ui,sans-serif;margin:0 0 8px;color:#fff;letter-spacing:.2px;}
  #hud .row{white-space:pre;}
  #hud .ok{color:#6ee787;}
  #hint{
    position:fixed;bottom:12px;left:16px;right:16px;
    font:12px/1.4 system-ui,sans-serif;color:#697089;pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <h1>Solar System · Phase 1</h1>
  <div class="row" id="time"></div>
  <div class="row" id="earth"></div>
  <div class="row" id="mars"></div>
</div>
<div id="hint">Fixed Sun · Velocity&nbsp;Verlet integrator · planets orbit the Sun but don't yet pull on each other.&nbsp;&nbsp; [Space]&nbsp;pause · [↑&nbsp;↓]&nbsp;speed · [R]&nbsp;reset</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ---- Physics constants — units: AU, years, solar masses ----
  // In these units G = 4π², which makes a body at 1 AU orbit the Sun in exactly 1 year.
  const G = 4 * Math.PI * Math.PI;
  const SUN_M = 1;
  const GM = G * SUN_M;
  const DT = 0.001;        // years per integration step (~8.8 hrs) → ~1000 steps per Earth orbit
  let substeps = 4;        // integration steps per animation frame (controls playback speed)
  let paused = false;

  // ---- Bodies ----
  const planets = [
    { name:'Earth', color:'#5aa2ff', r0:1.000, size:5 },
    { name:'Mars',  color:'#ff6a4d', r0:1.524, size:4 },
  ];
  const maxR = Math.max(...planets.map(p => p.r0));
  let t = 0; // elapsed years

  function reset(){
    for (const p of planets){
      p.x = p.r0; p.y = 0;                      // start on the +x axis
      p.vx = 0;   p.vy = 2*Math.PI/Math.sqrt(p.r0); // circular speed √(GM/r), perpendicular
      p.trail = [];
      p.rmin = Infinity; p.rmax = 0;
    }
    t = 0;
  }

  // Acceleration from the (fixed) Sun at the origin: a = -GM·r̂ / r²
  function accel(x, y){
    const r2 = x*x + y*y;
    const inv = GM / (r2 * Math.sqrt(r2));      // = GM / r³
    return [ -x*inv, -y*inv ];
  }

  // One Velocity Verlet step for one body — symplectic, so orbits stay closed.
  function step(p, dt){
    let [ax, ay] = accel(p.x, p.y);
    p.x += p.vx*dt + 0.5*ax*dt*dt;
    p.y += p.vy*dt + 0.5*ay*dt*dt;
    const [ax2, ay2] = accel(p.x, p.y);
    p.vx += 0.5*(ax+ax2)*dt;
    p.vy += 0.5*(ay+ay2)*dt;
    const r = Math.hypot(p.x, p.y);
    if (r < p.rmin) p.rmin = r;
    if (r > p.rmax) p.rmax = r;
  }

  // ---- Layout / auto-fit to viewport ----
  let W, H, cx, cy, scale, dpr, stars = [];
  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx = W/2; cy = H/2;
    scale = Math.min(W,H) * 0.42 / maxR;        // fit the outermost orbit with margin
    stars = [];
    const n = Math.round(W*H/9000);
    for (let i=0;i<n;i++)
      stars.push({x:Math.random()*W, y:Math.random()*H, a:Math.random()*0.6+0.15, s:Math.random()*1.3+0.3});
  }
  window.addEventListener('resize', resize);

  const sx = x => cx + x*scale;
  const sy = y => cy - y*scale;                 // flip y so counter-clockwise reads naturally

  // ---- Render ----
  function draw(){
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0,0,W,H);

    for (const st of stars){ ctx.globalAlpha = st.a; ctx.fillStyle = '#fff'; ctx.fillRect(st.x,st.y,st.s,st.s); }
    ctx.globalAlpha = 1;

    // faint orbit guide rings
    ctx.strokeStyle = 'rgba(120,140,180,0.12)';
    ctx.lineWidth = 1;
    for (const p of planets){ ctx.beginPath(); ctx.arc(cx,cy,p.r0*scale,0,2*Math.PI); ctx.stroke(); }

    // trails (fading)
    ctx.lineCap = 'round';
    for (const p of planets){
      const tr = p.trail;
      ctx.lineWidth = 2;
      ctx.strokeStyle = p.color;
      for (let i=1;i<tr.length;i++){
        ctx.globalAlpha = (i/tr.length) * 0.85;
        ctx.beginPath();
        ctx.moveTo(sx(tr[i-1].x), sy(tr[i-1].y));
        ctx.lineTo(sx(tr[i].x),   sy(tr[i].y));
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Sun
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,34);
    g.addColorStop(0,'#fff7d6'); g.addColorStop(0.4,'#ffd35a'); g.addColorStop(1,'rgba(255,180,40,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx,cy,34,0,2*Math.PI); ctx.fill();
    ctx.fillStyle = '#ffe08a'; ctx.beginPath(); ctx.arc(cx,cy,11,0,2*Math.PI); ctx.fill();

    // planets
    for (const p of planets){
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), p.size, 0, 2*Math.PI); ctx.fill();
    }
  }

  // ---- HUD ----
  const elTime = document.getElementById('time');
  const elRows = { Earth: document.getElementById('earth'), Mars: document.getElementById('mars') };
  const pad = (s,n) => (s + '      ').slice(0,n);
  function updHud(){
    elTime.textContent = `t = ${t.toFixed(2)} yr     speed ×${substeps}${paused?'   (paused)':''}`;
    for (const p of planets){
      const r = Math.hypot(p.x, p.y);
      const drift = p.rmax > 0 ? p.rmax - p.rmin : 0;
      const ok = drift / p.r0 < 0.005;
      elRows[p.name].innerHTML =
        `${pad(p.name,6)} r ${r.toFixed(4)} AU   drift ${drift.toFixed(5)}   ` +
        `<span class="${ok?'ok':''}">${ok ? 'stable ✓' : 'drifting'}</span>`;
    }
  }

  // ---- Main loop ----
  function frame(){
    if (!paused){
      for (let s=0;s<substeps;s++){
        for (const p of planets) step(p, DT);
        t += DT;
      }
      for (const p of planets){
        p.trail.push({x:p.x, y:p.y});
        if (p.trail.length > 320) p.trail.shift();
      }
    }
    draw();
    updHud();
    requestAnimationFrame(frame);
  }

  // ---- Controls ----
  window.addEventListener('keydown', e=>{
    if (e.code === 'Space'){ paused = !paused; e.preventDefault(); }
    else if (e.code === 'ArrowUp')   substeps = Math.min(32, substeps + 1);
    else if (e.code === 'ArrowDown') substeps = Math.max(1, substeps - 1);
    else if (e.key === 'r' || e.key === 'R') reset();
  });

  resize(); reset(); frame();
})();
</script>
</body>
</html>
