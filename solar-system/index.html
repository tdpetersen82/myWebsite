<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System</title>
<style>
  html,body{margin:0;height:100%;background:#05060a;overflow:hidden;}
  canvas{display:block;cursor:crosshair;}
  #hud{
    position:fixed;top:14px;left:16px;
    font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;
    color:#cfd6e6;pointer-events:none;text-shadow:0 1px 3px #000;
  }
  #hud h1{font:600 15px/1.4 system-ui,sans-serif;margin:0 0 8px;color:#fff;letter-spacing:.2px;}
  #hud .row{white-space:pre;}
  #hud .dim{color:#7c869c;margin-top:2px;}
  #hud .dim.ok{color:#6ee787;}
  #hud .dim.warn{color:#ffcf5a;}
  #hint{
    position:fixed;bottom:12px;left:16px;right:16px;
    font:12px/1.45 system-ui,sans-serif;color:#697089;pointer-events:none;
  }
  #comet-ui{position:fixed;top:14px;right:16px;font:600 12px/1.3 system-ui,sans-serif;color:#e6edf8;text-align:right;}
  #comet-toggle,#comet-launch{font:inherit;color:#e6edf8;background:rgba(42,54,78,0.72);border:1px solid rgba(150,170,210,0.35);border-radius:9px;padding:9px 14px;cursor:pointer;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  #comet-toggle:hover,#comet-launch:hover{background:rgba(62,78,112,0.9);}
  #comet-panel{margin-top:8px;padding:13px 14px 11px;width:214px;text-align:left;background:rgba(18,24,38,0.9);border:1px solid rgba(150,170,210,0.28);border-radius:10px;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);}
  #comet-panel label{display:block;margin:0 0 12px;color:#9fabc2;font-weight:500;}
  #comet-panel label span{float:right;color:#eaf1ff;font-weight:600;font-variant-numeric:tabular-nums;}
  #comet-panel input[type=range]{width:100%;margin:7px 0 0;accent-color:#6f9dff;cursor:pointer;}
  #comet-launch{width:100%;margin-top:3px;text-align:center;background:rgba(74,108,190,0.55);border-color:rgba(150,180,255,0.6);}
  #hud .row.clickable{pointer-events:auto;cursor:pointer;border-radius:4px;padding:0 4px;margin-left:-4px;}
  #hud .row.clickable:hover{background:rgba(120,150,210,0.16);}
  #hud .row.sel{background:rgba(120,150,210,0.28);}
  #edit-panel{position:fixed;left:16px;bottom:56px;width:216px;padding:12px 14px 11px;
    background:rgba(18,24,38,0.92);border:1px solid rgba(150,170,210,0.3);border-radius:10px;
    -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);font:600 12px/1.3 system-ui,sans-serif;color:#e6edf8;}
  #edit-head{display:flex;justify-content:space-between;align-items:center;margin:0 0 11px;font-weight:700;}
  #edit-head b{color:#fff;}
  #edit-close{background:none;border:none;color:#9fabc2;font-size:17px;line-height:1;cursor:pointer;padding:0 2px;}
  #edit-close:hover{color:#fff;}
  #edit-panel label{display:block;margin:0 0 11px;color:#9fabc2;font-weight:500;}
  #edit-panel label span{float:right;color:#eaf1ff;font-weight:600;font-variant-numeric:tabular-nums;}
  #edit-panel input[type=range]{width:100%;margin:7px 0 0;accent-color:#6f9dff;cursor:pointer;}
  #edit-delete{width:100%;margin-top:2px;padding:8px;text-align:center;cursor:pointer;font:inherit;color:#ffecec;
    background:rgba(150,60,60,0.5);border:1px solid rgba(220,140,140,0.5);border-radius:8px;}
  #edit-delete:hover{background:rgba(180,72,72,0.72);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="comet-ui">
  <button id="comet-toggle" type="button">☄ Comet ▾</button>
  <div id="comet-panel" hidden>
    <label>Mass <span id="m-val"></span><input id="m-slider" type="range" min="0" max="1000" value="90"></label>
    <label>Speed <span id="s-val"></span><input id="s-slider" type="range" min="0" max="1000" value="320"></label>
    <label>Direction <span id="d-val"></span><input id="d-slider" type="range" min="0" max="359" value="210"></label>
    <label>Aim <span id="a-val"></span><input id="a-slider" type="range" min="-60" max="60" value="12"></label>
    <button id="comet-launch" type="button">Launch ☄</button>
  </div>
</div>
<div id="hud">
  <h1>Solar System</h1>
  <div class="row" id="time"></div>
  <div id="rows"></div>
  <div class="row dim" id="health"></div>
  <div class="row dim" id="view"></div>
</div>
<div id="edit-panel" hidden>
  <div id="edit-head">Editing <b id="edit-name"></b><button id="edit-close" type="button">×</button></div>
  <label>Mass <span id="em-val"></span><input id="em-slider" type="range" min="0" max="1000" value="500"></label>
  <label id="es-row">Speed <span id="es-val"></span><input id="es-slider" type="range" min="0" max="1000" value="400"></label>
  <label id="ed-row">Direction <span id="ed-val"></span><input id="ed-slider" type="range" min="0" max="359" value="0"></label>
  <button id="edit-delete" type="button">Delete this body</button>
</div>
<div id="hint">Full N-body gravity — every body pulls on every other (the Sun is free too).&nbsp;&nbsp;<b>Scroll</b> to zoom · <b>click a body or its list row</b> to select &amp; edit · <b>[E]</b> Earth view · <b>[0]</b> reset view · <b>[C]</b> launch comet (tune it in the ☄ panel) · [Space] pause · [↑&nbsp;↓] speed · [R] reset</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ---- Physics — units: AU, years, solar masses (so G = 4π²) ----
  const G = 4 * Math.PI * Math.PI;
  const DT = 0.0002;       // years/step (~1.75 hrs) → resolves even the Moon's 27-day orbit
  let substeps = 6;
  let paused = false;

  const SUN = { name:'Sun', color:'#ffd35a', size:0, m:1, sun:true };
  // Real orbital elements (semi-major axis AU, eccentricity) + masses (solar masses)
  const planets = [
    { name:'Mercury', color:'#b9b0a3', size:2.2, m:1.6601e-7, a:0.387,  e:0.2056 },
    { name:'Venus',   color:'#e6c87a', size:3.9, m:2.4478e-6, a:0.723,  e:0.0068 },
    { name:'Earth',   color:'#5aa2ff', size:4.1, m:3.0035e-6, a:1.000,  e:0.0167 },
    { name:'Mars',    color:'#d9603b', size:2.7, m:3.2263e-7, a:1.524,  e:0.0934 },
    { name:'Jupiter', color:'#d2a679', size:7.5, m:9.5425e-4, a:5.203,  e:0.0489 },
    { name:'Saturn',  color:'#e0cd96', size:6.6, m:2.8576e-4, a:9.537,  e:0.0565 },
    { name:'Uranus',  color:'#a6dde6', size:5.0, m:4.3645e-5, a:19.191, e:0.0457 },
    { name:'Neptune', color:'#5572d6', size:4.9, m:5.1490e-5, a:30.07,  e:0.0113 },
  ];
  const EARTH = planets[2];
  const MOON  = { name:'Moon', color:'#cfd3da', size:2.0, m:3.694e-8, aM:0.00257, eM:0.0549, moon:true };
  const bodies = [SUN, ...planets, MOON];
  const MOON_EXAG = 40;    // Moon's true 0.00257 AU is ~1px — drawn radius scaled up so its orbit is visible
  let t = 0, E0 = 0, dashFlow = 0;
  let comets = [], flashes = [], cometSeq = 0;
  let baryX = 0, baryY = 0;   // mass-weighted centre of the whole system (cached per frame); the view centres here
  function curBary(){
    let mx = 0, my = 0, M = 0;
    for (const b of bodies){ if (b.deleted) continue; mx += b.m*b.x; my += b.m*b.y; M += b.m; }
    for (const c of comets){ if (c.m > 1e-9){ mx += c.m*c.x; my += c.m*c.y; M += c.m; } }
    return [mx/M, my/M];
  }

  function reset(){
    SUN.x = 0; SUN.y = 0; SUN.vx = 0; SUN.vy = 0;
    for (const p of planets){
      p.x = p.a * (1 - p.e); p.y = 0;
      p.vx = 0;
      // vis-viva perihelion speed about the Sun, with the proper two-body μ = G(M_sun + m_planet)
      p.vy = 2*Math.PI * Math.sqrt((1 + p.m) * (1 + p.e) / (p.a * (1 - p.e)));
    }
    const vM = 2*Math.PI * Math.sqrt((EARTH.m + MOON.m) * (1 + MOON.eM) / (MOON.aM * (1 - MOON.eM)));
    MOON.x = EARTH.x + MOON.aM * (1 - MOON.eM); MOON.y = EARTH.y;
    MOON.vx = EARTH.vx; MOON.vy = EARTH.vy + vM;
    // shift to the barycentric frame: zeros total momentum AND preserves every body's velocity
    // relative to the Sun (so the orbits keep their stated elements)
    let px = 0, py = 0, M = 0;
    for (const b of bodies){ px += b.m*b.vx; py += b.m*b.vy; M += b.m; }
    const vcx = px/M, vcy = py/M;
    for (const b of bodies){ b.vx -= vcx; b.vy -= vcy; }
    for (const b of bodies){ b.trail = []; b.deleted = false; b.edited = false; }
    MOON.rel = []; comets = []; flashes = []; cometSeq = 0;
    if (typeof deselect === 'function') deselect();
    t = 0; E0 = energy();
  }

  // ---- N-body ----
  function accels(){
    const n = bodies.length, ax = new Array(n).fill(0), ay = new Array(n).fill(0);
    for (let i=0;i<n;i++){ if (bodies[i].deleted) continue;
    for (let j=i+1;j<n;j++){
      if (bodies[j].deleted) continue;
      const dx = bodies[j].x-bodies[i].x, dy = bodies[j].y-bodies[i].y;
      const r2 = dx*dx+dy*dy, inv = G/(r2*Math.sqrt(r2));
      ax[i] += inv*bodies[j].m*dx; ay[i] += inv*bodies[j].m*dy;
      ax[j] -= inv*bodies[i].m*dx; ay[j] -= inv*bodies[i].m*dy;
    }}
    // massive comets / interlopers pull on the planets too (test-particle comets are skipped)
    for (const c of comets){
      if (!(c.m > 1e-9)) continue;
      for (let i=0;i<n;i++){
        if (bodies[i].deleted) continue;
        const dx = c.x-bodies[i].x, dy = c.y-bodies[i].y, r2 = dx*dx+dy*dy+1e-4;  // same softening as cometAccel (Newton's 3rd law)
        const inv = G*c.m/(r2*Math.sqrt(r2));
        ax[i] += inv*dx; ay[i] += inv*dy;
      }
    }
    return [ax, ay];
  }
  function stepAll(dt){
    const [ax, ay] = accels();
    for (let i=0;i<bodies.length;i++){
      const b = bodies[i]; if (b.deleted) continue;
      b.x += b.vx*dt + 0.5*ax[i]*dt*dt; b.y += b.vy*dt + 0.5*ay[i]*dt*dt;
      b._ax = ax[i]; b._ay = ay[i];
    }
    const [bx, by] = accels();
    for (let i=0;i<bodies.length;i++){
      const b = bodies[i]; if (b.deleted) continue;
      b.vx += 0.5*(b._ax + bx[i])*dt; b.vy += 0.5*(b._ay + by[i])*dt;
    }
  }
  function energy(){
    const all = bodies.filter(b => !b.deleted).concat(comets.filter(c => c.m > 1e-9));   // include massive interlopers
    let ke = 0, pe = 0;
    for (const b of all) ke += 0.5*b.m*(b.vx*b.vx + b.vy*b.vy);
    for (let i=0;i<all.length;i++) for (let j=i+1;j<all.length;j++){
      const dx = all[j].x-all[i].x, dy = all[j].y-all[i].y;
      pe -= G*all[i].m*all[j].m / Math.hypot(dx, dy);
    }
    return ke + pe;
  }

  // ---- Comets (test particles: feel gravity from every body, perturb nothing) ----
  function cometAccel(x, y){
    let ax = 0, ay = 0;
    for (const b of bodies){
      if (b.deleted) continue;
      const dx = b.x-x, dy = b.y-y, r2 = dx*dx + dy*dy + 1e-4;   // softened to avoid close-pass blowups
      const inv = G*b.m / (r2*Math.sqrt(r2));
      ax += inv*dx; ay += inv*dy;
    }
    return [ax, ay];
  }
  function launchComet(){   // params come from the panel sliders (paramMass/Speed/Dir/Impact, defined below)
    const dir = paramDir(), R = 22, m = paramMass();
    const x = R*Math.cos(dir), y = R*Math.sin(dir);
    const px = -Math.sin(dir), py = Math.cos(dir), im = paramImpact();   // impact parameter ⟂ to approach
    let dx = im*px - x, dy = im*py - y; const d = Math.hypot(dx, dy); dx/=d; dy/=d;
    const v = Math.sqrt(2*G*SUN.m/R) * paramSpeed();
    const me = m/3.0035e-6;
    const kind = m>=0.04?'Rogue star':me>=50?'Brown dwarf':me>=0.5?'Interloper':'Comet';
    comets.push({ x, y, vx:dx*v, vy:dy*v, m, trail:[], id: ++cometSeq,
      name: kind + ' ' + cometSeq,
      color: me<0.3 ? '#bfe0ff' : '#ffd98a' });
    if (comets.length > 30) comets.shift();   // cap; comets self-remove on escape (>80 AU) or impact
    E0 = energy();                            // re-baseline: a massive arrival changes the system's total energy
  }

  // ---- Camera + log-compressed radial scale ----
  // True distance from the Sun is mapped through a logarithm so all 8 orbits read at once;
  // the ANGLE is preserved, so motion stays true — only the radial spacing is compressed.
  const RMIN = 0.2;   // AU; anything closer collapses to the centre (keeps the Sun centred)
  function disp(x, y){
    const rx = x - baryX, ry = y - baryY, r = Math.hypot(rx, ry);   // relative to the system barycentre
    if (r <= RMIN) return [0, 0];
    const k = Math.log(r / RMIN) / r;
    return [rx*k, ry*k];
  }
  const maxDispR = Math.max(...planets.map(p => Math.log(p.a*(1+p.e) / RMIN)));

  let baseScale, zoom = 1, follow = null;
  const camD = () => follow ? disp(follow.x, follow.y) : [0, 0];
  const S = () => baseScale * zoom;
  const scr = (x, y) => { const [X, Y] = disp(x, y), [cX, cY] = camD(); return [cx + (X - cX)*S(), cy - (Y - cY)*S()]; };

  let W, H, cx, cy, dpr, stars = [];
  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*dpr; canvas.height = H*dpr;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx = W/2; cy = H/2;
    baseScale = Math.min(W,H) * 0.40 / maxDispR;     // fit Neptune's (compressed) aphelion, with margin for labels
    stars = [];
    const n = Math.round(W*H/9000);
    for (let i=0;i<n;i++)
      stars.push({x:Math.random()*W, y:Math.random()*H, a:Math.random()*0.6+0.15, s:Math.random()*1.3+0.3});
  }
  window.addEventListener('resize', resize);

  const fadedTrail = (pts, project, color, w, maxA) => {
    ctx.lineWidth = w; ctx.strokeStyle = color;
    for (let i=1;i<pts.length;i++){
      ctx.globalAlpha = (i/pts.length)*maxA;
      const a = project(pts[i-1]), b = project(pts[i]);
      ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  };
  // animated, fading comet-tail wake behind a body — flowing dashes read clearly as motion
  const wake = (pts, project, rgb, maxLenPx) => {
    if (pts.length < 2) return;
    const [hx, hy] = project(pts[pts.length-1]);
    const path = [[hx, hy]]; let acc = 0, px = hx, py = hy;
    for (let i=pts.length-2; i>=0 && acc < maxLenPx; i--){
      let [qx, qy] = project(pts[i]);
      const seg = Math.hypot(qx-px, qy-py);
      if (seg < 0.001) continue;
      if (acc + seg > maxLenPx){ const f=(maxLenPx-acc)/seg; qx=px+(qx-px)*f; qy=py+(qy-py)*f; acc=maxLenPx; }
      else acc += seg;
      path.push([qx, qy]); px = qx; py = qy;
    }
    if (path.length < 2) return;
    const tl = path[path.length-1];
    const grad = ctx.createLinearGradient(hx, hy, tl[0], tl[1]);
    grad.addColorStop(0, `rgba(${rgb},0.95)`); grad.addColorStop(1, `rgba(${rgb},0)`);
    ctx.strokeStyle = grad; ctx.lineWidth = 2.6; ctx.lineCap = 'round';
    ctx.setLineDash([6, 7]); ctx.lineDashOffset = -dashFlow;
    ctx.beginPath(); ctx.moveTo(path[0][0], path[0][1]);
    for (let i=1;i<path.length;i++) ctx.lineTo(path[i][0], path[i][1]);
    ctx.stroke();
    ctx.setLineDash([]); ctx.lineDashOffset = 0;
  };
  function label(name, color, lx, ly, off){
    ctx.fillStyle = color; ctx.globalAlpha = 0.92;
    ctx.font = '11px ui-monospace,Menlo,monospace'; ctx.textBaseline = 'middle';
    ctx.fillText(name, lx + off, ly); ctx.globalAlpha = 1;
  }

  function draw(){
    [baryX, baryY] = curBary();    // recentre the view on the system's barycentre each frame
    ctx.fillStyle = '#05060a'; ctx.fillRect(0,0,W,H);
    for (const st of stars){ ctx.globalAlpha = st.a; ctx.fillStyle = '#fff'; ctx.fillRect(st.x,st.y,st.s,st.s); }
    ctx.globalAlpha = 1;

    const earthView = follow === EARTH;
    const zoomedIn = follow && !earthView && zoom > 20;
    // orbit lines — sampled & compressed (true ellipses become smooth closed curves)
    if (!zoomedIn && !earthView){
      ctx.strokeStyle = 'rgba(120,140,180,0.16)'; ctx.lineWidth = 1;
      for (const p of planets){
        if (p.deleted || p.edited) continue;     // no nominal-orbit guide for removed/edited bodies
        const b = p.a*Math.sqrt(1-p.e*p.e);
        ctx.beginPath();
        for (let k=0;k<=120;k++){
          const phi = k/120*2*Math.PI;
          const [X, Y] = scr(SUN.x - p.a*p.e + p.a*Math.cos(phi), SUN.y + b*Math.sin(phi));
          if (k===0) ctx.moveTo(X,Y); else ctx.lineTo(X,Y);
        }
        ctx.stroke();
      }
    }
    ctx.lineCap = 'round';
    if (!zoomedIn && !earthView){
      for (const p of planets){ if (!p.deleted) fadedTrail(p.trail, q => scr(q.x, q.y), p.color, 1.2, 0.38); }
    } else if (earthView){
      wake(EARTH.trail, q => scr(q.x, q.y), '90,162,255', 140);
    }

    // Sun (hidden in the local Earth view, so the rest of the system doesn't wheel around Earth)
    let sxp, syp;
    if (!earthView){
      [sxp, syp] = scr(SUN.x, SUN.y);
      const g = ctx.createRadialGradient(sxp,syp,0,sxp,syp,21);
      g.addColorStop(0,'#fff7d6'); g.addColorStop(0.4,'#ffd35a'); g.addColorStop(1,'rgba(255,180,40,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sxp,syp,21,0,2*Math.PI); ctx.fill();
      ctx.fillStyle = '#ffe08a'; ctx.beginPath(); ctx.arc(sxp,syp,6.5,0,2*Math.PI); ctx.fill();
    }

    // planets — Earth view shows Earth only; deleted bodies vanish
    const shown = (earthView ? [EARTH] : planets).filter(p => !p.deleted);
    for (const p of shown){
      const [bx, by] = scr(p.x, p.y);
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(bx, by, p.size, 0, 2*Math.PI); ctx.fill();
    }

    // Moon orbiting Earth (drawn at exaggerated radius, anchored to Earth's screen position)
    const [eix, eiy] = scr(EARTH.x, EARTH.y);
    let mX = eix, mY = eiy;
    if (!MOON.deleted && !EARTH.deleted){
      const sF = S() * MOON_EXAG;
      fadedTrail(MOON.rel, p => [eix + p.dx*sF, eiy - p.dy*sF], MOON.color, 1.2, 0.5);
      mX = eix + (MOON.x-EARTH.x)*sF; mY = eiy - (MOON.y-EARTH.y)*sF;
      ctx.fillStyle = MOON.color; ctx.beginPath(); ctx.arc(mX, mY, MOON.size, 0, 2*Math.PI); ctx.fill();
    }

    // selection ring
    if (selected && !selected.deleted){
      const sp = selected === MOON ? [mX, mY] : scr(selected.x, selected.y);
      ctx.strokeStyle = '#fff'; ctx.globalAlpha = 0.7; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sp[0], sp[1], (selected.size || 6) + 6, 0, 2*Math.PI); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // labels
    if (!earthView) label('Sun', SUN.color, sxp, syp, 15);
    for (const p of shown){ const [bx, by] = scr(p.x, p.y); label(p.name, p.color, bx, by, p.size+5); }
    if (!MOON.deleted && !EARTH.deleted && Math.hypot(mX-eix, mY-eiy) > 11) label('Moon', MOON.color, mX, mY, MOON.size+5);

    // comets / interlopers — size & colour scale with mass — + impact flashes
    for (const c of comets){
      const me = c.m / 3.0035e-6;                                  // Earth masses
      const col = me < 0.3 ? '190,224,255' : (c.m < 0.05 ? '226,182,132' : '255,214,140');  // icy → rocky → star
      const headR = me < 0.3 ? 2.4 : (c.m < 0.05 ? 5 : 9);
      fadedTrail(c.trail, q => scr(q.x, q.y), `rgb(${col})`, me < 0.3 ? 1.4 : 2, 0.6);
      const [hx, hy] = scr(c.x, c.y);
      if (me < 0.3){                                               // anti-solar gas tail for small icy comets
        const [ssx, ssy] = scr(SUN.x, SUN.y);
        let tx = hx-ssx, ty = hy-ssy; const td = Math.hypot(tx,ty) || 1; tx/=td; ty/=td;
        const r = Math.hypot(c.x-baryX, c.y-baryY), tl = Math.max(8, Math.min(46, 12/Math.max(r,0.2)));
        const tg = ctx.createLinearGradient(hx, hy, hx+tx*tl, hy+ty*tl);
        tg.addColorStop(0,`rgba(${col},0.7)`); tg.addColorStop(1,`rgba(${col},0)`);
        ctx.strokeStyle = tg; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx+tx*tl, hy+ty*tl); ctx.stroke();
      } else {                                                     // glow for a massive interloper
        const gg = ctx.createRadialGradient(hx,hy,0,hx,hy,headR*2.4);
        gg.addColorStop(0,`rgba(${col},0.5)`); gg.addColorStop(1,`rgba(${col},0)`);
        ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(hx,hy,headR*2.4,0,2*Math.PI); ctx.fill();
      }
      ctx.fillStyle = `rgb(${col})`; ctx.beginPath(); ctx.arc(hx, hy, headR, 0, 2*Math.PI); ctx.fill();
    }
    for (const f of flashes){
      const [fx, fy] = scr(f.x, f.y);
      ctx.globalAlpha = Math.max(0, f.life); ctx.strokeStyle = '#ffd9a0'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(fx, fy, (f.big?26:13)*(1-f.life), 0, 2*Math.PI); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // ---- HUD ----
  const elTime = document.getElementById('time');
  const elHealth = document.getElementById('health');
  const elView = document.getElementById('view');
  const rowsEl = document.getElementById('rows');
  const pad = (s,n) => (s + '            ').slice(0,n);
  const KMS = 4.74057;   // 1 AU/yr in km/s

  // ---- Editor: select any object (table row or canvas click) → tweak mass / velocity, or delete ----
  let selected = null;
  const ePanel = document.getElementById('edit-panel'), eName = document.getElementById('edit-name');
  const emEl = document.getElementById('em-slider'), esEl = document.getElementById('es-slider'), edEl = document.getElementById('ed-slider');
  const emV = document.getElementById('em-val'), esV = document.getElementById('es-val'), edV = document.getElementById('ed-val');
  const esRow = document.getElementById('es-row'), edRow = document.getElementById('ed-row');
  const refOf = o => o.moon ? EARTH : SUN;                                  // what it orbits
  const vCirc = o => { const r = refOf(o), d = Math.hypot(o.x-r.x, o.y-r.y); return Math.sqrt(G*r.m/Math.max(d,1e-6)); };
  const sliderToMass = v => Math.pow(10, -13 + 13*(v/1000));                // solar masses
  const massToSlider = m => Math.max(0, Math.min(1000, Math.round(1000*(Math.log10(m)+13)/13)));
  function editLabels(){
    const m = sliderToMass(emEl.value), me = m/3.0035e-6, mj = m/9.5425e-4;
    emV.textContent = m>=0.06 ? m.toFixed(2)+' M☉' : mj>=1 ? mj.toFixed(1)+' Mⱼ' : me>=0.05 ? me.toFixed(2)+' M⊕' : 'tiny';
    esV.textContent = (esEl.value/1000*2.5).toFixed(2)+'× circ';
    edV.textContent = edEl.value+'°';
  }
  function selectBody(o){
    if (!o || o.deleted || o.dead){ deselect(); return; }
    selected = o; eName.textContent = o.name || 'Comet';
    emEl.value = massToSlider(o.m);
    const isSun = o === SUN;                          // the Sun has no orbital speed to edit
    const isComet = comets.includes(o);              // only a free-flying comet has a meaningful "heading" to re-aim
    esRow.style.display = isSun ? 'none' : '';        // Speed: planets, Moon, comets
    edRow.style.display = isComet ? '' : 'none';      // Direction: comets only (rotating a planet's velocity is meaningless)
    if (!isSun){
      const r = refOf(o), vrx = o.vx-r.vx, vry = o.vy-r.vy;
      esEl.value = Math.round(1000 * Math.min(2.5, Math.hypot(vrx,vry)/vCirc(o)) / 2.5);
      edEl.value = Math.round(((Math.atan2(vry,vrx)*180/Math.PI)%360 + 360) % 360);
    }
    editLabels(); ePanel.hidden = false;
  }
  function deselect(){ selected = null; ePanel.hidden = true; }
  function applyMass(){ if (!selected) return; selected.m = sliderToMass(emEl.value); selected.edited = true; E0 = energy(); editLabels(); }
  function applyVel(){ if (!selected || selected === SUN) return; const b = selected, r = refOf(b);
    const sp = (esEl.value/1000*2.5)*vCirc(b);
    let ang;
    if (comets.includes(b)) ang = edEl.value*Math.PI/180;                   // comet: aim with the Direction slider
    else {                                                                  // planet/Moon: keep its current heading, just rescale speed
      const vrx = b.vx-r.vx, vry = b.vy-r.vy, mag = Math.hypot(vrx,vry);
      ang = mag>1e-9 ? Math.atan2(vry,vrx) : Math.atan2(b.x-r.x, -(b.y-r.y));   // fall back to tangential if stopped
    }
    b.vx = r.vx + sp*Math.cos(ang); b.vy = r.vy + sp*Math.sin(ang); b.edited = true; E0 = energy(); editLabels();
  }
  emEl.addEventListener('input', applyMass);
  esEl.addEventListener('input', applyVel);
  edEl.addEventListener('input', applyVel);
  document.getElementById('edit-close').addEventListener('click', deselect);
  document.getElementById('edit-delete').addEventListener('click', () => {
    if (!selected) return;
    const b = selected;
    if (comets.includes(b)) b.dead = true;                                  // a comet / interloper
    else { b.deleted = true; if (b === EARTH) MOON.deleted = true; }         // a Moon with no Earth makes no sense
    if (follow === b){ follow = null; zoom = 1; }                            // stop tracking a ghost
    E0 = energy(); deselect();
  });
  function pick(o){
    selectBody(o); if (!selected) return;
    if (o === SUN) follow = null;                                           // edit the Sun in the system view
    else if (o.moon || o === EARTH){ follow = EARTH; if (zoom < 3) zoom = 3; }
    else follow = o;
  }

  // ---- the object table: Sun + planets + Moon + live comets ----
  let tableRows = [];
  const HEAD = `${pad('Body',14)} ${pad('Mass',12)} ${pad('Dist',9)} ${pad('Speed',11)} Period`;
  function rebuildTable(objs){
    rowsEl.innerHTML = '';
    const h = document.createElement('div'); h.className = 'row dim'; h.textContent = HEAD; rowsEl.appendChild(h);
    tableRows = objs.map(o => {
      const el = document.createElement('div'); el.className = 'row clickable';
      el.addEventListener('click', () => pick(o));
      rowsEl.appendChild(el); return { obj:o, el };
    });
  }
  function fmtMass(mS){                       // one shared scale (Earth masses) so the column is comparable
    const me = mS/3.0035e-6;                  // 1 M⊕; Sun ≈ 333,000 · Jupiter ≈ 318 · Moon ≈ 0.012
    if (me >= 1e6)   return me.toExponential(1).replace('e+','e')+' M⊕';
    if (me >= 1000)  return Math.round(me).toLocaleString('en-US')+' M⊕';
    if (me >= 1)     return me.toFixed(me>=100 ? 0 : me>=10 ? 1 : 2)+' M⊕';
    if (me >= 0.001) return me.toFixed(3)+' M⊕';
    return me.toExponential(1).replace('e-','e-')+' M⊕';   // tiny comets
  }
  function rowText(o){
    const nm = `<span style="color:${o.color||'#cfd6e6'}">${pad(o.name||'Comet',14)}</span>`;
    const rs = Math.hypot(o.x-SUN.x, o.y-SUN.y);
    const dist = o===SUN ? '—' : (rs>=100 ? rs.toFixed(0) : rs.toFixed(2))+' AU';
    const spd = (o===SUN ? Math.hypot(SUN.vx,SUN.vy) : Math.hypot(o.vx-SUN.vx, o.vy-SUN.vy)) * KMS;
    const pref = o.moon ? EARTH : SUN;
    const dx=o.x-pref.x, dy=o.y-pref.y, r=Math.hypot(dx,dy);
    const vx=o.vx-pref.vx, vy=o.vy-pref.vy, v2=vx*vx+vy*vy, mu=G*pref.m;   // heliocentric: a body's own mass doesn't shorten its "year"
    const a = 1/(2/r - v2/mu);
    const per = o===SUN ? '—' : a>0
      ? (() => { const T=2*Math.PI*Math.sqrt(a*a*a/mu); return T<0.5 ? Math.round(T*365.25)+' d' : T.toFixed(2)+' yr'; })()
      : 'unbound';
    return `${nm} ${pad(fmtMass(o.m||0),12)} ${pad(dist,9)} ${pad(spd.toFixed(1)+' km/s',11)} ${per}`;
  }

  function updHud(){
    if (selected && (selected.deleted || selected.dead)) deselect();        // selected object went away
    if (follow && (follow.deleted || follow.dead)){ follow = null; zoom = 1; }
    elTime.textContent = `t = ${t.toFixed(2)} yr     speed ×${substeps}${paused?'   (paused)':''}`;
    const objs = [SUN, ...planets.filter(p=>!p.deleted), ...(MOON.deleted?[]:[MOON]), ...comets];
    if (tableRows.length !== objs.length || tableRows.some((tr,i)=> tr.obj !== objs[i])) rebuildTable(objs);
    tableRows.forEach(({obj,el}) => { el.innerHTML = rowText(obj); el.classList.toggle('sel', obj === selected); });
    const rel = Math.abs((energy() - E0) / E0), ok = rel < 1e-3;
    elHealth.className = 'row dim' + (ok ? ' ok' : ' warn');
    elHealth.textContent = `total energy conserved — drift ${rel.toExponential(1)} ${ok ? '✓' : ''}`;
    const z = zoom < 10 ? zoom.toFixed(1) : Math.round(zoom);
    elView.textContent = `view: ${follow ? 'following ' + (follow.name||'comet') : 'whole system'}  ×${z}   ·   log radial scale · Moon ×${MOON_EXAG}`;
  }

  // ---- Main loop ----
  function frame(){
    if (!paused){
      for (let s=0;s<substeps;s++){
        stepAll(DT); t += DT;
        for (const c of comets){
          if (c.dead) continue;
          let [ax, ay] = cometAccel(c.x, c.y);
          c.x += c.vx*DT + 0.5*ax*DT*DT; c.y += c.vy*DT + 0.5*ay*DT*DT;
          const [ax2, ay2] = cometAccel(c.x, c.y);
          c.vx += 0.5*(ax+ax2)*DT; c.vy += 0.5*(ay+ay2)*DT;
          // collide check EVERY sub-step — a fast Sun-grazer slips past a once-per-frame check
          const massive = c.m > 1e-6;
          for (const b of bodies){
            if (massive && !b.sun) continue;                 // only the Sun stops a massive interloper
            const hr = b.sun ? 0.05 : 0.02, ex = b.x-c.x, ey = b.y-c.y;
            if (ex*ex + ey*ey < hr*hr){ c.dead = true; flashes.push({x:b.x, y:b.y, life:1, big: b.sun || massive || b.m > 1e-4}); break; }
          }
        }
      }
      for (const p of planets){ p.trail.push({x:p.x, y:p.y}); if (p.trail.length > 600) p.trail.shift(); }
      MOON.rel.push({dx: MOON.x-EARTH.x, dy: MOON.y-EARTH.y}); if (MOON.rel.length > 90) MOON.rel.shift();
      dashFlow += substeps * 0.6;
      for (const c of comets){ if (!c.dead){ c.trail.push({x:c.x, y:c.y}); if (c.trail.length > 500) c.trail.shift(); } }
      const nC = comets.length;
      comets = comets.filter(c => !c.dead && Math.hypot(c.x-baryX, c.y-baryY) <= 80);   // drop collided + escaped
      if (comets.length !== nC) E0 = energy();                              // re-baseline after a removal
      for (const f of flashes) f.life -= 0.05;
      flashes = flashes.filter(f => f.life > 0);
    }
    draw(); updHud();
    requestAnimationFrame(frame);
  }

  // ---- Controls ----
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoom *= e.deltaY < 0 ? 1.15 : 1/1.15;
    zoom = Math.max(0.2, Math.min(4000, zoom));
  }, {passive:false});
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    let best = null, bd = 1e9;
    for (const b of bodies){
      if (b.deleted) continue;
      const [bx, by] = scr(b.x, b.y);
      const d = Math.hypot(bx-mx, by-my), thr = Math.max((b.sun?21:b.size)+10, 14);
      if (d < thr && d < bd){ bd = d; best = b; }
    }
    if (!best || best.sun){ follow = null; zoom = 1; deselect(); }
    else pick(best);
  });
  // ---- Comet launch panel ----
  const cPanel = document.getElementById('comet-panel'), cToggle = document.getElementById('comet-toggle');
  const mEl = document.getElementById('m-slider'), sEl = document.getElementById('s-slider'),
        dEl = document.getElementById('d-slider'), aEl = document.getElementById('a-slider');
  const mV = document.getElementById('m-val'), sV = document.getElementById('s-val'),
        dV = document.getElementById('d-val'), aV = document.getElementById('a-val');
  function paramMass(){ return Math.pow(10, -13 + 13*(mEl.value/1000)); }   // solar masses: comet (1e-13) → star (1)
  function paramSpeed(){ return 0.3 + 2.2*(sEl.value/1000); }              // × escape speed at spawn
  function paramDir(){ return dEl.value*Math.PI/180; }                     // approach angle
  function paramImpact(){ return aEl.value/10; }                          // AU, signed miss distance
  function updCometLabels(){
    const m = paramMass(), me = m/3.0035e-6, mj = m/9.5425e-4;
    mV.textContent = m>=0.06 ? m.toFixed(2)+' M☉·star' : mj>=13 ? mj.toFixed(0)+' Mⱼ·brown dwarf'
                   : mj>=1 ? mj.toFixed(1)+' Mⱼ·giant' : me>=0.05 ? me.toFixed(2)+' M⊕·rocky' : 'comet·tiny';
    const sp = paramSpeed(); sV.textContent = sp.toFixed(2)+'×·'+(sp<0.97?'capture':sp<1.06?'parabolic':'flyby');
    dV.textContent = dEl.value+'°';
    const im = paramImpact(); aV.textContent = Math.abs(im)<0.2 ? 'at Sun' : Math.abs(im).toFixed(1)+' AU miss';
  }
  [mEl,sEl,dEl,aEl].forEach(el => el.addEventListener('input', updCometLabels));
  updCometLabels();
  cToggle.addEventListener('click', () => { cPanel.hidden = !cPanel.hidden; cToggle.textContent = '☄ Comet ' + (cPanel.hidden ? '▾' : '▴'); });
  document.getElementById('comet-launch').addEventListener('click', launchComet);
  window.addEventListener('keydown', e=>{
    if (e.code === 'Space'){ paused = !paused; e.preventDefault(); }
    else if (e.code === 'ArrowUp')   substeps = Math.min(32, substeps + 1);
    else if (e.code === 'ArrowDown') substeps = Math.max(1, substeps - 1);
    else if (e.key === 'e' || e.key === 'E'){ follow = EARTH; if (zoom < 3) zoom = 3; }
    else if (e.key === 'c' || e.key === 'C'){ launchComet(); }
    else if (e.key === '0'){ follow = null; zoom = 1; }
    else if (e.key === 'r' || e.key === 'R'){ reset(); }
  });

  resize(); reset(); frame();
})();
</script>
</body>
</html>
