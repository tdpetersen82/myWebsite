<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baccarat</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>&#x1F0CF; Baccarat</h1>
        <div id="game-wrapper">

            <!-- Header -->
            <div class="bacc-header">
                <h1>&#x1F0CF; Baccarat</h1>
                <div class="bacc-bankroll">
                    Bankroll: <span id="bankroll-value">$1,000</span>
                    <span class="bacc-commission">Commission: <span id="commission-value">$0</span></span>
                </div>
                <button class="btn-hints" id="btn-hints">Hints: OFF</button>
            </div>

            <!-- Table -->
            <div class="bacc-table">

                <!-- Two Hands Side by Side -->
                <div class="hands-row">
                    <!-- Player Hand -->
                    <div class="hand-area" id="player-area">
                        <div class="hand-label">Player</div>
                        <div class="hand-value" id="player-value"></div>
                        <div class="cards-row" id="player-cards"></div>
                    </div>

                    <!-- Banker Hand -->
                    <div class="hand-area" id="banker-area">
                        <div class="hand-label">Banker</div>
                        <div class="hand-value" id="banker-value"></div>
                        <div class="cards-row" id="banker-cards"></div>
                    </div>
                </div>

                <!-- Message -->
                <div class="message-area" id="message">Place your bet</div>

                <!-- Result Banner -->
                <div class="result-banner" id="result-banner"></div>

                <!-- Hint Panel -->
                <div class="hint-panel" id="hint-panel">
                    <div class="hint-header">
                        <span class="hint-action" id="hint-action"></span>
                        <span class="hint-risk" id="hint-risk"></span>
                    </div>
                    <div class="hint-explanation" id="hint-explanation"></div>
                    <div class="hint-detail-toggle" id="hint-detail-toggle">Learn More &#9656;</div>
                    <div class="hint-detail" id="hint-detail"></div>
                </div>

                <!-- Betting Area -->
                <div class="betting-area" id="betting-area">
                    <!-- Bet Zones -->
                    <div class="bet-zones" id="bet-zones">
                        <div class="bet-zone" id="zone-player">
                            <div class="bet-zone-label">Player</div>
                            <div class="bet-zone-payout">Pays 1:1</div>
                        </div>
                        <div class="bet-zone zone-tie" id="zone-tie">
                            <div class="bet-zone-label">Tie</div>
                            <div class="bet-zone-payout">Pays 8:1</div>
                        </div>
                        <div class="bet-zone" id="zone-banker">
                            <div class="bet-zone-label">Banker</div>
                            <div class="bet-zone-payout">Pays 1:1 (5% comm.)</div>
                        </div>
                    </div>

                    <!-- Chip Rack -->
                    <div class="chip-rack" id="chip-rack">
                        <div class="chip" data-value="5" style="background: #e74c3c; border-color: #c0392b;">$5</div>
                        <div class="chip" data-value="25" style="background: #27ae60; border-color: #1e8449;">$25</div>
                        <div class="chip" data-value="100" style="background: #2980b9; border-color: #1f6fa5;">$100</div>
                        <div class="chip" data-value="500" style="background: #8e44ad; border-color: #6c3483;">$500</div>
                    </div>

                    <div class="bet-display">
                        <button class="btn-clear" id="btn-clear">Clear</button>
                        <span>Bet: <span class="bet-amount" id="bet-amount">$0</span></span>
                        <button class="btn-rebet" id="btn-rebet">Rebet</button>
                        <button class="btn-deal" id="btn-deal" disabled>Deal</button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-bar" id="stats-bar">
                    <span>Played: 0</span>
                    <span>Player: 0</span>
                    <span>Banker: 0</span>
                    <span>Best: $1,000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- JS modules in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/deck.js"></script>
    <script src="js/rules.js"></script>
    <script src="js/strategy.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>

    <!-- Auto-scaling -->
    <script>
    (function() {
        var wrapper = document.getElementById('game-wrapper');
        function resize() {
            var W = 960, H = 640;
            var s = Math.min(window.innerWidth / W, (window.innerHeight * 0.85) / H, 1);
            wrapper.style.transform = 'scale(' + s + ')';
            wrapper.style.transformOrigin = 'top center';
            wrapper.style.marginTop = Math.max(0, (window.innerHeight * 0.85 - H * s) / 2) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();
    })();
    </script>

    <script src="../nav.js"></script>
</body>
</html>
