<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Switch</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Switch</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <p>Tap, Click, or press Space to bounce through matching colors</p>
            <button id="restartBtn" class="play-button">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        // ── Constants ──
        const W = canvas.width;
        const H = canvas.height;
        const COLORS = ['#FF0080', '#FFDD00', '#00E5FF', '#76FF03'];
        const COLOR_NAMES = ['pink', 'yellow', 'cyan', 'green'];
        const GRAVITY = 0.25;
        const JUMP_FORCE = -6.5;
        const BALL_RADIUS = 11;
        const OBSTACLE_SPACING = 220;
        const RING_RADIUS = 60;
        const RING_THICKNESS = 14;
        const BASE_ROTATION_SPEED = 0.012;

        // ── Sound ──
        function playSound(freq, type, duration) {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type || 'square';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.15, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (duration || 0.1));
                o.start(); o.stop(c.currentTime + (duration || 0.1));
            } catch(e) {}
        }

        // ── Game State ──
        let ball, obstacles, colorChangers, score, highScore;
        let cameraY, gameOver, gameStarted;
        let particles = [];

        highScore = parseInt(localStorage.getItem('colorSwitchHighScore')) || 0;
        highScoreElement.textContent = highScore;

        function init() {
            ball = { x: W / 2, y: H * 0.7, vy: 0, colorIndex: 0 };
            obstacles = [];
            colorChangers = [];
            particles = [];
            score = 0;
            cameraY = 0;
            gameOver = false;
            gameStarted = false;
            scoreElement.textContent = '0';

            // Generate initial obstacles
            for (let i = 0; i < 6; i++) {
                createObstacle(H * 0.4 - i * OBSTACLE_SPACING);
            }

            draw();
        }

        function createObstacle(y) {
            const types = ['circle', 'bars', 'square'];
            const speedMult = 1 + score * 0.06;
            const type = types[Math.floor(Math.random() * types.length)];
            const dir = Math.random() < 0.5 ? 1 : -1;

            obstacles.push({
                x: W / 2,
                y: y,
                type: type,
                angle: Math.random() * Math.PI * 2,
                speed: BASE_ROTATION_SPEED * speedMult * dir,
                passed: false
            });

            // Color changer between obstacles
            colorChangers.push({
                x: W / 2,
                y: y + OBSTACLE_SPACING / 2,
                collected: false,
                radius: 10
            });
        }

        function jump() {
            if (gameOver) { init(); return; }
            if (!gameStarted) gameStarted = true;
            ball.vy = JUMP_FORCE;
            playSound(400, 'sine', 0.05);
        }

        // ── Collision Detection ──
        function checkCollisions() {
            for (const obs of obstacles) {
                const screenY = obs.y + cameraY;
                if (screenY > H + 100 || screenY < -100) continue;

                if (obs.type === 'circle') {
                    if (checkCircleCollision(obs)) { die(); return; }
                } else if (obs.type === 'bars') {
                    if (checkBarsCollision(obs)) { die(); return; }
                } else if (obs.type === 'square') {
                    if (checkSquareCollision(obs)) { die(); return; }
                }

                // Check if passed
                if (!obs.passed && ball.y < obs.y - RING_RADIUS) {
                    obs.passed = true;
                    score++;
                    scoreElement.textContent = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.textContent = highScore;
                        localStorage.setItem('colorSwitchHighScore', highScore);
                    }
                    playSound(600, 'sine', 0.08);

                    // Spawn more obstacles if needed
                    const topObs = obstacles.reduce((min, o) => o.y < min ? o.y : min, Infinity);
                    if (ball.y - topObs < OBSTACLE_SPACING * 4) {
                        createObstacle(topObs - OBSTACLE_SPACING);
                    }
                }
            }

            // Color changers
            for (const cc of colorChangers) {
                if (cc.collected) continue;
                const dx = ball.x - cc.x;
                const dy = ball.y - cc.y;
                if (dx * dx + dy * dy < (BALL_RADIUS + cc.radius) * (BALL_RADIUS + cc.radius)) {
                    cc.collected = true;
                    // Change to a different random color
                    let newColor;
                    do { newColor = Math.floor(Math.random() * 4); } while (newColor === ball.colorIndex);
                    ball.colorIndex = newColor;
                    playSound(700, 'triangle', 0.08);
                    setTimeout(() => playSound(900, 'triangle', 0.08), 50);
                    // Particles
                    for (let i = 0; i < 8; i++) {
                        const angle = (Math.PI * 2 * i) / 8;
                        particles.push({
                            x: cc.x, y: cc.y,
                            vx: Math.cos(angle) * 3,
                            vy: Math.sin(angle) * 3,
                            color: COLORS[Math.floor(Math.random() * 4)],
                            life: 30
                        });
                    }
                }
            }
        }

        function checkCircleCollision(obs) {
            const dx = ball.x - obs.x;
            const dy = ball.y - obs.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Ball must be near the ring
            if (dist < RING_RADIUS - RING_THICKNESS / 2 - BALL_RADIUS ||
                dist > RING_RADIUS + RING_THICKNESS / 2 + BALL_RADIUS) {
                return false;
            }

            // Check which segment the ball is in
            let angle = Math.atan2(dy, dx) - obs.angle;
            angle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const segment = Math.floor(angle / (Math.PI / 2)) % 4;

            return segment !== ball.colorIndex;
        }

        function checkBarsCollision(obs) {
            // Two rotating bars forming a cross
            const cos = Math.cos(obs.angle);
            const sin = Math.sin(obs.angle);

            const dx = ball.x - obs.x;
            const dy = ball.y - obs.y;

            // Rotate ball position into obstacle's local space
            const lx = dx * cos + dy * sin;
            const ly = -dx * sin + dy * cos;

            const barLen = RING_RADIUS;
            const barThick = RING_THICKNESS;

            // Check horizontal bar (2 color halves)
            if (Math.abs(ly) < barThick / 2 + BALL_RADIUS && Math.abs(lx) < barLen + BALL_RADIUS) {
                const segment = lx > 0 ? 0 : 2;
                if (segment !== ball.colorIndex) return true;
            }

            // Check vertical bar (2 color halves)
            if (Math.abs(lx) < barThick / 2 + BALL_RADIUS && Math.abs(ly) < barLen + BALL_RADIUS) {
                const segment = ly > 0 ? 1 : 3;
                if (segment !== ball.colorIndex) return true;
            }

            return false;
        }

        function checkSquareCollision(obs) {
            const size = RING_RADIUS;
            const thick = RING_THICKNESS;
            const dx = ball.x - obs.x;
            const dy = ball.y - obs.y;

            // Rotate into local space
            const cos = Math.cos(obs.angle);
            const sin = Math.sin(obs.angle);
            const lx = dx * cos + dy * sin;
            const ly = -dx * sin + dy * cos;

            // Check 4 sides
            const sides = [
                {check: Math.abs(ly + size) < thick / 2 + BALL_RADIUS && Math.abs(lx) < size + BALL_RADIUS, seg: 0}, // bottom
                {check: Math.abs(lx - size) < thick / 2 + BALL_RADIUS && Math.abs(ly) < size + BALL_RADIUS, seg: 1}, // right
                {check: Math.abs(ly - size) < thick / 2 + BALL_RADIUS && Math.abs(lx) < size + BALL_RADIUS, seg: 2}, // top
                {check: Math.abs(lx + size) < thick / 2 + BALL_RADIUS && Math.abs(ly) < size + BALL_RADIUS, seg: 3}, // left
            ];

            for (const s of sides) {
                if (s.check && s.seg !== ball.colorIndex) return true;
            }
            return false;
        }

        function die() {
            gameOver = true;
            playSound(200, 'sawtooth', 0.2);
            setTimeout(() => playSound(150, 'sawtooth', 0.2), 100);
        }

        // ── Drawing ──
        function drawCircleObstacle(obs) {
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                const startAngle = obs.angle + i * Math.PI / 2;
                ctx.arc(obs.x, obs.y, RING_RADIUS, startAngle, startAngle + Math.PI / 2);
                ctx.lineWidth = RING_THICKNESS;
                ctx.strokeStyle = COLORS[i];
                ctx.stroke();
            }
        }

        function drawBarsObstacle(obs) {
            ctx.save();
            ctx.translate(obs.x, obs.y);
            ctx.rotate(-obs.angle);

            const barLen = RING_RADIUS;
            const barThick = RING_THICKNESS;

            // Horizontal bar
            ctx.fillStyle = COLORS[0];
            ctx.fillRect(0, -barThick / 2, barLen, barThick);
            ctx.fillStyle = COLORS[2];
            ctx.fillRect(-barLen, -barThick / 2, barLen, barThick);

            // Vertical bar
            ctx.fillStyle = COLORS[1];
            ctx.fillRect(-barThick / 2, 0, barThick, barLen);
            ctx.fillStyle = COLORS[3];
            ctx.fillRect(-barThick / 2, -barLen, barThick, barLen);

            ctx.restore();
        }

        function drawSquareObstacle(obs) {
            ctx.save();
            ctx.translate(obs.x, obs.y);
            ctx.rotate(-obs.angle);

            const size = RING_RADIUS;
            const thick = RING_THICKNESS;

            // 4 sides
            ctx.lineWidth = thick;
            ctx.lineCap = 'round';

            const sides = [
                {x1: -size, y1: -size, x2: size, y2: -size, c: 0},
                {x1: size, y1: -size, x2: size, y2: size, c: 1},
                {x1: size, y1: size, x2: -size, y2: size, c: 2},
                {x1: -size, y1: size, x2: -size, y2: -size, c: 3},
            ];

            for (const s of sides) {
                ctx.beginPath();
                ctx.moveTo(s.x1, s.y1);
                ctx.lineTo(s.x2, s.y2);
                ctx.strokeStyle = COLORS[s.c];
                ctx.stroke();
            }

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Draw some subtle stars
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            for (let i = 0; i < 30; i++) {
                const sx = ((i * 137.5) % W);
                const sy = ((i * 97.3 + cameraY * 0.2) % (H + 200)) - 100;
                ctx.fillRect(sx, sy, 2, 2);
            }

            ctx.save();
            ctx.translate(0, cameraY);

            // Draw obstacles
            for (const obs of obstacles) {
                const screenY = obs.y + cameraY;
                if (screenY < -150 || screenY > H + 150) continue;

                if (obs.type === 'circle') drawCircleObstacle(obs);
                else if (obs.type === 'bars') drawBarsObstacle(obs);
                else if (obs.type === 'square') drawSquareObstacle(obs);
            }

            // Draw color changers
            for (const cc of colorChangers) {
                if (cc.collected) continue;
                const screenY = cc.y + cameraY;
                if (screenY < -50 || screenY > H + 50) continue;

                // Multi-colored circle
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(cc.x, cc.y, cc.radius, i * Math.PI / 2, (i + 1) * Math.PI / 2);
                    ctx.lineTo(cc.x, cc.y);
                    ctx.closePath();
                    ctx.fillStyle = COLORS[i];
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(cc.x, cc.y, cc.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Draw particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            }
            ctx.globalAlpha = 1;

            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = COLORS[ball.colorIndex];
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Ball glow
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS + 4, 0, Math.PI * 2);
            ctx.strokeStyle = COLORS[ball.colorIndex] + '40';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.restore();

            // Score display
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(score, W / 2, H * 0.15);

            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 42px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', W / 2, H / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Tap to restart', W / 2, H / 2 + 50);
            }

            // Start prompt
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Tap to Start', W / 2, H * 0.85);
            }
        }

        // ── Game Loop ──
        function update() {
            requestAnimationFrame(update);

            if (!gameStarted || gameOver) { draw(); return; }

            // Physics
            ball.vy += GRAVITY;
            ball.y += ball.vy;

            // Clamp max fall speed
            if (ball.vy > 10) ball.vy = 10;

            // Death if ball falls below screen
            if (ball.y - cameraY > H + 50) {
                die();
                draw();
                return;
            }

            // Camera follows ball upward
            const targetCamera = -(ball.y - H * 0.6);
            if (targetCamera > cameraY) {
                cameraY += (targetCamera - cameraY) * 0.1;
            }

            // Rotate obstacles
            for (const obs of obstacles) {
                obs.angle += obs.speed;
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            checkCollisions();
            draw();
        }

        // ── Input ──
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            jump();
        });
        canvas.addEventListener('click', function() {
            jump();
        });
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });
        restartBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            init();
        });

        // ── Auto-Scale ──
        (function() {
            const c = document.getElementById('gameCanvas');
            const baseWidth = c.width, baseHeight = c.height;
            function scale() {
                const parent = c.parentElement;
                const ps = getComputedStyle(parent);
                const maxWidth = parent.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const maxHeight = window.innerHeight * 0.75;
                const scaleFactor = Math.min(maxWidth / baseWidth, maxHeight / baseHeight, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + scaleFactor + ')';
                c.style.marginBottom = (-(baseHeight * (1 - scaleFactor))) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();

        init();
        requestAnimationFrame(update);
    </script>
    <script src="../nav.js"></script>
</body>
</html>
