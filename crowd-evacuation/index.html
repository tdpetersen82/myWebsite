    <script>
    // Initialize hub-style high score display
    document.getElementById('highScore').textContent = Storage.getBest();

    // Phaser config
    const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: CFG.CANVAS_W,
        height: CFG.CANVAS_H,
        parent: 'game-container',
        backgroundColor: '#0f0c29',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [MenuScene, DesignScene, SimScene, ResultsScene],
        input: { keyboard: true },
        // We do our own physics — Phaser arcade not used
    });

    // Refresh high score readout when a level ends
    game.events.on('step', () => {
        const el = document.getElementById('highScore');
        if (el) el.textContent = Storage.getBest();
    });
