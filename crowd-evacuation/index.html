<body>
    <div class="container">
        <h1>🚨 Exodus</h1>
        <div class="game-info">
            <p>Best Score: <span id="highScore">0</span></p>
        </div>
        <div id="game-container"></div>
        <div class="controls-info">
            <p><strong>How to play:</strong> Click in the venue to place marshals (max 3). Click on a marshal to remove it. Press ALARM (or Enter) to start the simulation. Marshals reduce panic and pull people toward exits.</p>
        </div>

    <!-- Game scripts (order matters: dependencies first) -->
    <script src="js/config.js"></script>
    <script src="js/persistence/Storage.js"></script>
    <script src="js/sim/SpatialHash.js"></script>
    <script src="js/sim/GridMap.js"></script>
    <script src="js/sim/FlowField.js"></script>
    <script src="js/sim/Agent.js"></script>
    <script src="js/sim/SocialForce.js"></script>
    <script src="js/sim/PanicModel.js"></script>
    <script src="js/sim/ThreatSystem.js"></script>
    <script src="js/sim/Placements.js"></script>
    <script src="js/sim/CrowdSystem.js"></script>
    <script src="js/sim/Scoring.js"></script>
    <script src="js/audio/AudioManager.js"></script>
    <script src="js/ui/DebugOverlay.js"></script>
    <script src="js/ui/SettingsModal.js"></script>
    <script src="js/ui/TutorialController.js"></script>
    <script src="js/levels/levels.js"></script>
    <script src="js/levels/level-00-tutorial.js"></script>
    <script src="js/levels/level-01.js"></script>
    <script src="js/levels/level-02-nightclub.js"></script>
    <script src="js/levels/level-03-subway.js"></script>
    <script src="js/levels/level-04-stadium.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/DesignScene.js"></script>
    <script src="js/scenes/SimScene.js"></script>
    <script src="js/scenes/ResultsScene.js"></script>

    <script>
    // Initialize hub-style high score display
    document.getElementById('highScore').textContent = Storage.getBest();

    // Phaser config
    const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: CFG.CANVAS_W,
        height: CFG.CANVAS_H,
        parent: 'game-container',
        backgroundColor: '#0f0c29',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [MenuScene, DesignScene, SimScene, ResultsScene],
        input: { keyboard: true },
        // We do our own physics — Phaser arcade not used
    });

    // Refresh high score readout when a level ends
    game.events.on('step', () => {
        const el = document.getElementById('highScore');
        if (el) el.textContent = Storage.getBest();
    });
    </script>
