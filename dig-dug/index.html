<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dig Dug</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #game-container {
            position: relative;
            width: 800px;
            max-width: 100vw;
        }
        #game-container canvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Config -->
    <script src="js/config.js"></script>

    <!-- Audio -->
    <script src="js/AudioManager.js"></script>

    <!-- Entities -->
    <script src="js/entities/Grid.js"></script>
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/Pooka.js"></script>
    <script src="js/entities/Fygar.js"></script>
    <script src="js/entities/Rock.js"></script>

    <!-- Scenes -->
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/GameOverScene.js"></script>

    <!-- Game initialization -->
    <script>
        const game = new Phaser.Game({
            type: Phaser.AUTO,
            width: CONFIG.WIDTH,
            height: CONFIG.HEIGHT,
            parent: 'game-container',
            backgroundColor: '#000000',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
            },
            scene: [MenuScene, GameScene, GameOverScene],
            audio: {
                disableWebAudio: false,
            },
        });
    </script>

    <script src="../nav.js"></script>
</body>
</html>
