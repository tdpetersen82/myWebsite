<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍉 Fruit Ninja</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <p>Swipe across fruits to slash them! Don't hit the bombs!</p>
            <button id="restartBtn" class="play-button">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        const W = canvas.width;
        const H = canvas.height;
        const GRAVITY = 0.3;
        const MAX_LIVES = 3;

        function playSound(freq, type, duration) {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type || 'square';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.15, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (duration || 0.1));
                o.start(); o.stop(c.currentTime + (duration || 0.1));
            } catch(e) {}
        }

        const FRUIT_TYPES = [
            { name: 'watermelon', color: '#44cc44', innerColor: '#ff4466', radius: 25 },
            { name: 'orange', color: '#ff8800', innerColor: '#ffaa33', radius: 20 },
            { name: 'apple', color: '#dd2233', innerColor: '#ffeecc', radius: 20 },
            { name: 'banana', color: '#ffdd00', innerColor: '#fff8a0', radius: 18 },
            { name: 'strawberry', color: '#ff3366', innerColor: '#ff8899', radius: 17 }
        ];

        let score, highScore, lives, gameOver, gameStarted;
        let fruits, trail, particles, floatingTexts, halves;
        let isSwiping, comboCount;
        let lastSpawnTime, spawnInterval;

        highScore = parseInt(localStorage.getItem('fruitNinjaHighScore')) || 0;
        highScoreElement.textContent = highScore;

        function init() {
            score = 0;
            lives = MAX_LIVES;
            gameOver = false;
            gameStarted = false;
            fruits = [];
            trail = [];
            particles = [];
            floatingTexts = [];
            halves = [];
            isSwiping = false;
            comboCount = 0;
            lastSpawnTime = 0;
            spawnInterval = 1200;
            scoreElement.textContent = '0';
            draw();
        }

        function spawnFruit(now) {
            const isBomb = Math.random() < 0.15;
            const x = 50 + Math.random() * (W - 100);
            const vy = -(12 + Math.random() * 4);
            const vx = (Math.random() - 0.5) * 6;

            if (isBomb) {
                fruits.push({
                    x, y: H + 30,
                    vx, vy,
                    type: null,
                    isBomb: true,
                    radius: 22,
                    slashed: false
                });
            } else {
                const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
                fruits.push({
                    x, y: H + 30,
                    vx, vy,
                    type,
                    isBomb: false,
                    radius: type.radius,
                    slashed: false
                });
            }
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function pointSegmentDist(px, py, ax, ay, bx, by) {
            const dx = bx - ax, dy = by - ay;
            const len2 = dx * dx + dy * dy;
            if (len2 === 0) return Math.sqrt((px - ax) ** 2 + (py - ay) ** 2);
            let t = ((px - ax) * dx + (py - ay) * dy) / len2;
            t = Math.max(0, Math.min(1, t));
            const cx = ax + t * dx, cy = ay + t * dy;
            return Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
        }

        function checkSlash() {
            if (trail.length < 2) return;
            comboCount = 0;

            for (let fi = fruits.length - 1; fi >= 0; fi--) {
                const f = fruits[fi];
                if (f.slashed) continue;

                for (let ti = 1; ti < trail.length; ti++) {
                    const dist = pointSegmentDist(f.x, f.y, trail[ti - 1].x, trail[ti - 1].y, trail[ti].x, trail[ti].y);
                    if (dist < f.radius + 15) {
                        f.slashed = true;

                        if (f.isBomb) {
                            // Hit bomb - game over
                            gameOver = true;
                            playSound(150, 'sawtooth', 0.3);
                            // Bomb explosion particles
                            for (let i = 0; i < 20; i++) {
                                const a = Math.random() * Math.PI * 2;
                                const sp = 2 + Math.random() * 4;
                                particles.push({
                                    x: f.x, y: f.y,
                                    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                                    color: Math.random() < 0.5 ? '#ff6600' : '#ffcc00',
                                    life: 30
                                });
                            }
                            return;
                        }

                        comboCount++;
                        playSound(800 + comboCount * 100, 'sine', 0.05);

                        // Create halves
                        const angle = Math.atan2(trail[ti].y - trail[ti - 1].y, trail[ti].x - trail[ti - 1].x);
                        halves.push(
                            { x: f.x, y: f.y, vx: -2 + f.vx, vy: f.vy, angle: angle, va: -0.1, color: f.type.color, innerColor: f.type.innerColor, radius: f.radius, life: 30, side: -1 },
                            { x: f.x, y: f.y, vx: 2 + f.vx, vy: f.vy, angle: angle, va: 0.1, color: f.type.color, innerColor: f.type.innerColor, radius: f.radius, life: 30, side: 1 }
                        );

                        // Juice particles
                        for (let i = 0; i < 10; i++) {
                            const a = Math.random() * Math.PI * 2;
                            const sp = 1 + Math.random() * 3;
                            particles.push({
                                x: f.x, y: f.y,
                                vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                                color: f.type.color,
                                life: 20
                            });
                        }

                        break;
                    }
                }
            }

            // Remove slashed fruits
            fruits = fruits.filter(f => !f.slashed || f.isBomb);

            // Combo scoring
            if (comboCount > 0) {
                const points = comboCount === 1 ? 10 : 10 * comboCount + 5 * (comboCount - 1);
                score += points;
                scoreElement.textContent = score;

                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('fruitNinjaHighScore', highScore);
                }

                if (comboCount > 1) {
                    floatingTexts.push({
                        x: trail[trail.length - 1].x,
                        y: trail[trail.length - 1].y,
                        text: comboCount + 'x Combo! +' + points,
                        color: '#ffd700',
                        life: 45
                    });
                }
            }
        }

        // Input handlers
        function onPointerDown(e) {
            e.preventDefault();
            if (gameOver) { init(); return; }
            if (!gameStarted) { gameStarted = true; lastSpawnTime = performance.now(); return; }
            isSwiping = true;
            trail = [];
            const pos = getCanvasPos(e);
            trail.push(pos);
        }

        function onPointerMove(e) {
            e.preventDefault();
            if (!isSwiping || gameOver) return;
            const pos = getCanvasPos(e);
            trail.push(pos);
            if (trail.length > 15) trail.shift();
            checkSlash();
        }

        function onPointerUp(e) {
            e.preventDefault();
            isSwiping = false;
            trail = [];
        }

        canvas.addEventListener('mousedown', onPointerDown);
        canvas.addEventListener('mousemove', onPointerMove);
        canvas.addEventListener('mouseup', onPointerUp);
        canvas.addEventListener('touchstart', onPointerDown);
        canvas.addEventListener('touchmove', onPointerMove);
        canvas.addEventListener('touchend', onPointerUp);
        restartBtn.addEventListener('click', (e) => { e.stopPropagation(); init(); });

        function update(now) {
            if (!gameStarted || gameOver) return;

            // Spawn fruits
            const adjustedInterval = Math.max(600, spawnInterval - score * 2);
            if (now - lastSpawnTime >= adjustedInterval) {
                spawnFruit(now);
                // Sometimes spawn 2 at once
                if (Math.random() < 0.3) spawnFruit(now);
                lastSpawnTime = now;
            }

            // Update fruits
            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                f.x += f.vx;
                f.y += f.vy;
                f.vy += GRAVITY;

                // Missed fruit (fell below screen)
                if (f.y > H + 50) {
                    if (!f.isBomb && !f.slashed) {
                        lives--;
                        playSound(300, 'square', 0.1);
                        if (lives <= 0) {
                            gameOver = true;
                            playSound(200, 'sawtooth', 0.2);
                        }
                    }
                    fruits.splice(i, 1);
                }
            }

            // Update halves
            for (let i = halves.length - 1; i >= 0; i--) {
                const h = halves[i];
                h.x += h.vx;
                h.y += h.vy;
                h.vy += GRAVITY * 0.8;
                h.angle += h.va;
                h.life--;
                if (h.life <= 0 || h.y > H + 50) halves.splice(i, 1);
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.05;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Update floating texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 1.2;
                floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            // Fade trail
            if (!isSwiping && trail.length > 0) {
                trail = [];
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Stars
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            for (let i = 0; i < 40; i++) {
                ctx.fillRect((i * 137.5) % W, (i * 97.3) % H, 2, 2);
            }

            // Draw trail
            if (trail.length > 1) {
                for (let i = 1; i < trail.length; i++) {
                    const alpha = i / trail.length;
                    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
                    ctx.lineWidth = 3 + alpha * 3;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
                    ctx.lineTo(trail[i].x, trail[i].y);
                    ctx.stroke();
                }
            }

            // Draw fruits
            for (const f of fruits) {
                if (f.slashed) continue;

                if (f.isBomb) {
                    // Bomb
                    ctx.fillStyle = '#222';
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#444';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Fuse
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(f.x + f.radius * 0.5, f.y - f.radius * 0.5);
                    ctx.quadraticCurveTo(f.x + f.radius, f.y - f.radius, f.x + f.radius * 0.7, f.y - f.radius * 1.2);
                    ctx.stroke();
                    // Spark
                    ctx.fillStyle = '#ff8800';
                    ctx.beginPath();
                    ctx.arc(f.x + f.radius * 0.7, f.y - f.radius * 1.2, 4, 0, Math.PI * 2);
                    ctx.fill();
                    // Skull symbol
                    ctx.fillStyle = '#ff4444';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('X', f.x, f.y);
                } else {
                    // Fruit
                    ctx.fillStyle = f.type.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                    ctx.fill();
                    // Highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(f.x - f.radius * 0.3, f.y - f.radius * 0.3, f.radius * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    // Stem
                    ctx.strokeStyle = '#4a2';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(f.x, f.y - f.radius);
                    ctx.lineTo(f.x + 2, f.y - f.radius - 6);
                    ctx.stroke();
                }
            }

            // Draw halves
            for (const h of halves) {
                ctx.save();
                ctx.globalAlpha = h.life / 30;
                ctx.translate(h.x, h.y);
                ctx.rotate(h.angle);
                // Half circle
                ctx.fillStyle = h.color;
                ctx.beginPath();
                ctx.arc(0, 0, h.radius, h.side === -1 ? Math.PI / 2 : -Math.PI / 2, h.side === -1 ? -Math.PI / 2 : Math.PI / 2);
                ctx.closePath();
                ctx.fill();
                // Inner
                ctx.fillStyle = h.innerColor;
                ctx.beginPath();
                ctx.arc(0, 0, h.radius * 0.7, h.side === -1 ? Math.PI / 2 : -Math.PI / 2, h.side === -1 ? -Math.PI / 2 : Math.PI / 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Floating texts
            for (const ft of floatingTexts) {
                ctx.globalAlpha = ft.life / 45;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1;

            // Lives display
            if (gameStarted && !gameOver) {
                ctx.font = '20px Arial';
                ctx.textAlign = 'left';
                for (let i = 0; i < MAX_LIVES; i++) {
                    ctx.fillStyle = i < lives ? '#ff4444' : 'rgba(255,255,255,0.2)';
                    ctx.fillText(i < lives ? '❤' : '✕', 15 + i * 28, 30);
                }
            }

            // Game over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 42px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over', W / 2, H / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Tap to restart', W / 2, H / 2 + 50);
            }

            // Start prompt
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Tap to Start', W / 2, H / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Swipe to slice the fruit!', W / 2, H / 2 + 35);
            }
        }

        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Auto-Scale
        (function() {
            const c = document.getElementById('gameCanvas');
            const baseWidth = c.width, baseHeight = c.height;
            function scale() {
                const parent = c.parentElement;
                const ps = getComputedStyle(parent);
                const maxWidth = parent.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const maxHeight = window.innerHeight * 0.75;
                const scaleFactor = Math.min(maxWidth / baseWidth, maxHeight / baseHeight, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + scaleFactor + ')';
                c.style.marginBottom = (-(baseHeight * (1 - scaleFactor))) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();

        init();
        requestAnimationFrame(gameLoop);
    </script>
    <script src="../nav.js"></script>
</body>
</html>
