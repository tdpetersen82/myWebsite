<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Speedrun Bot — Arcade Game Hub</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            overflow: hidden;
        }
        #wrapper {
            width: 920px;
            height: 520px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            position: relative;
        }
        #game {
            width: 640px;
            height: 480px;
            flex-shrink: 0;
        }
        #bot-panel {
            width: 260px;
            height: 480px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.9);
            border: 2px solid #e74c3c;
            border-radius: 8px;
            padding: 10px;
            font-size: 9px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #bot-panel h3 {
            margin: 0 0 6px;
            color: #e74c3c;
            font-size: 11px;
            text-align: center;
        }
        .btn-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        #bot-panel button {
            flex: 1;
            padding: 7px 4px;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 9px;
            cursor: pointer;
            color: #fff;
        }
        #btn-record { background: #e67e22; }
        #btn-record:hover { background: #f39c12; }
        #btn-record.active { background: #c0392b; animation: pulse 1s infinite; }
        #btn-start { background: #27ae60; }
        #btn-start:hover { background: #2ecc71; }
        #btn-stop { background: #7f8c8d; }
        #btn-stop:hover { background: #95a5a6; }
        button:disabled { background: #555 !important; cursor: not-allowed; animation: none !important; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

        #bot-status {
            margin: 6px 0;
            line-height: 1.5;
            font-size: 9px;
            color: #aaa;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        #bot-status .label { color: #666; }
        #bot-status .value { color: #fff; }
        #bot-status .value.running { color: #2ecc71; }
        #bot-status .value.recording { color: #e67e22; }
        #bot-status .value.stopped { color: #e74c3c; }

        #log-header {
            font-size: 9px;
            color: #888;
            margin: 4px 0 2px;
        }
        #log {
            flex: 1;
            overflow-y: auto;
            font-size: 8px;
            line-height: 1.4;
            color: #8f8;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px;
            font-family: 'Courier New', monospace;
        }
        #log .log-frame { color: #666; }
        #log .log-action { color: #8f8; }
        #log .log-btn { color: #ff0; }
        #log .log-info { color: #88f; }
        #log .log-warn { color: #f88; }
        #log .log-enemy { color: #f80; }
        #log .log-ctx { color: #999; }

        #ram-status {
            display: none;
            margin: 4px 0;
            font-size: 8px;
            line-height: 1.6;
            color: #aaa;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        #ram-status .ram-label { color: #666; font-size: 7px; }
        #ram-status .ram-val { color: #0ff; }
        #ram-status .ram-pos { color: #8f8; }
        #ram-status .ram-speed { color: #ff0; }
        #ram-status .ram-enemy { color: #f80; }
        #ram-status .ram-danger { color: #f22; font-weight: bold; }
        #ram-status .ram-state { color: #c8f; }
        #ram-status .ram-score { color: #fff; }

        #next-up {
            margin-top: 4px;
            font-size: 8px;
            color: #aaa;
            border-top: 1px solid #333;
            padding-top: 4px;
        }
        #next-up .next-label { color: #666; }
        #next-up .next-value { color: #ff0; }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="game"></div>
        <canvas id="jsnes-canvas" width="256" height="240" style="display:none; position:absolute; top:0; left:0; width:640px; height:480px; image-rendering:pixelated; z-index:10;"></canvas>
        <div id="bot-panel">
            <h3>SPEEDRUN BOT</h3>
            <div class="btn-row">
                <button id="btn-go" disabled style="background:#9b59b6">GO</button>
                <button id="btn-record" disabled>RECORD</button>
                <button id="btn-stop" disabled>STOP</button>
            </div>
            <div class="btn-row">
                <button id="btn-start" disabled>REPLAY</button>
                <button id="btn-load-best" disabled style="background:#3498db">BEST</button>
                <button id="btn-hof" disabled style="background:#d4a017;font-size:8px">🏆 HOF</button>
            </div>
            <div id="bot-status">
                <div><span class="label">STATUS:</span> <span id="status-text" class="value stopped">WAITING</span></div>
                <div><span class="label">MODE:</span> <span id="mode-text" class="value">---</span></div>
                <div><span class="label">FRAME:</span> <span id="frame-text" class="value">0</span></div>
                <div><span class="label">TIME:</span> <span id="time-text" class="value">0.0s</span></div>
                <div><span class="label">EVENTS:</span> <span id="events-text" class="value">0</span></div>
                <div><span class="label">INPUTS:</span> <span id="input-text" class="value">---</span></div>
            </div>
            <div id="ram-status">
                <div><span class="ram-label">POS:</span> <span id="ram-pos" class="ram-pos">---</span></div>
                <div><span class="ram-label">VEL:</span> <span id="ram-speed" class="ram-speed">---</span></div>
                <div><span class="ram-label">STATE:</span> <span id="ram-state" class="ram-state">---</span></div>
                <div><span class="ram-label">ENEMIES:</span> <span id="ram-enemies" class="ram-enemy">---</span></div>
                <div><span class="ram-label">NEAREST:</span> <span id="ram-nearest" class="ram-enemy">---</span></div>
                <div><span class="ram-label">SCORE:</span> <span id="ram-score" class="ram-score">---</span></div>
            </div>
            <div id="next-up">
                <span class="next-label">NEXT:</span> <span id="next-text" class="next-value">---</span>
            </div>
            <div id="log-header">LOG</div>
            <div id="log"></div>
        </div>
    </div>

    <script src="../nav.js"></script>

    <script>
        EJS_player = '#game';
        EJS_core = 'nes';
        EJS_gameUrl = 'super-mario-bros-1.nes';
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_startOnLoaded = true;

        EJS_onGameStart = function() {
            document.getElementById('btn-go').disabled = false;
            document.getElementById('btn-record').disabled = false;
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-load-best').disabled = false;
            document.getElementById('btn-hof').disabled = false;
            document.getElementById('status-text').textContent = 'READY';
            if (window.botLog) {
                window.botLog('Emulator ready', 'info');
                window.botLog('gameManager: ' + (EJS_emulator.gameManager ? 'YES' : 'NO'), 'info');
                window.botLog('simulateInput: ' + (EJS_emulator.gameManager?.simulateInput ? 'YES' : 'NO'), 'info');
                window.botLog('Press GO to auto-start, or RECORD to play manually', 'info');
            }
        };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    <script src="https://unpkg.com/jsnes@1.2.1/dist/jsnes.min.js"></script>
    <script src="bot.js"></script>

    <script>
        (function() {
            function scale() {
                const wrapper = document.getElementById('wrapper');
                const W = 920, H = 520;
                const pad = 40;
                const scaleX = (window.innerWidth - pad * 2) / W;
                const scaleY = (window.innerHeight - pad * 2) / H;
                const s = Math.min(scaleX, scaleY, 2);
                wrapper.style.transform = 'scale(' + s + ')';
                wrapper.style.transformOrigin = 'top left';
                wrapper.style.position = 'absolute';
                wrapper.style.left = Math.max(pad, (window.innerWidth - W * s) / 2) + 'px';
                wrapper.style.top = Math.max(pad, (window.innerHeight - H * s) / 2) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();
    </script>
</body>
</html>
