<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mario Speedrun — Analysis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
h1 { color: #00d4ff; margin-bottom: 5px; }
h2 { color: #ffa500; margin: 20px 0 10px; font-size: 16px; }
.subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
canvas { background: #0d0d1a; border: 1px solid #333; border-radius: 4px; display: block; margin: 10px 0; }
.stats { background: #0d0d1a; border: 1px solid #333; border-radius: 4px; padding: 12px; margin: 10px 0; font-size: 13px; line-height: 1.6; }
.stats .label { color: #888; }
.stats .value { color: #00d4ff; }
.stats .slow { color: #ff4444; }
.stats .fast { color: #44ff44; }
.legend { display: flex; gap: 20px; flex-wrap: wrap; margin: 10px 0; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-swatch { width: 16px; height: 3px; border-radius: 1px; }
.error { color: #ff4444; padding: 20px; }
#controls { margin: 15px 0; display: flex; gap: 10px; align-items: center; }
#controls button { background: #333; color: #e0e0e0; border: 1px solid #555; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
#controls button:hover { background: #444; }
#controls button.active { background: #0066aa; border-color: #00d4ff; }
</style>
</head>
<body>
<h1>Mario Speedrun Analysis</h1>
<div class="subtitle">Speed profiles, section records, and bottleneck analysis</div>

<div id="controls">
    <button id="btn-speed" class="active" onclick="setView('speed')">Speed Profile</button>
    <button id="btn-section" onclick="setView('section')">Section Records</button>
    <button id="btn-bottleneck" onclick="setView('bottleneck')">Bottlenecks</button>
    <span style="color:#666; margin-left:10px;" id="status">Loading...</span>
</div>

<div id="charts"></div>
<div id="stats-panel"></div>

<script>
let hofData = null;
let sectionData = null;
let bestData = null;
let currentView = 'speed';

async function loadData() {
    try {
        const [hof, sections, best] = await Promise.all([
            fetch('hall-of-fame.json').then(r => r.ok ? r.json() : []),
            fetch('section-records.json').then(r => r.ok ? r.json() : []),
            fetch('best-sequence.json').then(r => r.ok ? r.json() : null),
        ]);
        hofData = hof;
        sectionData = sections;
        bestData = best;
        document.getElementById('status').textContent = `${hof.length} HoF | ${sections.length} records`;
        render();
    } catch(e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
    }
}

function setView(v) {
    currentView = v;
    document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + v).classList.add('active');
    render();
}

function render() {
    if (currentView === 'speed') renderSpeedProfile();
    else if (currentView === 'section') renderSectionRecords();
    else if (currentView === 'bottleneck') renderBottlenecks();
}

// ==================== SPEED PROFILE ====================

function renderSpeedProfile() {
    const container = document.getElementById('charts');
    const statsPanel = document.getElementById('stats-panel');
    container.innerHTML = '';
    statsPanel.innerHTML = '';

    if (!hofData || hofData.length === 0) {
        container.innerHTML = '<div class="error">No hall of fame data. Run the optimizer first.</div>';
        return;
    }

    // Build speed profiles from HoF events
    // We need to reconstruct X position over time from events
    // Since we don't have traces, use section records to approximate

    const canvas = document.createElement('canvas');
    const W = Math.min(window.innerWidth - 60, 1200);
    const H = 350;
    canvas.width = W;
    canvas.height = H;
    container.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    const PAD = { left: 60, right: 20, top: 30, bottom: 40 };
    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top - PAD.bottom;

    // Use section records to build speed-over-X chart
    // For each 100px window, plot the record speed
    const windows100 = sectionData
        .filter(r => r.xEnd - r.xStart === 100)
        .sort((a, b) => a.xStart - b.xStart);

    if (windows100.length === 0) {
        container.innerHTML = '<div class="error">No 100px section records found.</div>';
        return;
    }

    const maxX = Math.max(...windows100.map(r => r.xEnd));
    const maxSpeed = 3.0;

    // Also compute wider window speeds for overlay
    const windows200 = sectionData.filter(r => r.xEnd - r.xStart === 200).sort((a, b) => a.xStart - b.xStart);
    const windows400 = sectionData.filter(r => r.xEnd - r.xStart === 400).sort((a, b) => a.xStart - b.xStart);

    // Background
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    for (let s = 0; s <= maxSpeed; s += 0.5) {
        const y = PAD.top + plotH - (s / maxSpeed) * plotH;
        ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
        ctx.fillStyle = '#555';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'right';
        ctx.fillText(s.toFixed(1), PAD.left - 5, y + 3);
    }
    // X grid
    for (let x = 0; x <= maxX; x += 400) {
        const px = PAD.left + (x / maxX) * plotW;
        ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, H - PAD.bottom); ctx.stroke();
        ctx.fillStyle = '#555';
        ctx.textAlign = 'center';
        ctx.fillText(x, px, H - PAD.bottom + 15);
    }

    // Labels
    ctx.fillStyle = '#888';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('X Position (pixels)', W / 2, H - 5);
    ctx.save();
    ctx.translate(12, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Speed (px/frame)', 0, 0);
    ctx.restore();

    // Title
    ctx.fillStyle = '#00d4ff';
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('Speed Profile — Record Speed at Each Section', PAD.left, 18);

    // Draw max speed line
    const maxSpeedY = PAD.top + plotH - (2.5 / maxSpeed) * plotH;
    ctx.strokeStyle = '#335';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(PAD.left, maxSpeedY); ctx.lineTo(W - PAD.right, maxSpeedY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#446';
    ctx.font = '9px Courier New';
    ctx.fillText('max run speed (2.5)', PAD.left + 5, maxSpeedY - 4);

    // Plot 400px windows (background, wide)
    function plotWindows(windows, color, alpha, lineWidth) {
        if (windows.length === 0) return;
        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        for (let i = 0; i < windows.length; i++) {
            const r = windows[i];
            const midX = (r.xStart + r.xEnd) / 2;
            const speed = (r.xEnd - r.xStart) / r.frames;
            const px = PAD.left + (midX / maxX) * plotW;
            const py = PAD.top + plotH - (speed / maxSpeed) * plotH;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    plotWindows(windows400, '#664400', 0.5, 3);
    plotWindows(windows200, '#886600', 0.7, 2);

    // Plot 100px windows (foreground, sharp)
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < windows100.length; i++) {
        const r = windows100[i];
        const midX = (r.xStart + r.xEnd) / 2;
        const speed = (r.xEnd - r.xStart) / r.frames;
        const px = PAD.left + (midX / maxX) * plotW;
        const py = PAD.top + plotH - (speed / maxSpeed) * plotH;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Fill below the 100px line
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#00d4ff';
    ctx.lineTo(PAD.left + plotW, PAD.top + plotH);
    ctx.lineTo(PAD.left, PAD.top + plotH);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    // Checkpoint markers
    const checkpoints = [800, 1600, 2400];
    for (const cp of checkpoints) {
        const px = PAD.left + (cp / maxX) * plotW;
        ctx.strokeStyle = '#ff660044';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, H - PAD.bottom); ctx.stroke();
        ctx.fillStyle = '#ff6600';
        ctx.font = '9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('CP ' + cp, px, PAD.top - 5);
    }

    // Legend
    const legendDiv = document.createElement('div');
    legendDiv.className = 'legend';
    legendDiv.innerHTML = `
        <div class="legend-item"><div class="legend-swatch" style="background:#00d4ff"></div>100px sections</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#886600"></div>200px sections</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#664400"></div>400px sections</div>
    `;
    container.appendChild(legendDiv);

    // Stats
    const bestHof = hofData[0];
    statsPanel.innerHTML = `<div class="stats">
        <div><span class="label">Best completion:</span> <span class="value">${bestHof.completionFrame}f (${(bestHof.completionFrame/60.098).toFixed(1)}s)</span></div>
        <div><span class="label">Theoretical min:</span> <span class="value">${Math.ceil(3161/2.5)}f (${(3161/2.5/60.098).toFixed(1)}s)</span></div>
        <div><span class="label">Gap:</span> <span class="slow">${bestHof.completionFrame - Math.ceil(3161/2.5)} frames (${((bestHof.completionFrame - Math.ceil(3161/2.5))/60.098).toFixed(1)}s) lost to obstacles</span></div>
        <div><span class="label">Section records:</span> <span class="value">${sectionData.length}</span></div>
        <div><span class="label">HoF entries:</span> <span class="value">${hofData.length}</span></div>
    </div>`;
}

// ==================== SECTION RECORDS ====================

function renderSectionRecords() {
    const container = document.getElementById('charts');
    const statsPanel = document.getElementById('stats-panel');
    container.innerHTML = '';
    statsPanel.innerHTML = '';

    if (!sectionData || sectionData.length === 0) {
        container.innerHTML = '<div class="error">No section records.</div>';
        return;
    }

    const canvas = document.createElement('canvas');
    const W = Math.min(window.innerWidth - 60, 1200);
    const H = 400;
    canvas.width = W;
    canvas.height = H;
    container.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    const PAD = { left: 60, right: 20, top: 30, bottom: 40 };
    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top - PAD.bottom;

    // Heatmap: X axis = xStart, Y axis = section size, color = speed
    const maxX = 3200;
    const maxSize = 2500;

    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);

    // Plot each record as a colored rectangle
    for (const r of sectionData) {
        const speed = (r.xEnd - r.xStart) / r.frames;
        const size = r.xEnd - r.xStart;
        const px = PAD.left + (r.xStart / maxX) * plotW;
        const py = PAD.top + plotH - (size / maxSize) * plotH;
        const pw = Math.max(2, (size / maxX) * plotW);
        const ph = Math.max(2, 4);

        // Color: green = fast (2.5), yellow = medium (2.0), red = slow (1.0)
        const t = Math.max(0, Math.min(1, (speed - 1.0) / 1.5));
        const r_ = Math.round(255 * (1 - t));
        const g_ = Math.round(255 * t);
        ctx.fillStyle = `rgba(${r_}, ${g_}, 40, 0.6)`;
        ctx.fillRect(px, py, pw, ph);
    }

    // Axes
    ctx.fillStyle = '#555';
    ctx.font = '10px Courier New';
    for (let x = 0; x <= maxX; x += 400) {
        const px = PAD.left + (x / maxX) * plotW;
        ctx.textAlign = 'center';
        ctx.fillText(x, px, H - PAD.bottom + 15);
    }
    for (let s = 0; s <= maxSize; s += 500) {
        const py = PAD.top + plotH - (s / maxSize) * plotH;
        ctx.textAlign = 'right';
        ctx.fillText(s + 'px', PAD.left - 5, py + 3);
    }

    ctx.fillStyle = '#888';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Section Start X', W / 2, H - 5);
    ctx.save();
    ctx.translate(12, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Section Size (px)', 0, 0);
    ctx.restore();

    ctx.fillStyle = '#ffa500';
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('Section Record Heatmap — green=fast, red=slow', PAD.left, 18);

    // Legend gradient
    const legendDiv = document.createElement('div');
    legendDiv.className = 'legend';
    legendDiv.innerHTML = `
        <div class="legend-item"><div class="legend-swatch" style="background:rgb(255,40,40)"></div>1.0 px/f (slow)</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgb(200,200,40)"></div>1.75 px/f</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgb(40,255,40)"></div>2.5 px/f (max)</div>
    `;
    container.appendChild(legendDiv);
}

// ==================== BOTTLENECKS ====================

function renderBottlenecks() {
    const container = document.getElementById('charts');
    const statsPanel = document.getElementById('stats-panel');
    container.innerHTML = '';
    statsPanel.innerHTML = '';

    if (!sectionData || sectionData.length === 0 || !hofData || hofData.length === 0) {
        container.innerHTML = '<div class="error">Need both section records and HoF data.</div>';
        return;
    }

    // Find sections where wider windows are much slower than expected
    // (obstacles, jumps, pipe transitions)
    const wideSections = sectionData
        .filter(r => (r.xEnd - r.xStart) >= 200 && (r.xEnd - r.xStart) <= 800)
        .map(r => ({
            ...r,
            speed: (r.xEnd - r.xStart) / r.frames,
            size: r.xEnd - r.xStart,
            // "slowdown" = how much slower than max speed
            slowdown: r.frames - Math.ceil((r.xEnd - r.xStart) / 2.5),
        }))
        .filter(r => r.slowdown > 5)
        .sort((a, b) => b.slowdown - a.slowdown);

    const canvas = document.createElement('canvas');
    const W = Math.min(window.innerWidth - 60, 1200);
    const H = 350;
    canvas.width = W;
    canvas.height = H;
    container.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    const PAD = { left: 60, right: 20, top: 30, bottom: 40 };
    const plotW = W - PAD.left - PAD.right;
    const plotH = H - PAD.top - PAD.bottom;

    const maxX = 3200;
    const maxSlowdown = Math.max(20, ...wideSections.slice(0, 50).map(r => r.slowdown));

    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = '#222';
    for (let s = 0; s <= maxSlowdown; s += 20) {
        const y = PAD.top + plotH - (s / maxSlowdown) * plotH;
        ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
        ctx.fillStyle = '#555';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'right';
        ctx.fillText(s + 'f', PAD.left - 5, y + 3);
    }
    for (let x = 0; x <= maxX; x += 400) {
        const px = PAD.left + (x / maxX) * plotW;
        ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, H - PAD.bottom); ctx.stroke();
        ctx.fillStyle = '#555';
        ctx.textAlign = 'center';
        ctx.fillText(x, px, H - PAD.bottom + 15);
    }

    // Plot bottleneck bars
    for (const r of wideSections.slice(0, 100)) {
        const px = PAD.left + (r.xStart / maxX) * plotW;
        const pw = Math.max(3, (r.size / maxX) * plotW);
        const barH = (r.slowdown / maxSlowdown) * plotH;
        const py = PAD.top + plotH - barH;

        // Color intensity by severity
        const t = Math.min(1, r.slowdown / maxSlowdown);
        ctx.fillStyle = `rgba(255, ${Math.round(100 * (1-t))}, 50, ${0.3 + t * 0.5})`;
        ctx.fillRect(px, py, pw, barH);
    }

    // Labels
    ctx.fillStyle = '#888';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('X Position', W / 2, H - 5);
    ctx.save();
    ctx.translate(12, H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Frames Lost vs Max Speed', 0, 0);
    ctx.restore();

    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('Bottleneck Map — frames lost to obstacles at each X range', PAD.left, 18);

    // Checkpoint markers
    for (const cp of [800, 1600, 2400]) {
        const px = PAD.left + (cp / maxX) * plotW;
        ctx.strokeStyle = '#ff660066';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, H - PAD.bottom); ctx.stroke();
    }

    // Stats: top bottlenecks
    const top10 = wideSections.slice(0, 10);
    let html = '<h2>Top Bottlenecks (200-800px sections)</h2><div class="stats">';
    for (const r of top10) {
        html += `<div>X=${r.xStart}-${r.xEnd} (${r.size}px): <span class="slow">${r.frames}f</span> actual vs ${Math.ceil(r.size/2.5)}f ideal = <span class="slow">${r.slowdown}f lost</span> (${r.speed.toFixed(2)} px/f)</div>`;
    }

    // HoF checkpoint analysis
    if (hofData[0]?.checkpoints) {
        const cp = hofData[0].checkpoints;
        html += '<br><div style="color:#ffa500;font-weight:bold">HoF #1 Checkpoint Splits:</div>';
        const ranges = [
            { label: '0-800', frames: cp[0] },
            { label: '800-1600', frames: cp[1] - cp[0] },
            { label: '1600-2400', frames: cp[2] - cp[1] },
            { label: '2400-3161', frames: hofData[0].completionFrame - cp[2] },
        ];
        for (const r of ranges) {
            const ideal = r.label === '2400-3161' ? Math.ceil(761/2.5) : Math.ceil(800/2.5);
            const lost = r.frames - ideal;
            const cls = lost > 50 ? 'slow' : lost > 20 ? 'value' : 'fast';
            html += `<div>  ${r.label}: ${r.frames}f (ideal ${ideal}f, <span class="${cls}">${lost}f lost</span>)</div>`;
        }
    }
    html += '</div>';
    statsPanel.innerHTML = html;
}

loadData();
</script>
</body>
</html>
