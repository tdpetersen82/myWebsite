        canvas {
            display: block;

        .turn-indicator.player .pill { background: linear-gradient(135deg, #4facfe 0%, #00b8ff 100%); }
        .turn-indicator.computer .pill { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }

            animation: dots 1s steps(4, end) infinite;

        .score-label {

            text-transform: uppercase;

        .score-value {
            font-size: 1.9em;

            line-height: 1;
            margin-top: 2px;
            color: #222;
        }

        .difficulty-screen {
            margin: 14px auto;
            max-width: 540px;
        }
        .difficulty-screen h2 {
            color: #444;
            font-size: 1.1em;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .diff-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;

        .diff-card {
            background: #fff;
            border: 2px solid #e6e6f0;

            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;

        .diff-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);

        .diff-icon {
            font-size: 1.8em;

        .diff-name {
            font-weight: 800;
            font-size: 1.1em;

            margin-bottom: 4px;

        .diff-desc {

            line-height: 1.3;

        .diff-card.easy .diff-name { color: #4caf50; }
        .diff-card.medium .diff-name { color: #ff9800; }
        .diff-card.hard .diff-name { color: #f44336; }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 12px 0 4px;
            font-size: 0.85em;
            color: #666;
        }
        .stats-bar strong { color: #333; }

        .game-over-msg {
            font-size: 1.3em;
            font-weight: 800;
            margin: 10px 0;
            min-height: 1.6em;
            letter-spacing: 0.3px;
        }
        .game-over-msg.win { color: #2196f3; }
        .game-over-msg.lose { color: #e53935; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .diff-grid { grid-template-columns: 1fr; }
            .score-card { padding: 8px 14px; min-width: 95px; }
            .score-value { font-size: 1.6em; }
        }

<body>
    <div class="container">
        <h1>🔵 Dots &amp; Boxes</h1>

        <div id="difficultyScreen" class="difficulty-screen">
            <h2>Choose your difficulty</h2>
            <div class="diff-grid">
                <div class="diff-card easy" onclick="startGame('easy')">
                    <div class="diff-icon">🌱</div>
                    <div class="diff-name">Easy</div>

                </div>
                <div class="diff-card medium" onclick="startGame('medium')">
                    <div class="diff-icon">⚔️</div>
                    <div class="diff-name">Medium</div>
                    <div class="diff-desc">4×4 grid<br>Smarter AI</div>
                </div>
                <div class="diff-card hard" onclick="startGame('hard')">
                    <div class="diff-icon">🔥</div>
                    <div class="diff-name">Hard</div>
                    <div class="diff-desc">5×5 grid<br>Strategic AI</div>
                </div>
            </div>

        <div id="gameArea" class="hidden">
            <div class="scoreboard">

                </div>
                <div class="score-card computer" id="computerCard">
                    <div class="score-label">Computer</div>
                    <div class="score-value" id="computerScore">0</div>
                </div>
            </div>
            <div id="turnIndicator" class="turn-indicator player">
                <span class="pill" id="turnPill">Your turn</span>
            </div>
            <canvas id="gameCanvas" width="540" height="540"></canvas>

                <button class="play-button" onclick="showDifficulty()">New Game</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const playerCardEl = document.getElementById('playerCard');
        const computerCardEl = document.getElementById('computerCard');
        const turnIndicatorEl = document.getElementById('turnIndicator');
        const turnPillEl = document.getElementById('turnPill');
        const gameOverMsgEl = document.getElementById('gameOverMsg');
        const difficultyScreen = document.getElementById('difficultyScreen');
        const gameArea = document.getElementById('gameArea');
        const statsBar = document.getElementById('statsBar');

        // ===================== Audio =====================
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration = 0.1, type = 'square', volume = 0.18) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(volume, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        function playLineSound() { playSound(620, 0.05, 'sine'); }
        function playBoxPlayerSound() { playSound(820, 0.13, 'sine'); setTimeout(() => playSound(1040, 0.13, 'sine'), 90); }
        function playBoxComputerSound() { playSound(380, 0.12, 'triangle'); }
        function playWinSound() {
            [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.18, 'sine', 0.16), i * 110));
        }
        function playLoseSound() {
            [400, 330, 260, 200].forEach((f, i) => setTimeout(() => playSound(f, 0.18, 'sine', 0.16), i * 110));
        }

        // ===================== Game state =====================
        let rows, cols, difficulty;
        let horizontalLines, verticalLines, boxes;
        let playerScore, computerScore;
        let currentTurn;
        let hoveredLine;
        let gameOver;
        let computerThinking;

        // Animation state
        let lineAnims = []; // {type, row, col, owner, t, duration}
        let boxAnims = [];  // {row, col, owner, t, duration}
        let particles = []; // {x, y, vx, vy, life, color}
        let needsRedraw = true;

        // ===================== Layout constants =====================
        const PADDING = 50;
        let dotSpacing;
        const DOT_RADIUS = 7;
        const LINE_THICKNESS = 6;
        const HOVER_THICKNESS = 8;
        const CLICK_THRESHOLD = 32;

        const PLAYER_COLOR = '#4facfe';
        const PLAYER_GLOW = 'rgba(79, 172, 254, 0.45)';
        const PLAYER_FILL = 'rgba(79, 172, 254, 0.22)';
        const PLAYER_FILL_DARK = 'rgba(79, 172, 254, 0.4)';
        const COMPUTER_COLOR = '#f5576c';
        const COMPUTER_GLOW = 'rgba(245, 87, 108, 0.45)';
        const COMPUTER_FILL = 'rgba(245, 87, 108, 0.22)';
        const COMPUTER_FILL_DARK = 'rgba(245, 87, 108, 0.4)';
        const EMPTY_LINE_COLOR = 'rgba(255, 255, 255, 0.08)';
        const HOVER_COLOR = 'rgba(79, 172, 254, 0.7)';
        const DOT_COLOR = '#e8e8f5';
        const DOT_GLOW = 'rgba(232, 232, 245, 0.25)';

        function colorForOwner(owner) { return owner === 1 ? PLAYER_COLOR : COMPUTER_COLOR; }
        function fillForOwner(owner) { return owner === 1 ? PLAYER_FILL : COMPUTER_FILL; }
        function fillDarkForOwner(owner) { return owner === 1 ? PLAYER_FILL_DARK : COMPUTER_FILL_DARK; }
        function glowForOwner(owner) { return owner === 1 ? PLAYER_GLOW : COMPUTER_GLOW; }

        // ===================== Stats (localStorage) =====================
        function loadStats() {
            try {
                return JSON.parse(localStorage.getItem('dotsBoxesStats')) || { wins: 0, losses: 0, ties: 0 };
            } catch { return { wins: 0, losses: 0, ties: 0 }; }
        }
        function saveStats(s) { localStorage.setItem('dotsBoxesStats', JSON.stringify(s)); }
        function updateStatsBar() {
            const s = loadStats();
            statsBar.innerHTML = `Wins: <strong>${s.wins}</strong> · Losses: <strong>${s.losses}</strong> · Ties: <strong>${s.ties}</strong>`;
        }

        // ===================== Screen control =====================
        function showDifficulty() {
            difficultyScreen.classList.remove('hidden');
            gameArea.classList.add('hidden');
            gameOverMsgEl.textContent = '';
            updateStatsBar();
        }

        function startGame(diff) {
            difficulty = diff;
            if (diff === 'easy') { rows = 3; cols = 3; }
            else if (diff === 'medium') { rows = 4; cols = 4; }
            else { rows = 5; cols = 5; }

            dotSpacing = (canvas.width - 2 * PADDING) / cols;

            horizontalLines = [];
            for (let r = 0; r <= rows; r++) {
                horizontalLines[r] = [];
                for (let c = 0; c < cols; c++) horizontalLines[r][c] = 0;
            }
            verticalLines = [];
            for (let r = 0; r < rows; r++) {
                verticalLines[r] = [];
                for (let c = 0; c <= cols; c++) verticalLines[r][c] = 0;
            }
            boxes = [];
            for (let r = 0; r < rows; r++) {
                boxes[r] = [];
                for (let c = 0; c < cols; c++) boxes[r][c] = 0;
            }

            playerScore = 0;
            computerScore = 0;
            currentTurn = 'player';
            hoveredLine = null;
            gameOver = false;
            computerThinking = false;
            lineAnims = [];
            boxAnims = [];
            particles = [];

            difficultyScreen.classList.add('hidden');
            gameArea.classList.remove('hidden');
            gameOverMsgEl.textContent = '';
            gameOverMsgEl.className = 'game-over-msg';
            updateUI();
            needsRedraw = true;
            requestAnimationFrame(() => { if (_scaleCanvas) _scaleCanvas(); });
        }

        function updateUI() {
            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
            playerCardEl.classList.toggle('active', currentTurn === 'player' && !gameOver);
            computerCardEl.classList.toggle('active', currentTurn === 'computer' && !gameOver);

            if (gameOver) {
                turnPillEl.textContent = 'Game over';
                turnIndicatorEl.className = 'turn-indicator';
            } else if (currentTurn === 'player') {
                turnPillEl.textContent = 'Your turn';
                turnIndicatorEl.className = 'turn-indicator player';
            } else {
                turnPillEl.textContent = 'Computer thinking';
                turnIndicatorEl.className = 'turn-indicator computer thinking';
            }
        }

        // ===================== Coordinate helpers =====================
        function dotX(col) { return PADDING + col * dotSpacing; }
        function dotY(row) { return PADDING + row * dotSpacing; }

        // ===================== Animation helpers =====================
        function startLineAnim(type, row, col, owner) {
            lineAnims.push({ type, row, col, owner, t: 0, duration: 220 });
        }
        function startBoxAnim(row, col, owner) {
            boxAnims.push({ row, col, owner, t: 0, duration: 380 });
            // Spawn a small particle burst
            const cx = dotX(col) + dotSpacing / 2;
            const cy = dotY(row) + dotSpacing / 2;
            const color = owner === 1 ? PLAYER_COLOR : COMPUTER_COLOR;
            for (let i = 0; i < 10; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = 0.6 + Math.random() * 1.6;
                particles.push({
                    x: cx, y: cy,
                    vx: Math.cos(a) * sp,
                    vy: Math.sin(a) * sp,
                    life: 1,
                    color
                });
            }
        }

        // ===================== Drawing =====================
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Subtle dot grid pattern background
            ctx.fillStyle = 'rgba(255,255,255,0.025)';
            for (let y = 20; y < canvas.height; y += 40) {
                for (let x = 20; x < canvas.width; x += 40) {
                    ctx.fillRect(x, y, 1, 1);
                }
            }
        }

        function drawBoxes() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (boxes[r][c] === 0) continue;
                    const x = dotX(c);
                    const y = dotY(r);
                    const owner = boxes[r][c];

                    // Find ongoing animation if any
                    const anim = boxAnims.find(a => a.row === r && a.col === c);
                    let scale = 1, glow = 0;
                    if (anim) {
                        const p = Math.min(1, anim.t / anim.duration);
                        // Ease-out elastic-ish
                        scale = 1 + 0.18 * Math.sin(p * Math.PI) * (1 - p);
                        glow = (1 - p);
                    }

                    const inset = 4;
                    const w = dotSpacing - inset * 2;
                    const cx = x + dotSpacing / 2;
                    const cy = y + dotSpacing / 2;
                    const drawW = w * scale;

                    // Glow during animation
                    if (glow > 0) {
                        ctx.save();
                        ctx.shadowColor = glowForOwner(owner);
                        ctx.shadowBlur = 22 * glow;
                        ctx.fillStyle = fillDarkForOwner(owner);
                        roundRect(ctx, cx - drawW / 2, cy - drawW / 2, drawW, drawW, 6);
                        ctx.fill();
                        ctx.restore();
                    } else {
                        ctx.fillStyle = fillForOwner(owner);
                        roundRect(ctx, cx - drawW / 2, cy - drawW / 2, drawW, drawW, 6);
                        ctx.fill();
                    }

                    // Player marker icon (owl face style — just colored circle with letter)
                    const markerSize = Math.floor(dotSpacing * 0.32) * scale;
                    ctx.beginPath();
                    ctx.arc(cx, cy, markerSize, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(cx - markerSize * 0.3, cy - markerSize * 0.3, markerSize * 0.2, cx, cy, markerSize);
                    if (owner === 1) {
                        grad.addColorStop(0, '#aee0ff');
                        grad.addColorStop(1, PLAYER_COLOR);
                    } else {
                        grad.addColorStop(0, '#ffc0c8');
                        grad.addColorStop(1, COMPUTER_COLOR);
                    }
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    ctx.fillStyle = '#fff';
                    ctx.font = `bold ${Math.floor(markerSize * 1.0)}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(owner === 1 ? 'P' : 'C', cx, cy + 1);
                }
            }
        }

        function roundRect(c, x, y, w, h, r) {
            c.beginPath();
            c.moveTo(x + r, y);
            c.lineTo(x + w - r, y);
            c.quadraticCurveTo(x + w, y, x + w, y + r);
            c.lineTo(x + w, y + h - r);
            c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            c.lineTo(x + r, y + h);
            c.quadraticCurveTo(x, y + h, x, y + h - r);
            c.lineTo(x, y + r);
            c.quadraticCurveTo(x, y, x + r, y);
            c.closePath();
        }

        function drawEmptyLines() {
            ctx.strokeStyle = EMPTY_LINE_COLOR;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.setLineDash([4, 6]);
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (horizontalLines[r][c] === 0) {
                        ctx.beginPath();
                        ctx.moveTo(dotX(c) + 4, dotY(r));
                        ctx.lineTo(dotX(c + 1) - 4, dotY(r));
                        ctx.stroke();
                    }
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    if (verticalLines[r][c] === 0) {
                        ctx.beginPath();
                        ctx.moveTo(dotX(c), dotY(r) + 4);
                        ctx.lineTo(dotX(c), dotY(r + 1) - 4);
                        ctx.stroke();
                    }
                }
            }
            ctx.setLineDash([]);
        }

        function drawClaimedLines() {
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (horizontalLines[r][c] !== 0) {
                        drawLine('h', r, c, horizontalLines[r][c]);
                    }
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    if (verticalLines[r][c] !== 0) {
                        drawLine('v', r, c, verticalLines[r][c]);
                    }
                }
            }
        }

        function drawLine(type, row, col, owner) {
            const anim = lineAnims.find(a => a.type === type && a.row === row && a.col === col);
            let progress = 1;
            if (anim) progress = Math.min(1, anim.t / anim.duration);

            const x1 = dotX(col);
            const y1 = dotY(row);
            const x2 = type === 'h' ? dotX(col + 1) : dotX(col);
            const y2 = type === 'h' ? dotY(row) : dotY(row + 1);
            const ex = x1 + (x2 - x1) * progress;
            const ey = y1 + (y2 - y1) * progress;

            ctx.save();
            ctx.shadowColor = glowForOwner(owner);
            ctx.shadowBlur = 6;
            ctx.strokeStyle = colorForOwner(owner);
            ctx.lineWidth = LINE_THICKNESS;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            ctx.restore();
        }

        function drawHover() {
            if (!hoveredLine || gameOver || currentTurn !== 'player' || computerThinking) return;
            ctx.save();
            ctx.shadowColor = HOVER_COLOR;
            ctx.shadowBlur = 12;
            ctx.strokeStyle = HOVER_COLOR;
            ctx.lineWidth = HOVER_THICKNESS;
            ctx.lineCap = 'round';
            ctx.beginPath();
            if (hoveredLine.type === 'h') {
                ctx.moveTo(dotX(hoveredLine.col), dotY(hoveredLine.row));
                ctx.lineTo(dotX(hoveredLine.col + 1), dotY(hoveredLine.row));
            } else {
                ctx.moveTo(dotX(hoveredLine.col), dotY(hoveredLine.row));
                ctx.lineTo(dotX(hoveredLine.col), dotY(hoveredLine.row + 1));
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawDots() {
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    const x = dotX(c);
                    const y = dotY(r);
                    // Glow halo
                    ctx.fillStyle = DOT_GLOW;
                    ctx.beginPath();
                    ctx.arc(x, y, DOT_RADIUS + 3, 0, Math.PI * 2);
                    ctx.fill();
                    // Inner dot
                    ctx.fillStyle = DOT_COLOR;
                    ctx.beginPath();
                    ctx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5 * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function draw() {
            drawBackground();
            drawBoxes();
            drawEmptyLines();
            drawClaimedLines();
            drawHover();
            drawDots();
            drawParticles();
        }

        // ===================== Animation loop =====================
        let lastFrame = 0;
        function animLoop(t) {
            const dt = lastFrame ? Math.min(50, t - lastFrame) : 16;
            lastFrame = t;

            let anyAnimActive = lineAnims.length > 0 || boxAnims.length > 0 || particles.length > 0;

            // Advance line anims
            for (let i = lineAnims.length - 1; i >= 0; i--) {
                lineAnims[i].t += dt;
                if (lineAnims[i].t >= lineAnims[i].duration) lineAnims.splice(i, 1);
            }
            // Advance box anims
            for (let i = boxAnims.length - 1; i >= 0; i--) {
                boxAnims[i].t += dt;
                if (boxAnims[i].t >= boxAnims[i].duration) boxAnims.splice(i, 1);
            }
            // Advance particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.92;
                p.vy *= 0.92;
                p.vy += 0.04;
                p.life -= dt / 600;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (anyAnimActive || needsRedraw) {
                draw();
                needsRedraw = false;
            }
            requestAnimationFrame(animLoop);
        }
        requestAnimationFrame(animLoop);

        // ===================== Game logic =====================
        function getNearestLine(mx, my) {
            let best = null;
            let bestDist = CLICK_THRESHOLD;
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (horizontalLines[r][c] !== 0) continue;
                    const x1 = dotX(c), x2 = dotX(c + 1), y = dotY(r);
                    const t = Math.max(0, Math.min(1, (mx - x1) / (x2 - x1)));
                    const px = x1 + t * (x2 - x1);
                    const dist = Math.sqrt((mx - px) ** 2 + (my - y) ** 2);
                    if (dist < bestDist) { bestDist = dist; best = { type: 'h', row: r, col: c }; }
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    if (verticalLines[r][c] !== 0) continue;
                    const x = dotX(c), y1 = dotY(r), y2 = dotY(r + 1);
                    const t = Math.max(0, Math.min(1, (my - y1) / (y2 - y1)));
                    const py = y1 + t * (y2 - y1);
                    const dist = Math.sqrt((mx - x) ** 2 + (my - py) ** 2);
                    if (dist < bestDist) { bestDist = dist; best = { type: 'v', row: r, col: c }; }
                }
            }
            return best;
        }

        function countBoxSides(r, c) {
            let count = 0;
            if (horizontalLines[r][c] !== 0) count++;
            if (horizontalLines[r + 1][c] !== 0) count++;
            if (verticalLines[r][c] !== 0) count++;
            if (verticalLines[r][c + 1] !== 0) count++;
            return count;
        }

        function placeLine(type, row, col, owner) {
            if (type === 'h') horizontalLines[row][col] = owner;
            else verticalLines[row][col] = owner;

            startLineAnim(type, row, col, owner);

            let completedBoxes = 0;
            const completed = [];
            if (type === 'h') {
                if (row > 0 && boxes[row - 1][col] === 0 && countBoxSides(row - 1, col) === 4) {
                    boxes[row - 1][col] = owner; completed.push([row - 1, col]); completedBoxes++;
                }
                if (row < rows && boxes[row][col] === 0 && countBoxSides(row, col) === 4) {
                    boxes[row][col] = owner; completed.push([row, col]); completedBoxes++;
                }
            } else {
                if (col > 0 && boxes[row][col - 1] === 0 && countBoxSides(row, col - 1) === 4) {
                    boxes[row][col - 1] = owner; completed.push([row, col - 1]); completedBoxes++;
                }
                if (col < cols && boxes[row][col] === 0 && countBoxSides(row, col) === 4) {
                    boxes[row][col] = owner; completed.push([row, col]); completedBoxes++;
                }
            }
            for (const [r, c] of completed) startBoxAnim(r, c, owner);
            return completedBoxes;
        }

        function getAvailableMoves() {
            const moves = [];
            for (let r = 0; r <= rows; r++)
                for (let c = 0; c < cols; c++)
                    if (horizontalLines[r][c] === 0) moves.push({ type: 'h', row: r, col: c });
            for (let r = 0; r < rows; r++)
                for (let c = 0; c <= cols; c++)
                    if (verticalLines[r][c] === 0) moves.push({ type: 'v', row: r, col: c });
            return moves;
        }

        function wouldCompleteBox(type, row, col) {
            if (type === 'h') {
                if (row > 0 && boxes[row - 1][col] === 0 && countBoxSides(row - 1, col) === 3) return true;
                if (row < rows && boxes[row][col] === 0 && countBoxSides(row, col) === 3) return true;
            } else {
                if (col > 0 && boxes[row][col - 1] === 0 && countBoxSides(row, col - 1) === 3) return true;
                if (col < cols && boxes[row][col] === 0 && countBoxSides(row, col) === 3) return true;
            }
            return false;
        }

        function wouldCreateThreeSided(type, row, col) {
            if (type === 'h') {
                if (row > 0 && boxes[row - 1][col] === 0 && countBoxSides(row - 1, col) === 2) return true;
                if (row < rows && boxes[row][col] === 0 && countBoxSides(row, col) === 2) return true;
            } else {
                if (col > 0 && boxes[row][col - 1] === 0 && countBoxSides(row, col - 1) === 2) return true;
                if (col < cols && boxes[row][col] === 0 && countBoxSides(row, col) === 2) return true;
            }
            return false;
        }

        function countChainLength(type, row, col) {
            if (type === 'h') horizontalLines[row][col] = 2;
            else verticalLines[row][col] = 2;

            const toCheck = [];
            if (type === 'h') {
                if (row > 0 && boxes[row - 1][col] === 0 && countBoxSides(row - 1, col) === 3) toCheck.push({ r: row - 1, c: col });
                if (row < rows && boxes[row][col] === 0 && countBoxSides(row, col) === 3) toCheck.push({ r: row, c: col });
            } else {
                if (col > 0 && boxes[row][col - 1] === 0 && countBoxSides(row, col - 1) === 3) toCheck.push({ r: row, c: col - 1 });
                if (col < cols && boxes[row][col] === 0 && countBoxSides(row, col) === 3) toCheck.push({ r: row, c: col });
            }
            const chainBoxes = toCheck.length;

            if (type === 'h') horizontalLines[row][col] = 0;
            else verticalLines[row][col] = 0;
            return chainBoxes;
        }

        function getComputerMove() {
            const moves = getAvailableMoves();
            if (moves.length === 0) return null;

            const completingMoves = moves.filter(m => wouldCompleteBox(m.type, m.row, m.col));
            if (completingMoves.length > 0 && difficulty !== 'easy') {
                return completingMoves[Math.floor(Math.random() * completingMoves.length)];
            }

            if (difficulty === 'easy') {
                if (completingMoves.length > 0 && Math.random() < 0.5) {
                    return completingMoves[Math.floor(Math.random() * completingMoves.length)];
                }
                return moves[Math.floor(Math.random() * moves.length)];
            }

            if (difficulty === 'medium') {
                const safeMoves = moves.filter(m => !wouldCreateThreeSided(m.type, m.row, m.col));
                if (safeMoves.length > 0 && Math.random() < 0.6) {
                    return safeMoves[Math.floor(Math.random() * safeMoves.length)];
                }
                return moves[Math.floor(Math.random() * moves.length)];
            }

            // Hard
            const safeMoves = moves.filter(m => !wouldCreateThreeSided(m.type, m.row, m.col));
            if (safeMoves.length > 0) return safeMoves[Math.floor(Math.random() * safeMoves.length)];

            let bestMove = moves[0];
            let bestChain = Infinity;
            for (const m of moves) {
                const chain = countChainLength(m.type, m.row, m.col);
                if (chain < bestChain) { bestChain = chain; bestMove = m; }
            }
            return bestMove;
        }

        function makeMove(type, row, col, owner) {
            const ownerVal = owner === 'player' ? 1 : 2;
            const completed = placeLine(type, row, col, ownerVal);
            playLineSound();

            if (completed > 0) {
                if (owner === 'player') { playerScore += completed; playBoxPlayerSound(); }
                else { computerScore += completed; playBoxComputerSound(); }
            }
            updateUI();

            if (isGameOver()) { endGame(); return; }

            if (completed > 0) {
                if (owner === 'computer') setTimeout(computerTurn, 450);
            } else {
                if (owner === 'player') {
                    currentTurn = 'computer';
                    updateUI();
                    setTimeout(computerTurn, 450);
                } else {
                    currentTurn = 'player';
                    updateUI();
                }
            }
        }

        function computerTurn() {
            if (gameOver) return;
            computerThinking = true;
            const move = getComputerMove();
            if (move) makeMove(move.type, move.row, move.col, 'computer');
            computerThinking = false;
        }

        function isGameOver() {
            return playerScore + computerScore === rows * cols;
        }

        function endGame() {
            gameOver = true;
            currentTurn = null;
            updateUI();

            const stats = loadStats();
            if (playerScore > computerScore) {
                gameOverMsgEl.className = 'game-over-msg win';
                gameOverMsgEl.textContent = `🏆 You win! ${playerScore}–${computerScore}`;
                playWinSound();
                stats.wins++;
            } else if (computerScore > playerScore) {
                gameOverMsgEl.className = 'game-over-msg lose';
                gameOverMsgEl.textContent = `Computer wins ${computerScore}–${playerScore}`;
                playLoseSound();
                stats.losses++;
            } else {
                gameOverMsgEl.className = 'game-over-msg tie';
                gameOverMsgEl.textContent = `It's a tie! ${playerScore}–${computerScore}`;
                stats.ties++;
            }
            saveStats(stats);
        }

        // ===================== Input =====================
        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { mx: (clientX - rect.left) * scaleX, my: (clientY - rect.top) * scaleY };
        }

        canvas.addEventListener('mousemove', (e) => {
            if (gameOver || currentTurn !== 'player' || computerThinking) {
                if (hoveredLine) { hoveredLine = null; needsRedraw = true; }
                return;
            }
            const { mx, my } = getCanvasCoords(e.clientX, e.clientY);
            const newHover = getNearestLine(mx, my);
            const changed = !!hoveredLine !== !!newHover ||
                (hoveredLine && newHover && (hoveredLine.type !== newHover.type || hoveredLine.row !== newHover.row || hoveredLine.col !== newHover.col));
            hoveredLine = newHover;
            if (changed) needsRedraw = true;
        });

        canvas.addEventListener('mouseleave', () => {
            if (hoveredLine) { hoveredLine = null; needsRedraw = true; }
        });

        canvas.addEventListener('click', (e) => {
            if (gameOver || currentTurn !== 'player' || computerThinking) return;
            const { mx, my } = getCanvasCoords(e.clientX, e.clientY);
            const line = getNearestLine(mx, my);
            if (line) {
                hoveredLine = null;
                makeMove(line.type, line.row, line.col, 'player');
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver || currentTurn !== 'player' || computerThinking) return;
            const t = e.touches[0];
            const { mx, my } = getCanvasCoords(t.clientX, t.clientY);
            const line = getNearestLine(mx, my);
            if (line) {
                hoveredLine = null;
                makeMove(line.type, line.row, line.col, 'player');
            }
        }, { passive: false });

        // ===================== Init =====================
        updateStatsBar();

        // Auto-scale canvas to fit viewport
        const _scaleCanvas = (function() {
            const c = document.getElementById('gameCanvas');
            const bw = c.width, bh = c.height;
            function sc() {
                const par = c.parentElement;
                if (!par || par.offsetWidth === 0) return;
                const ps = getComputedStyle(par);
                const mw = par.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const mh = window.innerHeight * 0.72;
                const s = Math.max(0.1, Math.min(mw / bw, mh / bh, 1));
                if (isNaN(s)) return;
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + s + ')';
                c.style.marginBottom = (-(bh * (1 - s))) + 'px';
            }
            window.addEventListener('resize', sc);
            sc();
            return sc;
        })();
    </script>
