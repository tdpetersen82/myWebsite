<body>
    <div class="container">
        <h1>💣 Bomberman</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
            <p>Lives: <span id="lives">3</span></p>
            <p>Level: <span id="level">1</span></p>
        </div>
        <div id="game-container"></div>
        <div class="controls-info">
            <p><strong>Controls:</strong> Arrow Keys = Move | Space = Place Bomb | P/ESC = Pause | M = Mute</p>
        </div>
    </div>

    <!-- Game scripts -->
    <script src="js/config.js"></script>
    <script src="js/AudioManager.js"></script>
    <script src="js/entities/Grid.js"></script>
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/Bomb.js"></script>
    <script src="js/entities/Explosion.js"></script>
    <script src="js/entities/Enemy.js"></script>
    <script src="js/entities/PowerUp.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/GameOverScene.js"></script>

    <script>
    // Initialize audio manager globally
    window.gameAudio = new AudioManager();

    // Initialize high score display
    document.getElementById('highScore').textContent =
        localStorage.getItem(CONFIG.STORAGE_KEY) || 0;

    // Create Phaser game
    const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: CONFIG.WIDTH,
        height: CONFIG.HEIGHT,
        parent: 'game-container',
        backgroundColor: '#1a1a2e',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [MenuScene, GameScene, GameOverScene],
        physics: {
            default: 'arcade',
            arcade: {
                debug: false,
            },
        },
        input: {
            keyboard: true,
        },
    });

    // Update external HUD elements from game events
    game.events.on('step', () => {
        const gameScene = game.scene.getScene('GameScene');
        if (gameScene && gameScene.scene.isActive()) {
            if (gameScene.player) {
                document.getElementById('score').textContent = gameScene.score || 0;
                document.getElementById('lives').textContent = gameScene.lives || 0;
                document.getElementById('level').textContent = gameScene.level || 1;
                const hs = localStorage.getItem(CONFIG.STORAGE_KEY) || 0;
                document.getElementById('highScore').textContent =
                    Math.max(parseInt(hs), gameScene.score || 0);
            }
        }
    });
    </script>
