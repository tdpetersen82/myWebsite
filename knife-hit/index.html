<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knife Hit</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔪 Knife Hit</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <p>Tap, Click, or press Space to throw knives into the log!</p>
            <button id="restartBtn" class="play-button">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        const W = canvas.width;
        const H = canvas.height;
        const LOG_X = W / 2;
        const LOG_Y = 160;
        const LOG_RADIUS = 80;
        const KNIFE_WIDTH = 8;
        const KNIFE_LENGTH = 40;
        const KNIFE_SPEED = 14;
        const KNIFE_ANGULAR_WIDTH = 0.22;

        function playSound(freq, type, duration) {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type || 'square';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.15, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (duration || 0.1));
                o.start(); o.stop(c.currentTime + (duration || 0.1));
            } catch(e) {}
        }

        let score, highScore, level, gameOver, gameStarted;
        let logAngle, rotationSpeed, rotationDir, dirChangeTimer, dirChangeInterval;
        let embeddedKnives, apples, flyingKnife, knivesRemaining;
        let particles, floatingTexts, levelUpTimer;

        highScore = parseInt(localStorage.getItem('knifeHitHighScore')) || 0;
        highScoreElement.textContent = highScore;

        function init() {
            score = 0;
            level = 1;
            gameOver = false;
            gameStarted = false;
            logAngle = 0;
            rotationSpeed = 0.02;
            rotationDir = 1;
            dirChangeTimer = 0;
            dirChangeInterval = 0; // No direction changes level 1
            embeddedKnives = [];
            apples = [];
            flyingKnife = null;
            knivesRemaining = 5;
            particles = [];
            floatingTexts = [];
            levelUpTimer = 0;
            scoreElement.textContent = '0';
            setupLevel();
            draw();
        }

        function setupLevel() {
            embeddedKnives = [];
            apples = [];
            knivesRemaining = 5 + Math.floor((level - 1) * 1.5);

            // Rotation based on level
            if (level === 1) {
                rotationSpeed = 0.02;
                dirChangeInterval = 0;
            } else if (level === 2) {
                rotationSpeed = 0.025;
                dirChangeInterval = 3000;
            } else {
                rotationSpeed = Math.min(0.05, 0.025 + (level - 2) * 0.005);
                dirChangeInterval = Math.max(1500, 3000 - (level - 2) * 300);
            }
            dirChangeTimer = performance.now();
            rotationDir = 1;

            // Pre-placed knives starting level 3
            if (level >= 3) {
                const preCount = Math.min(3, level - 2);
                for (let i = 0; i < preCount; i++) {
                    const angle = (Math.PI * 2 * i) / preCount + Math.random() * 0.5;
                    embeddedKnives.push({ angle });
                }
            }

            // Apples (1-2)
            const appleCount = Math.random() < 0.5 ? 1 : 2;
            for (let i = 0; i < appleCount; i++) {
                let angle;
                let safe = false;
                let attempts = 0;
                while (!safe && attempts < 50) {
                    angle = Math.random() * Math.PI * 2;
                    safe = true;
                    for (const k of embeddedKnives) {
                        if (Math.abs(normalizeAngle(angle - k.angle)) < 0.4) {
                            safe = false;
                            break;
                        }
                    }
                    for (const a of apples) {
                        if (Math.abs(normalizeAngle(angle - a.angle)) < 0.4) {
                            safe = false;
                            break;
                        }
                    }
                    attempts++;
                }
                if (safe) apples.push({ angle, collected: false });
            }
        }

        function normalizeAngle(a) {
            while (a > Math.PI) a -= Math.PI * 2;
            while (a < -Math.PI) a += Math.PI * 2;
            return a;
        }

        function throwKnife() {
            if (gameOver) { init(); return; }
            if (!gameStarted) { gameStarted = true; return; }
            if (flyingKnife || levelUpTimer > 0) return;
            if (knivesRemaining <= 0) return;

            flyingKnife = { x: W / 2, y: 540, vy: -KNIFE_SPEED };
            playSound(600, 'sine', 0.05);
        }

        function embedKnife() {
            const angle = Math.atan2(flyingKnife.y - LOG_Y, flyingKnife.x - LOG_X);
            const embeddedAngle = normalizeAngle(angle - logAngle);

            // Check collision with existing knives
            for (const k of embeddedKnives) {
                if (Math.abs(normalizeAngle(embeddedAngle - k.angle)) < KNIFE_ANGULAR_WIDTH) {
                    // Hit another knife - game over
                    gameOver = true;
                    playSound(150, 'sawtooth', 0.3);
                    flyingKnife = null;
                    return;
                }
            }

            // Check apple hits
            for (const apple of apples) {
                if (!apple.collected && Math.abs(normalizeAngle(embeddedAngle - apple.angle)) < 0.25) {
                    apple.collected = true;
                    score += 50;
                    playSound(1000, 'sine', 0.1);
                    floatingTexts.push({ x: W / 2, y: LOG_Y - 60, text: '+50', color: '#44ff44', life: 40 });
                    // Apple burst particles
                    for (let i = 0; i < 10; i++) {
                        const a = Math.random() * Math.PI * 2;
                        particles.push({
                            x: LOG_X + Math.cos(angle) * (LOG_RADIUS + 10),
                            y: LOG_Y + Math.sin(angle) * (LOG_RADIUS + 10),
                            vx: Math.cos(a) * (2 + Math.random() * 2),
                            vy: Math.sin(a) * (2 + Math.random() * 2),
                            color: Math.random() < 0.5 ? '#ff4444' : '#44cc44',
                            life: 25
                        });
                    }
                }
            }

            embeddedKnives.push({ angle: embeddedAngle });
            knivesRemaining--;
            score += 10;
            scoreElement.textContent = score;
            playSound(400, 'triangle', 0.08);

            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('knifeHitHighScore', highScore);
            }

            flyingKnife = null;

            // Level complete?
            if (knivesRemaining <= 0) {
                levelUpTimer = performance.now();
                level++;
                playSound(500, 'sine', 0.1);
                setTimeout(() => playSound(700, 'sine', 0.1), 100);
                setTimeout(() => playSound(900, 'sine', 0.1), 200);
                floatingTexts.push({ x: W / 2, y: H / 2, text: 'Level ' + level + '!', color: '#ffd700', life: 60 });
                setTimeout(() => {
                    levelUpTimer = 0;
                    setupLevel();
                }, 1500);
            }
        }

        // Input
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); throwKnife(); });
        canvas.addEventListener('click', () => throwKnife());
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); throwKnife(); }
        });
        restartBtn.addEventListener('click', (e) => { e.stopPropagation(); init(); });

        function update(now) {
            if (!gameStarted || gameOver) return;

            // Rotate log
            if (dirChangeInterval > 0 && now - dirChangeTimer >= dirChangeInterval) {
                rotationDir *= -1;
                dirChangeTimer = now;
                // Random speed burst for higher levels
                if (level >= 4 && Math.random() < 0.3) {
                    rotationSpeed = Math.min(0.06, rotationSpeed * 1.3);
                    setTimeout(() => {
                        rotationSpeed = Math.min(0.05, 0.025 + (level - 2) * 0.005);
                    }, 500);
                }
            }
            logAngle += rotationSpeed * rotationDir;

            // Update flying knife
            if (flyingKnife) {
                flyingKnife.y += flyingKnife.vy;
                const dx = flyingKnife.x - LOG_X;
                const dy = flyingKnife.y - LOG_Y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= LOG_RADIUS + KNIFE_LENGTH * 0.3) {
                    embedKnife();
                }
                // Off screen
                if (flyingKnife && flyingKnife.y < -50) {
                    flyingKnife = null;
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.1;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Update floating texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 1;
                floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Level number background
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.font = 'bold 120px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(level, W / 2, H / 2);

            // Draw log
            ctx.save();
            ctx.translate(LOG_X, LOG_Y);
            ctx.rotate(logAngle);

            // Log body
            const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, LOG_RADIUS);
            grad.addColorStop(0, '#8B6914');
            grad.addColorStop(0.5, '#6B4F12');
            grad.addColorStop(1, '#4a3510');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, LOG_RADIUS, 0, Math.PI * 2);
            ctx.fill();

            // Wood grain rings
            ctx.strokeStyle = 'rgba(139,105,20,0.3)';
            ctx.lineWidth = 1;
            for (let r = 20; r < LOG_RADIUS; r += 15) {
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Center dot
            ctx.fillStyle = '#4a3510';
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();

            // Draw apples on log
            for (const apple of apples) {
                if (apple.collected) continue;
                const ax = Math.cos(apple.angle) * (LOG_RADIUS + 12);
                const ay = Math.sin(apple.angle) * (LOG_RADIUS + 12);
                // Apple body
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.arc(ax, ay, 10, 0, Math.PI * 2);
                ctx.fill();
                // Stem
                ctx.strokeStyle = '#4a2';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ax, ay - 10);
                ctx.lineTo(ax + 3, ay - 15);
                ctx.stroke();
                // Leaf
                ctx.fillStyle = '#4a2';
                ctx.beginPath();
                ctx.ellipse(ax + 5, ay - 13, 4, 2, 0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw embedded knives
            for (const k of embeddedKnives) {
                ctx.save();
                ctx.rotate(k.angle);
                ctx.translate(LOG_RADIUS, 0);
                // Blade
                ctx.fillStyle = '#ccc';
                ctx.fillRect(0, -KNIFE_WIDTH / 2, KNIFE_LENGTH * 0.6, KNIFE_WIDTH);
                // Handle
                ctx.fillStyle = '#555';
                ctx.fillRect(KNIFE_LENGTH * 0.6, -KNIFE_WIDTH / 2 - 1, KNIFE_LENGTH * 0.4, KNIFE_WIDTH + 2);
                ctx.restore();
            }

            ctx.restore();

            // Draw flying knife
            if (flyingKnife) {
                // Motion blur
                for (let i = 2; i >= 0; i--) {
                    ctx.globalAlpha = (3 - i) / 5;
                    const by = flyingKnife.y + i * 12;
                    ctx.fillStyle = '#ccc';
                    ctx.fillRect(flyingKnife.x - KNIFE_WIDTH / 2, by - KNIFE_LENGTH * 0.6, KNIFE_WIDTH, KNIFE_LENGTH * 0.6);
                    ctx.fillStyle = '#555';
                    ctx.fillRect(flyingKnife.x - KNIFE_WIDTH / 2 - 1, by, KNIFE_WIDTH + 2, KNIFE_LENGTH * 0.4);
                }
                ctx.globalAlpha = 1;
            }

            // Draw waiting knife at bottom
            if (!flyingKnife && knivesRemaining > 0 && !gameOver && levelUpTimer === 0) {
                ctx.fillStyle = '#ccc';
                ctx.fillRect(W / 2 - KNIFE_WIDTH / 2, 520 - KNIFE_LENGTH * 0.6, KNIFE_WIDTH, KNIFE_LENGTH * 0.6);
                ctx.fillStyle = '#555';
                ctx.fillRect(W / 2 - KNIFE_WIDTH / 2 - 1, 520, KNIFE_WIDTH + 2, KNIFE_LENGTH * 0.4);
            }

            // Remaining knives indicator
            ctx.fillStyle = '#aaa';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            const knifeY = 580;
            const totalWidth = Math.min(knivesRemaining, 20) * 12;
            const startX = W / 2 - totalWidth / 2;
            for (let i = 0; i < Math.min(knivesRemaining, 20); i++) {
                ctx.fillStyle = '#888';
                ctx.fillRect(startX + i * 12, knifeY, 4, 15);
            }
            if (knivesRemaining > 20) {
                ctx.fillStyle = '#888';
                ctx.font = '12px Arial';
                ctx.fillText('+' + (knivesRemaining - 20), W / 2 + totalWidth / 2 + 15, knifeY + 10);
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 25;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            }
            ctx.globalAlpha = 1;

            // Floating texts
            for (const ft of floatingTexts) {
                ctx.globalAlpha = ft.life / 60;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1;

            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 42px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over', W / 2, H / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
                ctx.font = '18px Arial';
                ctx.fillText('Level: ' + level, W / 2, H / 2 + 45);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Tap to restart', W / 2, H / 2 + 80);
            }

            // Start prompt
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Tap to Start', W / 2, H / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Throw knives into the log!', W / 2, H / 2 + 35);
            }
        }

        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Auto-Scale
        (function() {
            const c = document.getElementById('gameCanvas');
            const baseWidth = c.width, baseHeight = c.height;
            function scale() {
                const parent = c.parentElement;
                const ps = getComputedStyle(parent);
                const maxWidth = parent.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const maxHeight = window.innerHeight * 0.75;
                const scaleFactor = Math.min(maxWidth / baseWidth, maxHeight / baseHeight, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + scaleFactor + ')';
                c.style.marginBottom = (-(baseHeight * (1 - scaleFactor))) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();

        init();
        requestAnimationFrame(gameLoop);
    </script>
    <script src="../nav.js"></script>
</body>
</html>
