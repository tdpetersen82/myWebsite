<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .course-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; flex-wrap:wrap; }
        .course-row input { padding:8px 10px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.9em; }
        .course-row input:focus, .course-row select:focus { border-color:#667eea; outline:none; }
        .course-row select { padding:8px 10px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.9em; }
        .course-row .name-input { flex:2; min-width:120px; }
        .course-row .credit-input { width:70px; }
        .course-row button { background:#e74c3c; color:#fff; border:none; border-radius:8px; padding:8px 12px; cursor:pointer; }
        .gpa-result { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-radius:12px; padding:24px; margin-top:16px; text-align:center; }
        .gpa-result .big { font-size:2.5em; font-weight:800; }
        .gpa-result .detail { font-size:0.95em; margin-top:6px; opacity:0.9; }
        .grade-ref { background:#f8f8fc; border-radius:10px; padding:12px 16px; margin-top:16px; text-align:left; font-size:0.85em; }
        .grade-ref table { width:100%; border-collapse:collapse; }
        .grade-ref td { padding:3px 8px; }
        .grade-ref tr:nth-child(even) { background:#eef; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>🎓 GPA Calculator</h1>
        <p class="subtitle">Calculate your weighted GPA on a 4.0 scale.</p>

        <div class="tool-area">
            <div id="coursesContainer"></div>
            <button class="copy-btn" id="addCourse" style="margin:8px 0;">+ Add Course</button>
            <button class="copy-btn" id="calcBtn" style="width:100%;padding:12px;font-size:1em;margin-top:8px;">Calculate GPA</button>

            <div id="result"></div>

            <details class="grade-ref">
                <summary style="cursor:pointer;font-weight:700;color:#444;">Grade Scale Reference</summary>
                <table style="margin-top:8px;">
                    <tr><td><strong>A+</strong></td><td>4.0</td><td><strong>B+</strong></td><td>3.3</td><td><strong>C+</strong></td><td>2.3</td><td><strong>D+</strong></td><td>1.3</td></tr>
                    <tr><td><strong>A</strong></td><td>4.0</td><td><strong>B</strong></td><td>3.0</td><td><strong>C</strong></td><td>2.0</td><td><strong>D</strong></td><td>1.0</td></tr>
                    <tr><td><strong>A-</strong></td><td>3.7</td><td><strong>B-</strong></td><td>2.7</td><td><strong>C-</strong></td><td>1.7</td><td><strong>F</strong></td><td>0.0</td></tr>
                </table>
            </details>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        const gradePoints = {'A+':4.0,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'D-':0.7,'F':0.0};
        const grades = Object.keys(gradePoints);
        const container = document.getElementById('coursesContainer');

        function addCourse(name) {
            const row = document.createElement('div');
            row.className = 'course-row';
            let opts = '';
            grades.forEach(g => { opts += '<option value="' + g + '">' + g + '</option>'; });
            row.innerHTML = '<input type="text" class="name-input" placeholder="Course name" value="' + (name || '') + '">' +
                '<select class="grade-select">' + opts + '</select>' +
                '<input type="number" class="credit-input" placeholder="Credits" value="3" min="0.5" step="0.5">' +
                '<button title="Remove">&times;</button>';
            row.querySelector('button').addEventListener('click', () => row.remove());
            container.appendChild(row);
        }

        document.getElementById('addCourse').addEventListener('click', () => addCourse(''));
        addCourse('Course 1');
        addCourse('Course 2');
        addCourse('Course 3');

        document.getElementById('calcBtn').addEventListener('click', function() {
            const rows = container.querySelectorAll('.course-row');
            let totalPoints = 0, totalCredits = 0;
            rows.forEach(row => {
                const grade = row.querySelector('.grade-select').value;
                const credits = parseFloat(row.querySelector('.credit-input').value) || 0;
                totalPoints += gradePoints[grade] * credits;
                totalCredits += credits;
            });

            const gpa = totalCredits > 0 ? totalPoints / totalCredits : 0;
            document.getElementById('result').innerHTML =
                '<div class="gpa-result"><div class="big">' + gpa.toFixed(2) + '</div>' +
                '<div class="detail">Cumulative GPA &middot; ' + totalCredits + ' total credits</div></div>';
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
