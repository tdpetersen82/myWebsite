<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Counter — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <div class="container">
        <h1>🔤 Text Counter</h1>
        <p class="subtitle">Count characters, words, sentences, paragraphs, and estimate reading time instantly.</p>

        <div class="tool-area">
            <label for="textInput">Paste or type your text below:</label>
            <textarea id="textInput" placeholder="Start typing or paste your text here..."></textarea>
        </div>

        <div class="tool-grid" id="statsGrid">
            <div class="info-item">
                <div class="info-label">Characters</div>
                <div class="info-value" id="charCount">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Characters (no spaces)</div>
                <div class="info-value" id="charNoSpace">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Words</div>
                <div class="info-value" id="wordCount">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Sentences</div>
                <div class="info-value" id="sentenceCount">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Paragraphs</div>
                <div class="info-value" id="paraCount">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Reading Time</div>
                <div class="info-value" id="readTime">0 sec</div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');

        function updateStats() {
            const text = textInput.value;

            document.getElementById('charCount').textContent = text.length;
            document.getElementById('charNoSpace').textContent = text.replace(/\s/g, '').length;

            const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
            document.getElementById('wordCount').textContent = words.length;

            const sentences = text.match(/[.!?]+/g);
            document.getElementById('sentenceCount').textContent = sentences ? sentences.length : 0;

            const paragraphs = text.trim() === '' ? [] : text.trim().split(/\n\s*\n/);
            document.getElementById('paraCount').textContent = text.trim() === '' ? 0 : paragraphs.length;

            const wpm = 200;
            const minutes = words.length / wpm;
            if (minutes < 1) {
                document.getElementById('readTime').textContent = Math.ceil(minutes * 60) + ' sec';
            } else {
                document.getElementById('readTime').textContent = Math.ceil(minutes) + ' min';
            }
        }

        textInput.addEventListener('input', updateStats);
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
