<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema Markup Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .form-group { text-align:left; margin-bottom:10px; }
        .form-group label { font-weight:600; font-size:0.88em; color:#444; display:block; margin-bottom:3px; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:9px 11px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.92em; }
        .form-group input:focus, .form-group textarea:focus { border-color:#667eea; outline:none; }
        .form-group textarea { min-height:60px; resize:vertical; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .output-box { background:#1a1a2e; color:#ccc; border-radius:10px; padding:16px; font-family:'Courier New',monospace; font-size:0.82em; white-space:pre-wrap; word-break:break-all; max-height:400px; overflow:auto; margin-top:10px; text-align:left; }
        .faq-item { border:1px solid #e0e0e0; border-radius:8px; padding:10px; margin-bottom:8px; text-align:left; }
        .faq-item input, .faq-item textarea { width:100%; padding:6px 8px; border:1px solid #ddd; border-radius:6px; margin-top:4px; font-size:0.9em; }
        .faq-item label { font-size:0.85em; font-weight:600; color:#555; }
        .faq-remove { background:#e74c3c; color:#fff; border:none; border-radius:6px; padding:4px 10px; cursor:pointer; float:right; font-size:0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Schema Markup Generator</h1>
        <p class="subtitle">Generate JSON-LD structured data for better search engine results.</p>

        <div class="tool-area">
            <div class="tool-tabs">
                <button class="tool-tab active" data-tab="article">Article</button>
                <button class="tool-tab" data-tab="product">Product</button>
                <button class="tool-tab" data-tab="faq">FAQ</button>
                <button class="tool-tab" data-tab="business">LocalBusiness</button>
            </div>

            <div class="tab-panel active" id="panel-article">
                <div class="form-group"><label>Headline</label><input type="text" id="art-headline" placeholder="Article headline"></div>
                <div class="form-group"><label>Author</label><input type="text" id="art-author" placeholder="Author name"></div>
                <div class="form-group"><label>Date Published</label><input type="date" id="art-date"></div>
                <div class="form-group"><label>Image URL</label><input type="url" id="art-image" placeholder="https://..."></div>
                <div class="form-group"><label>Publisher Name</label><input type="text" id="art-publisher" placeholder="Publisher"></div>
                <div class="form-group"><label>Description</label><textarea id="art-desc" placeholder="Brief description"></textarea></div>
            </div>

            <div class="tab-panel" id="panel-product">
                <div class="form-group"><label>Product Name</label><input type="text" id="prod-name" placeholder="Product name"></div>
                <div class="form-group"><label>Description</label><textarea id="prod-desc" placeholder="Product description"></textarea></div>
                <div class="form-group"><label>Image URL</label><input type="url" id="prod-image" placeholder="https://..."></div>
                <div class="form-group"><label>Brand</label><input type="text" id="prod-brand" placeholder="Brand name"></div>
                <div class="form-group"><label>Price</label><input type="number" id="prod-price" placeholder="29.99" step="0.01"></div>
                <div class="form-group"><label>Currency</label><input type="text" id="prod-currency" value="USD" placeholder="USD"></div>
                <div class="form-group"><label>Availability</label>
                    <select id="prod-avail"><option value="https://schema.org/InStock">In Stock</option><option value="https://schema.org/OutOfStock">Out of Stock</option><option value="https://schema.org/PreOrder">Pre-Order</option></select>
                </div>
            </div>

            <div class="tab-panel" id="panel-faq">
                <div id="faqContainer"></div>
                <button class="copy-btn" id="addFaq" style="margin:8px 0;">+ Add Question</button>
            </div>

            <div class="tab-panel" id="panel-business">
                <div class="form-group"><label>Business Name</label><input type="text" id="biz-name" placeholder="Business name"></div>
                <div class="form-group"><label>Street Address</label><input type="text" id="biz-street" placeholder="123 Main St"></div>
                <div class="form-group"><label>City</label><input type="text" id="biz-city" placeholder="City"></div>
                <div class="form-group"><label>State</label><input type="text" id="biz-state" placeholder="State"></div>
                <div class="form-group"><label>Postal Code</label><input type="text" id="biz-zip" placeholder="12345"></div>
                <div class="form-group"><label>Country</label><input type="text" id="biz-country" value="US" placeholder="US"></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="biz-phone" placeholder="+1-555-000-0000"></div>
                <div class="form-group"><label>Website URL</label><input type="url" id="biz-url" placeholder="https://..."></div>
            </div>

            <button class="copy-btn" id="generateBtn" style="width:100%;padding:12px;font-size:1em;margin-top:12px;">Generate JSON-LD</button>

            <div class="tool-output">
                <div class="output-box" id="output"></div>
                <button class="copy-btn" id="copyBtn" style="margin-top:10px;">Copy</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        let activeTab = 'article';

        document.querySelectorAll('.tool-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                activeTab = tab.dataset.tab;
                document.getElementById('panel-' + activeTab).classList.add('active');
            });
        });

        // FAQ
        function addFaq(q, a) {
            const div = document.createElement('div');
            div.className = 'faq-item';
            div.innerHTML = '<button class="faq-remove">&times;</button><label>Question</label><input type="text" class="faq-q" value="' + (q||'') + '" placeholder="What is...?">' +
                '<label>Answer</label><textarea class="faq-a" placeholder="The answer is...">' + (a||'') + '</textarea>';
            div.querySelector('.faq-remove').addEventListener('click', () => div.remove());
            document.getElementById('faqContainer').appendChild(div);
        }
        document.getElementById('addFaq').addEventListener('click', () => addFaq('', ''));
        addFaq('', '');

        function val(id) { return document.getElementById(id).value.trim(); }

        document.getElementById('generateBtn').addEventListener('click', function() {
            let data;
            if (activeTab === 'article') {
                data = {
                    "@context": "https://schema.org",
                    "@type": "Article",
                    "headline": val('art-headline'),
                    "author": {"@type": "Person", "name": val('art-author')},
                    "datePublished": val('art-date'),
                    "image": val('art-image'),
                    "publisher": {"@type": "Organization", "name": val('art-publisher')},
                    "description": val('art-desc')
                };
            } else if (activeTab === 'product') {
                data = {
                    "@context": "https://schema.org",
                    "@type": "Product",
                    "name": val('prod-name'),
                    "description": val('prod-desc'),
                    "image": val('prod-image'),
                    "brand": {"@type": "Brand", "name": val('prod-brand')},
                    "offers": {
                        "@type": "Offer",
                        "price": val('prod-price'),
                        "priceCurrency": val('prod-currency'),
                        "availability": document.getElementById('prod-avail').value
                    }
                };
            } else if (activeTab === 'faq') {
                const items = [];
                document.querySelectorAll('.faq-item').forEach(item => {
                    const q = item.querySelector('.faq-q').value.trim();
                    const a = item.querySelector('.faq-a').value.trim();
                    if (q || a) items.push({"@type": "Question", "name": q, "acceptedAnswer": {"@type": "Answer", "text": a}});
                });
                data = {"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": items};
            } else {
                data = {
                    "@context": "https://schema.org",
                    "@type": "LocalBusiness",
                    "name": val('biz-name'),
                    "address": {
                        "@type": "PostalAddress",
                        "streetAddress": val('biz-street'),
                        "addressLocality": val('biz-city'),
                        "addressRegion": val('biz-state'),
                        "postalCode": val('biz-zip'),
                        "addressCountry": val('biz-country')
                    },
                    "telephone": val('biz-phone'),
                    "url": val('biz-url')
                };
            }

            const json = JSON.stringify(data, null, 2);
            const script = '<script type="application/ld+json">\n' + json + '\n<\/script>';
            document.getElementById('output').textContent = script;
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const txt = document.getElementById('output').textContent;
            if (!txt) return;
            navigator.clipboard.writeText(txt).then(() => {
                this.textContent = 'Copied!';
                setTimeout(() => this.textContent = 'Copy', 1200);
            });
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
