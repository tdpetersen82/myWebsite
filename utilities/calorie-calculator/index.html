<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .form-group { text-align:left; margin-bottom:10px; }
        .form-group label { font-weight:600; font-size:0.88em; color:#444; display:block; margin-bottom:3px; }
        .form-group input, .form-group select { width:100%; padding:9px 11px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.92em; }
        .form-group input:focus, .form-group select:focus { border-color:#667eea; outline:none; }
        .toggle-row { display:flex; gap:6px; margin-bottom:4px; }
        .toggle-btn { padding:6px 14px; border:2px solid #e0e0e0; border-radius:8px; background:#fff; cursor:pointer; font-size:0.85em; font-weight:600; }
        .toggle-btn.active { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-color:transparent; }
        .inline-group { display:flex; gap:10px; flex-wrap:wrap; }
        .inline-group .form-group { flex:1; min-width:120px; }
        .height-imperial { display:none; gap:10px; }
        .height-imperial .form-group { flex:1; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>🔥 Calorie Calculator</h1>
        <p class="subtitle">Calculate your BMR and daily calorie needs using the Mifflin-St Jeor equation.</p>

        <div class="tool-area">
            <div class="form-group">
                <label>Gender</label>
                <div class="toggle-row" id="genderToggle">
                    <button class="toggle-btn active" data-val="M">Male</button>
                    <button class="toggle-btn" data-val="F">Female</button>
                </div>
            </div>

            <div class="form-group">
                <label for="age">Age (years)</label>
                <input type="number" id="age" value="30" min="1" max="120">
            </div>

            <div class="form-group">
                <label>Weight
                    <span class="toggle-row" id="weightToggle" style="display:inline-flex;margin-left:8px;">
                        <button class="toggle-btn active" data-val="kg" style="padding:3px 10px;font-size:0.8em;">kg</button>
                        <button class="toggle-btn" data-val="lb" style="padding:3px 10px;font-size:0.8em;">lb</button>
                    </span>
                </label>
                <input type="number" id="weight" value="70" min="1" step="0.1">
            </div>

            <div class="form-group">
                <label>Height
                    <span class="toggle-row" id="heightToggle" style="display:inline-flex;margin-left:8px;">
                        <button class="toggle-btn active" data-val="cm" style="padding:3px 10px;font-size:0.8em;">cm</button>
                        <button class="toggle-btn" data-val="ft" style="padding:3px 10px;font-size:0.8em;">ft/in</button>
                    </span>
                </label>
                <input type="number" id="heightCm" value="175" min="1" step="0.1">
                <div class="height-imperial" id="heightImperial">
                    <div class="form-group"><label>Feet</label><input type="number" id="heightFt" value="5" min="0"></div>
                    <div class="form-group"><label>Inches</label><input type="number" id="heightIn" value="9" min="0" max="11" step="0.1"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="activity">Activity Level</label>
                <select id="activity">
                    <option value="1.2">Sedentary (little or no exercise)</option>
                    <option value="1.375">Lightly active (1-3 days/week)</option>
                    <option value="1.55" selected>Moderately active (3-5 days/week)</option>
                    <option value="1.725">Active (6-7 days/week)</option>
                    <option value="1.9">Very active (hard exercise daily)</option>
                </select>
            </div>

            <button class="copy-btn" id="calcBtn" style="width:100%;padding:12px;font-size:1em;margin-top:8px;">Calculate</button>

            <div class="tool-grid" id="results" style="margin-top:16px;">
                <div class="info-item"><div class="info-label">BMR</div><div class="info-value" id="rBmr">—</div></div>
                <div class="info-item"><div class="info-label">TDEE (Maintenance)</div><div class="info-value" id="rTdee">—</div></div>
                <div class="info-item"><div class="info-label">Weight Loss (-500)</div><div class="info-value" id="rLoss">—</div></div>
                <div class="info-item"><div class="info-label">Weight Gain (+500)</div><div class="info-value" id="rGain">—</div></div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        let gender = 'M', weightUnit = 'kg', heightUnit = 'cm';

        function setupToggle(containerId, callback) {
            const btns = document.querySelectorAll('#' + containerId + ' .toggle-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    btns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    callback(this.dataset.val);
                });
            });
        }

        setupToggle('genderToggle', v => { gender = v; });
        setupToggle('weightToggle', v => { weightUnit = v; });
        setupToggle('heightToggle', v => {
            heightUnit = v;
            document.getElementById('heightCm').style.display = v === 'cm' ? 'block' : 'none';
            document.getElementById('heightImperial').style.display = v === 'ft' ? 'flex' : 'none';
        });

        document.getElementById('calcBtn').addEventListener('click', function() {
            const age = parseInt(document.getElementById('age').value) || 0;
            let weight = parseFloat(document.getElementById('weight').value) || 0;
            let heightCm;

            if (weightUnit === 'lb') weight = weight * 0.453592;

            if (heightUnit === 'cm') {
                heightCm = parseFloat(document.getElementById('heightCm').value) || 0;
            } else {
                const ft = parseFloat(document.getElementById('heightFt').value) || 0;
                const inc = parseFloat(document.getElementById('heightIn').value) || 0;
                heightCm = (ft * 12 + inc) * 2.54;
            }

            const activity = parseFloat(document.getElementById('activity').value);

            // Mifflin-St Jeor
            let bmr;
            if (gender === 'M') {
                bmr = 10 * weight + 6.25 * heightCm - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * heightCm - 5 * age - 161;
            }

            const tdee = bmr * activity;

            document.getElementById('rBmr').textContent = Math.round(bmr) + ' cal';
            document.getElementById('rTdee').textContent = Math.round(tdee) + ' cal';
            document.getElementById('rLoss').textContent = Math.round(tdee - 500) + ' cal';
            document.getElementById('rGain').textContent = Math.round(tdee + 500) + ' cal';
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
