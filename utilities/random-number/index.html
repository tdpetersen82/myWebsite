<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .gen-row { display: flex; gap: 8px; margin: 8px 0; justify-content: center; align-items: center; flex-wrap: wrap; }
        .gen-row label { font-size: 0.9em; display: flex; align-items: center; gap: 4px; }
        .gen-row input[type=number] { width: 90px; padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        .options-row { display: flex; flex-wrap: wrap; gap: 16px; margin: 8px 0; justify-content: center; align-items: center; }
        .options-row label { display: flex; align-items: center; gap: 6px; font-size: 0.9em; cursor: pointer; }
        .results-area { min-height: 50px; padding: 16px; font-size: 1.3em; font-weight: 700; color: #667eea; word-break: break-all; }
        .quick-section { margin-top: 20px; padding-top: 16px; border-top: 2px solid #eee; }
        .quick-section h3 { margin-bottom: 10px; color: #444; }
        .quick-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .quick-btn { padding: 10px 24px; border: 2px solid #667eea; background: #fff; color: #667eea; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1em; transition: all 0.2s; }
        .quick-btn:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .quick-result { font-size: 1.5em; font-weight: 700; margin-top: 8px; min-height: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Random Number Generator</h1>
        <p class="subtitle">Generate cryptographically secure random numbers.</p>
        <div class="tool-area">
            <div class="gen-row">
                <label>Min: <input type="number" id="minVal" value="1"></label>
                <label>Max: <input type="number" id="maxVal" value="100"></label>
                <label>Count: <input type="number" id="count" value="1" min="1" max="1000"></label>
            </div>
            <div class="options-row">
                <label><input type="checkbox" id="allowDupes" checked> Allow duplicates</label>
                <label><input type="checkbox" id="sortResults"> Sort results</label>
            </div>
            <button class="copy-btn" onclick="generate()">Generate</button>
            <div class="tool-output results-area" id="results"></div>

            <div class="quick-section">
                <h3>Quick Tools</h3>
                <div class="quick-btns">
                    <button class="quick-btn" onclick="coinFlip()">🪙 Coin Flip</button>
                    <button class="quick-btn" onclick="diceRoll()">🎯 Dice Roll</button>
                </div>
                <div class="quick-result" id="quickResult"></div>
            </div>
        </div>
    </div>
    <script src="../../nav.js"></script>
    <script>
        function secureRandom() {
            const arr = new Uint32Array(1);
            crypto.getRandomValues(arr);
            return arr[0] / (0xFFFFFFFF + 1);
        }

        function secureRandomInt(min, max) {
            return Math.floor(secureRandom() * (max - min + 1)) + min;
        }

        function generate() {
            const min = parseInt(document.getElementById('minVal').value);
            const max = parseInt(document.getElementById('maxVal').value);
            const count = Math.min(parseInt(document.getElementById('count').value) || 1, 1000);
            const allowDupes = document.getElementById('allowDupes').checked;
            const sortResults = document.getElementById('sortResults').checked;

            if (isNaN(min) || isNaN(max) || min > max) {
                document.getElementById('results').textContent = 'Invalid range.';
                return;
            }

            const range = max - min + 1;
            if (!allowDupes && count > range) {
                document.getElementById('results').textContent = `Cannot generate ${count} unique numbers from a range of ${range}.`;
                return;
            }

            const numbers = [];
            if (allowDupes) {
                for (let i = 0; i < count; i++) numbers.push(secureRandomInt(min, max));
            } else {
                const used = new Set();
                while (numbers.length < count) {
                    const n = secureRandomInt(min, max);
                    if (!used.has(n)) { used.add(n); numbers.push(n); }
                }
            }

            if (sortResults) numbers.sort((a, b) => a - b);
            document.getElementById('results').textContent = numbers.join(', ');
        }

        function coinFlip() {
            const result = secureRandomInt(0, 1) === 0 ? 'Heads' : 'Tails';
            document.getElementById('quickResult').textContent = `🪙 ${result}`;
        }

        function diceRoll() {
            const result = secureRandomInt(1, 6);
            document.getElementById('quickResult').textContent = `🎯 ${result}`;
        }
    </script>
</body>
</html>
