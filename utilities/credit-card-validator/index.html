<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Validator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .card-input {
            font-size: 1.4em; font-family: 'Courier New', monospace; letter-spacing: 2px;
            padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
            width: 100%; box-sizing: border-box; text-align: center;
        }
        .card-input:focus { border-color: #667eea; outline: none; }
        .card-type { font-size: 2em; margin: 8px 0; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.95em; margin: 8px 0; }
        .status-valid { background: #d4edda; color: #155724; }
        .status-invalid { background: #f8d7da; color: #721c24; }
        .masked-display { font-family: 'Courier New', monospace; font-size: 1.1em; color: #666; letter-spacing: 2px; margin: 6px 0; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>💳 Credit Card Validator</h1>
        <p class="subtitle">Validate credit card numbers using the Luhn algorithm.</p>

        <div class="tool-area">
            <label for="ccInput">Card Number</label>
            <input type="text" id="ccInput" class="card-input" placeholder="4111 1111 1111 1111" maxlength="23" autocomplete="off">

            <div class="card-type" id="cardType"></div>
            <div id="result"></div>

            <p style="font-size:0.8em;color:#999;margin-top:12px;">This tool validates the number format only. No data is sent anywhere.</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('ccInput');

        const cardPatterns = [
            { name: 'Visa', icon: '💙', regex: /^4\d{12}(\d{3})?$/ },
            { name: 'Mastercard', icon: '🟠', regex: /^5[1-5]\d{14}$/ },
            { name: 'American Express', icon: '💚', regex: /^3[47]\d{13}$/ },
            { name: 'Discover', icon: '🟡', regex: /^6(?:011|5\d{2})\d{12}$/ },
            { name: 'Diners Club', icon: '🔷', regex: /^3(?:0[0-5]|[68]\d)\d{11}$/ },
            { name: 'JCB', icon: '🔴', regex: /^35(?:2[89]|[3-8]\d)\d{12}$/ },
            { name: 'UnionPay', icon: '🔵', regex: /^62\d{14,17}$/ },
        ];

        function luhn(num) {
            let sum = 0;
            let alt = false;
            for (let i = num.length - 1; i >= 0; i--) {
                let n = parseInt(num[i], 10);
                if (alt) { n *= 2; if (n > 9) n -= 9; }
                sum += n;
                alt = !alt;
            }
            return sum % 10 === 0;
        }

        function detectCard(num) {
            for (const card of cardPatterns) {
                if (card.regex.test(num)) return card;
            }
            return null;
        }

        function formatInput(val) {
            const digits = val.replace(/\D/g, '');
            const groups = [];
            // Amex: 4-6-5, others: 4-4-4-4...
            const isAmex = /^3[47]/.test(digits);
            if (isAmex) {
                if (digits.length > 0) groups.push(digits.slice(0, 4));
                if (digits.length > 4) groups.push(digits.slice(4, 10));
                if (digits.length > 10) groups.push(digits.slice(10, 15));
            } else {
                for (let i = 0; i < digits.length; i += 4) {
                    groups.push(digits.slice(i, i + 4));
                }
            }
            return groups.join(' ');
        }

        function maskNumber(num) {
            if (num.length < 8) return num;
            return num.slice(0, 4) + ' ' + '*'.repeat(num.length - 8).replace(/(.{4})/g, '$1 ').trim() + ' ' + num.slice(-4);
        }

        input.addEventListener('input', function() {
            const pos = this.selectionStart;
            const oldLen = this.value.length;
            this.value = formatInput(this.value);
            const newLen = this.value.length;
            this.setSelectionRange(pos + (newLen - oldLen), pos + (newLen - oldLen));
            validate();
        });

        function validate() {
            const digits = input.value.replace(/\D/g, '');
            const result = document.getElementById('result');
            const cardTypeEl = document.getElementById('cardType');

            if (digits.length < 2) {
                result.innerHTML = '';
                cardTypeEl.textContent = '';
                return;
            }

            const card = detectCard(digits);
            cardTypeEl.textContent = card ? `${card.icon} ${card.name}` : '';

            if (digits.length >= 13) {
                const isValid = luhn(digits);
                let html = `<div class="status-badge ${isValid ? 'status-valid' : 'status-invalid'}">${isValid ? '✅ Valid (Luhn check passed)' : '❌ Invalid (Luhn check failed)'}</div>`;

                if (card) {
                    html += `<div class="tool-grid" style="margin-top:10px;">
                        <div class="info-item"><div class="info-label">Card Network</div><div class="info-value">${card.icon} ${card.name}</div></div>
                        <div class="info-item"><div class="info-label">Card Length</div><div class="info-value">${digits.length} digits</div></div>
                        <div class="info-item"><div class="info-label">BIN (first 6)</div><div class="info-value">${digits.slice(0, 6)}</div></div>
                    </div>`;
                    html += `<div class="masked-display">Masked: ${maskNumber(digits)}</div>`;
                }
                result.innerHTML = html;
            } else {
                result.innerHTML = `<p style="color:#999;font-size:0.9em;">Enter at least 13 digits to validate.</p>`;
            }
        }
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
