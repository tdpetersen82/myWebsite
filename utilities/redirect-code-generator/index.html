<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect Code Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .form-group { text-align:left; margin-bottom:10px; }
        .form-group label { font-weight:600; font-size:0.88em; color:#444; display:block; margin-bottom:3px; }
        .form-group input, .form-group select { width:100%; padding:9px 11px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.92em; }
        .form-group input:focus { border-color:#667eea; outline:none; }
        .output-box { background:#1a1a2e; color:#ccc; border-radius:10px; padding:16px; font-family:'Courier New',monospace; font-size:0.82em; white-space:pre-wrap; word-break:break-all; min-height:60px; margin-top:8px; text-align:left; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>↪️ Redirect Code Generator</h1>
        <p class="subtitle">Generate redirect code snippets for Apache, Nginx, PHP, JavaScript, and HTML.</p>

        <div class="tool-area">
            <div class="form-group">
                <label>From URL</label>
                <input type="text" id="fromUrl" placeholder="/old-page">
            </div>
            <div class="form-group">
                <label>To URL</label>
                <input type="text" id="toUrl" placeholder="https://example.com/new-page">
            </div>
            <div class="form-group">
                <label>Redirect Type</label>
                <select id="redirectType">
                    <option value="301">301 — Permanent</option>
                    <option value="302">302 — Temporary</option>
                </select>
            </div>

            <button class="copy-btn" id="generateBtn" style="width:100%;padding:12px;font-size:1em;margin-top:8px;">Generate Code</button>

            <div class="tool-tabs" style="margin-top:16px;">
                <button class="tool-tab active" data-tab="apache">Apache</button>
                <button class="tool-tab" data-tab="nginx">Nginx</button>
                <button class="tool-tab" data-tab="php">PHP</button>
                <button class="tool-tab" data-tab="js">JavaScript</button>
                <button class="tool-tab" data-tab="html">HTML</button>
            </div>

            <div class="tab-panel active" id="panel-apache">
                <div class="output-box" id="out-apache"></div>
                <button class="copy-btn copy-out" data-target="out-apache" style="margin-top:8px;">Copy</button>
            </div>
            <div class="tab-panel" id="panel-nginx">
                <div class="output-box" id="out-nginx"></div>
                <button class="copy-btn copy-out" data-target="out-nginx" style="margin-top:8px;">Copy</button>
            </div>
            <div class="tab-panel" id="panel-php">
                <div class="output-box" id="out-php"></div>
                <button class="copy-btn copy-out" data-target="out-php" style="margin-top:8px;">Copy</button>
            </div>
            <div class="tab-panel" id="panel-js">
                <div class="output-box" id="out-js"></div>
                <button class="copy-btn copy-out" data-target="out-js" style="margin-top:8px;">Copy</button>
            </div>
            <div class="tab-panel" id="panel-html">
                <div class="output-box" id="out-html"></div>
                <button class="copy-btn copy-out" data-target="out-html" style="margin-top:8px;">Copy</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        document.querySelectorAll('.tool-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            });
        });

        document.getElementById('generateBtn').addEventListener('click', function() {
            const from = document.getElementById('fromUrl').value.trim() || '/old-page';
            const to = document.getElementById('toUrl').value.trim() || 'https://example.com/new-page';
            const code = document.getElementById('redirectType').value;
            const perm = code === '301';

            // Apache
            document.getElementById('out-apache').textContent =
                'RewriteEngine On\nRewriteRule ^' + from.replace(/^\//, '') + '$ ' + to + ' [R=' + code + ',L]';

            // Nginx
            const nginxKeyword = perm ? 'permanent' : 'redirect';
            document.getElementById('out-nginx').textContent =
                'server {\n    location = ' + from + ' {\n        return ' + code + ' ' + to + ';\n    }\n}';

            // PHP
            document.getElementById('out-php').textContent =
                '<?php\nheader("Location: ' + to + '", true, ' + code + ');\nexit();\n?>';

            // JavaScript
            document.getElementById('out-js').textContent =
                '// ' + code + ' redirect (client-side)\nwindow.location.replace("' + to + '");';

            // HTML
            document.getElementById('out-html').textContent =
                '<!DOCTYPE html>\n<html>\n<head>\n    <meta http-equiv="refresh" content="0; url=' + to + '">\n    <title>Redirecting...</title>\n</head>\n<body>\n    <p>Redirecting to <a href="' + to + '">' + to + '</a>...</p>\n</body>\n</html>';
        });

        document.querySelectorAll('.copy-out').forEach(btn => {
            btn.addEventListener('click', function() {
                const txt = document.getElementById(this.dataset.target).textContent;
                if (!txt) return;
                navigator.clipboard.writeText(txt).then(() => {
                    this.textContent = 'Copied!';
                    setTimeout(() => this.textContent = 'Copy', 1200);
                });
            });
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
