<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Minifier — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>🎨 CSS Minifier</h1>
        <p class="subtitle">Minify CSS by removing comments, whitespace, and unnecessary characters.</p>

        <div class="tool-area">
            <div class="tool-row">
                <div>
                    <label for="cssInput">Input CSS</label>
                    <textarea id="cssInput" placeholder="Paste your CSS here..."></textarea>
                </div>
                <div>
                    <label for="cssOutput">Minified Output</label>
                    <textarea id="cssOutput" readonly placeholder="Minified CSS will appear here..."></textarea>
                </div>
            </div>

            <div style="text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button class="copy-btn" onclick="minifyCSS()">Minify CSS</button>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy Output</button>
            </div>

            <div class="tool-output" id="stats" style="display:none;">
                <div class="tool-grid">
                    <div class="info-item">
                        <span class="info-label">Original Size</span>
                        <span class="info-value" id="origSize">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Minified Size</span>
                        <span class="info-value" id="minSize">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Reduction</span>
                        <span class="info-value" id="reduction">—</span>
                    </div>
                </div>
            </div>

            <div id="errorMsg" style="color:#e74c3c;margin-top:8px;font-size:0.9em;text-align:center;"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('cssInput');
        const output = document.getElementById('cssOutput');
        const errorMsg = document.getElementById('errorMsg');

        function minifyCSS() {
            errorMsg.textContent = '';
            const src = input.value;
            if (!src.trim()) {
                errorMsg.textContent = 'Please enter some CSS to minify.';
                return;
            }

            let result = src;

            // Remove /* */ comments
            result = result.replace(/\/\*[\s\S]*?\*\//g, '');

            // Remove newlines and tabs
            result = result.replace(/[\n\r\t]/g, '');

            // Collapse multiple spaces to one
            result = result.replace(/ {2,}/g, ' ');

            // Remove spaces around { } : ; ,
            result = result.replace(/\s*{\s*/g, '{');
            result = result.replace(/\s*}\s*/g, '}');
            result = result.replace(/\s*:\s*/g, ':');
            result = result.replace(/\s*;\s*/g, ';');
            result = result.replace(/\s*,\s*/g, ',');

            // Remove trailing semicolons before }
            result = result.replace(/;}/g, '}');

            // Remove leading/trailing whitespace
            result = result.trim();

            output.value = result;

            const origBytes = new Blob([src]).size;
            const minBytes = new Blob([result]).size;
            const pct = origBytes > 0 ? ((1 - minBytes / origBytes) * 100).toFixed(1) : 0;

            document.getElementById('origSize').textContent = formatBytes(origBytes);
            document.getElementById('minSize').textContent = formatBytes(minBytes);
            document.getElementById('reduction').textContent = pct + '% smaller';
            document.getElementById('stats').style.display = '';
        }

        function formatBytes(b) {
            if (b < 1024) return b + ' B';
            return (b / 1024).toFixed(2) + ' KB';
        }

        function copyOutput() {
            navigator.clipboard.writeText(output.value).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
