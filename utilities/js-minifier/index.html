<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Minifier — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <div class="container">
        <h1>⚡ JavaScript Minifier</h1>
        <p class="subtitle">Basic JavaScript minification — removes comments and collapses whitespace.</p>

        <div class="tool-area">
            <div class="tool-row">
                <div>
                    <label for="jsInput">Input JavaScript</label>
                    <textarea id="jsInput" placeholder="Paste your JavaScript here..."></textarea>
                </div>
                <div>
                    <label for="jsOutput">Minified Output</label>
                    <textarea id="jsOutput" readonly placeholder="Minified JS will appear here..."></textarea>
                </div>
            </div>

            <div style="text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button class="copy-btn" onclick="minifyJS()">Minify JS</button>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy Output</button>
            </div>

            <div class="tool-output" id="stats" style="display:none;">
                <div class="tool-grid">
                    <div class="info-item">
                        <span class="info-label">Original Size</span>
                        <span class="info-value" id="origSize">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Minified Size</span>
                        <span class="info-value" id="minSize">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Reduction</span>
                        <span class="info-value" id="reduction">—</span>
                    </div>
                </div>
            </div>

            <div id="errorMsg" style="color:#e74c3c;margin-top:8px;font-size:0.9em;text-align:center;"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('jsInput');
        const output = document.getElementById('jsOutput');
        const errorMsg = document.getElementById('errorMsg');

        function minifyJS() {
            errorMsg.textContent = '';
            const src = input.value;
            if (!src.trim()) {
                errorMsg.textContent = 'Please enter some JavaScript to minify.';
                return;
            }

            try {
                let result = '';
                let i = 0;
                const len = src.length;

                while (i < len) {
                    // Handle strings
                    if (src[i] === '"' || src[i] === "'" || src[i] === '`') {
                        const quote = src[i];
                        result += src[i++];
                        while (i < len && src[i] !== quote) {
                            if (src[i] === '\\') {
                                result += src[i++];
                                if (i < len) result += src[i++];
                            } else {
                                result += src[i++];
                            }
                        }
                        if (i < len) result += src[i++];
                    }
                    // Handle regex literals (basic detection)
                    else if (src[i] === '/' && i + 1 < len && src[i + 1] === '/') {
                        // Single-line comment — skip to end of line
                        while (i < len && src[i] !== '\n') i++;
                    }
                    else if (src[i] === '/' && i + 1 < len && src[i + 1] === '*') {
                        // Multi-line comment — skip to */
                        i += 2;
                        while (i < len - 1 && !(src[i] === '*' && src[i + 1] === '/')) i++;
                        i += 2;
                    }
                    else {
                        result += src[i++];
                    }
                }

                // Collapse whitespace (newlines, tabs, multiple spaces)
                result = result.replace(/[\n\r]+/g, '\n');
                result = result.replace(/\t/g, ' ');
                result = result.replace(/ {2,}/g, ' ');

                // Remove spaces around operators (basic)
                result = result.replace(/ ?\{ ?/g, '{');
                result = result.replace(/ ?\} ?/g, '}');
                result = result.replace(/ ?; ?/g, ';');
                result = result.replace(/ ?, ?/g, ',');

                // Remove blank lines
                result = result.replace(/\n{2,}/g, '\n');

                // Remove leading spaces on lines
                result = result.replace(/\n\s+/g, '\n');

                result = result.trim();
                output.value = result;

                const origBytes = new Blob([src]).size;
                const minBytes = new Blob([result]).size;
                const pct = origBytes > 0 ? ((1 - minBytes / origBytes) * 100).toFixed(1) : 0;

                document.getElementById('origSize').textContent = formatBytes(origBytes);
                document.getElementById('minSize').textContent = formatBytes(minBytes);
                document.getElementById('reduction').textContent = pct + '% smaller';
                document.getElementById('stats').style.display = '';
            } catch (e) {
                errorMsg.textContent = 'Error during minification: ' + e.message;
            }
        }

        function formatBytes(b) {
            if (b < 1024) return b + ' B';
            return (b / 1024).toFixed(2) + ' KB';
        }

        function copyOutput() {
            navigator.clipboard.writeText(output.value).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
