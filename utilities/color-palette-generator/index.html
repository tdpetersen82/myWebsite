<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .picker-row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .picker-row label { font-size: 0.85em; color: #666; }
        .picker-row input[type=color] { width: 60px; height: 40px; border: none; cursor: pointer; }
        .hex-display { font-weight: 700; color: #667eea; font-size: 1.1em; }
        .palette-section { margin-bottom: 20px; }
        .palette-section h3 { font-size: 0.95em; color: #555; margin-bottom: 8px; text-align: left; }
        .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .swatch { width: 80px; text-align: center; cursor: pointer; }
        .swatch-color { width: 80px; height: 60px; border-radius: 10px; border: 2px solid #e0e0e0; transition: transform 0.15s; }
        .swatch-color:hover { transform: scale(1.05); }
        .swatch-label { font-size: 0.75em; color: #666; margin-top: 4px; font-family: monospace; }
        .copy-btn { background: #667eea; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85em; margin-top: 8px; }
        .copy-btn:hover { background: #5a6fd6; }
        .copied { color: #27ae60; font-size: 0.85em; margin-left: 8px; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>&#127912; Color Palette Generator</h1>
        <p class="subtitle">Generate harmonious color palettes from any base color.</p>

        <div class="tool-area">
            <div class="picker-row">
                <label>Base Color:</label>
                <input type="color" id="baseColor" value="#667eea">
                <span class="hex-display" id="hexDisplay">#667eea</span>
            </div>

            <div id="palettes"></div>
        </div>
    </div>

    <script>
        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1,3),16)/255;
            let g = parseInt(hex.slice(3,5),16)/255;
            let b = parseInt(hex.slice(5,7),16)/255;
            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            let h, s, l = (max+min)/2;
            if (max===min) { h=s=0; }
            else {
                const d = max-min;
                s = l>0.5 ? d/(2-max-min) : d/(max+min);
                switch(max) {
                    case r: h=((g-b)/d+(g<b?6:0))/6; break;
                    case g: h=((b-r)/d+2)/6; break;
                    case b: h=((r-g)/d+4)/6; break;
                }
            }
            return [h*360, s*100, l*100];
        }

        function hslToHex(h, s, l) {
            h = ((h%360)+360)%360;
            s = Math.max(0,Math.min(100,s))/100;
            l = Math.max(0,Math.min(100,l))/100;
            const a = s * Math.min(l, 1-l);
            const f = n => {
                const k = (n+h/30)%12;
                const color = l - a * Math.max(Math.min(k-3, 9-k, 1), -1);
                return Math.round(255*color).toString(16).padStart(2,'0');
            };
            return '#' + f(0) + f(8) + f(4);
        }

        function generatePalettes(hex) {
            const [h, s, l] = hexToHsl(hex);
            return {
                'Complementary': [
                    [h, s, l], [h+180, s, l]
                ],
                'Analogous': [
                    [h-30, s, l], [h-15, s, l], [h, s, l], [h+15, s, l], [h+30, s, l]
                ],
                'Triadic': [
                    [h, s, l], [h+120, s, l], [h+240, s, l]
                ],
                'Split-Complementary': [
                    [h, s, l], [h+150, s, l], [h+210, s, l]
                ],
                'Tetradic': [
                    [h, s, l], [h+90, s, l], [h+180, s, l], [h+270, s, l]
                ]
            };
        }

        function render() {
            const hex = document.getElementById('baseColor').value;
            document.getElementById('hexDisplay').textContent = hex;
            const palettes = generatePalettes(hex);
            const container = document.getElementById('palettes');
            container.innerHTML = '';

            for (const [name, colors] of Object.entries(palettes)) {
                const section = document.createElement('div');
                section.className = 'palette-section';

                const hexValues = colors.map(c => hslToHex(c[0], c[1], c[2]));
                const copyAllBtn = `<button class="copy-btn" onclick="copyAll(this, '${hexValues.join(', ')}')" style="float:right;">Copy All</button>`;
                section.innerHTML = `<h3>${name} ${copyAllBtn}</h3><div class="swatch-row">${
                    colors.map(c => {
                        const h = hslToHex(c[0], c[1], c[2]);
                        return `<div class="swatch" onclick="copySingle(this, '${h}')">
                            <div class="swatch-color" style="background:${h}"></div>
                            <div class="swatch-label">${h}</div>
                        </div>`;
                    }).join('')
                }</div>`;
                container.appendChild(section);
            }
        }

        function copySingle(el, hex) {
            navigator.clipboard.writeText(hex);
            const lbl = el.querySelector('.swatch-label');
            const orig = lbl.textContent;
            lbl.textContent = 'Copied!';
            setTimeout(() => lbl.textContent = orig, 1000);
        }

        function copyAll(btn, text) {
            navigator.clipboard.writeText(text);
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy All', 1000);
        }

        document.getElementById('baseColor').addEventListener('input', render);
        render();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
