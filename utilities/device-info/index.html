<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Info — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <div class="container">
        <h1>📱 Device Info</h1>
        <p class="subtitle">Instantly detect your browser, OS, screen, and hardware details.</p>

        <div class="tool-area">
            <div class="tool-grid" id="infoGrid"></div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const grid = document.getElementById('infoGrid');

        function addItem(label, value) {
            const item = document.createElement('div');
            item.className = 'info-item';
            item.innerHTML = '<div class="info-label">' + escapeHtml(label) + '</div><div class="info-value">' + escapeHtml(String(value)) + '</div>';
            grid.appendChild(item);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Browser detection
        function detectBrowser() {
            const ua = navigator.userAgent;
            let name = 'Unknown', version = '';
            if (/Edg\/(\d[\d.]+)/.test(ua))       { name = 'Microsoft Edge'; version = RegExp.$1; }
            else if (/OPR\/(\d[\d.]+)/.test(ua))   { name = 'Opera'; version = RegExp.$1; }
            else if (/Chrome\/(\d[\d.]+)/.test(ua)) { name = 'Chrome'; version = RegExp.$1; }
            else if (/Safari\/(\d[\d.]+)/.test(ua) && /Version\/(\d[\d.]+)/.test(ua)) { name = 'Safari'; version = RegExp.$1; }
            else if (/Firefox\/(\d[\d.]+)/.test(ua)) { name = 'Firefox'; version = RegExp.$1; }
            return name + ' ' + version;
        }

        // OS detection
        function detectOS() {
            const ua = navigator.userAgent;
            if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
            if (/Windows NT 6\.3/.test(ua)) return 'Windows 8.1';
            if (/Windows NT 6\.2/.test(ua)) return 'Windows 8';
            if (/Windows NT 6\.1/.test(ua)) return 'Windows 7';
            if (/Windows/.test(ua)) return 'Windows';
            if (/Mac OS X ([\d_]+)/.test(ua)) return 'macOS ' + RegExp.$1.replace(/_/g, '.');
            if (/Android ([\d.]+)/.test(ua)) return 'Android ' + RegExp.$1;
            if (/iPhone OS ([\d_]+)/.test(ua)) return 'iOS ' + RegExp.$1.replace(/_/g, '.');
            if (/iPad/.test(ua)) return 'iPadOS';
            if (/Linux/.test(ua)) return 'Linux';
            if (/CrOS/.test(ua)) return 'Chrome OS';
            return navigator.platform || 'Unknown';
        }

        // GPU info
        function getGPU() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const ext = gl.getExtension('WEBGL_debug_renderer_info');
                    if (ext) return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
                    return gl.getParameter(gl.RENDERER);
                }
            } catch (e) {}
            return 'Not available';
        }

        // Connection type
        function getConnection() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                let info = conn.effectiveType || conn.type || 'Unknown';
                if (conn.downlink) info += ' (' + conn.downlink + ' Mbps)';
                return info;
            }
            return 'Not available';
        }

        // Populate info
        addItem('Browser', detectBrowser());
        addItem('Operating System', detectOS());
        addItem('Screen Resolution', screen.width + ' × ' + screen.height);
        addItem('Viewport Size', window.innerWidth + ' × ' + window.innerHeight);
        addItem('Device Pixel Ratio', window.devicePixelRatio);
        addItem('Color Depth', screen.colorDepth + '-bit');
        addItem('Language', navigator.language || navigator.userLanguage || 'Unknown');
        addItem('Cookies Enabled', navigator.cookieEnabled ? 'Yes' : 'No');
        addItem('JavaScript Enabled', 'Yes');
        addItem('Online Status', navigator.onLine ? 'Online' : 'Offline');
        addItem('Touch Support', ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? 'Yes (' + navigator.maxTouchPoints + ' points)' : 'No');
        addItem('GPU / Renderer', getGPU());
        addItem('Platform', navigator.platform || 'Unknown');
        addItem('Timezone', Intl.DateTimeFormat().resolvedOptions().timeZone + ' (UTC' + (new Date().getTimezoneOffset() > 0 ? '-' : '+') + Math.abs(new Date().getTimezoneOffset() / 60) + ')');
        addItem('Connection Type', getConnection());

        // Update online status live
        window.addEventListener('online', function() {
            var items = grid.querySelectorAll('.info-item');
            items.forEach(function(item) {
                if (item.querySelector('.info-label').textContent === 'Online Status') {
                    item.querySelector('.info-value').textContent = 'Online';
                }
            });
        });
        window.addEventListener('offline', function() {
            var items = grid.querySelectorAll('.info-item');
            items.forEach(function(item) {
                if (item.querySelector('.info-label').textContent === 'Online Status') {
                    item.querySelector('.info-value').textContent = 'Offline';
                }
            });
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
