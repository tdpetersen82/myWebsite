<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBAN Validator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .iban-input {
            font-size: 1.2em; font-family: 'Courier New', monospace; letter-spacing: 2px;
            padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
            width: 100%; box-sizing: border-box; text-align: center; text-transform: uppercase;
        }
        .iban-input:focus { border-color: #667eea; outline: none; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.95em; margin: 8px 0; }
        .status-valid { background: #d4edda; color: #155724; }
        .status-invalid { background: #f8d7da; color: #721c24; }
        .formatted-iban { font-family: 'Courier New', monospace; font-size: 1.2em; letter-spacing: 3px; color: #764ba2; margin: 8px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 IBAN Validator</h1>
        <p class="subtitle">Validate International Bank Account Numbers with country-specific checks.</p>

        <div class="tool-area">
            <label for="ibanInput">IBAN</label>
            <input type="text" id="ibanInput" class="iban-input" placeholder="GB29 NWBK 6016 1331 9268 19" autocomplete="off">

            <div style="text-align:center;margin:12px 0;">
                <button class="copy-btn" onclick="validate()" style="padding:10px 24px;">✅ Validate</button>
            </div>

            <div id="result"></div>
        </div>
    </div>

    <script>
        const ibanLengths = {
            AL:28,AD:24,AT:20,AZ:28,BH:22,BY:28,BE:16,BA:20,BR:29,BG:22,CR:22,HR:21,CY:28,CZ:24,
            DK:18,DO:28,TL:23,EE:20,FO:18,FI:18,FR:27,GE:22,DE:22,GI:23,GR:27,GL:18,GT:28,HU:28,
            IS:26,IQ:23,IE:22,IL:23,IT:27,JO:30,KZ:20,XK:20,KW:30,LV:21,LB:28,LI:21,LT:20,LU:20,
            MK:19,MT:31,MR:27,MU:30,MC:27,MD:24,ME:22,NL:18,NO:15,PK:24,PS:29,PL:28,PT:25,QA:29,
            RO:24,SM:27,SA:24,RS:22,SK:24,SI:19,ES:24,SE:24,CH:21,TN:24,TR:26,AE:23,GB:22,VA:22,
            VG:24,UA:29
        };

        const countryNames = {
            AL:'Albania',AD:'Andorra',AT:'Austria',AZ:'Azerbaijan',BH:'Bahrain',BY:'Belarus',BE:'Belgium',
            BA:'Bosnia & Herzegovina',BR:'Brazil',BG:'Bulgaria',CR:'Costa Rica',HR:'Croatia',CY:'Cyprus',
            CZ:'Czech Republic',DK:'Denmark',DO:'Dominican Republic',TL:'East Timor',EE:'Estonia',FO:'Faroe Islands',
            FI:'Finland',FR:'France',GE:'Georgia',DE:'Germany',GI:'Gibraltar',GR:'Greece',GL:'Greenland',
            GT:'Guatemala',HU:'Hungary',IS:'Iceland',IQ:'Iraq',IE:'Ireland',IL:'Israel',IT:'Italy',JO:'Jordan',
            KZ:'Kazakhstan',XK:'Kosovo',KW:'Kuwait',LV:'Latvia',LB:'Lebanon',LI:'Liechtenstein',LT:'Lithuania',
            LU:'Luxembourg',MK:'North Macedonia',MT:'Malta',MR:'Mauritania',MU:'Mauritius',MC:'Monaco',MD:'Moldova',
            ME:'Montenegro',NL:'Netherlands',NO:'Norway',PK:'Pakistan',PS:'Palestine',PL:'Poland',PT:'Portugal',
            QA:'Qatar',RO:'Romania',SM:'San Marino',SA:'Saudi Arabia',RS:'Serbia',SK:'Slovakia',SI:'Slovenia',
            ES:'Spain',SE:'Sweden',CH:'Switzerland',TN:'Tunisia',TR:'Turkey',AE:'United Arab Emirates',
            GB:'United Kingdom',VA:'Vatican City',VG:'British Virgin Islands',UA:'Ukraine'
        };

        function mod97(str) {
            let remainder = '';
            for (let i = 0; i < str.length; i++) {
                remainder += str[i];
                remainder = String(parseInt(remainder, 10) % 97);
            }
            return parseInt(remainder, 10);
        }

        function validate() {
            const raw = document.getElementById('ibanInput').value.replace(/\s/g, '').toUpperCase();
            const result = document.getElementById('result');

            if (raw.length < 2) { result.innerHTML = ''; return; }

            const country = raw.slice(0, 2);
            const checkDigits = raw.slice(2, 4);
            const bban = raw.slice(4);
            const errors = [];

            if (!/^[A-Z]{2}/.test(raw)) errors.push('IBAN must start with a 2-letter country code.');
            if (!/^\d{2}$/.test(checkDigits)) errors.push('Check digits (positions 3-4) must be numeric.');
            if (ibanLengths[country] && raw.length !== ibanLengths[country]) {
                errors.push(`${country} IBANs must be ${ibanLengths[country]} characters (got ${raw.length}).`);
            } else if (!ibanLengths[country]) {
                errors.push(`Unknown country code: ${country}.`);
            }

            // Mod 97 check
            const rearranged = raw.slice(4) + raw.slice(0, 4);
            const numStr = rearranged.split('').map(c => {
                const code = c.charCodeAt(0);
                return code >= 65 && code <= 90 ? String(code - 55) : c;
            }).join('');

            const isValidMod = mod97(numStr) === 1;
            if (!isValidMod && errors.length === 0) errors.push('IBAN check digit validation failed (mod 97 !== 1).');

            const isValid = errors.length === 0 && isValidMod;
            const formatted = raw.match(/.{1,4}/g)?.join(' ') || raw;

            let html = `<div class="status-badge ${isValid ? 'status-valid' : 'status-invalid'}">${isValid ? '✅ Valid IBAN' : '❌ Invalid IBAN'}</div>`;

            if (errors.length > 0) {
                html += errors.map(e => `<p style="color:#e74c3c;font-size:0.9em;text-align:left;">• ${e}</p>`).join('');
            }

            html += `<div class="formatted-iban">${formatted}</div>`;

            html += `<div class="tool-grid" style="margin-top:10px;">
                <div class="info-item"><div class="info-label">Country</div><div class="info-value">${countryNames[country] || country} (${country})</div></div>
                <div class="info-item"><div class="info-label">Check Digits</div><div class="info-value">${checkDigits}</div></div>
                <div class="info-item"><div class="info-label">BBAN</div><div class="info-value" style="font-family:monospace;">${bban}</div></div>
                <div class="info-item"><div class="info-label">Length</div><div class="info-value">${raw.length}${ibanLengths[country] ? ' / ' + ibanLengths[country] + ' expected' : ''}</div></div>
            </div>`;

            result.innerHTML = html;
        }

        document.getElementById('ibanInput').addEventListener('input', validate);
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
