<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Frame Viewer — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .gif-preview { text-align: center; margin: 16px 0; }
        .gif-preview img { max-width: 100%; max-height: 400px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 16px 0; }
        .info-item { background: #f0f4ff; border-radius: 10px; padding: 14px; text-align: center; }
        .info-label { font-size: 0.8em; color: #888; margin-bottom: 4px; }
        .info-value { font-size: 1.2em; font-weight: 700; color: #667eea; }
        .controls { display: flex; gap: 8px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
        .ctrl-btn { background: #667eea; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 0.9em; }
        .ctrl-btn:hover { background: #5a6fd6; }
        .ctrl-btn.active { background: #27ae60; }
        .frame-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 16px; }
        .frame-grid canvas { width: 100%; border: 2px solid #e0e0e0; border-radius: 6px; background: #fff; }
        .frame-label { font-size: 0.75em; color: #888; text-align: center; }
        .slider-row { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
        .slider-row input { flex: 1; }
        .slider-row label { font-size: 0.85em; color: #666; min-width: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#127910; GIF Frame Viewer</h1>
        <p class="subtitle">View GIF metadata and control playback. Extract visual frames.</p>

        <div class="tool-area">
            <input type="file" id="fileInput" accept="image/gif">

            <div id="output" style="display:none;">
                <div class="gif-preview">
                    <img id="gifImg">
                </div>

                <div class="controls">
                    <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">Pause</button>
                    <button class="ctrl-btn" onclick="stepFrame(-1)">&#9664; Prev</button>
                    <button class="ctrl-btn" onclick="stepFrame(1)">Next &#9654;</button>
                    <button class="ctrl-btn" onclick="extractFrames()">Extract Frames</button>
                </div>

                <div class="slider-row">
                    <label>Speed:</label>
                    <input type="range" id="speedSlider" min="0.25" max="3" step="0.25" value="1">
                    <span id="speedVal">1x</span>
                </div>

                <div class="info-grid">
                    <div class="info-item"><div class="info-label">File Size</div><div class="info-value" id="fileSize"></div></div>
                    <div class="info-item"><div class="info-label">Dimensions</div><div class="info-value" id="dimensions"></div></div>
                    <div class="info-item"><div class="info-label">Type</div><div class="info-value" id="fileType"></div></div>
                    <div class="info-item"><div class="info-label">Frames Extracted</div><div class="info-value" id="frameCount">-</div></div>
                </div>

                <div class="frame-grid" id="frameGrid"></div>
            </div>
        </div>
    </div>

    <script>
        let gifFile = null;
        let playing = true;
        const gifImg = document.getElementById('gifImg');

        document.getElementById('fileInput').addEventListener('change', e => {
            gifFile = e.target.files[0];
            if (!gifFile) return;

            const url = URL.createObjectURL(gifFile);
            gifImg.src = url;
            playing = true;
            document.getElementById('playPauseBtn').textContent = 'Pause';

            gifImg.onload = () => {
                document.getElementById('fileSize').textContent = formatSize(gifFile.size);
                document.getElementById('dimensions').textContent = gifImg.naturalWidth + 'x' + gifImg.naturalHeight;
                document.getElementById('fileType').textContent = gifFile.type || 'image/gif';
                document.getElementById('output').style.display = '';
                document.getElementById('frameGrid').innerHTML = '';
                document.getElementById('frameCount').textContent = '-';
            };
        });

        function formatSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
            return (b/1048576).toFixed(2) + ' MB';
        }

        function togglePlay() {
            playing = !playing;
            document.getElementById('playPauseBtn').textContent = playing ? 'Pause' : 'Play';
            if (!playing) {
                // Freeze by drawing current frame to a canvas and replacing src
                const canvas = document.createElement('canvas');
                canvas.width = gifImg.naturalWidth;
                canvas.height = gifImg.naturalHeight;
                canvas.getContext('2d').drawImage(gifImg, 0, 0);
                gifImg.dataset.originalSrc = gifImg.src;
                gifImg.src = canvas.toDataURL('image/png');
            } else {
                if (gifImg.dataset.originalSrc) {
                    gifImg.src = gifImg.dataset.originalSrc;
                }
            }
        }

        function stepFrame(dir) {
            // Capture current frame
            if (playing) togglePlay();
            // For stepping, we briefly resume and re-pause
            const canvas = document.createElement('canvas');
            canvas.width = gifImg.naturalWidth;
            canvas.height = gifImg.naturalHeight;
            if (gifImg.dataset.originalSrc) {
                gifImg.src = gifImg.dataset.originalSrc;
            }
            setTimeout(() => {
                canvas.getContext('2d').drawImage(gifImg, 0, 0);
                gifImg.src = canvas.toDataURL('image/png');
            }, 50);
        }

        function extractFrames() {
            if (!gifFile) return;
            // Use canvas sampling approach - capture frames at intervals
            const frameGrid = document.getElementById('frameGrid');
            frameGrid.innerHTML = '<p style="color:#888;font-size:0.85em;grid-column:1/-1;">Extracting frames by sampling at intervals...</p>';

            const tmpImg = new Image();
            const origSrc = gifImg.dataset.originalSrc || gifImg.src;
            tmpImg.src = origSrc;

            const w = gifImg.naturalWidth;
            const h = gifImg.naturalHeight;
            let frames = [];
            let count = 0;
            const maxFrames = 30;
            const interval = 100; // ms between captures

            function captureFrame() {
                if (count >= maxFrames) {
                    showFrames(frames);
                    return;
                }
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(tmpImg, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');

                // Only add if different from last frame
                if (frames.length === 0 || dataUrl !== frames[frames.length - 1]) {
                    frames.push(dataUrl);
                }
                count++;
                setTimeout(captureFrame, interval);
            }

            tmpImg.onload = () => { captureFrame(); };
            if (tmpImg.complete) captureFrame();
        }

        function showFrames(frames) {
            const grid = document.getElementById('frameGrid');
            grid.innerHTML = '';
            document.getElementById('frameCount').textContent = frames.length;

            frames.forEach((dataUrl, i) => {
                const div = document.createElement('div');
                div.innerHTML = `<img src="${dataUrl}" style="width:100%;border:2px solid #e0e0e0;border-radius:6px;">
                    <div class="frame-label">Frame ${i + 1}</div>`;
                grid.appendChild(div);
            });
        }

        document.getElementById('speedSlider').addEventListener('input', e => {
            document.getElementById('speedVal').textContent = e.target.value + 'x';
        });
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
