<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Card Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .form-group { text-align:left; margin-bottom:10px; }
        .form-group label { font-weight:600; font-size:0.88em; color:#444; display:block; margin-bottom:3px; }
        .form-group input, .form-group select { width:100%; padding:9px 11px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.92em; }
        .form-group input:focus { border-color:#667eea; outline:none; }
        .char-count { font-size:0.78em; color:#999; text-align:right; }
        .char-count.over { color:#e74c3c; font-weight:700; }
        .tw-preview { border:1px solid #e1e8ed; border-radius:14px; overflow:hidden; max-width:500px; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#fff; margin:16px 0; text-align:left; }
        .tw-preview-img { width:100%; background:#e4e6eb; display:flex; align-items:center; justify-content:center; color:#999; font-size:0.9em; overflow:hidden; }
        .tw-preview-img.large { height:250px; }
        .tw-preview-img.small { height:125px; width:125px; float:left; border-radius:14px 0 0 14px; }
        .tw-preview-img img { width:100%; height:100%; object-fit:cover; }
        .tw-preview-body { padding:10px 14px; }
        .tw-preview-url { font-size:0.8em; color:#8899a6; }
        .tw-preview-title { font-size:0.95em; font-weight:700; color:#14171a; margin:2px 0; }
        .tw-preview-desc { font-size:0.85em; color:#657786; }
        .summary-card { display:flex; border:1px solid #e1e8ed; border-radius:14px; overflow:hidden; max-width:500px; margin:16px 0; text-align:left; }
        .output-box { background:#1a1a2e; color:#ccc; border-radius:10px; padding:16px; font-family:'Courier New',monospace; font-size:0.82em; white-space:pre-wrap; word-break:break-all; margin-top:10px; text-align:left; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>🐦 Twitter Card Generator</h1>
        <p class="subtitle">Generate Twitter Card meta tags and preview how your link will look on Twitter/X.</p>

        <div class="tool-area">
            <div class="form-group">
                <label>Card Type</label>
                <select id="cardType">
                    <option value="summary">Summary</option>
                    <option value="summary_large_image" selected>Summary Large Image</option>
                </select>
            </div>
            <div class="form-group">
                <label>Title <span class="char-count" id="titleCount">0/70</span></label>
                <input type="text" id="twTitle" placeholder="Your page title" maxlength="70">
            </div>
            <div class="form-group">
                <label>Description <span class="char-count" id="descCount">0/200</span></label>
                <input type="text" id="twDesc" placeholder="Brief page description" maxlength="200">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="url" id="twImage" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label>Site Handle</label>
                <input type="text" id="twSite" placeholder="@yoursite">
            </div>
            <div class="form-group">
                <label>Creator Handle</label>
                <input type="text" id="twCreator" placeholder="@creator">
            </div>

            <div id="previewArea"></div>

            <div class="tool-output">
                <div class="output-box" id="metaOutput"></div>
                <button class="copy-btn" id="copyBtn" style="margin-top:10px;">Copy Meta Tags</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        const fields = ['twTitle','twDesc','twImage','twSite','twCreator','cardType'];

        function updateCharCount(inputId, countId, max) {
            const len = document.getElementById(inputId).value.length;
            const el = document.getElementById(countId);
            el.textContent = len + '/' + max;
            el.className = 'char-count' + (len > max ? ' over' : '');
        }

        function update() {
            updateCharCount('twTitle', 'titleCount', 70);
            updateCharCount('twDesc', 'descCount', 200);

            const type = document.getElementById('cardType').value;
            const title = document.getElementById('twTitle').value || 'Page Title';
            const desc = document.getElementById('twDesc').value || 'Page description will appear here.';
            const image = document.getElementById('twImage').value;
            const site = document.getElementById('twSite').value;

            let preview = '';
            if (type === 'summary_large_image') {
                preview = '<div class="tw-preview"><div class="tw-preview-img large">' +
                    (image ? '<img src="' + image + '" onerror="this.parentElement.textContent=\'Image failed\'">' : 'No image') +
                    '</div><div class="tw-preview-body"><div class="tw-preview-title">' + escHtml(title) +
                    '</div><div class="tw-preview-desc">' + escHtml(desc) +
                    '</div><div class="tw-preview-url">' + escHtml(site || 'example.com') + '</div></div></div>';
            } else {
                preview = '<div class="summary-card"><div class="tw-preview-img small" style="min-width:125px;">' +
                    (image ? '<img src="' + image + '" onerror="this.parentElement.textContent=\'No img\'">' : 'No image') +
                    '</div><div class="tw-preview-body"><div class="tw-preview-url">' + escHtml(site || 'example.com') +
                    '</div><div class="tw-preview-title">' + escHtml(title) +
                    '</div><div class="tw-preview-desc">' + escHtml(desc) + '</div></div></div>';
            }
            document.getElementById('previewArea').innerHTML = preview;

            // Meta tags
            let meta = '<meta name="twitter:card" content="' + type + '">\n';
            if (document.getElementById('twTitle').value) meta += '<meta name="twitter:title" content="' + document.getElementById('twTitle').value.replace(/"/g,'&quot;') + '">\n';
            if (document.getElementById('twDesc').value) meta += '<meta name="twitter:description" content="' + document.getElementById('twDesc').value.replace(/"/g,'&quot;') + '">\n';
            if (image) meta += '<meta name="twitter:image" content="' + image.replace(/"/g,'&quot;') + '">\n';
            if (site) meta += '<meta name="twitter:site" content="' + site.replace(/"/g,'&quot;') + '">\n';
            if (document.getElementById('twCreator').value) meta += '<meta name="twitter:creator" content="' + document.getElementById('twCreator').value.replace(/"/g,'&quot;') + '">\n';
            document.getElementById('metaOutput').textContent = meta;
        }

        function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        fields.forEach(id => document.getElementById(id).addEventListener('input', update));
        document.getElementById('cardType').addEventListener('change', update);
        update();

        document.getElementById('copyBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(document.getElementById('metaOutput').textContent).then(() => {
                this.textContent = 'Copied!';
                setTimeout(() => this.textContent = 'Copy Meta Tags', 1200);
            });
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
