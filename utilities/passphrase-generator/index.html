<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passphrase Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .passphrase-display {
            background: #1a1a2e; color: #43e97b; font-family: 'Courier New', monospace;
            font-size: 1.3em; padding: 20px; border-radius: 10px; margin: 14px 0;
            word-break: break-all; min-height: 2em; letter-spacing: 0.5px;
        }
        .entropy-display { font-size: 0.95em; color: #666; margin: 6px 0; }
        .entropy-display strong { color: #764ba2; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 14px 0; text-align: left; }
        .config-item { background: #f5f5fa; padding: 12px; border-radius: 10px; }
        .config-item label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9em; color: #555; }
        .config-item input[type="range"] { width: 100%; }
        .config-item select { width: 100%; padding: 6px 10px; border: 2px solid #e0e0e0; border-radius: 6px; }
        .toggle-row { display: flex; align-items: center; gap: 8px; }
        .toggle-row input[type="checkbox"] { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Passphrase Generator</h1>
        <p class="subtitle">Generate secure, memorable passphrases from common English words.</p>

        <div class="tool-area">
            <div class="passphrase-display" id="passphraseDisplay">Loading...</div>
            <div class="entropy-display" id="entropyDisplay"></div>

            <div style="text-align:center;margin:10px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button class="copy-btn" onclick="generate()" style="font-size:1.05em;padding:10px 24px;">🔄 Generate</button>
                <button class="copy-btn" onclick="copyPassphrase()">📋 Copy</button>
            </div>

            <div class="config-grid">
                <div class="config-item">
                    <label>Word Count: <span id="wordCountLabel">5</span></label>
                    <input type="range" id="wordCount" min="3" max="10" value="5" oninput="document.getElementById('wordCountLabel').textContent=this.value;generate()">
                </div>
                <div class="config-item">
                    <label>Separator</label>
                    <select id="separator" onchange="generate()">
                        <option value="-">Dash (-)</option>
                        <option value=" ">Space</option>
                        <option value=".">Period (.)</option>
                        <option value="">None</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>Options</label>
                    <div class="toggle-row"><input type="checkbox" id="capitalize" checked onchange="generate()"><label for="capitalize">Capitalize words</label></div>
                    <div class="toggle-row" style="margin-top:6px;"><input type="checkbox" id="includeNum" onchange="generate()"><label for="includeNum">Include number</label></div>
                </div>
            </div>
        </div>
    </div>

    <script>

","tower","town","trace","track","trade","train","trait","travel","treat","tree","trend","trial","tribe","trick","trip","troop","truck","truly","trust","truth","try","tube","tune","turn","twice","twin","twist","two","type","ugly","uncle","under","union","unique","unit","unless","unlike","until","update","upon","upper","urban","urge","usage","use","used","useful","user","usual","valley","value","van","vary","vast","verb","verify","very","via","victim","video","view","violin","virtue","vision","visit","visual","vital","voice","volume","vote","wage","wait","wake","walk","wall","wander","want","war","warm","warn","wash","waste","watch","water","wave","way","weak","wealth","weapon","wear","web","week","weigh","weird","well","west","wet","what","wheat","wheel","when","where","which","while","white","whole","whom","why","wide","widely","wife","wild","will","win","wind","window","wine","wing","winner","winter","wire","wise","wish","with","woman","wonder","wood","word","work","worker","world","worry","worse","worst","worth","would","wound","wrap","write","wrong","yard","yeah","year","yellow","yes","yet","yield","young","yours","youth","zero","zone"];

        function generate() {
            const count = parseInt(document.getElementById('wordCount').value);
            const sep = document.getElementById('separator').value;
            const cap = document.getElementById('capitalize').checked;
            const addNum = document.getElementById('includeNum').checked;

            const words = [];
            const used = new Set();
            while (words.length < count) {
                const idx = Math.floor(Math.random() * WORDS.length);
                if (!used.has(idx)) {
                    used.add(idx);
                    let w = WORDS[idx];
                    if (cap) w = w.charAt(0).toUpperCase() + w.slice(1);
                    words.push(w);
                }
            }

            if (addNum) {
                const pos = Math.floor(Math.random() * (words.length + 1));
                words.splice(pos, 0, String(Math.floor(Math.random() * 100)));
            }

            const passphrase = words.join(sep);
            document.getElementById('passphraseDisplay').textContent = passphrase;

            const bitsPerWord = Math.log2(WORDS.length);
            let totalBits = count * bitsPerWord;
            if (addNum) totalBits += Math.log2(100);
            document.getElementById('entropyDisplay').innerHTML = `Entropy: <strong>~${Math.round(totalBits)} bits</strong> (${WORDS.length} word list, ${count} words)`;
        }

        function copyPassphrase() {
            const text = document.getElementById('passphraseDisplay').textContent;
            navigator.clipboard.writeText(text);
        }

        generate();
    </script>
    <script src="../../nav.js"></script>
