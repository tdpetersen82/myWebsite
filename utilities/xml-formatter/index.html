<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Formatter — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <div class="container">
        <h1>📰 XML Formatter</h1>
        <p class="subtitle">Format, validate, and pretty-print XML documents.</p>

        <div class="tool-area">
            <div class="tool-row">
                <div>
                    <label for="xmlInput">Input XML</label>
                    <textarea id="xmlInput" placeholder="Paste your XML here..."></textarea>
                </div>
                <div>
                    <label for="xmlOutput">Formatted Output</label>
                    <textarea id="xmlOutput" readonly placeholder="Formatted XML will appear here..."></textarea>
                </div>
            </div>

            <div style="text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button class="copy-btn" onclick="formatXML()">Format XML</button>
                <button class="copy-btn" onclick="minifyXML()">Minify XML</button>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy Output</button>
            </div>

            <div id="errorMsg" style="color:#e74c3c;margin-top:8px;font-size:0.9em;text-align:center;"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('xmlInput');
        const output = document.getElementById('xmlOutput');
        const errorMsg = document.getElementById('errorMsg');

        function formatXML() {
            errorMsg.textContent = '';
            const src = input.value.trim();
            if (!src) {
                errorMsg.textContent = 'Please enter XML to format.';
                return;
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(src, 'application/xml');

            const parseError = doc.querySelector('parsererror');
            if (parseError) {
                errorMsg.textContent = 'XML Parse Error: ' + parseError.textContent.split('\n')[0];
                return;
            }

            output.value = serializeNode(doc.documentElement, 0);
        }

        function serializeNode(node, depth) {
            const indent = '    '.repeat(depth);

            if (node.nodeType === Node.TEXT_NODE) {
                const text = node.textContent.trim();
                return text ? indent + text : '';
            }

            if (node.nodeType === Node.COMMENT_NODE) {
                return indent + '<!--' + node.textContent + '-->';
            }

            if (node.nodeType === Node.PROCESSING_INSTRUCTION_NODE) {
                return indent + '<?' + node.target + ' ' + node.data + '?>';
            }

            if (node.nodeType === Node.CDATA_SECTION_NODE) {
                return indent + '<![CDATA[' + node.textContent + ']]>';
            }

            if (node.nodeType !== Node.ELEMENT_NODE) return '';

            let result = indent + '<' + node.tagName;

            // Attributes
            for (let i = 0; i < node.attributes.length; i++) {
                const attr = node.attributes[i];
                result += ' ' + attr.name + '="' + escapeXml(attr.value) + '"';
            }

            // Children
            const children = [];
            for (let i = 0; i < node.childNodes.length; i++) {
                const child = node.childNodes[i];
                const serialized = serializeNode(child, depth + 1);
                if (serialized) children.push(serialized);
            }

            if (children.length === 0) {
                result += '/>';
            } else if (children.length === 1 && node.childNodes.length === 1 && node.childNodes[0].nodeType === Node.TEXT_NODE) {
                // Inline text content
                result += '>' + node.textContent.trim() + '</' + node.tagName + '>';
            } else {
                result += '>\n' + children.join('\n') + '\n' + indent + '</' + node.tagName + '>';
            }

            return result;
        }

        function escapeXml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function minifyXML() {
            errorMsg.textContent = '';
            const src = input.value.trim();
            if (!src) {
                errorMsg.textContent = 'Please enter XML to minify.';
                return;
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(src, 'application/xml');
            const parseError = doc.querySelector('parsererror');
            if (parseError) {
                errorMsg.textContent = 'XML Parse Error: ' + parseError.textContent.split('\n')[0];
                return;
            }

            const serializer = new XMLSerializer();
            let result = serializer.serializeToString(doc);
            result = result.replace(/>\s+</g, '><');
            output.value = result;
        }

        function copyOutput() {
            navigator.clipboard.writeText(output.value).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
