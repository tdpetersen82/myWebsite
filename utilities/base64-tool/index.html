<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>🔐 Base64 Tool</h1>
        <p class="subtitle">Encode and decode text to and from Base64 format.</p>

        <div class="tool-area">
            <div class="tool-row">
                <div>
                    <label for="b64Input">Input</label>
                    <textarea id="b64Input" placeholder="Enter text or Base64 string..."></textarea>
                </div>
                <div>
                    <label for="b64Output">Output</label>
                    <textarea id="b64Output" readonly placeholder="Result will appear here..."></textarea>
                </div>
            </div>

            <div style="text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
                <button class="copy-btn" onclick="encodeB64()">Encode →</button>
                <button class="copy-btn" onclick="decodeB64()">← Decode</button>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy Output</button>
            </div>

            <div id="errorMsg" style="color:#e74c3c;margin-top:8px;font-size:0.9em;text-align:center;"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('b64Input');
        const output = document.getElementById('b64Output');
        const errorMsg = document.getElementById('errorMsg');

        function encodeB64() {
            errorMsg.textContent = '';
            try {
                output.value = btoa(unescape(encodeURIComponent(input.value)));
            } catch (e) {
                errorMsg.textContent = 'Error encoding: ' + e.message;
            }
        }

        function decodeB64() {
            errorMsg.textContent = '';
            try {
                output.value = decodeURIComponent(escape(atob(input.value.trim())));
            } catch (e) {
                errorMsg.textContent = 'Invalid Base64 input. Please check your string.';
            }
        }

        function copyOutput() {
            navigator.clipboard.writeText(output.value).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
