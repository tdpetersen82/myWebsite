<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.htaccess Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .option-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #eee; text-align:left; }
        .option-row label { flex:1; font-weight:600; font-size:0.9em; color:#444; cursor:pointer; }
        .option-row input[type="checkbox"] { width:20px; height:20px; accent-color:#667eea; }
        .sub-options { padding:8px 0 8px 30px; text-align:left; }
        .sub-options label { font-size:0.85em; color:#666; display:block; margin-bottom:4px; }
        .sub-options input { padding:6px 10px; border:2px solid #e0e0e0; border-radius:6px; font-size:0.9em; width:100%; max-width:300px; }
        .sub-options input:focus { border-color:#667eea; outline:none; }
        .output-box { background:#1a1a2e; color:#ccc; border-radius:10px; padding:16px; font-family:'Courier New',monospace; font-size:0.82em; white-space:pre-wrap; word-break:break-all; max-height:500px; overflow:auto; margin-top:10px; text-align:left; }
        .www-select { padding:6px 10px; border:2px solid #e0e0e0; border-radius:6px; font-size:0.9em; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>⚙️ .htaccess Generator</h1>
        <p class="subtitle">Generate common .htaccess rules for Apache web servers.</p>

        <div class="tool-area">
            <div class="option-row">
                <input type="checkbox" id="forceHttps">
                <label for="forceHttps">Force HTTPS</label>
            </div>

            <div class="option-row">
                <input type="checkbox" id="wwwRedirect">
                <label for="wwwRedirect">WWW Redirect</label>
                <select class="www-select" id="wwwType">
                    <option value="add">Add WWW</option>
                    <option value="remove">Remove WWW</option>
                </select>
            </div>

            <div class="option-row">
                <input type="checkbox" id="gzip">
                <label for="gzip">GZIP Compression</label>
            </div>

            <div class="option-row">
                <input type="checkbox" id="caching">
                <label for="caching">Browser Caching</label>
            </div>
            <div class="sub-options" id="cachingOptions" style="display:none;">
                <label>Images expiry (days): <input type="number" id="cacheImages" value="30" min="1"></label>
                <label>CSS/JS expiry (days): <input type="number" id="cacheCssJs" value="7" min="1"></label>
                <label>HTML expiry (days): <input type="number" id="cacheHtml" value="1" min="1"></label>
            </div>

            <div class="option-row">
                <input type="checkbox" id="errorPages">
                <label for="errorPages">Custom Error Pages</label>
            </div>
            <div class="sub-options" id="errorOptions" style="display:none;">
                <label>404 page: <input type="text" id="error404" value="/404.html" placeholder="/404.html"></label>
                <label>500 page: <input type="text" id="error500" value="/500.html" placeholder="/500.html"></label>
            </div>

            <div class="option-row">
                <input type="checkbox" id="blockIps">
                <label for="blockIps">Block IPs</label>
            </div>
            <div class="sub-options" id="blockIpOptions" style="display:none;">
                <label>IPs (one per line):</label>
                <textarea id="ipList" style="width:100%;max-width:300px;min-height:60px;padding:6px 10px;border:2px solid #e0e0e0;border-radius:6px;font-size:0.9em;font-family:monospace;" placeholder="192.168.1.1&#10;10.0.0.0/24"></textarea>
            </div>

            <button class="copy-btn" id="generateBtn" style="width:100%;padding:12px;font-size:1em;margin-top:16px;">Generate .htaccess</button>

            <div class="tool-output">
                <div class="output-box" id="output"></div>
                <div class="tool-row" style="margin-top:10px;display:flex;gap:8px;">
                    <button class="copy-btn" id="copyBtn">Copy</button>
                    <button class="copy-btn" id="downloadBtn">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        document.getElementById('caching').addEventListener('change', function() {
            document.getElementById('cachingOptions').style.display = this.checked ? 'block' : 'none';
        });
        document.getElementById('errorPages').addEventListener('change', function() {
            document.getElementById('errorOptions').style.display = this.checked ? 'block' : 'none';
        });
        document.getElementById('blockIps').addEventListener('change', function() {
            document.getElementById('blockIpOptions').style.display = this.checked ? 'block' : 'none';
        });

        document.getElementById('generateBtn').addEventListener('click', function() {
            let out = '';

            if (document.getElementById('forceHttps').checked) {
                out += '# Force HTTPS\nRewriteEngine On\nRewriteCond %{HTTPS} off\nRewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]\n\n';
            }

            if (document.getElementById('wwwRedirect').checked) {
                const type = document.getElementById('wwwType').value;
                if (type === 'add') {
                    out += '# Redirect to WWW\nRewriteEngine On\nRewriteCond %{HTTP_HOST} !^www\\. [NC]\nRewriteRule ^(.*)$ https://www.%{HTTP_HOST}%{REQUEST_URI} [L,R=301]\n\n';
                } else {
                    out += '# Redirect to non-WWW\nRewriteEngine On\nRewriteCond %{HTTP_HOST} ^www\\.(.*)$ [NC]\nRewriteRule ^(.*)$ https://%1%{REQUEST_URI} [L,R=301]\n\n';
                }
            }

            if (document.getElementById('gzip').checked) {
                out += '# GZIP Compression\n<IfModule mod_deflate.c>\n  AddOutputFilterByType DEFLATE text/html text/plain text/css\n  AddOutputFilterByType DEFLATE text/javascript application/javascript application/json\n  AddOutputFilterByType DEFLATE application/xml text/xml\n  AddOutputFilterByType DEFLATE image/svg+xml\n  AddOutputFilterByType DEFLATE application/font-woff application/font-woff2\n</IfModule>\n\n';
            }

            if (document.getElementById('caching').checked) {
                const img = document.getElementById('cacheImages').value || 30;
                const css = document.getElementById('cacheCssJs').value || 7;
                const html = document.getElementById('cacheHtml').value || 1;
                out += '# Browser Caching\n<IfModule mod_expires.c>\n  ExpiresActive On\n';
                out += '  ExpiresByType image/jpeg "access plus ' + img + ' days"\n';
                out += '  ExpiresByType image/png "access plus ' + img + ' days"\n';
                out += '  ExpiresByType image/gif "access plus ' + img + ' days"\n';
                out += '  ExpiresByType image/webp "access plus ' + img + ' days"\n';
                out += '  ExpiresByType image/svg+xml "access plus ' + img + ' days"\n';
                out += '  ExpiresByType text/css "access plus ' + css + ' days"\n';
                out += '  ExpiresByType application/javascript "access plus ' + css + ' days"\n';
                out += '  ExpiresByType text/html "access plus ' + html + ' days"\n';
                out += '</IfModule>\n\n';
            }

            if (document.getElementById('errorPages').checked) {
                const e404 = document.getElementById('error404').value.trim() || '/404.html';
                const e500 = document.getElementById('error500').value.trim() || '/500.html';
                out += '# Custom Error Pages\nErrorDocument 404 ' + e404 + '\nErrorDocument 500 ' + e500 + '\n\n';
            }

            if (document.getElementById('blockIps').checked) {
                const ips = document.getElementById('ipList').value.trim().split('\n').map(s => s.trim()).filter(Boolean);
                if (ips.length) {
                    out += '# Block IPs\n<RequireAll>\n  Require all granted\n';
                    ips.forEach(ip => { out += '  Require not ip ' + ip + '\n'; });
                    out += '</RequireAll>\n\n';
                }
            }

            document.getElementById('output').textContent = out || '# No options selected.';
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const txt = document.getElementById('output').textContent;
            if (!txt) return;
            navigator.clipboard.writeText(txt).then(() => {
                this.textContent = 'Copied!';
                setTimeout(() => this.textContent = 'Copy', 1200);
            });
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            const txt = document.getElementById('output').textContent;
            if (!txt) return;
            const blob = new Blob([txt], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '.htaccess';
            a.click();
            URL.revokeObjectURL(a.href);
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
