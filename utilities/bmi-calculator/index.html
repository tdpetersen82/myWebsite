<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .toggle-row { display: flex; gap: 8px; justify-content: center; margin: 12px 0; }
        .toggle-btn { padding: 8px 20px; border: 2px solid #667eea; background: #fff; color: #667eea; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .toggle-btn.active { background: #667eea; color: #fff; }
        .bmi-result { font-size: 2.5em; font-weight: bold; margin: 12px 0; }
        .bmi-category { font-size: 1.2em; font-weight: 600; margin-bottom: 12px; }
        .bmi-bar { height: 20px; border-radius: 10px; background: linear-gradient(90deg, #3498db 0%, #2ecc71 25%, #f1c40f 50%, #e67e22 75%, #e74c3c 100%); position: relative; margin: 12px 0; }
        .bmi-marker { width: 4px; height: 30px; background: #333; position: absolute; top: -5px; border-radius: 2px; transition: left 0.3s; }
        .bmi-labels { display: flex; justify-content: space-between; font-size: 0.75em; color: #666; }
        .tool-row { display: flex; gap: 12px; }
        .tool-row > * { flex: 1; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>⚖️ BMI Calculator</h1>
        <p class="subtitle">Calculate your Body Mass Index and see your health category.</p>
        <div class="tool-area">
            <div class="toggle-row">
                <button class="toggle-btn active" onclick="setSystem('metric')">Metric (kg/cm)</button>
                <button class="toggle-btn" onclick="setSystem('imperial')">Imperial (lb/in)</button>
            </div>
            <div class="tool-row">
                <div>
                    <label for="weight" id="weightLabel">Weight (kg):</label>
                    <input type="number" id="weight" placeholder="70" min="0" step="0.1" oninput="calc()">
                </div>
                <div>
                    <label for="height" id="heightLabel">Height (cm):</label>
                    <input type="number" id="height" placeholder="170" min="0" step="0.1" oninput="calc()">
                </div>
            </div>
            <div class="bmi-result" id="bmiVal">—</div>
            <div class="bmi-category" id="bmiCat"></div>
            <div class="bmi-bar"><div class="bmi-marker" id="marker" style="left:50%"></div></div>
            <div class="bmi-labels"><span>Underweight<br>&lt;18.5</span><span>Normal<br>18.5-24.9</span><span>Overweight<br>25-29.9</span><span>Obese<br>30+</span></div>
        </div>
    </div>
    <script src="../../nav.js"></script>
    <script>
        let system = 'metric';
        function setSystem(s) {
            system = s;
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(s)));
            document.getElementById('weightLabel').textContent = s === 'metric' ? 'Weight (kg):' : 'Weight (lb):';
            document.getElementById('heightLabel').textContent = s === 'metric' ? 'Height (cm):' : 'Height (in):';
            calc();
        }
        function calc() {
            let w = parseFloat(document.getElementById('weight').value);
            let h = parseFloat(document.getElementById('height').value);
            if (!w || !h || w <= 0 || h <= 0) { document.getElementById('bmiVal').textContent = '—'; document.getElementById('bmiCat').textContent = ''; return; }
            if (system === 'imperial') { w = w * 0.453592; h = h * 2.54; }
            const bmi = w / ((h / 100) ** 2);
            let cat, color;
            if (bmi < 18.5) { cat = 'Underweight'; color = '#3498db'; }
            else if (bmi < 25) { cat = 'Normal'; color = '#2ecc71'; }
            else if (bmi < 30) { cat = 'Overweight'; color = '#f1c40f'; }
            else { cat = 'Obese'; color = '#e74c3c'; }
            document.getElementById('bmiVal').textContent = bmi.toFixed(1);
            document.getElementById('bmiVal').style.color = color;
            document.getElementById('bmiCat').textContent = cat;
            document.getElementById('bmiCat').style.color = color;
            const pct = Math.min(100, Math.max(0, ((bmi - 10) / 35) * 100));
            document.getElementById('marker').style.left = pct + '%';
        }
    </script>
</body>
</html>
