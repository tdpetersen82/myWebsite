<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placeholder Image Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .tool-row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 14px; }
        .tool-row > div { flex: 1; min-width: 100px; }
        .tool-row label { display: block; font-size: 0.85em; color: #666; margin-bottom: 4px; }
        .tool-row input { width: 100%; }
        .tool-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tool-tab { padding: 6px 12px; border-radius: 6px; border: 2px solid #667eea; background: none; color: #667eea; cursor: pointer; font-size: 0.8em; }
        .tool-tab:hover, .tool-tab.active { background: #667eea; color: #fff; }
        .preview { margin-top: 16px; text-align: center; }
        .preview canvas { max-width: 100%; border: 2px solid #e0e0e0; border-radius: 8px; }
        .gen-btn { background: #667eea; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 1em; }
        .gen-btn:hover { background: #5a6fd6; }
        .dl-btn { background: #27ae60; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 1em; margin-left: 8px; }
        .dl-btn:hover { background: #219a52; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#128444; Placeholder Image</h1>
        <p class="subtitle">Generate placeholder images with custom dimensions, colors, and text.</p>

        <div class="tool-area">
            <p style="font-size:0.85em;color:#888;margin-bottom:8px;">Presets:</p>
            <div class="tool-tabs">
                <button class="tool-tab" onclick="preset(300,200)">300x200</button>
                <button class="tool-tab" onclick="preset(400,300)">400x300</button>
                <button class="tool-tab" onclick="preset(800,600)">800x600</button>
                <button class="tool-tab" onclick="preset(1280,720)">1280x720</button>
                <button class="tool-tab" onclick="preset(1920,1080)">1920x1080</button>
                <button class="tool-tab" onclick="preset(512,512)">512x512</button>
            </div>

            <div class="tool-row">
                <div>
                    <label>Width</label>
                    <input type="number" id="width" value="800" min="1" max="4000">
                </div>
                <div>
                    <label>Height</label>
                    <input type="number" id="height" value="600" min="1" max="4000">
                </div>
                <div>
                    <label>Background</label>
                    <input type="color" id="bgColor" value="#cccccc">
                </div>
                <div>
                    <label>Text Color</label>
                    <input type="color" id="txtColor" value="#666666">
                </div>
            </div>
            <div class="tool-row">
                <div style="flex:2;">
                    <label>Custom Text (optional)</label>
                    <input type="text" id="customText" placeholder="Leave blank for WxH">
                </div>
            </div>

            <div>
                <button class="gen-btn" onclick="generate()">Generate</button>
                <button class="dl-btn" id="dlBtn" onclick="download()" style="display:none;">Download PNG</button>
            </div>

            <div class="preview">
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <script>
        function preset(w, h) {
            document.getElementById('width').value = w;
            document.getElementById('height').value = h;
            generate();
        }

        function generate() {
            const w = parseInt(document.getElementById('width').value) || 100;
            const h = parseInt(document.getElementById('height').value) || 100;
            const bg = document.getElementById('bgColor').value;
            const tc = document.getElementById('txtColor').value;
            const text = document.getElementById('customText').value || (w + 'x' + h);

            const canvas = document.getElementById('canvas');
            canvas.width = w;
            canvas.height = h;
            canvas.style.display = '';

            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            const fontSize = Math.max(12, Math.min(w, h) / 8);
            ctx.fillStyle = tc;
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, w / 2, h / 2);

            document.getElementById('dlBtn').style.display = '';
        }

        function download() {
            const canvas = document.getElementById('canvas');
            canvas.toBlob(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'placeholder.png';
                a.click();
            }, 'image/png');
        }

        generate();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
