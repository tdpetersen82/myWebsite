<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robots.txt Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .form-group { text-align:left; margin-bottom:12px; }
        .form-group label { font-weight:600; font-size:0.9em; color:#444; display:block; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px 12px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.95em; }
        .form-group input:focus { border-color:#667eea; outline:none; }
        .rule-row { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
        .rule-row select { padding:8px; border:2px solid #e0e0e0; border-radius:8px; }
        .rule-row input { flex:1; padding:8px 10px; border:2px solid #e0e0e0; border-radius:8px; }
        .rule-row button { background:#e74c3c; color:#fff; border:none; border-radius:8px; padding:8px 12px; cursor:pointer; }
        .add-btn { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; margin:8px 0; }
        .output-box { background:#1a1a2e; color:#ccc; border-radius:10px; padding:16px; font-family:'Courier New',monospace; font-size:0.85em; white-space:pre-wrap; min-height:100px; margin-top:10px; text-align:left; }
        .preset-row { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Robots.txt Generator</h1>
        <p class="subtitle">Generate a robots.txt file for your website to control search engine crawling.</p>

        <div class="tool-area">
            <div class="form-group">
                <label for="userAgent">User-agent</label>
                <input type="text" id="userAgent" value="*" placeholder="* (all bots)">
            </div>

            <div class="form-group">
                <label>Rules</label>
                <div id="rulesContainer"></div>
                <button class="add-btn" id="addRule">+ Add Rule</button>
            </div>

            <div class="form-group">
                <label for="sitemapUrl">Sitemap URL</label>
                <input type="url" id="sitemapUrl" placeholder="https://example.com/sitemap.xml">
            </div>

            <div class="form-group">
                <label for="crawlDelay">Crawl-delay (seconds)</label>
                <input type="number" id="crawlDelay" placeholder="e.g. 10" min="0">
            </div>

            <div class="preset-row">
                <span style="font-weight:600;font-size:0.9em;color:#444;line-height:2.2;">Presets:</span>
                <button class="copy-btn" data-preset="allow">Allow All</button>
                <button class="copy-btn" data-preset="block">Block All</button>
                <button class="copy-btn" data-preset="blockbots">Block Common Bots</button>
            </div>

            <button class="copy-btn" id="generateBtn" style="width:100%;padding:12px;font-size:1em;">Generate robots.txt</button>

            <div class="tool-output">
                <div class="output-box" id="output"></div>
                <div class="tool-row" style="margin-top:10px;display:flex;gap:8px;">
                    <button class="copy-btn" id="copyBtn">Copy</button>
                    <button class="copy-btn" id="downloadBtn">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';
        const rulesContainer = document.getElementById('rulesContainer');
        let ruleId = 0;

        function addRule(type, path) {
            const row = document.createElement('div');
            row.className = 'rule-row';
            row.innerHTML = '<select><option value="Disallow"' + (type==='Disallow'?' selected':'') + '>Disallow</option><option value="Allow"' + (type==='Allow'?' selected':'') + '>Allow</option></select>' +
                '<input type="text" placeholder="/path/" value="' + (path||'') + '">' +
                '<button title="Remove">&times;</button>';
            row.querySelector('button').addEventListener('click', () => row.remove());
            rulesContainer.appendChild(row);
        }

        document.getElementById('addRule').addEventListener('click', () => addRule('Disallow', ''));
        addRule('Disallow', '');

        function generate() {
            const ua = document.getElementById('userAgent').value.trim() || '*';
            const sitemap = document.getElementById('sitemapUrl').value.trim();
            const delay = document.getElementById('crawlDelay').value.trim();
            let txt = 'User-agent: ' + ua + '\n';
            rulesContainer.querySelectorAll('.rule-row').forEach(row => {
                const type = row.querySelector('select').value;
                const path = row.querySelector('input').value.trim();
                txt += type + ': ' + path + '\n';
            });
            if (delay) txt += 'Crawl-delay: ' + delay + '\n';
            if (sitemap) txt += '\nSitemap: ' + sitemap + '\n';
            document.getElementById('output').textContent = txt;
        }

        document.getElementById('generateBtn').addEventListener('click', generate);

        document.querySelectorAll('[data-preset]').forEach(btn => {
            btn.addEventListener('click', () => {
                rulesContainer.innerHTML = '';
                const p = btn.dataset.preset;
                if (p === 'allow') {
                    document.getElementById('userAgent').value = '*';
                    addRule('Allow', '/');
                } else if (p === 'block') {
                    document.getElementById('userAgent').value = '*';
                    addRule('Disallow', '/');
                } else if (p === 'blockbots') {
                    document.getElementById('userAgent').value = '*';
                    addRule('Allow', '/');
                    // Add common bot blocks as separate output
                    generate();
                    let txt = document.getElementById('output').textContent;
                    txt += '\nUser-agent: AhrefsBot\nDisallow: /\n';
                    txt += '\nUser-agent: SemrushBot\nDisallow: /\n';
                    txt += '\nUser-agent: MJ12bot\nDisallow: /\n';
                    txt += '\nUser-agent: DotBot\nDisallow: /\n';
                    document.getElementById('output').textContent = txt;
                    return;
                }
                generate();
            });
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const txt = document.getElementById('output').textContent;
            if (!txt) return;
            navigator.clipboard.writeText(txt).then(() => {
                this.textContent = 'Copied!';
                setTimeout(() => this.textContent = 'Copy', 1200);
            });
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            const txt = document.getElementById('output').textContent;
            if (!txt) return;
            const blob = new Blob([txt], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'robots.txt';
            a.click();
            URL.revokeObjectURL(a.href);
        });
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
