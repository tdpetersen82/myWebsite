<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Base64 — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .tool-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tool-tab { padding: 8px 18px; border-radius: 8px; border: 2px solid #667eea; background: none; color: #667eea; cursor: pointer; font-size: 0.9em; font-weight: 600; }
        .tool-tab.active { background: #667eea; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tool-output { width: 100%; min-height: 120px; border: 2px solid #e0e0e0; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.8em; resize: vertical; word-break: break-all; }
        .copy-btn { background: #667eea; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85em; margin-top: 8px; }
        .copy-btn:hover { background: #5a6fd6; }
        .download-btn { background: #27ae60; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; font-size: 0.9em; margin-top: 8px; }
        .info-row { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
        .info-item { background: #f0f4ff; border-radius: 8px; padding: 10px 16px; }
        .info-label { font-size: 0.75em; color: #888; }
        .info-value { font-weight: 700; color: #667eea; }
        .preview { margin-top: 12px; text-align: center; }
        .preview img { max-width: 100%; max-height: 300px; border: 2px solid #e0e0e0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#128444; Image to Base64</h1>
        <p class="subtitle">Convert between images and Base64 data URIs.</p>

        <div class="tool-area">
            <div class="tool-tabs">
                <button class="tool-tab active" onclick="switchTab('encode')">Image &rarr; Base64</button>
                <button class="tool-tab" onclick="switchTab('decode')">Base64 &rarr; Image</button>
            </div>

            <!-- Encode Tab -->
            <div class="tab-content active" id="tab-encode">
                <input type="file" id="encodeFile" accept="image/*">
                <div id="encodeOutput" style="display:none;">
                    <div class="preview"><img id="encodePreview"></div>
                    <div class="info-row">
                        <div class="info-item"><div class="info-label">File Size</div><div class="info-value" id="encFileSize"></div></div>
                        <div class="info-item"><div class="info-label">Base64 Size</div><div class="info-value" id="encB64Size"></div></div>
                        <div class="info-item"><div class="info-label">Type</div><div class="info-value" id="encType"></div></div>
                    </div>
                    <textarea class="tool-output" id="encodeResult" readonly></textarea>
                    <button class="copy-btn" onclick="copyText('encodeResult')">Copy Base64</button>
                </div>
            </div>

            <!-- Decode Tab -->
            <div class="tab-content" id="tab-decode">
                <textarea class="tool-output" id="decodeInput" placeholder="Paste a data URI here (data:image/png;base64,...)"></textarea>
                <button class="copy-btn" onclick="decodeB64()" style="margin-top:8px;">Convert</button>
                <div id="decodeOutput" style="display:none;">
                    <div class="preview"><img id="decodePreview"></div>
                    <button class="download-btn" onclick="downloadDecoded()">Download Image</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        function fmtSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
            return (b/1048576).toFixed(2) + ' MB';
        }

        document.getElementById('encodeFile').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const dataUri = reader.result;
                document.getElementById('encodePreview').src = dataUri;
                document.getElementById('encodeResult').value = dataUri;
                document.getElementById('encFileSize').textContent = fmtSize(file.size);
                document.getElementById('encB64Size').textContent = fmtSize(dataUri.length);
                document.getElementById('encType').textContent = file.type;
                document.getElementById('encodeOutput').style.display = '';
            };
            reader.readAsDataURL(file);
        });

        function copyText(id) {
            const el = document.getElementById(id);
            navigator.clipboard.writeText(el.value).then(() => {
                event.target.textContent = 'Copied!';
                setTimeout(() => event.target.textContent = 'Copy Base64', 1500);
            });
        }

        function decodeB64() {
            const input = document.getElementById('decodeInput').value.trim();
            if (!input) return;
            document.getElementById('decodePreview').src = input;
            document.getElementById('decodeOutput').style.display = '';
        }

        function downloadDecoded() {
            const src = document.getElementById('decodePreview').src;
            const a = document.createElement('a');
            a.href = src;
            const match = src.match(/data:image\/(\w+)/);
            a.download = 'image.' + (match ? match[1] : 'png');
            a.click();
        }
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
