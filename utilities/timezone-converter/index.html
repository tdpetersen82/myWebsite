<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone Converter — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .tz-row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 16px; }
        .tz-row > div { flex: 1; min-width: 180px; }
        .tz-row label { display: block; font-size: 0.85em; color: #666; margin-bottom: 4px; }
        .tz-row select, .tz-row input { width: 100%; }
        .result-box { background: #f0f4ff; border-radius: 10px; padding: 20px; margin-top: 16px; }
        .result-box .converted-time { font-size: 2em; font-weight: 700; color: #667eea; }
        .result-box .converted-detail { color: #666; margin-top: 4px; }
        .now-btn { background: #667eea; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 0.9em; margin-top: 4px; }
        .now-btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#127760; Timezone Converter</h1>
        <p class="subtitle">Convert times between any major timezone instantly.</p>

        <div class="tool-area">
            <div class="tz-row">
                <div>
                    <label>Time</label>
                    <input type="datetime-local" id="timeInput">
                    <button class="now-btn" id="nowBtn">Now</button>
                </div>
                <div>
                    <label>From Timezone</label>
                    <select id="fromTz"></select>
                </div>
                <div>
                    <label>To Timezone</label>
                    <select id="toTz"></select>
                </div>
            </div>

            <div class="result-box" id="result" style="display:none;">
                <div class="converted-time" id="convertedTime"></div>
                <div class="converted-detail" id="convertedDetail"></div>
            </div>
        </div>
    </div>

    <script>
        const timezones = [
            'America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
            'America/Anchorage','America/Toronto','America/Mexico_City','America/Sao_Paulo',
            'Europe/London','Europe/Paris','Europe/Berlin','Europe/Moscow',
            'Asia/Dubai','Asia/Kolkata','Asia/Bangkok','Asia/Shanghai',
            'Asia/Tokyo','Asia/Seoul','Asia/Singapore','Asia/Hong_Kong',
            'Australia/Sydney','Australia/Perth','Pacific/Auckland','Pacific/Honolulu',
            'Africa/Cairo','Africa/Lagos'
        ];

        const fromTz = document.getElementById('fromTz');
        const toTz = document.getElementById('toTz');
        const timeInput = document.getElementById('timeInput');

        timezones.forEach(tz => {
            fromTz.add(new Option(tz.replace(/_/g,' '), tz));
            toTz.add(new Option(tz.replace(/_/g,' '), tz));
        });

        // Default: local tz guess
        const guess = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (timezones.includes(guess)) fromTz.value = guess;
        toTz.value = 'Europe/London';

        function setNow() {
            const now = new Date();
            const off = now.getTimezoneOffset();
            const local = new Date(now.getTime() - off * 60000);
            timeInput.value = local.toISOString().slice(0, 16);
            convert();
        }

        document.getElementById('nowBtn').addEventListener('click', setNow);

        function convert() {
            if (!timeInput.value) return;
            const srcTz = fromTz.value;
            const dstTz = toTz.value;

            // Parse the input as a time in the source timezone
            // Create a date, find the offset for source tz, adjust
            const naive = new Date(timeInput.value);

            // Format in source tz to get effective UTC
            const srcStr = naive.toLocaleString('en-US', { timeZone: srcTz });
            const srcDate = new Date(srcStr);
            const utcDate = new Date(naive.getTime() + (naive.getTime() - srcDate.getTime()));

            const opts = { timeZone: dstTz, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const formatted = new Intl.DateTimeFormat('en-US', opts).format(utcDate);

            const timeOnly = new Intl.DateTimeFormat('en-US', { timeZone: dstTz, hour: '2-digit', minute: '2-digit', hour12: true }).format(utcDate);

            document.getElementById('convertedTime').textContent = timeOnly;
            document.getElementById('convertedDetail').textContent = formatted + ' (' + dstTz.replace(/_/g,' ') + ')';
            document.getElementById('result').style.display = '';
        }

        timeInput.addEventListener('change', convert);
        fromTz.addEventListener('change', convert);
        toTz.addEventListener('change', convert);

        setNow();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
