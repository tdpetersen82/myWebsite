<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Shadow Generator — Free Online Tool</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .shadow-preview-area {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            min-height: 220px;
        }
        .shadow-box {
            width: 160px;
            height: 160px;
            background: #fff;
            border-radius: 12px;
            transition: box-shadow 0.2s;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
            font-size: 0.9em;
        }
        .control-group input[type="range"] {
            width: 100%;
        }
        .range-value {
            font-weight: 600;
            color: #667eea;
        }
        .color-opacity-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .color-opacity-row input[type="color"] {
            width: 60px;
            height: 36px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            padding: 2px;
        }
        .color-opacity-row label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .toggle-row label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }
        .shadow-list {
            margin-bottom: 12px;
        }
        .shadow-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.85em;
            font-family: 'Courier New', monospace;
            color: #333;
        }
        .shadow-item button {
            background: #d33;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .shadow-item.active {
            border: 2px solid #667eea;
        }
        .shadow-item:not(.active) {
            border: 2px solid transparent;
            cursor: pointer;
        }
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DP6FGVETMV"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-DP6FGVETMV");</script>
</head>
<body>
    <div class="container">
        <h1>🔲 Box Shadow Generator</h1>
        <p class="subtitle">Design CSS box shadows visually with multiple layers, then copy the code.</p>

        <div class="tool-area">
            <div class="shadow-preview-area">
                <div class="shadow-box" id="shadowBox"></div>
            </div>

            <div class="shadow-list" id="shadowList"></div>

            <div class="btn-row">
                <button class="copy-btn" id="addShadowBtn">+ Add Shadow</button>
            </div>

            <div id="editorPanel">
                <div class="control-group">
                    <label>Horizontal Offset <span class="range-value" id="hVal">5</span>px</label>
                    <input type="range" id="hOffset" min="-50" max="50" value="5">
                </div>
                <div class="control-group">
                    <label>Vertical Offset <span class="range-value" id="vVal">5</span>px</label>
                    <input type="range" id="vOffset" min="-50" max="50" value="5">
                </div>
                <div class="control-group">
                    <label>Blur <span class="range-value" id="bVal">15</span>px</label>
                    <input type="range" id="blur" min="0" max="100" value="15">
                </div>
                <div class="control-group">
                    <label>Spread <span class="range-value" id="sVal">0</span>px</label>
                    <input type="range" id="spread" min="-50" max="50" value="0">
                </div>
                <div class="color-opacity-row">
                    <label>Color</label>
                    <input type="color" id="shadowColor" value="#000000">
                    <label>Opacity <span class="range-value" id="oVal">25</span>%</label>
                    <input type="range" id="opacity" min="0" max="100" value="25" style="flex:1;">
                </div>
                <div class="toggle-row">
                    <input type="checkbox" id="insetToggle">
                    <label for="insetToggle">Inset Shadow</label>
                </div>
            </div>

            <div class="tool-output" id="cssOutput"></div>
            <div style="margin-top:10px;">
                <button class="copy-btn" id="copyBtn">Copy CSS</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        let shadows = [
            { h: 5, v: 5, blur: 15, spread: 0, color: '#000000', opacity: 25, inset: false }
        ];
        let activeIndex = 0;

        const hOffsetEl = document.getElementById('hOffset');
        const vOffsetEl = document.getElementById('vOffset');
        const blurEl = document.getElementById('blur');
        const spreadEl = document.getElementById('spread');
        const colorEl = document.getElementById('shadowColor');
        const opacityEl = document.getElementById('opacity');
        const insetEl = document.getElementById('insetToggle');

        const hValEl = document.getElementById('hVal');
        const vValEl = document.getElementById('vVal');
        const bValEl = document.getElementById('bVal');
        const sValEl = document.getElementById('sVal');
        const oValEl = document.getElementById('oVal');

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function shadowToCSS(s) {
            const rgb = hexToRgb(s.color);
            const a = (s.opacity / 100).toFixed(2);
            return (s.inset ? 'inset ' : '') + s.h + 'px ' + s.v + 'px ' + s.blur + 'px ' + s.spread + 'px rgba(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ', ' + a + ')';
        }

        function update() {
            // Save current controls to active shadow
            shadows[activeIndex] = {
                h: parseInt(hOffsetEl.value),
                v: parseInt(vOffsetEl.value),
                blur: parseInt(blurEl.value),
                spread: parseInt(spreadEl.value),
                color: colorEl.value,
                opacity: parseInt(opacityEl.value),
                inset: insetEl.checked
            };

            const cssVal = shadows.map(shadowToCSS).join(',\n    ');
            const fullCSS = 'box-shadow: ' + cssVal + ';';
            document.getElementById('shadowBox').style.boxShadow = shadows.map(shadowToCSS).join(', ');
            document.getElementById('cssOutput').textContent = fullCSS;

            hValEl.textContent = hOffsetEl.value;
            vValEl.textContent = vOffsetEl.value;
            bValEl.textContent = blurEl.value;
            sValEl.textContent = spreadEl.value;
            oValEl.textContent = opacityEl.value;

            renderList();
        }

        function loadShadow(idx) {
            activeIndex = idx;
            const s = shadows[idx];
            hOffsetEl.value = s.h;
            vOffsetEl.value = s.v;
            blurEl.value = s.blur;
            spreadEl.value = s.spread;
            colorEl.value = s.color;
            opacityEl.value = s.opacity;
            insetEl.checked = s.inset;

            hValEl.textContent = s.h;
            vValEl.textContent = s.v;
            bValEl.textContent = s.blur;
            sValEl.textContent = s.spread;
            oValEl.textContent = s.opacity;

            renderList();
        }

        function renderList() {
            const listEl = document.getElementById('shadowList');
            listEl.innerHTML = '';
            shadows.forEach(function(s, i) {
                const div = document.createElement('div');
                div.className = 'shadow-item' + (i === activeIndex ? ' active' : '');
                const span = document.createElement('span');
                span.textContent = 'Shadow ' + (i + 1) + ': ' + shadowToCSS(s);
                span.style.overflow = 'hidden';
                span.style.textOverflow = 'ellipsis';
                span.style.whiteSpace = 'nowrap';
                span.style.flex = '1';
                div.appendChild(span);
                if (i !== activeIndex) {
                    div.addEventListener('click', function() { loadShadow(i); });
                }
                if (shadows.length > 1) {
                    const del = document.createElement('button');
                    del.textContent = 'Remove';
                    del.addEventListener('click', function(e) {
                        e.stopPropagation();
                        shadows.splice(i, 1);
                        if (activeIndex >= shadows.length) activeIndex = shadows.length - 1;
                        loadShadow(activeIndex);
                        update();
                    });
                    div.appendChild(del);
                }
                listEl.appendChild(div);
            });
        }

        [hOffsetEl, vOffsetEl, blurEl, spreadEl, opacityEl].forEach(function(el) {
            el.addEventListener('input', update);
        });
        colorEl.addEventListener('input', update);
        insetEl.addEventListener('change', update);

        document.getElementById('addShadowBtn').addEventListener('click', function() {
            shadows.push({ h: 0, v: 0, blur: 10, spread: 0, color: '#000000', opacity: 20, inset: false });
            loadShadow(shadows.length - 1);
            update();
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            navigator.clipboard.writeText(document.getElementById('cssOutput').textContent).then(() => {
                this.textContent = 'Copied!';
                setTimeout(() => this.textContent = 'Copy CSS', 1200);
            });
        });

        update();
    })();
    </script>
    <script src="../../nav.js"></script>
</body>
</html>
