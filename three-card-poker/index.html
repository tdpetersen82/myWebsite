<body>
    <div class="container">
        <h1>&#x1F0CF; Three Card Poker</h1>
        <div id="game-wrapper">

            <!-- Header -->
            <div class="tcp-header">
                <h1>&#x1F0CF; Three Card Poker</h1>
                <div class="tcp-bankroll">Bankroll: <span id="bankroll-value">$1,000</span></div>
                <button class="btn-hints" id="btn-hints">Hints: OFF</button>
            </div>

            <!-- Table -->
            <div class="tcp-table">

                <!-- Dealer Hand -->
                <div class="hand-area" id="dealer-area">
                    <div class="hand-label">Dealer</div>
                    <div class="hand-value" id="dealer-value"></div>
                    <div class="cards-row" id="dealer-cards"></div>
                </div>

                <!-- Message -->
                <div class="message-area" id="message">Place your bets</div>

                <!-- Result Banner -->
                <div class="result-banner" id="result-banner"></div>

                <!-- Bet Circles -->
                <div class="bet-circles">
                    <div class="bet-circle" id="circle-pair-plus">
                        <div class="bet-circle-label">PAIR PLUS</div>
                        <div class="bet-circle-amount" id="pair-plus-amount"></div>
                    </div>
                    <div class="bet-circle" id="circle-ante">
                        <div class="bet-circle-label">ANTE</div>
                        <div class="bet-circle-amount" id="ante-amount"></div>
                    </div>
                    <div class="bet-circle" id="circle-play">
                        <div class="bet-circle-label">PLAY</div>
                        <div class="bet-circle-amount" id="play-amount"></div>
                    </div>
                </div>

                <!-- Player Hand -->
                <div class="hand-area" id="player-area">
                    <div class="hand-label">Player</div>
                    <div class="hand-value" id="player-value"></div>
                    <div class="cards-row" id="player-cards"></div>
                </div>

                <!-- Hint Panel -->
                <div class="hint-panel" id="hint-panel">
                    <div class="hint-header">
                        <span class="hint-action" id="hint-action"></span>
                        <span class="hint-risk" id="hint-risk"></span>
                    </div>
                    <div class="hint-explanation" id="hint-explanation"></div>
                    <div class="hint-detail-toggle" id="hint-detail-toggle">Learn More &#9656;</div>
                    <div class="hint-detail" id="hint-detail"></div>
                </div>

                <!-- Action Buttons -->
                <div class="action-bar" id="action-bar" style="display:none">
                    <button class="btn-action btn-play" id="btn-play">Play</button>
                    <button class="btn-action btn-fold" id="btn-fold">Fold</button>
                </div>

                <!-- Betting Area -->
                <div class="betting-area" id="betting-area">
                    <div class="bet-selector">
                        <button class="bet-target active" id="target-ante" data-target="ante">Ante</button>
                        <button class="bet-target" id="target-pair-plus" data-target="pairplus">Pair Plus</button>
                    </div>
                    <div class="chip-rack" id="chip-rack">
                        <div class="chip" data-value="5" style="background: #e74c3c; border-color: #c0392b;">$5</div>
                        <div class="chip" data-value="25" style="background: #27ae60; border-color: #1e8449;">$25</div>
                        <div class="chip" data-value="100" style="background: #2980b9; border-color: #1f6fa5;">$100</div>
                        <div class="chip" data-value="500" style="background: #8e44ad; border-color: #6c3483;">$500</div>
                    </div>
                    <div class="bet-display">
                        <button class="btn-clear" id="btn-clear">Clear</button>
                        <span>Ante: <span class="bet-amount" id="bet-ante-display">$0</span></span>
                        <span>PP: <span class="bet-amount" id="bet-pp-display">$0</span></span>
                        <button class="btn-rebet" id="btn-rebet">Rebet</button>
                        <button class="btn-deal" id="btn-deal" disabled>Deal</button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-bar" id="stats-bar">
                    <span>Played: 0</span>
                    <span>Wins: 0</span>
                    <span>Bonuses: 0</span>
                    <span>Best: $1,000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Auto-scaling -->
    <script>
    (function() {
        var wrapper = document.getElementById('game-wrapper');
        function resize() {
            var W = 960, H = 640;
            var s = Math.min(window.innerWidth / W, (window.innerHeight * 0.85) / H, 1);
            wrapper.style.transform = 'scale(' + s + ')';
            wrapper.style.transformOrigin = 'top center';
            wrapper.style.marginTop = Math.max(0, (window.innerHeight * 0.85 - H * s) / 2) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();
    })();
    </script>
