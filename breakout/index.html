<body>
    <div class="container">
        <h1>🧱 Breakout</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>Lives: <span id="lives">3</span></p>
            <p>Level: <span id="level">1</span></p>
        </div>
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div class="controls">
            <p>Move mouse or use ← → arrow keys</p>
            <p>Press Space to launch ball</p>
            <button id="restartBtn" class="play-button">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const levelElement = document.getElementById('level');
        const restartBtn = document.getElementById('restartBtn');

        // Sound effects using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(frequency, duration, type = 'sine') {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playPaddleHitSound() {
            playSound(400, 0.1, 'square');
        }

        function playBrickBreakSound() {
            playSound(600, 0.1, 'sine');
        }

        function playLevelUpSound() {
            playSound(500, 0.15);
            setTimeout(() => playSound(700, 0.15), 100);
            setTimeout(() => playSound(900, 0.2), 200);
        }

        function playLoseLifeSound() {
            playSound(250, 0.2, 'sawtooth');
        }

        function playGameOverSound() {
            playSound(200, 0.1);
            setTimeout(() => playSound(150, 0.2), 100);
        }

        const paddle = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            width: 100,
            height: 15,
            speed: 8,
            dx: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: paddle.y - 10,
            radius: 8,
            dx: 0,
            dy: 0,
            speed: 5,
            launched: false
        };

        const brick = {
            rows: 5,
            cols: 8,
            width: 70,
            height: 25,
            padding: 5,
            offsetX: 15,
            offsetY: 50
        };

        let bricks = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let gameRunning = false;
        let gameLoop;
        let lastFrameTime = 0;
        const targetFPS = 60;
        const frameDelay = 1000 / targetFPS;

        const BRICK_COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];
        const HARD_BRICK_COLOR = '#FFD700';
        const HARD_BRICK_COLOR2 = '#C0C0C0';

        function initBricks() {
            // More rows at higher levels (5 base, +1 every 2 levels, max 8)
            const rows = Math.min(8, 5 + Math.floor((level - 1) / 2));
            bricks = [];
            const pattern = (level - 1) % 4; // Cycle through 4 patterns
            for (let row = 0; row < rows; row++) {
                bricks[row] = [];
                for (let col = 0; col < brick.cols; col++) {
                    let active = true;
                    // Different patterns per level
                    if (pattern === 1) {
                        // Checkerboard
                        active = (row + col) % 2 === 0;
                    } else if (pattern === 2) {
                        // Diamond shape
                        const centerR = (rows - 1) / 2;
                        const centerC = (brick.cols - 1) / 2;
                        active = Math.abs(row - centerR) / centerR + Math.abs(col - centerC) / centerC <= 1.2;
                    } else if (pattern === 3) {
                        // Alternating rows offset
                        active = row % 2 === 0 ? col < brick.cols - 1 : col > 0;
                    }
                    // Multi-hit bricks starting level 3
                    let hits = 1;
                    if (level >= 3 && row <= 1) hits = 2;
                    if (level >= 6 && row === 0) hits = 3;

                    bricks[row][col] = {
                        x: brick.offsetX + col * (brick.width + brick.padding),
                        y: brick.offsetY + row * (brick.height + brick.padding),
                        status: active ? hits : 0,
                        maxHits: hits,
                        color: BRICK_COLORS[row % BRICK_COLORS.length]
                    };
                }
            }
        }

        function drawBricks() {
            bricks.forEach(row => {
                row.forEach(b => {
                    if (b.status > 0) {
                        // Color based on remaining hits
                        if (b.status >= 3) ctx.fillStyle = HARD_BRICK_COLOR;
                        else if (b.status === 2) ctx.fillStyle = HARD_BRICK_COLOR2;
                        else ctx.fillStyle = b.color;
                        ctx.fillRect(b.x, b.y, brick.width, brick.height);
                        ctx.strokeStyle = '#000';
                        ctx.strokeRect(b.x, b.y, brick.width, brick.height);
                        // Show hit indicator for multi-hit bricks
                        if (b.maxHits > 1 && b.status > 1) {
                            ctx.fillStyle = 'rgba(0,0,0,0.4)';
                            ctx.font = 'bold 12px Arial';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(b.status, b.x + brick.width / 2, b.y + brick.height / 2);
                        }
                    }
                });
            });
        }

        function drawPaddle() {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle = '#2E7D32';
            ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#FF5252';
            ctx.fill();
            ctx.strokeStyle = '#C62828';
            ctx.stroke();
            ctx.closePath();
        }

        function drawGame() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawPaddle();
            drawBall();
        }

        function collisionDetection() {
            bricks.forEach(row => {
                row.forEach(b => {
                    if (b.status > 0) {
                        if (ball.x + ball.radius > b.x &&
                            ball.x - ball.radius < b.x + brick.width &&
                            ball.y + ball.radius > b.y &&
                            ball.y - ball.radius < b.y + brick.height) {

                            // Determine which side of the brick was hit
                            const overlapLeft = (ball.x + ball.radius) - b.x;
                            const overlapRight = (b.x + brick.width) - (ball.x - ball.radius);
                            const overlapTop = (ball.y + ball.radius) - b.y;
                            const overlapBottom = (b.y + brick.height) - (ball.y - ball.radius);
                            const minOverlapX = Math.min(overlapLeft, overlapRight);
                            const minOverlapY = Math.min(overlapTop, overlapBottom);

                            if (minOverlapX < minOverlapY) {
                                ball.dx = -ball.dx;
                            } else {
                                ball.dy = -ball.dy;
                            }
                            b.status--;
                            score += 10;
                            scoreElement.textContent = score;
                            playBrickBreakSound();

                            // Check if all bricks are destroyed
                            if (bricks.every(row => row.every(b => b.status === 0))) {
                                nextLevel();
                            }
                        }
                    }
                });
            });
        }

        function nextLevel() {
            level++;
            levelElement.textContent = level;
            ball.speed += 0.5;
            // Shrink paddle slightly each level (min 60px)
            paddle.width = Math.max(60, 100 - (level - 1) * 5);
            playLevelUpSound();
            initBricks();
            resetBall();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = paddle.y - 10;
            ball.dx = 0;
            ball.dy = 0;
            ball.launched = false;
        }

        function loseLife() {
            lives--;
            livesElement.textContent = lives;
            playLoseLifeSound();
            
            if (lives === 0) {
                gameOver();
            } else {
                resetBall();
            }
        }

        function update(currentTime) {
            if (!gameRunning) return;

            // Frame rate limiting
            const deltaTime = currentTime - lastFrameTime;
            if (deltaTime < frameDelay) {
                gameLoop = requestAnimationFrame(update);
                return;
            }
            lastFrameTime = currentTime - (deltaTime % frameDelay);

            // Move paddle
            paddle.x += paddle.dx;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }

            // If ball not launched, keep it on paddle
            if (!ball.launched) {
                ball.x = paddle.x + paddle.width / 2;
            } else {
                // Move ball
                ball.x += ball.dx;
                ball.y += ball.dy;

                // Wall collision (sides)
                if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                    ball.dx = -ball.dx;
                }

                // Wall collision (top)
                if (ball.y - ball.radius < 0) {
                    ball.dy = -ball.dy;
                }

                // Paddle collision
                if (ball.y + ball.radius > paddle.y &&
                    ball.y - ball.radius < paddle.y + paddle.height &&
                    ball.x + ball.radius > paddle.x &&
                    ball.x - ball.radius < paddle.x + paddle.width) {
                    
                    // Add angle based on where ball hits paddle
                    let hitPos = (ball.x - paddle.x) / paddle.width;
                    ball.dx = (hitPos - 0.5) * ball.speed * 2;
                    // Clamp dx and normalize to maintain constant ball speed
                    ball.dx = Math.max(-ball.speed * 0.9, Math.min(ball.speed * 0.9, ball.dx));
                    ball.dy = -Math.sqrt(ball.speed * ball.speed - ball.dx * ball.dx);
                    playPaddleHitSound();
                }

                // Ball falls below paddle
                if (ball.y + ball.radius > canvas.height) {
                    loseLife();
                }

                collisionDetection();
            }

            drawGame();
            gameLoop = requestAnimationFrame(update);
        }

        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            playGameOverSound();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);
            ctx.font = '20px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
        }

        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            ball.speed = 5;
            
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            levelElement.textContent = level;
            
            paddle.x = canvas.width / 2 - paddle.width / 2;
            initBricks();
            resetBall();
            
            gameRunning = true;
            lastFrameTime = performance.now();
            gameLoop = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                if (!gameRunning) {
                    startGame();
                } else if (!ball.launched) {
                    ball.launched = true;
                    ball.dx = (Math.random() - 0.5) * ball.speed * 2;
                    ball.dy = -ball.speed;
                }
            }

            if (e.key === 'ArrowLeft') {
                paddle.dx = -paddle.speed;
            } else if (e.key === 'ArrowRight') {
                paddle.dx = paddle.speed;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                paddle.dx = 0;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;
            
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
        });

        restartBtn.addEventListener('click', startGame);

        // Draw initial state
        initBricks();
        drawGame();

        // Auto-scale canvas to fit viewport
        (function() {
            const c = document.getElementById('gameCanvas');
            const bw = c.width, bh = c.height;
            function sc() {
                const par = c.parentElement;
                const ps = getComputedStyle(par);
                const mw = par.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const mh = window.innerHeight * 0.75;
                const s = Math.min(mw / bw, mh / bh, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + s + ')';
                c.style.marginBottom = (-(bh * (1 - s))) + 'px';
            }
            window.addEventListener('resize', sc);
            sc();
        })();
    </script>
