<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stack Tower</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #1a1a2e;
            display: block;
            margin: 20px auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ Stack Tower</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <p>Tap, Click, or press Space to stack blocks</p>
            <button id="restartBtn" class="play-button">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        // ── Constants ──
        const W = canvas.width;
        const H = canvas.height;
        const BLOCK_HEIGHT = 28;
        const INITIAL_WIDTH = 200;
        const INITIAL_SPEED = 2.5;
        const SPEED_INCREMENT = 0.12;
        const PERFECT_THRESHOLD = 4;

        // ── Sound ──
        function playSound(freq, type, duration) {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type || 'square';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.2, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (duration || 0.1));
                o.start(); o.stop(c.currentTime + (duration || 0.1));
            } catch(e) {}
        }

        // ── Game State ──
        let blocks, currentBlock, fallingPieces, score, highScore, gameOver, gameStarted;
        let cameraY, targetCameraY, perfectStreak;
        let lastTime = 0;
        let showPerfect = 0;

        highScore = parseInt(localStorage.getItem('stackTowerHighScore')) || 0;
        highScoreElement.textContent = highScore;

        function blockColor(index) {
            const hue = (index * 25 + 200) % 360;
            return 'hsl(' + hue + ', 70%, 55%)';
        }
        function blockColorDark(index) {
            const hue = (index * 25 + 200) % 360;
            return 'hsl(' + hue + ', 70%, 40%)';
        }

        function init() {
            blocks = [{
                x: W / 2 - INITIAL_WIDTH / 2,
                y: H - BLOCK_HEIGHT - 40,
                width: INITIAL_WIDTH
            }];
            currentBlock = {
                x: 0,
                y: blocks[0].y - BLOCK_HEIGHT,
                width: INITIAL_WIDTH,
                speed: INITIAL_SPEED,
                direction: 1
            };
            fallingPieces = [];
            score = 0;
            gameOver = false;
            gameStarted = false;
            cameraY = 0;
            targetCameraY = 0;
            perfectStreak = 0;
            showPerfect = 0;
            scoreElement.textContent = '0';
            draw();
        }

        function dropBlock() {
            if (gameOver) { init(); return; }
            if (!gameStarted) { gameStarted = true; }

            const top = blocks[blocks.length - 1];
            const cur = currentBlock;

            // Calculate overlap
            const overlapLeft = Math.max(cur.x, top.x);
            const overlapRight = Math.min(cur.x + cur.width, top.x + top.width);
            const overlapWidth = overlapRight - overlapLeft;

            if (overlapWidth <= 0) {
                // Complete miss — game over
                fallingPieces.push({x: cur.x, y: cur.y, width: cur.width, vy: 0, color: blockColor(blocks.length)});
                gameOver = true;
                playSound(150, 'sawtooth', 0.3);
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('stackTowerHighScore', highScore);
                }
                return;
            }

            // Check for perfect
            if (Math.abs(cur.x - top.x) < PERFECT_THRESHOLD && Math.abs(cur.width - top.width) < PERFECT_THRESHOLD) {
                // Perfect stack — snap to previous block
                blocks.push({x: top.x, y: cur.y, width: top.width});
                perfectStreak++;
                showPerfect = 60;
                playSound(800, 'sine', 0.1);
                setTimeout(() => playSound(1000, 'sine', 0.1), 60);
            } else {
                perfectStreak = 0;
                // Trim overhang
                blocks.push({x: overlapLeft, y: cur.y, width: overlapWidth});

                // Create falling piece for the trimmed part
                if (cur.x < top.x) {
                    fallingPieces.push({x: cur.x, y: cur.y, width: overlapLeft - cur.x, vy: 0, color: blockColor(blocks.length - 1)});
                }
                if (cur.x + cur.width > top.x + top.width) {
                    fallingPieces.push({x: overlapRight, y: cur.y, width: (cur.x + cur.width) - overlapRight, vy: 0, color: blockColor(blocks.length - 1)});
                }
                playSound(500, 'sine', 0.05);
            }

            score++;
            scoreElement.textContent = score;
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('stackTowerHighScore', highScore);
            }

            // Set up next block
            const placed = blocks[blocks.length - 1];
            currentBlock = {
                x: Math.random() < 0.5 ? -placed.width : W,
                y: placed.y - BLOCK_HEIGHT,
                width: placed.width,
                speed: INITIAL_SPEED + score * SPEED_INCREMENT,
                direction: Math.random() < 0.5 ? 1 : -1
            };

            // Camera
            const stackTop = currentBlock.y;
            if (stackTop < H * 0.4) {
                targetCameraY = H * 0.4 - stackTop;
            }
        }

        // ── Drawing ──
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0f0c29');
            grad.addColorStop(0.5, '#302b63');
            grad.addColorStop(1, '#24243e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Lerp camera
            cameraY += (targetCameraY - cameraY) * 0.08;

            ctx.save();
            ctx.translate(0, cameraY);

            // Draw placed blocks
            for (let i = 0; i < blocks.length; i++) {
                const b = blocks[i];
                ctx.fillStyle = blockColor(i);
                ctx.fillRect(b.x, b.y, b.width, BLOCK_HEIGHT);
                // Top edge highlight
                ctx.fillStyle = blockColorDark(i);
                ctx.fillRect(b.x, b.y + BLOCK_HEIGHT - 3, b.width, 3);
            }

            // Draw current block
            if (!gameOver && gameStarted) {
                ctx.fillStyle = blockColor(blocks.length);
                ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, BLOCK_HEIGHT);
                ctx.fillStyle = blockColorDark(blocks.length);
                ctx.fillRect(currentBlock.x, currentBlock.y + BLOCK_HEIGHT - 3, currentBlock.width, 3);
            }

            // Draw falling pieces
            for (const fp of fallingPieces) {
                ctx.globalAlpha = Math.max(0, 1 - fp.vy / 15);
                ctx.fillStyle = fp.color;
                ctx.fillRect(fp.x, fp.y, fp.width, BLOCK_HEIGHT);
                ctx.globalAlpha = 1;
            }

            ctx.restore();

            // Perfect text
            if (showPerfect > 0) {
                ctx.save();
                ctx.globalAlpha = showPerfect / 60;
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const streakText = perfectStreak > 1 ? 'PERFECT x' + perfectStreak + '!' : 'PERFECT!';
                ctx.fillText(streakText, W / 2, H * 0.3);
                ctx.restore();
            }

            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 42px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over', W / 2, H / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Tap to restart', W / 2, H / 2 + 50);
            }

            // Start prompt
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Tap to Start', W / 2, H * 0.3);
            }
        }

        // ── Game Loop ──
        function update(timestamp) {
            requestAnimationFrame(update);
            if (!gameStarted || gameOver) { draw(); return; }

            // Move current block
            currentBlock.x += currentBlock.speed * currentBlock.direction;
            if (currentBlock.x + currentBlock.width > W) {
                currentBlock.direction = -1;
                currentBlock.x = W - currentBlock.width;
            }
            if (currentBlock.x < 0) {
                currentBlock.direction = 1;
                currentBlock.x = 0;
            }

            // Update falling pieces
            for (let i = fallingPieces.length - 1; i >= 0; i--) {
                fallingPieces[i].vy += 0.4;
                fallingPieces[i].y += fallingPieces[i].vy;
                if (fallingPieces[i].y > H + 200 - cameraY) {
                    fallingPieces.splice(i, 1);
                }
            }

            if (showPerfect > 0) showPerfect--;

            draw();
        }

        // ── Input ──
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            dropBlock();
        });
        canvas.addEventListener('click', function() {
            dropBlock();
        });
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                dropBlock();
            }
        });
        restartBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            init();
        });

        // ── Auto-Scale ──
        (function() {
            const c = document.getElementById('gameCanvas');
            const baseWidth = c.width, baseHeight = c.height;
            function scale() {
                const parent = c.parentElement;
                const ps = getComputedStyle(parent);
                const maxWidth = parent.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const maxHeight = window.innerHeight * 0.75;
                const scaleFactor = Math.min(maxWidth / baseWidth, maxHeight / baseHeight, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + scaleFactor + ')';
                c.style.marginBottom = (-(baseHeight * (1 - scaleFactor))) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();

        init();
        requestAnimationFrame(update);
    </script>
    <script src="../nav.js"></script>
</body>
</html>
