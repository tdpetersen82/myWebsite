<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemmings</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        #game-container canvas {
            border-radius: 10px;
        }
        .skill-toolbar {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .skill-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 10px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #2a2a3e;
            color: #fff;
            cursor: pointer;
            font-size: 11px;
            min-width: 58px;
            transition: all 0.15s;
            font-family: monospace;
        }
        .skill-btn:hover { background: #3a3a5e; border-color: #888; }
        .skill-btn.selected { background: #5a3a8e; border-color: #a855f7; box-shadow: 0 0 8px rgba(168,85,247,0.5); }
        .skill-btn.disabled { opacity: 0.4; cursor: default; }
        .skill-btn .skill-icon { font-size: 18px; margin-bottom: 2px; }
        .skill-btn .skill-count { font-size: 13px; font-weight: bold; color: #fbbf24; }
        .game-controls-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .ctrl-btn {
            padding: 5px 14px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #2a2a3e;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-family: monospace;
            transition: all 0.15s;
        }
        .ctrl-btn:hover { background: #3a3a5e; border-color: #888; }
        .ctrl-btn.active { background: #854d0e; border-color: #f59e0b; }
        .rate-control { display: flex; align-items: center; gap: 4px; color: #fff; font-family: monospace; font-size: 13px; }
        .rate-btn { width: 28px; height: 28px; border-radius: 6px; border: 2px solid #555; background: #2a2a3e; color: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .rate-btn:hover { background: #3a3a5e; }
        .lives-display { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐭 Lemmings</h1>
        <div class="game-info">
            <p>Level: <span id="levelName">-</span></p>
            <p>Out: <span id="outCount">0</span></p>
            <p>Saved: <span id="savedCount">0</span></p>
            <p>Need: <span id="needCount">0</span></p>
        </div>
        <div id="game-container"></div>
        <div class="skill-toolbar" id="skillToolbar"></div>
        <div class="game-controls-bar">
            <div class="rate-control">
                <button class="rate-btn" id="rateDown">-</button>
                <span>Rate: <span id="releaseRate">50</span></span>
                <button class="rate-btn" id="rateUp">+</button>
            </div>
            <button class="ctrl-btn" id="pauseBtn">⏸ Pause</button>
            <button class="ctrl-btn" id="nukeBtn">☢ Nuke</button>
        </div>
        <div class="controls">
            <p>Click a skill, then click a lemming to assign it. Scroll left/right by moving mouse to edges.</p>
            <button id="restartBtn" class="play-button">Restart Level</button>
        </div>
    </div>

    <script>
    // ─── Sound Effects ──────────────────────────────────────────
    function playSound(freq, type, duration) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = type || 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (duration || 0.1));
            osc.start();
            osc.stop(ctx.currentTime + (duration || 0.1));
        } catch(e) {}
    }
    function sndSpawn() { playSound(880, 'sine', 0.08); }
    function sndAssign() { playSound(600, 'square', 0.06); }
    function sndBuild() { playSound(400, 'sine', 0.05); }
    function sndDig() { playSound(200, 'sawtooth', 0.06); }
    function sndExplode() { playSound(80, 'sawtooth', 0.4); }
    function sndSaved() { playSound(1200, 'sine', 0.15); setTimeout(() => playSound(1500, 'sine', 0.15), 150); }
    function sndSplat() { playSound(100, 'triangle', 0.2); }
    function sndWin() { [0,150,300,450].forEach((d,i) => setTimeout(() => playSound([523,659,784,1047][i], 'sine', 0.2), d)); }

    // ─── Constants ──────────────────────────────────────────────
    const GAME_W = 1600;
    const GAME_H = 560;
    const VIEW_W = 800;
    const VIEW_H = 560;
    const LEMMING_W = 8;
    const LEMMING_H = 12;
    const GRAVITY = 1;
    const MAX_FALL = 60;
    const WALK_SPEED = 0.7;
    const CLIMB_SPEED = 0.7;
    const FLOAT_SPEED = 1;
    const BUILD_STEPS = 12;
    const BUILD_STEP_W = 6;
    const BUILD_STEP_H = 2;
    const DIG_RATE = 2;
    const BASH_RATE = 2;
    const MINE_RATE = 2;
    const EXPLODE_RADIUS = 20;
    const SCROLL_ZONE = 60;
    const SCROLL_SPEED = 6;

    // ─── Level Data ─────────────────────────────────────────────
    const LEVELS = [
        {
            name: "Just Dig!",
            numLemmings: 10,
            saveRequired: 8,
            releaseRate: 50,
            timeLimit: 180,
            entrance: { x: 400, y: 30 },
            exit: { x: 400, y: 480 },
            skills: { climber: 0, floater: 0, blocker: 0, builder: 0, basher: 0, digger: 10, miner: 0, bomber: 0 },
            build(ctx, w, h) {
                ctx.fillStyle = '#5a7a3a';
                // Top platform where lemmings land
                ctx.fillRect(300, 80, 200, 20);
                // Thick main platform
                ctx.fillStyle = '#4a6a2a';
                ctx.fillRect(100, 200, 600, 40);
                // Second thick platform
                ctx.fillRect(150, 340, 500, 40);
                // Ground at bottom
                ctx.fillStyle = '#3a5a1a';
                ctx.fillRect(0, 500, 800, 60);
                // Exit platform
                ctx.fillRect(350, 470, 100, 30);
            }
        },
        {
            name: "Build to Safety",
            numLemmings: 15,
            saveRequired: 10,
            releaseRate: 40,
            timeLimit: 240,
            entrance: { x: 200, y: 30 },
            exit: { x: 700, y: 420 },
            skills: { climber: 0, floater: 0, blocker: 2, builder: 15, basher: 0, digger: 0, miner: 0, bomber: 2 },
            build(ctx, w, h) {
                ctx.fillStyle = '#6a5a3a';
                // Left platform
                ctx.fillRect(100, 80, 200, 20);
                // Left tall column
                ctx.fillRect(100, 80, 20, 370);
                // Left floor
                ctx.fillRect(100, 430, 200, 20);
                // Gap here - need to build across
                // Right platform
                ctx.fillRect(500, 430, 250, 20);
                // Right wall
                ctx.fillRect(730, 300, 20, 150);
                // Ground
                ctx.fillStyle = '#5a4a2a';
                ctx.fillRect(0, 500, w, 60);
                // Exit ledge
                ctx.fillRect(650, 410, 100, 20);
            }
        },
        {
            name: "Dig & Bash",
            numLemmings: 20,
            saveRequired: 15,
            releaseRate: 50,
            timeLimit: 300,
            entrance: { x: 150, y: 30 },
            exit: { x: 750, y: 440 },
            skills: { climber: 0, floater: 5, blocker: 2, builder: 0, basher: 10, digger: 10, miner: 5, bomber: 2 },
            build(ctx, w, h) {
                // Landing platform
                ctx.fillStyle = '#5a6a4a';
                ctx.fillRect(50, 80, 200, 20);
                // First wall to bash through
                ctx.fillRect(250, 40, 30, 160);
                // Second platform
                ctx.fillRect(250, 180, 250, 20);
                // Wall
                ctx.fillRect(500, 100, 30, 100);
                // Third platform
                ctx.fillRect(500, 180, 300, 20);
                // Floor with sections to dig through
                ctx.fillStyle = '#4a5a3a';
                ctx.fillRect(50, 300, 350, 30);
                ctx.fillRect(500, 300, 300, 30);
                // Lower sections
                ctx.fillRect(100, 430, 300, 30);
                ctx.fillRect(550, 430, 250, 30);
                // Ground
                ctx.fillStyle = '#3a4a2a';
                ctx.fillRect(0, 500, w, 60);
                // Exit area
                ctx.fillRect(700, 460, 100, 40);
            }
        },
        {
            name: "Climb & Float",
            numLemmings: 20,
            saveRequired: 15,
            releaseRate: 45,
            timeLimit: 300,
            entrance: { x: 200, y: 30 },
            exit: { x: 700, y: 120 },
            skills: { climber: 20, floater: 20, blocker: 3, builder: 5, basher: 0, digger: 0, miner: 0, bomber: 2 },
            build(ctx, w, h) {
                // Start ledge
                ctx.fillStyle = '#5a5a7a';
                ctx.fillRect(100, 80, 200, 20);
                // Drop down to pit
                ctx.fillRect(50, 350, 700, 30);
                // Left wall of pit
                ctx.fillRect(50, 80, 20, 300);
                // Right wall (need to climb over)
                ctx.fillRect(500, 150, 20, 200);
                // High exit platform
                ctx.fillRect(600, 140, 200, 20);
                // Tall wall near exit (need climbers)
                ctx.fillRect(750, 140, 20, 210);
                // Extra platform
                ctx.fillRect(520, 250, 100, 15);
                // Ground
                ctx.fillStyle = '#4a4a6a';
                ctx.fillRect(0, 500, w, 60);
            }
        },
        {
            name: "The Full Toolkit",
            numLemmings: 30,
            saveRequired: 20,
            releaseRate: 60,
            timeLimit: 360,
            entrance: { x: 100, y: 30 },
            exit: { x: 1400, y: 420 },
            skills: { climber: 5, floater: 5, blocker: 3, builder: 10, basher: 10, digger: 5, miner: 5, bomber: 3 },
            build(ctx, w, h) {
                ctx.fillStyle = '#6a6a4a';
                // Start platform
                ctx.fillRect(30, 80, 150, 20);
                // Wall 1
                ctx.fillRect(180, 40, 25, 120);
                // Platform 2
                ctx.fillRect(180, 140, 250, 20);
                // Drop zone
                ctx.fillRect(180, 300, 200, 25);
                // Wall 2 (bash through)
                ctx.fillRect(380, 200, 25, 125);
                // Platform 3
                ctx.fillRect(380, 300, 250, 25);
                // Gap - need builder
                // Platform 4 (higher)
                ctx.fillRect(700, 260, 200, 20);
                // Wall 3 (climb)
                ctx.fillRect(900, 100, 20, 180);
                // High platform
                ctx.fillRect(900, 100, 200, 20);
                // Dig section
                ctx.fillRect(920, 250, 200, 30);
                ctx.fillRect(950, 380, 200, 25);
                // Final approach
                ctx.fillRect(1150, 300, 30, 100);
                ctx.fillRect(1180, 380, 200, 25);
                // Exit area
                ctx.fillRect(1350, 440, 100, 20);
                // Ground
                ctx.fillStyle = '#5a5a3a';
                ctx.fillRect(0, 500, w, 60);
                // Pits / death zones - walls
                ctx.fillRect(0, 80, 30, 420);
                ctx.fillRect(w - 30, 80, 30, 420);
            }
        }
    ];

    // ─── DOM Elements ───────────────────────────────────────────
    const levelNameEl = document.getElementById('levelName');
    const outCountEl = document.getElementById('outCount');
    const savedCountEl = document.getElementById('savedCount');
    const needCountEl = document.getElementById('needCount');
    const releaseRateEl = document.getElementById('releaseRate');
    const toolbarEl = document.getElementById('skillToolbar');
    const pauseBtn = document.getElementById('pauseBtn');
    const nukeBtn = document.getElementById('nukeBtn');
    const restartBtn = document.getElementById('restartBtn');
    const rateUpBtn = document.getElementById('rateUp');
    const rateDownBtn = document.getElementById('rateDown');

    // ─── Game State ─────────────────────────────────────────────
    let currentLevel = 0;
    let selectedSkill = null;
    let gamePaused = false;
    let progress = JSON.parse(localStorage.getItem('lemmingsProgress') || '{}');

    const SKILL_ICONS = {
        climber: '🧗', floater: '☂️', blocker: '🛑', builder: '🔨',
        basher: '⛏️', digger: '⬇️', miner: '⛏️', bomber: '💣'
    };
    const SKILL_NAMES = ['climber','floater','blocker','builder','basher','digger','miner','bomber'];

    // ─── Skill Toolbar Setup ────────────────────────────────────
    function buildToolbar(skills) {
        toolbarEl.innerHTML = '';
        SKILL_NAMES.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'skill-btn' + (skills[name] <= 0 ? ' disabled' : '');
            btn.dataset.skill = name;
            btn.innerHTML = `<span class="skill-icon">${SKILL_ICONS[name]}</span><span>${name}</span><span class="skill-count" id="sk-${name}">${skills[name]}</span>`;
            btn.addEventListener('click', () => {
                if (skills[name] <= 0) return;
                document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('selected'));
                if (selectedSkill === name) { selectedSkill = null; return; }
                selectedSkill = name;
                btn.classList.add('selected');
            });
            toolbarEl.appendChild(btn);
        });
    }

    // ─── Phaser Scenes ──────────────────────────────────────────

    class MenuScene extends Phaser.Scene {
        constructor() { super({ key: 'MenuScene' }); }
        create() {
            this.cameras.main.setBackgroundColor('#1a1a2e');
            const cx = VIEW_W / 2, cy = VIEW_H / 2;
            this.add.text(cx, cy - 120, '🐭 LEMMINGS', { fontSize: '48px', fontFamily: 'monospace', color: '#a855f7' }).setOrigin(0.5);
            this.add.text(cx, cy - 50, 'Guide the lemmings to safety!', { fontSize: '18px', fontFamily: 'monospace', color: '#ccc' }).setOrigin(0.5);

            // Level buttons
            LEVELS.forEach((lvl, i) => {
                const y = cy + i * 45;
                const beaten = progress[i] !== undefined;
                const txt = this.add.text(cx, y, `${i+1}. ${lvl.name}${beaten ? ' ✓' : ''}`, {
                    fontSize: '20px', fontFamily: 'monospace', color: beaten ? '#4ade80' : '#fff'
                }).setOrigin(0.5).setInteractive({ useHandCursor: true });
                txt.on('pointerdown', () => {
                    currentLevel = i;
                    this.scene.start('GameScene');
                });
                txt.on('pointerover', () => txt.setColor('#a855f7'));
                txt.on('pointerout', () => txt.setColor(beaten ? '#4ade80' : '#fff'));
            });
        }
    }

    class GameScene extends Phaser.Scene {
        constructor() { super({ key: 'GameScene' }); }

        create() {
            const lvl = LEVELS[currentLevel];
            this.levelData = lvl;
            this.cameras.main.setBackgroundColor('#1a1a2e');

            // ── Terrain Setup ──
            this.terrainCanvas = document.createElement('canvas');
            this.terrainCanvas.width = GAME_W;
            this.terrainCanvas.height = GAME_H;
            this.terrainCtx = this.terrainCanvas.getContext('2d');
            lvl.build(this.terrainCtx, GAME_W, GAME_H);

            // Create Phaser texture from terrain canvas
            if (this.textures.exists('terrain')) this.textures.remove('terrain');
            this.textures.addCanvas('terrain', this.terrainCanvas);
            this.terrainImage = this.add.image(0, 0, 'terrain').setOrigin(0, 0);

            // ── Entrance & Exit markers ──
            // Entrance trapdoor
            this.add.rectangle(lvl.entrance.x, lvl.entrance.y - 10, 30, 16, 0x888888).setOrigin(0.5, 1);
            this.add.text(lvl.entrance.x, lvl.entrance.y - 18, '▼', { fontSize: '14px', color: '#ff0' }).setOrigin(0.5);
            // Exit flag
            this.add.rectangle(lvl.exit.x, lvl.exit.y, 24, 20, 0x444444).setOrigin(0.5, 1);
            this.add.text(lvl.exit.x, lvl.exit.y - 6, '🚪', { fontSize: '16px' }).setOrigin(0.5, 1);

            // ── Camera ──
            this.cameras.main.setBounds(0, 0, GAME_W, GAME_H);
            this.cameras.main.setScroll(Math.max(0, lvl.entrance.x - VIEW_W / 2), 0);

            // ── Lemmings ──
            this.lemmings = [];
            this.lemmingsOut = 0;
            this.lemmingsSaved = 0;
            this.lemmingsDead = 0;
            this.releaseRate = lvl.releaseRate;
            this.releaseTimer = 0;
            this.totalToRelease = lvl.numLemmings;
            this.skills = { ...lvl.skills };
            this.nuking = false;
            this.nukeIndex = 0;
            this.gameOver = false;
            this.elapsedTime = 0;

            // ── HUD ──
            levelNameEl.textContent = lvl.name;
            needCountEl.textContent = lvl.saveRequired;
            releaseRateEl.textContent = this.releaseRate;
            this.updateHUD();
            buildToolbar(this.skills);
            gamePaused = false;
            pauseBtn.textContent = '⏸ Pause';
            pauseBtn.classList.remove('active');
            selectedSkill = null;

            // ── Lemming Graphics Group ──
            this.lemmingGfx = this.add.group();

            // ── Input ──
            this.input.on('pointerdown', (ptr) => {
                if (!selectedSkill) return;
                const wx = ptr.worldX, wy = ptr.worldY;
                // Find closest lemming to click
                let best = null, bestDist = 20;
                for (const lem of this.lemmings) {
                    if (lem.dead || lem.exited) continue;
                    const d = Math.hypot(lem.x - wx, lem.y - wy);
                    if (d < bestDist) { bestDist = d; best = lem; }
                }
                if (best) this.assignSkill(best, selectedSkill);
            });

            // Mouse position for scrolling
            this.mouseX = VIEW_W / 2;
            this.input.on('pointermove', (ptr) => { this.mouseX = ptr.x; });
        }

        assignSkill(lem, skill) {
            if (this.skills[skill] <= 0) return;
            // Permanent skills can stack
            if (skill === 'climber') {
                if (lem.isClimber) return;
                lem.isClimber = true;
            } else if (skill === 'floater') {
                if (lem.isFloater) return;
                lem.isFloater = true;
            } else if (skill === 'bomber') {
                if (lem.bombing) return;
                lem.bombing = true;
                lem.bombTimer = 5;
            } else {
                // Action skills - override current action
                if (lem.state === skill) return;
                lem.state = skill;
                lem.actionTimer = 0;
                lem.buildCount = 0;
            }
            this.skills[skill]--;
            document.getElementById('sk-' + skill).textContent = this.skills[skill];
            if (this.skills[skill] <= 0) {
                const btn = document.querySelector(`[data-skill="${skill}"]`);
                if (btn) btn.classList.add('disabled');
                if (selectedSkill === skill) { selectedSkill = null; btn && btn.classList.remove('selected'); }
            }
            sndAssign();
        }

        spawnLemming() {
            const lvl = this.levelData;
            const lem = {
                x: lvl.entrance.x,
                y: lvl.entrance.y,
                dir: 1, // 1=right, -1=left
                state: 'falling',
                fallDist: 0,
                isClimber: false,
                isFloater: false,
                bombing: false,
                bombTimer: 0,
                actionTimer: 0,
                buildCount: 0,
                dead: false,
                exited: false,
                animFrame: 0,
                animTimer: 0,
                gfx: this.add.graphics()
            };
            this.lemmings.push(lem);
            this.lemmingsOut++;
            sndSpawn();
        }

        terrainAt(x, y) {
            if (x < 0 || x >= GAME_W || y < 0 || y >= GAME_H) return false;
            const d = this.terrainCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
            return d[3] > 128;
        }

        terrainSolid(x, y, w, h) {
            for (let px = x; px < x + w; px += 2) {
                for (let py = y; py < y + h; py += 2) {
                    if (this.terrainAt(px, py)) return true;
                }
            }
            return false;
        }

        eraseTerrain(cx, cy, radius) {
            this.terrainCtx.save();
            this.terrainCtx.globalCompositeOperation = 'destination-out';
            this.terrainCtx.beginPath();
            this.terrainCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            this.terrainCtx.fill();
            this.terrainCtx.restore();
            this.refreshTerrain();
        }

        eraseTerrainRect(x, y, w, h) {
            this.terrainCtx.clearRect(x, y, w, h);
            this.refreshTerrain();
        }

        addTerrain(x, y, w, h) {
            this.terrainCtx.fillStyle = '#7a6a4a';
            this.terrainCtx.fillRect(x, y, w, h);
            this.refreshTerrain();
        }

        refreshTerrain() {
            this.textures.remove('terrain');
            this.textures.addCanvas('terrain', this.terrainCanvas);
            this.terrainImage.setTexture('terrain');
        }

        updateHUD() {
            outCountEl.textContent = this.lemmingsOut;
            savedCountEl.textContent = this.lemmingsSaved;
        }

        update(time, delta) {
            if (gamePaused || this.gameOver) return;
            const dt = delta / 1000;
            this.elapsedTime += dt;

            // ── Scroll camera ──
            const cam = this.cameras.main;
            if (this.mouseX < SCROLL_ZONE) {
                cam.scrollX = Math.max(0, cam.scrollX - SCROLL_SPEED);
            } else if (this.mouseX > VIEW_W - SCROLL_ZONE) {
                cam.scrollX = Math.min(GAME_W - VIEW_W, cam.scrollX + SCROLL_SPEED);
            }

            // ── Release lemmings ──
            if (this.lemmingsOut < this.totalToRelease) {
                this.releaseTimer += dt;
                const interval = (101 - this.releaseRate) / 30;
                if (this.releaseTimer >= interval) {
                    this.releaseTimer -= interval;
                    this.spawnLemming();
                    this.updateHUD();
                }
            }

            // ── Nuking ──
            if (this.nuking) {
                this.nukeTimer = (this.nukeTimer || 0) + dt;
                if (this.nukeTimer > 0.3 && this.nukeIndex < this.lemmings.length) {
                    const lem = this.lemmings[this.nukeIndex];
                    if (!lem.dead && !lem.exited && !lem.bombing) {
                        lem.bombing = true;
                        lem.bombTimer = 3;
                    }
                    this.nukeIndex++;
                    this.nukeTimer = 0;
                }
            }

            // ── Update each lemming ──
            let needsTerrainRefresh = false;
            for (const lem of this.lemmings) {
                if (lem.dead || lem.exited) continue;

                // Animation timer
                lem.animTimer += dt;
                if (lem.animTimer > 0.25) { lem.animTimer = 0; lem.animFrame = 1 - lem.animFrame; }

                // Bomb countdown
                if (lem.bombing) {
                    lem.bombTimer -= dt;
                    if (lem.bombTimer <= 0) {
                        this.eraseTerrain(lem.x, lem.y, EXPLODE_RADIUS);
                        lem.dead = true;
                        this.lemmingsDead++;
                        sndExplode();
                        // Create particles
                        for (let i = 0; i < 12; i++) {
                            const angle = (Math.PI * 2 * i) / 12;
                            const px = lem.x + Math.cos(angle) * 10;
                            const py = lem.y + Math.sin(angle) * 10;
                            const p = this.add.circle(px, py, 2, 0xff4444);
                            this.tweens.add({ targets: p, x: px + Math.cos(angle) * 30, y: py + Math.sin(angle) * 30, alpha: 0, duration: 400, onComplete: () => p.destroy() });
                        }
                        continue;
                    }
                }

                // Check exit
                const lvl = this.levelData;
                if (Math.abs(lem.x - lvl.exit.x) < 14 && Math.abs(lem.y - lvl.exit.y) < 14) {
                    lem.exited = true;
                    this.lemmingsSaved++;
                    this.updateHUD();
                    sndSaved();
                    continue;
                }

                // Out of bounds
                if (lem.y > GAME_H - 5 || lem.x < 2 || lem.x > GAME_W - 2) {
                    lem.dead = true;
                    this.lemmingsDead++;
                    continue;
                }

                // State machine
                switch (lem.state) {
                    case 'falling':
                        this.updateFalling(lem, dt);
                        break;
                    case 'walking':
                        this.updateWalking(lem, dt);
                        break;
                    case 'climbing':
                        this.updateClimbing(lem, dt);
                        break;
                    case 'blocker':
                        // Blockers just stand still; collision handled in walking
                        break;
                    case 'builder':
                        this.updateBuilder(lem, dt);
                        needsTerrainRefresh = true;
                        break;
                    case 'basher':
                        this.updateBasher(lem, dt);
                        needsTerrainRefresh = true;
                        break;
                    case 'digger':
                        this.updateDigger(lem, dt);
                        needsTerrainRefresh = true;
                        break;
                    case 'miner':
                        this.updateMiner(lem, dt);
                        needsTerrainRefresh = true;
                        break;
                }

                // Gravity for non-grounded states except climbing, blocking, building
                if (lem.state !== 'climbing' && lem.state !== 'blocker') {
                    if (!this.terrainAt(lem.x, lem.y + 1) && lem.state !== 'falling') {
                        if (lem.state !== 'builder') {
                            lem.state = 'falling';
                            lem.fallDist = 0;
                        }
                    }
                }
            }

            if (needsTerrainRefresh) this.refreshTerrain();

            // ── Draw lemmings ──
            for (const lem of this.lemmings) {
                lem.gfx.clear();
                if (lem.dead || lem.exited) continue;
                this.drawLemming(lem);
            }

            // ── Check win/lose ──
            const allDone = (this.lemmingsSaved + this.lemmingsDead >= this.totalToRelease) && this.lemmingsOut >= this.totalToRelease;
            const activeLemmings = this.lemmings.filter(l => !l.dead && !l.exited).length;
            if (allDone || (this.lemmingsOut >= this.totalToRelease && activeLemmings === 0)) {
                this.gameOver = true;
                if (this.lemmingsSaved >= this.levelData.saveRequired) {
                    // Win
                    progress[currentLevel] = Math.max(progress[currentLevel] || 0, this.lemmingsSaved);
                    localStorage.setItem('lemmingsProgress', JSON.stringify(progress));
                    sndWin();
                    this.time.delayedCall(800, () => this.scene.start('LevelCompleteScene'));
                } else {
                    this.time.delayedCall(800, () => this.scene.start('GameOverScene'));
                }
            }
        }

        updateFalling(lem, dt) {
            const speed = (lem.isFloater && lem.fallDist > 10) ? FLOAT_SPEED : GRAVITY * 3;
            const steps = Math.ceil(speed);
            for (let i = 0; i < steps; i++) {
                if (this.terrainAt(lem.x, lem.y + 1)) {
                    // Landed
                    if (lem.fallDist > MAX_FALL && !lem.isFloater) {
                        lem.dead = true;
                        this.lemmingsDead++;
                        sndSplat();
                    } else {
                        lem.state = 'walking';
                    }
                    lem.fallDist = 0;
                    return;
                }
                lem.y += 1;
                lem.fallDist++;
            }
        }

        updateWalking(lem, dt) {
            // Check for blockers
            for (const other of this.lemmings) {
                if (other === lem || other.dead || other.exited || other.state !== 'blocker') continue;
                if (Math.abs(lem.x - other.x) < 8 && Math.abs(lem.y - other.y) < 12) {
                    if ((lem.dir === 1 && lem.x < other.x) || (lem.dir === -1 && lem.x > other.x)) {
                        lem.dir *= -1;
                    }
                }
            }

            const nx = lem.x + lem.dir * WALK_SPEED;
            // Check wall ahead (check a few pixels up from feet)
            const wallAhead = this.terrainAt(nx + lem.dir * 4, lem.y - 2) ||
                              this.terrainAt(nx + lem.dir * 4, lem.y - 5);

            if (wallAhead) {
                // Check if can step up (2px ledge)
                if (!this.terrainAt(nx + lem.dir * 4, lem.y - 8) &&
                    !this.terrainAt(nx + lem.dir * 4, lem.y - 10)) {
                    // Step up
                    lem.x = nx;
                    lem.y -= 2;
                } else if (lem.isClimber) {
                    lem.state = 'climbing';
                } else {
                    lem.dir *= -1;
                }
            } else {
                lem.x = nx;
            }

            // Slope down: check if ground has dropped
            if (!this.terrainAt(lem.x, lem.y + 1)) {
                // Check a few pixels down for slope
                let found = false;
                for (let dy = 1; dy <= 4; dy++) {
                    if (this.terrainAt(lem.x, lem.y + dy)) {
                        lem.y += dy - 1;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    lem.state = 'falling';
                    lem.fallDist = 0;
                }
            }
        }

        updateClimbing(lem, dt) {
            // Move up
            lem.y -= CLIMB_SPEED;
            // Check if we've reached the top of the wall
            if (!this.terrainAt(lem.x + lem.dir * 5, lem.y - 2)) {
                // Top reached - step over
                lem.x += lem.dir * 5;
                lem.state = 'walking';
            }
            // Check if blocked above
            if (this.terrainAt(lem.x, lem.y - LEMMING_H)) {
                // Can't climb further, fall back
                lem.dir *= -1;
                lem.state = 'falling';
                lem.fallDist = 0;
            }
        }

        updateBuilder(lem, dt) {
            lem.actionTimer += dt;
            if (lem.actionTimer > 0.4) {
                lem.actionTimer = 0;
                if (lem.buildCount >= BUILD_STEPS) {
                    // Done building, resume walking
                    lem.state = 'walking';
                    return;
                }
                // Place a brick step
                const bx = lem.x + lem.dir * lem.buildCount * 3;
                const by = lem.y - 1;
                this.terrainCtx.fillStyle = '#9a8a6a';
                this.terrainCtx.fillRect(bx, by, BUILD_STEP_W, BUILD_STEP_H);
                lem.x += lem.dir * 3;
                lem.y -= BUILD_STEP_H;
                lem.buildCount++;
                sndBuild();

                // Check if hit ceiling
                if (this.terrainAt(lem.x, lem.y - LEMMING_H)) {
                    lem.state = 'walking';
                    lem.dir *= -1;
                }
            }
        }

        updateBasher(lem, dt) {
            lem.actionTimer += dt;
            if (lem.actionTimer > 0.15) {
                lem.actionTimer = 0;
                const bx = lem.x + lem.dir * 6;
                const by = lem.y - LEMMING_H / 2;
                // Check if there's terrain to bash
                if (!this.terrainSolid(bx, by - 4, 4, LEMMING_H)) {
                    lem.state = 'walking';
                    return;
                }
                this.terrainCtx.clearRect(bx - 2, by - 5, 6, LEMMING_H + 2);
                lem.x += lem.dir * BASH_RATE;
                sndDig();
            }
        }

        updateDigger(lem, dt) {
            lem.actionTimer += dt;
            if (lem.actionTimer > 0.15) {
                lem.actionTimer = 0;
                // Check if there's terrain below
                if (!this.terrainAt(lem.x, lem.y + 1) && !this.terrainAt(lem.x - 3, lem.y + 1) && !this.terrainAt(lem.x + 3, lem.y + 1)) {
                    lem.state = 'falling';
                    lem.fallDist = 0;
                    return;
                }
                this.terrainCtx.clearRect(lem.x - 5, lem.y, 10, DIG_RATE);
                lem.y += DIG_RATE;
                sndDig();
            }
        }

        updateMiner(lem, dt) {
            lem.actionTimer += dt;
            if (lem.actionTimer > 0.2) {
                lem.actionTimer = 0;
                const mx = lem.x + lem.dir * 4;
                const my = lem.y + 2;
                // Check terrain ahead and below
                if (!this.terrainAt(mx, my) && !this.terrainAt(mx + lem.dir * 2, my + 2)) {
                    lem.state = 'falling';
                    lem.fallDist = 0;
                    return;
                }
                this.terrainCtx.clearRect(mx - 3, my - 3, 8, 8);
                lem.x += lem.dir * MINE_RATE;
                lem.y += MINE_RATE;
                sndDig();
            }
        }

        drawLemming(lem) {
            const g = lem.gfx;
            const x = lem.x, y = lem.y;

            // Body (blue)
            g.fillStyle(0x4488ff, 1);
            g.fillRect(x - 3, y - 10, 6, 8);

            // Hair (green)
            g.fillStyle(0x44dd44, 1);
            g.fillRect(x - 3, y - 12, 6, 3);

            // Legs
            g.fillStyle(0x4488ff, 1);
            if (lem.state === 'walking') {
                if (lem.animFrame === 0) {
                    g.fillRect(x - 3, y - 2, 2, 3);
                    g.fillRect(x + 1, y - 2, 2, 3);
                } else {
                    g.fillRect(x - 2 + lem.dir, y - 2, 2, 3);
                    g.fillRect(x - lem.dir, y - 2, 2, 3);
                }
            } else {
                g.fillRect(x - 3, y - 2, 2, 2);
                g.fillRect(x + 1, y - 2, 2, 2);
            }

            // State-specific visuals
            if (lem.state === 'blocker') {
                // Arms out
                g.fillStyle(0x4488ff, 1);
                g.fillRect(x - 7, y - 8, 4, 2);
                g.fillRect(x + 3, y - 8, 4, 2);
            }
            if (lem.state === 'builder' || lem.state === 'basher' || lem.state === 'miner') {
                // Holding tool
                g.fillStyle(0xaa8844, 1);
                g.fillRect(x + lem.dir * 4, y - 10, 2, 6);
            }
            if (lem.state === 'digger') {
                g.fillStyle(0xaa8844, 1);
                g.fillRect(x - 1, y - 1, 2, 4);
            }
            if (lem.isFloater && lem.state === 'falling' && lem.fallDist > 5) {
                // Umbrella
                g.fillStyle(0xff66aa, 1);
                g.fillTriangle(x, y - 20, x - 8, y - 12, x + 8, y - 12);
                g.fillStyle(0xaa4466, 1);
                g.fillRect(x - 1, y - 14, 2, 4);
            }
            if (lem.isClimber && lem.state === 'climbing') {
                // Arms gripping wall
                g.fillStyle(0x4488ff, 1);
                g.fillRect(x + lem.dir * 3, y - 10, 3, 2);
                g.fillRect(x + lem.dir * 3, y - 5, 3, 2);
            }

            // Bomb countdown
            if (lem.bombing && lem.bombTimer > 0) {
                g.fillStyle(0xff0000, 1);
                const countText = Math.ceil(lem.bombTimer).toString();
                // Draw countdown number above head
                this.drawDigit(g, x - 3, y - 20, Math.ceil(lem.bombTimer));
            }
        }

        drawDigit(g, x, y, num) {
            // Simple pixel number
            g.fillStyle(0xff4444, 1);
            g.fillRect(x, y, 6, 7);
            g.fillStyle(0xffffff, 1);
            // Just draw a filled block with the number's rough shape
            g.fillRect(x + 2, y + 2, 2, 3);
        }
    }

    class LevelCompleteScene extends Phaser.Scene {
        constructor() { super({ key: 'LevelCompleteScene' }); }
        create() {
            this.cameras.main.setBackgroundColor('#1a2e1a');
            const cx = VIEW_W / 2, cy = VIEW_H / 2;
            const lvl = LEVELS[currentLevel];
            const saved = progress[currentLevel] || 0;
            this.add.text(cx, cy - 80, 'Level Complete!', { fontSize: '36px', fontFamily: 'monospace', color: '#4ade80' }).setOrigin(0.5);
            this.add.text(cx, cy - 30, `${lvl.name}`, { fontSize: '22px', fontFamily: 'monospace', color: '#ccc' }).setOrigin(0.5);
            this.add.text(cx, cy + 10, `Saved: ${saved} / ${lvl.numLemmings}`, { fontSize: '20px', fontFamily: 'monospace', color: '#fff' }).setOrigin(0.5);
            this.add.text(cx, cy + 40, `Required: ${lvl.saveRequired}`, { fontSize: '16px', fontFamily: 'monospace', color: '#aaa' }).setOrigin(0.5);

            if (currentLevel < LEVELS.length - 1) {
                const next = this.add.text(cx, cy + 90, '▶ Next Level', { fontSize: '24px', fontFamily: 'monospace', color: '#a855f7' }).setOrigin(0.5).setInteractive({ useHandCursor: true });
                next.on('pointerdown', () => { currentLevel++; this.scene.start('GameScene'); });
                next.on('pointerover', () => next.setColor('#c084fc'));
                next.on('pointerout', () => next.setColor('#a855f7'));
            }

            const menu = this.add.text(cx, cy + 140, '🏠 Menu', { fontSize: '20px', fontFamily: 'monospace', color: '#888' }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            menu.on('pointerdown', () => this.scene.start('MenuScene'));
            menu.on('pointerover', () => menu.setColor('#ccc'));
            menu.on('pointerout', () => menu.setColor('#888'));
        }
    }

    class GameOverScene extends Phaser.Scene {
        constructor() { super({ key: 'GameOverScene' }); }
        create() {
            this.cameras.main.setBackgroundColor('#2e1a1a');
            const cx = VIEW_W / 2, cy = VIEW_H / 2;
            const lvl = LEVELS[currentLevel];
            this.add.text(cx, cy - 60, 'Not Enough Saved!', { fontSize: '32px', fontFamily: 'monospace', color: '#ef4444' }).setOrigin(0.5);
            this.add.text(cx, cy - 10, `Needed ${lvl.saveRequired} but didn't make it.`, { fontSize: '16px', fontFamily: 'monospace', color: '#ccc' }).setOrigin(0.5);

            const retry = this.add.text(cx, cy + 50, '🔄 Retry', { fontSize: '24px', fontFamily: 'monospace', color: '#f59e0b' }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            retry.on('pointerdown', () => this.scene.start('GameScene'));
            retry.on('pointerover', () => retry.setColor('#fbbf24'));
            retry.on('pointerout', () => retry.setColor('#f59e0b'));

            const menu = this.add.text(cx, cy + 100, '🏠 Menu', { fontSize: '20px', fontFamily: 'monospace', color: '#888' }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            menu.on('pointerdown', () => this.scene.start('MenuScene'));
            menu.on('pointerover', () => menu.setColor('#ccc'));
            menu.on('pointerout', () => menu.setColor('#888'));
        }
    }

    // ─── Phaser Config ──────────────────────────────────────────
    const config = {
        type: Phaser.AUTO,
        width: VIEW_W,
        height: VIEW_H,
        parent: 'game-container',
        backgroundColor: '#1a1a2e',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_HORIZONTALLY
        },
        scene: [MenuScene, GameScene, LevelCompleteScene, GameOverScene]
    };

    const game = new Phaser.Game(config);

    // ─── Control Buttons ────────────────────────────────────────
    pauseBtn.addEventListener('click', () => {
        gamePaused = !gamePaused;
        pauseBtn.textContent = gamePaused ? '▶ Resume' : '⏸ Pause';
        pauseBtn.classList.toggle('active', gamePaused);
    });

    nukeBtn.addEventListener('click', () => {
        const scene = game.scene.getScene('GameScene');
        if (scene && scene.scene.isActive()) {
            scene.nuking = true;
            scene.nukeIndex = 0;
            scene.nukeTimer = 0;
        }
    });

    restartBtn.addEventListener('click', () => {
        selectedSkill = null;
        game.scene.getScene('GameScene') && game.scene.start('GameScene');
    });

    rateUpBtn.addEventListener('click', () => {
        const scene = game.scene.getScene('GameScene');
        if (scene && scene.scene.isActive() && scene.releaseRate < 99) {
            scene.releaseRate = Math.min(99, scene.releaseRate + 5);
            releaseRateEl.textContent = scene.releaseRate;
        }
    });

    rateDownBtn.addEventListener('click', () => {
        const scene = game.scene.getScene('GameScene');
        if (scene && scene.scene.isActive() && scene.releaseRate > 1) {
            scene.releaseRate = Math.max(1, scene.releaseRate - 5);
            releaseRateEl.textContent = scene.releaseRate;
        }
    });
    </script>
    <script src="../nav.js"></script>
</body>
