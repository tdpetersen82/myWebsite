<style>
  :root{
    --felt-1:#0e3a2e;
    --felt-2:#0a2a21;
    --felt-rail:#3a2418;
    --brass:#c9a26a;
    --brass-2:#e6c590;
    --brass-deep:#8c6a3f;
    --ivory:#f4ecd8;
    --ivory-dim:#d9cfb8;
    --red:#c0392b;
    --ink:#0c1611;
    --ink-2:#1a2820;
    --green-chip:#2e7d4f;
    --shadow-deep: 0 30px 60px -20px rgba(0,0,0,.6), 0 12px 24px -10px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0a0805;color:var(--ivory);font-family:'Inter',system-ui,sans-serif;overflow:hidden}
  body{
    background:
      radial-gradient(1200px 700px at 50% 30%, rgba(89,60,30,.45), transparent 70%),
      radial-gradient(900px 600px at 50% 90%, rgba(0,0,0,.7), transparent 70%),
      #0a0805;
  }
  #root{width:100%;height:100%}
  #game-wrapper{width:1380px;height:860px;transform-origin:top center;margin:0 auto}
  /* card flip */
  .card-shell{perspective:900px}
  .card-flip{
    transform-style:preserve-3d;
    transition: transform .55s cubic-bezier(.2,.8,.25,1);
  }
  .card-flip.face-down{transform:rotateY(180deg)}
  .card-face,.card-back{
    position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;
  }
  .card-back{transform:rotateY(180deg)}
  /* deal-in animation */
  @keyframes dealIn{
    0%{transform:translate(var(--from-x,300px), var(--from-y,-260px)) rotate(-12deg) scale(.85);opacity:0}
    60%{opacity:1}
    100%{transform:translate(0,0) rotate(0) scale(1);opacity:1}
  }
  .deal-in{animation:dealIn .55s cubic-bezier(.2,.7,.2,1) backwards}
  .chat-pop{opacity:1;transition:transform .3s cubic-bezier(.2,.9,.2,1)}
  @keyframes glowPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(230,197,144,.0), inset 0 0 0 1px rgba(230,197,144,.4)}
    50%{box-shadow:0 0 30px 4px rgba(230,197,144,.35), inset 0 0 0 1px rgba(230,197,144,.7)}
  }
  .glow-pulse{animation:glowPulse 1.6s ease-in-out infinite}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .shake{animation:shake .5s ease-in-out}
  @keyframes bannerIn{
    0%{transform:translateY(-20px) scale(.92);opacity:0;letter-spacing:.4em}
    100%{transform:translateY(0) scale(1);opacity:1;letter-spacing:.18em}
  }
  .banner-in{animation:bannerIn .55s cubic-bezier(.2,.8,.25,1) both}
  /* scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(201,162,106,.3);border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}
  button{font-family:inherit}
  .blink-cursor::after{content:'▍';margin-left:2px;animation:blink 1s steps(2) infinite;opacity:.6}
  @keyframes blink{50%{opacity:0}}
  @keyframes breathe{
    0%,100%{transform:translateX(-50%) translateY(0)}
    50%{transform:translateX(-50%) translateY(-2px)}
  }
  .breathe{animation:breathe 4s ease-in-out infinite}
  @keyframes holdGlow{
    0%,100%{box-shadow:0 0 0 2px rgba(230,197,144,.7), 0 0 22px rgba(230,197,144,.5)}
    50%{box-shadow:0 0 0 2px rgba(230,197,144,.9), 0 0 32px rgba(230,197,144,.7)}
  }
  .hold-glow{animation:holdGlow 1.4s ease-in-out infinite}
  @keyframes flipCard{
    0%{transform:rotateY(0);}
    50%{transform:rotateY(90deg);}
    51%{transform:rotateY(-90deg);}
    100%{transform:rotateY(0);}
  }
  .flip-card{animation:flipCard .5s ease-in-out}
</style>

<script>
(function() {
  var wrapper = document.getElementById('game-wrapper');
  function resize() {
    var W = 1380, H = 860;
    var s = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
    wrapper.style.transform = 'scale(' + s + ')';
    wrapper.style.marginTop = Math.max(0, (window.innerHeight - H * s) / 2) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();
})();
</script>
