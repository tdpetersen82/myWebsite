<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>&#x1F0CF; Blackjack</h1>
        <div id="game-wrapper">

            <!-- Header -->
            <div class="bj-header">
                <h1>&#x2660; Blackjack</h1>
                <div class="bj-bankroll">Bankroll: <span id="bankroll-value">$1,000</span></div>
                <button class="btn-hints" id="btn-hints">Hints: OFF</button>
            </div>

            <!-- Table -->
            <div class="bj-table">

                <!-- Dealer Hand -->
                <div class="hand-area" id="dealer-area">
                    <div class="hand-label">Dealer</div>
                    <div class="hand-value" id="dealer-value"></div>
                    <div class="cards-row" id="dealer-cards"></div>
                </div>

                <!-- Message -->
                <div class="message-area" id="message">Place your bet</div>

                <!-- Result Banner -->
                <div class="result-banner" id="result-banner"></div>

                <!-- Player Hand -->
                <div class="hand-area" id="player-area">
                    <div class="hand-label">Player</div>
                    <div class="hand-value" id="player-value"></div>
                    <div class="cards-row" id="player-cards"></div>
                </div>

                <!-- Hint Panel -->
                <div class="hint-panel" id="hint-panel">
                    <div class="hint-action" id="hint-action"></div>
                    <div class="hint-explanation" id="hint-explanation"></div>
                </div>

                <!-- Action Buttons -->
                <div class="action-bar" id="action-bar" style="display:none">
                    <button class="btn-action btn-hit" id="btn-hit">Hit</button>
                    <button class="btn-action btn-stand" id="btn-stand">Stand</button>
                    <button class="btn-action btn-double" id="btn-double">Double</button>
                    <button class="btn-action btn-split" id="btn-split">Split</button>
                    <button class="btn-action btn-insurance" id="btn-insurance">Insurance</button>
                    <button class="btn-action btn-surrender" id="btn-surrender">Surrender</button>
                </div>

                <!-- Betting Area -->
                <div class="betting-area" id="betting-area">
                    <div class="chip-rack" id="chip-rack">
                        <div class="chip" data-value="5" style="background: #e74c3c; border-color: #c0392b;">$5</div>
                        <div class="chip" data-value="25" style="background: #27ae60; border-color: #1e8449;">$25</div>
                        <div class="chip" data-value="100" style="background: #2980b9; border-color: #1f6fa5;">$100</div>
                        <div class="chip" data-value="500" style="background: #8e44ad; border-color: #6c3483;">$500</div>
                    </div>
                    <div class="bet-display">
                        <button class="btn-clear" id="btn-clear">Clear</button>
                        <span>Bet: <span class="bet-amount" id="bet-amount">$0</span></span>
                        <button class="btn-rebet" id="btn-rebet">Rebet</button>
                        <button class="btn-deal" id="btn-deal" disabled>Deal</button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-bar" id="stats-bar">
                    <span>Played: 0</span>
                    <span>Won: 0</span>
                    <span>BJ: 0</span>
                    <span>Best: $1,000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- JS modules in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/deck.js"></script>
    <script src="js/hand.js"></script>
    <script src="js/strategy.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>

    <!-- Auto-scaling -->
    <script>
    (function() {
        var wrapper = document.getElementById('game-wrapper');
        function resize() {
            var W = 960, H = 640;
            var s = Math.min(window.innerWidth / W, (window.innerHeight * 0.85) / H, 1);
            wrapper.style.transform = 'scale(' + s + ')';
            wrapper.style.transformOrigin = 'top center';
            wrapper.style.marginTop = Math.max(0, (window.innerHeight * 0.85 - H * s) / 2) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();
    })();
    </script>

    <script src="../nav.js"></script>
</body>
</html>
