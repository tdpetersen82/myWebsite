<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        canvas {
            border: 2px solid #333;
            background-color: #4a8c3f;
            display: block;
            margin: 20px auto;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔨 Whack-a-Mole</h1>
        <div class="game-info">
            <p>Score: <span id="score">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>Tap or click the moles! Avoid the red ones.</p>
            <button id="restartBtn" class="play-button">Restart Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        const W = canvas.width;
        const H = canvas.height;
        const GRID_COLS = 3;
        const GRID_ROWS = 3;
        const CELL_SIZE = 110;
        const CELL_GAP = 15;
        const GAME_DURATION = 60;

        // Sound
        function playSound(freq, type, duration) {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const o = c.createOscillator();
                const g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type || 'square';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.15, c.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (duration || 0.1));
                o.start(); o.stop(c.currentTime + (duration || 0.1));
            } catch(e) {}
        }

        // Game state
        let score, highScore, timeLeft, gameOver, gameStarted;
        let moles, particles, floatingTexts;
        let spawnInterval, stayDuration, maxSimultaneous;
        let lastSpawnTime, timerInterval;

        highScore = parseInt(localStorage.getItem('whackAMoleHighScore')) || 0;
        highScoreElement.textContent = highScore;

        // Hole positions
        const holes = [];
        for (let r = 0; r < GRID_ROWS; r++) {
            for (let c = 0; c < GRID_COLS; c++) {
                holes.push({
                    x: c * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2 + 30,
                    y: r * (CELL_SIZE + CELL_GAP) + CELL_SIZE / 2 + 50
                });
            }
        }

        function init() {
            score = 0;
            timeLeft = GAME_DURATION;
            gameOver = false;
            gameStarted = false;
            moles = [];
            particles = [];
            floatingTexts = [];
            spawnInterval = 1200;
            stayDuration = 1200;
            maxSimultaneous = 1;
            lastSpawnTime = 0;
            scoreElement.textContent = '0';
            if (timerInterval) clearInterval(timerInterval);
            draw();
        }

        function startGame() {
            gameStarted = true;
            lastSpawnTime = performance.now();
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    gameOver = true;
                    clearInterval(timerInterval);
                    playSound(400, 'sine', 0.15);
                    setTimeout(() => playSound(300, 'sine', 0.15), 100);
                    setTimeout(() => playSound(200, 'sine', 0.2), 200);
                }
                // Difficulty scaling every 10 seconds
                const elapsed = GAME_DURATION - timeLeft;
                spawnInterval = Math.max(500, 1200 - Math.floor(elapsed / 10) * 80);
                stayDuration = Math.max(400, 1200 - Math.floor(elapsed / 10) * 60);
                maxSimultaneous = Math.min(3, 1 + Math.floor(elapsed / 20));
            }, 1000);
        }

        function spawnMole(now) {
            if (gameOver) return;
            const activeMoles = moles.filter(m => m.state !== 'hidden');
            if (activeMoles.length >= maxSimultaneous) return;

            // Find available holes
            const occupiedHoles = new Set(activeMoles.map(m => m.holeIndex));
            const available = [];
            for (let i = 0; i < 9; i++) {
                if (!occupiedHoles.has(i)) available.push(i);
            }
            if (available.length === 0) return;

            const holeIndex = available[Math.floor(Math.random() * available.length)];
            const hole = holes[holeIndex];

            // Mole type
            const rand = Math.random();
            let type = 'normal';
            if (rand < 0.05) type = 'red';
            else if (rand < 0.15) type = 'golden';

            moles.push({
                holeIndex,
                x: hole.x,
                y: hole.y,
                type,
                state: 'rising',
                stateStart: now,
                offset: 0, // 0 = hidden, 40 = fully up
                hit: false
            });
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleTap(e) {
            e.preventDefault();
            if (gameOver) { init(); return; }
            if (!gameStarted) { startGame(); return; }

            const pos = getCanvasPos(e);

            for (let i = moles.length - 1; i >= 0; i--) {
                const m = moles[i];
                if (m.state !== 'up' && m.state !== 'rising') continue;
                if (m.hit) continue;

                const dx = pos.x - m.x;
                const dy = pos.y - (m.y - m.offset);
                if (dx * dx + dy * dy < 40 * 40) {
                    m.hit = true;
                    m.state = 'falling';
                    m.stateStart = performance.now();

                    if (m.type === 'red') {
                        score = Math.max(0, score - 15);
                        playSound(200, 'sawtooth', 0.15);
                        floatingTexts.push({ x: m.x, y: m.y - m.offset, text: '-15', color: '#ff4444', life: 40 });
                    } else if (m.type === 'golden') {
                        score += 30;
                        playSound(800, 'sine', 0.1);
                        setTimeout(() => playSound(1000, 'sine', 0.1), 50);
                        floatingTexts.push({ x: m.x, y: m.y - m.offset, text: '+30', color: '#ffd700', life: 40 });
                    } else {
                        score += 10;
                        playSound(500, 'triangle', 0.08);
                        floatingTexts.push({ x: m.x, y: m.y - m.offset, text: '+10', color: '#fff', life: 40 });
                    }

                    scoreElement.textContent = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.textContent = highScore;
                        localStorage.setItem('whackAMoleHighScore', highScore);
                    }

                    // Star particles
                    for (let j = 0; j < 8; j++) {
                        const angle = (Math.PI * 2 * j) / 8;
                        particles.push({
                            x: m.x, y: m.y - m.offset,
                            vx: Math.cos(angle) * 3,
                            vy: Math.sin(angle) * 3,
                            color: m.type === 'golden' ? '#ffd700' : m.type === 'red' ? '#ff4444' : '#fff',
                            life: 20
                        });
                    }
                    break;
                }
            }
        }

        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('click', handleTap);
        restartBtn.addEventListener('click', (e) => { e.stopPropagation(); init(); });

        function update(now) {
            if (!gameStarted || gameOver) return;

            // Spawn moles
            if (now - lastSpawnTime >= spawnInterval) {
                spawnMole(now);
                lastSpawnTime = now;
            }

            // Update moles
            for (let i = moles.length - 1; i >= 0; i--) {
                const m = moles[i];
                const elapsed = now - m.stateStart;

                if (m.state === 'rising') {
                    m.offset = Math.min(40, (elapsed / 150) * 40);
                    if (elapsed >= 150) {
                        m.state = 'up';
                        m.stateStart = now;
                    }
                } else if (m.state === 'up') {
                    const dur = m.type === 'golden' ? stayDuration * 0.5 : stayDuration;
                    if (elapsed >= dur) {
                        m.state = 'falling';
                        m.stateStart = now;
                    }
                } else if (m.state === 'falling') {
                    m.offset = Math.max(0, 40 - (elapsed / 150) * 40);
                    if (elapsed >= 150) {
                        moles.splice(i, 1);
                    }
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Update floating texts
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 1.5;
                floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Background
            ctx.fillStyle = '#4a8c3f';
            ctx.fillRect(0, 0, W, H);

            // Grass texture lines
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < W; i += 8) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, H);
                ctx.stroke();
            }

            // Timer
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('⏱ ' + timeLeft + 's', W / 2, 10);

            // Draw holes and moles
            for (let i = 0; i < 9; i++) {
                const hole = holes[i];

                // Hole shadow
                ctx.fillStyle = '#2d5a1e';
                ctx.beginPath();
                ctx.ellipse(hole.x, hole.y + 20, 45, 18, 0, 0, Math.PI * 2);
                ctx.fill();

                // Hole
                ctx.fillStyle = '#3d2b1f';
                ctx.beginPath();
                ctx.ellipse(hole.x, hole.y + 15, 40, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2a1a0e';
                ctx.beginPath();
                ctx.ellipse(hole.x, hole.y + 15, 35, 12, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw moles (clipped to holes)
            for (const m of moles) {
                if (m.offset <= 0) continue;

                ctx.save();
                // Clip to hole area
                ctx.beginPath();
                ctx.rect(m.x - 45, m.y - 60, 90, 60);
                ctx.clip();

                const moleY = m.y - m.offset + 15;

                // Mole body
                if (m.type === 'golden') {
                    ctx.fillStyle = '#ffd700';
                    // Pulsing glow
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 10 + Math.sin(performance.now() / 100) * 5;
                } else if (m.type === 'red') {
                    ctx.fillStyle = '#cc3333';
                } else {
                    ctx.fillStyle = '#8B6914';
                }

                ctx.beginPath();
                ctx.arc(m.x, moleY, 28, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Snout
                ctx.fillStyle = m.type === 'golden' ? '#ffec80' : m.type === 'red' ? '#ee6666' : '#a0803b';
                ctx.beginPath();
                ctx.ellipse(m.x, moleY + 10, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // Nose
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.ellipse(m.x, moleY + 6, 5, 3, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(m.x - 10, moleY - 6, 6, 0, Math.PI * 2);
                ctx.arc(m.x + 10, moleY - 6, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(m.x - 10, moleY - 6, 3, 0, Math.PI * 2);
                ctx.arc(m.x + 10, moleY - 6, 3, 0, Math.PI * 2);
                ctx.fill();

                // Red mole angry eyebrows
                if (m.type === 'red') {
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(m.x - 16, moleY - 16);
                    ctx.lineTo(m.x - 5, moleY - 12);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(m.x + 16, moleY - 16);
                    ctx.lineTo(m.x + 5, moleY - 12);
                    ctx.stroke();
                }

                ctx.restore();
            }

            // Particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 20;
                ctx.fillStyle = p.color;
                // Draw star shape
                ctx.beginPath();
                for (let j = 0; j < 5; j++) {
                    const a = (Math.PI * 2 * j) / 5 - Math.PI / 2;
                    const r = j % 2 === 0 ? 4 : 2;
                    if (j === 0) ctx.moveTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
                    else ctx.lineTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
                }
                ctx.closePath();
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Floating texts
            for (const ft of floatingTexts) {
                ctx.globalAlpha = ft.life / 40;
                ctx.fillStyle = ft.color;
                ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1;

            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 42px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over', W / 2, H / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#aaa';
                ctx.fillText('Tap to restart', W / 2, H / 2 + 50);
            }

            // Start prompt
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Tap to Start', W / 2, H / 2);
                ctx.font = '16px Arial';
                ctx.fillStyle = '#ccc';
                ctx.fillText('Whack moles for 60 seconds!', W / 2, H / 2 + 35);
            }
        }

        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Auto-Scale
        (function() {
            const c = document.getElementById('gameCanvas');
            const baseWidth = c.width, baseHeight = c.height;
            function scale() {
                const parent = c.parentElement;
                const ps = getComputedStyle(parent);
                const maxWidth = parent.clientWidth - parseFloat(ps.paddingLeft) - parseFloat(ps.paddingRight);
                const maxHeight = window.innerHeight * 0.75;
                const scaleFactor = Math.min(maxWidth / baseWidth, maxHeight / baseHeight, 1);
                c.style.transformOrigin = 'top center';
                c.style.transform = 'scale(' + scaleFactor + ')';
                c.style.marginBottom = (-(baseHeight * (1 - scaleFactor))) + 'px';
            }
            window.addEventListener('resize', scale);
            scale();
        })();

        init();
        requestAnimationFrame(gameLoop);
    </script>
    <script src="../nav.js"></script>
</body>
</html>
