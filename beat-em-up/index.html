<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Brawl</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        #game-container canvas {
            display: block;
            margin: 0 auto;
            border: 2px solid #333;
        }
        #game-container {
            margin: 10px auto;
            text-align: center;
        }
        .hud-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px;
            background: #111;
            border-radius: 8px;
            margin-bottom: 6px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
        }
        .hud-player {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .health-bar-outer {
            width: 140px;
            height: 16px;
            background: #333;
            border-radius: 3px;
            border: 1px solid #555;
            overflow: hidden;
        }
        .health-bar-inner {
            height: 100%;
            transition: width 0.2s;
            border-radius: 2px;
        }
        .special-bar-outer {
            width: 140px;
            height: 8px;
            background: #222;
            border-radius: 2px;
            border: 1px solid #444;
            overflow: hidden;
            margin-top: 2px;
        }
        .special-bar-inner {
            height: 100%;
            background: #ff0;
            transition: width 0.2s;
            border-radius: 1px;
        }
        #p1Health { background: #4488ff; }
        #p2Health { background: #ff4444; }
        .hud-center {
            text-align: center;
            font-weight: bold;
        }
        .hud-center .score-val { font-size: 18px; color: #ff0; }
        .hud-center .stage-val { font-size: 12px; color: #aaa; }
        .lives-display { font-size: 12px; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👊 Street Brawl</h1>
        <div class="hud-bar">
            <div class="hud-player">
                <span style="color:#4488ff;font-weight:bold;">P1</span>
                <div>
                    <div class="health-bar-outer"><div class="health-bar-inner" id="p1Health" style="width:100%"></div></div>
                    <div class="special-bar-outer"><div class="special-bar-inner" id="p1Special" style="width:0%"></div></div>
                </div>
                <span class="lives-display" id="p1Lives">♥♥♥</span>
            </div>
            <div class="hud-center">
                <div class="score-val" id="score">0</div>
                <div class="stage-val" id="stageDisplay">Stage 1</div>
            </div>
            <div class="hud-player">
                <span class="lives-display" id="p2Lives">♥♥♥</span>
                <div>
                    <div class="health-bar-outer"><div class="health-bar-inner" id="p2Health" style="width:100%"></div></div>
                    <div class="special-bar-outer"><div class="special-bar-inner" id="p2Special" style="width:0%"></div></div>
                </div>
                <span style="color:#ff4444;font-weight:bold;">P2</span>
            </div>
        </div>
        <div id="game-container"></div>
        <div class="controls">
            <p>P1: WASD move | F punch | G kick | R special &nbsp;|&nbsp; P2: Arrows move | ; punch | ' kick | . special</p>
            <button id="restartBtn" class="play-button" style="margin-top:8px;">Restart Game</button>
        </div>
    </div>

    <script>
    // ==================== CONSTANTS ====================
    const GAME_W = 800;
    const GAME_H = 500;
    const GROUND_TOP = 300;    // Top of walkable floor area
    const GROUND_BOTTOM = 460; // Bottom of walkable floor area
    const GRAVITY = 1200;
    const JUMP_FORCE = -500;
    const PLAYER_SPEED = 200;
    const PLAYER_MAX_HP = 100;
    const PLAYER_MAX_LIVES = 3;
    const SPECIAL_MAX = 100;
    const SPECIAL_COST = 100;
    const IFRAMES_DURATION = 500;
    const COMBO_WINDOW = 600; // ms to chain combo

    // ==================== WEB AUDIO SOUNDS ====================
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function playPunchHit() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        osc.start(); osc.stop(ctx.currentTime + 0.08);
    }

    function playKickHit() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.12);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start(); osc.stop(ctx.currentTime + 0.12);
    }

    function playPlayerHurt() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(500, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
    }

    function playEnemyHurt() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(250, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    function playKO() {
        const ctx = getAudioCtx();
        for (let i = 0; i < 3; i++) {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150 - i * 30, ctx.currentTime + i * 0.05);
            osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + i * 0.05 + 0.2);
            gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.05 + 0.2);
            osc.start(ctx.currentTime + i * 0.05); osc.stop(ctx.currentTime + i * 0.05 + 0.2);
        }
    }

    function playLevelComplete() {
        const ctx = getAudioCtx();
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.15);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
            osc.start(ctx.currentTime + i * 0.15); osc.stop(ctx.currentTime + i * 0.15 + 0.3);
        });
    }

    function playGameOver() {
        const ctx = getAudioCtx();
        const notes = [392, 330, 262, 196];
        notes.forEach((freq, i) => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.25);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.4);
            osc.start(ctx.currentTime + i * 0.25); osc.stop(ctx.currentTime + i * 0.25 + 0.4);
        });
    }

    function playSpecial() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.3);
        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
    }

    function playMenuSelect() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = 660;
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    // ==================== ENTITY DRAWING ====================
    function drawBlockFigure(gfx, x, y, w, h, colors, state, facingRight, stateTimer, isFlashing) {
        if (isFlashing && Math.floor(stateTimer * 10) % 2 === 0) return;

        const headR = w * 0.3;
        const torsoW = w * 0.5;
        const torsoH = h * 0.3;
        const limbW = w * 0.15;
        const limbH = h * 0.25;
        const dir = facingRight ? 1 : -1;

        // Legs
        let leftLegX = x - torsoW * 0.3;
        let rightLegX = x + torsoW * 0.3;
        let leftLegY = y + torsoH * 0.5;
        let rightLegY = y + torsoH * 0.5;
        let leftLegAngle = 0;
        let rightLegAngle = 0;

        if (state === 'walk') {
            const walkCycle = Math.sin(stateTimer * 8);
            leftLegX += walkCycle * 6 * dir;
            rightLegX -= walkCycle * 6 * dir;
        } else if (state === 'kick') {
            if (facingRight) {
                rightLegX += 20;
                rightLegY -= 8;
            } else {
                leftLegX -= 20;
                leftLegY -= 8;
            }
        } else if (state === 'knockdown') {
            leftLegX += 10 * dir;
            rightLegX += 15 * dir;
            leftLegY -= 5;
        }

        gfx.fillStyle(colors.legs);
        gfx.fillRect(leftLegX - limbW / 2, leftLegY, limbW, limbH);
        gfx.fillRect(rightLegX - limbW / 2, rightLegY, limbW, limbH);

        // Torso
        let torsoX = x;
        let torsoY = y - torsoH * 0.3;
        if (state === 'knockdown') {
            torsoY += 10;
        }
        gfx.fillStyle(colors.torso);
        gfx.fillRect(torsoX - torsoW / 2, torsoY - torsoH / 2, torsoW, torsoH);

        // Arms
        let leftArmX = x - torsoW * 0.45;
        let rightArmX = x + torsoW * 0.45;
        let leftArmY = torsoY - torsoH * 0.2;
        let rightArmY = torsoY - torsoH * 0.2;
        const armW = limbW;
        const armH = limbH * 0.9;

        if (state === 'punch') {
            if (facingRight) {
                rightArmX += 25;
                rightArmY -= 2;
            } else {
                leftArmX -= 25;
                leftArmY -= 2;
            }
        } else if (state === 'walk') {
            const armSwing = Math.sin(stateTimer * 8);
            leftArmX -= armSwing * 4 * dir;
            rightArmX += armSwing * 4 * dir;
        } else if (state === 'special') {
            leftArmX -= 15;
            rightArmX += 15;
            leftArmY -= 10;
            rightArmY -= 10;
        } else if (state === 'knockdown') {
            leftArmX += 8 * dir;
            rightArmX += 12 * dir;
        } else if (state === 'jump_attack') {
            if (facingRight) {
                rightArmX += 20;
                rightArmY -= 5;
            } else {
                leftArmX -= 20;
                leftArmY -= 5;
            }
        }

        gfx.fillStyle(colors.arms);
        gfx.fillRect(leftArmX - armW / 2, leftArmY, armW, armH);
        gfx.fillRect(rightArmX - armW / 2, rightArmY, armW, armH);

        // Fist highlight on punch
        if (state === 'punch' || state === 'jump_attack') {
            const fistX = facingRight ? rightArmX : leftArmX;
            const fistY = facingRight ? rightArmY : leftArmY;
            gfx.fillStyle(0xffffff);
            gfx.fillRect(fistX + (facingRight ? armW * 0.3 : -armW * 0.8), fistY, armW * 0.5, armW * 0.5);
        }

        // Head
        let headY = torsoY - torsoH / 2 - headR;
        if (state === 'knockdown') {
            headY += 12;
        }
        gfx.fillStyle(colors.head);
        gfx.fillCircle(x, headY, headR);

        // Eyes
        gfx.fillStyle(0xffffff);
        const eyeOff = facingRight ? 2 : -2;
        gfx.fillCircle(x + eyeOff - 3, headY - 2, 2);
        gfx.fillCircle(x + eyeOff + 3, headY - 2, 2);

        // Shoe on kick
        if (state === 'kick') {
            const shoeX = facingRight ? rightLegX + limbW : leftLegX - limbW;
            gfx.fillStyle(0xffffff);
            gfx.fillRect(shoeX - 4, rightLegY + limbH - 4, 8, 4);
        }
    }

    // ==================== PLAYER CLASS ====================
    class Player {
        constructor(id, keys, colors) {
            this.id = id;
            this.keys = keys;
            this.colors = colors;
            this.reset();
        }

        reset() {
            this.x = this.id === 1 ? 100 : 160;
            this.y = 380;
            this.vx = 0;
            this.vy = 0;
            this.width = 40;
            this.height = 55;
            this.hp = PLAYER_MAX_HP;
            this.lives = PLAYER_MAX_LIVES;
            this.special = 0;
            this.state = 'idle';
            this.stateTimer = 0;
            this.facingRight = true;
            this.onGround = true;
            this.iframes = 0;
            this.comboCount = 0;
            this.lastAttackTime = 0;
            this.attackCooldown = 0;
            this.active = true;
            this.dead = false;
            this.respawnTimer = 0;
            this.attackHitbox = null;
            this.attackDamage = 0;
            this.attackHit = false;
        }

        handleInput(cursors, dt, scene) {
            if (!this.active || this.state === 'hurt' || this.state === 'knockdown') return;

            const keys = this.keys;
            let moveX = 0;
            let moveY = 0;

            if (cursors[keys.left].isDown) moveX = -1;
            if (cursors[keys.right].isDown) moveX = 1;
            if (cursors[keys.up].isDown) moveY = -1;
            if (cursors[keys.down].isDown) moveY = 1;

            // Movement
            if (this.state !== 'punch' && this.state !== 'kick' && this.state !== 'special' && this.state !== 'jump_attack') {
                this.vx = moveX * PLAYER_SPEED;
                // Y-axis depth movement (only when on ground)
                if (this.onGround) {
                    this.y += moveY * PLAYER_SPEED * 0.6 * dt;
                    this.y = Phaser.Math.Clamp(this.y, GROUND_TOP, GROUND_BOTTOM);
                }

                if (moveX !== 0) this.facingRight = moveX > 0;
                if (moveX !== 0 || moveY !== 0) {
                    if (this.state !== 'jump') this.state = 'walk';
                } else {
                    if (this.state === 'walk') this.state = 'idle';
                }
            }

            // Jump
            if (Phaser.Input.Keyboard.JustDown(cursors[keys.up]) && this.onGround && this.state !== 'punch' && this.state !== 'kick' && this.state !== 'special') {
                this.vy = JUMP_FORCE;
                this.onGround = false;
                this.groundY = this.y;
                this.state = 'jump';
            }

            // Attack cooldown
            if (this.attackCooldown > 0) return;

            // Punch
            if (Phaser.Input.Keyboard.JustDown(cursors[keys.punch])) {
                if (!this.onGround) {
                    this.state = 'jump_attack';
                    this.stateTimer = 0;
                    this.attackCooldown = 0.3;
                    this.attackDamage = 15;
                    this.createAttackHitbox(35, 20);
                } else {
                    const now = scene.time.now;
                    if (now - this.lastAttackTime < COMBO_WINDOW && this.comboCount < 2) {
                        this.comboCount++;
                    } else {
                        this.comboCount = 0;
                    }
                    this.lastAttackTime = now;
                    this.state = 'punch';
                    this.stateTimer = 0;
                    this.vx = 0;
                    this.attackCooldown = 0.25;
                    this.attackDamage = 8 + this.comboCount * 4;
                    this.createAttackHitbox(30, 18);
                }
                this.attackHit = false;
            }

            // Kick
            if (Phaser.Input.Keyboard.JustDown(cursors[keys.kick])) {
                if (!this.onGround) {
                    this.state = 'jump_attack';
                    this.stateTimer = 0;
                    this.attackCooldown = 0.35;
                    this.attackDamage = 18;
                    this.createAttackHitbox(35, 25);
                } else {
                    this.state = 'kick';
                    this.stateTimer = 0;
                    this.vx = 0;
                    this.attackCooldown = 0.4;
                    this.attackDamage = 15;
                    this.createAttackHitbox(35, 22);
                    this.comboCount = 0;
                }
                this.attackHit = false;
            }

            // Special
            if (Phaser.Input.Keyboard.JustDown(cursors[keys.special]) && this.special >= SPECIAL_COST) {
                this.state = 'special';
                this.stateTimer = 0;
                this.vx = 0;
                this.special = 0;
                this.attackCooldown = 0.6;
                this.attackDamage = 40;
                this.attackHitbox = { x: this.x - 60, y: this.y - 40, w: 120, h: 80 };
                this.attackHit = false;
                playSpecial();
            }
        }

        createAttackHitbox(rangeX, rangeY) {
            const dir = this.facingRight ? 1 : -1;
            this.attackHitbox = {
                x: this.x + dir * 15,
                y: this.y - this.height / 2,
                w: rangeX,
                h: rangeY
            };
            if (!this.facingRight) this.attackHitbox.x -= rangeX;
        }

        update(dt, cameraX, worldWidth) {
            if (!this.active) {
                if (this.dead) return;
                this.respawnTimer -= dt;
                if (this.respawnTimer <= 0) {
                    if (this.lives > 0) {
                        this.active = true;
                        this.hp = PLAYER_MAX_HP;
                        this.state = 'idle';
                        this.iframes = 1.0;
                        this.onGround = true;
                    } else {
                        this.dead = true;
                    }
                }
                return;
            }

            this.stateTimer += dt;
            if (this.attackCooldown > 0) this.attackCooldown -= dt;
            if (this.iframes > 0) this.iframes -= dt;

            // Gravity / jumping
            if (!this.onGround) {
                this.vy += GRAVITY * dt;
                this.jumpY = (this.jumpY || 0) + this.vy * dt;

                if (this.jumpY >= 0) {
                    this.jumpY = 0;
                    this.vy = 0;
                    this.onGround = true;
                    if (this.state === 'jump' || this.state === 'jump_attack') this.state = 'idle';
                }
            }

            // Horizontal movement
            this.x += this.vx * dt;
            this.x = Phaser.Math.Clamp(this.x, cameraX + 20, Math.min(cameraX + GAME_W - 20, worldWidth - 20));

            // State timeouts
            if (this.state === 'punch' && this.stateTimer > 0.2) {
                this.state = 'idle';
                this.attackHitbox = null;
            }
            if (this.state === 'kick' && this.stateTimer > 0.3) {
                this.state = 'idle';
                this.attackHitbox = null;
            }
            if (this.state === 'jump_attack' && this.stateTimer > 0.25) {
                this.attackHitbox = null;
            }
            if (this.state === 'special' && this.stateTimer > 0.4) {
                this.state = 'idle';
                this.attackHitbox = null;
            }
            if (this.state === 'hurt' && this.stateTimer > 0.3) {
                this.state = 'idle';
            }
            if (this.state === 'knockdown' && this.stateTimer > 0.8) {
                this.state = 'idle';
            }
        }

        takeDamage(amount, fromX) {
            if (this.iframes > 0 || !this.active) return;
            this.hp -= amount;
            this.iframes = IFRAMES_DURATION / 1000;
            playPlayerHurt();

            if (this.hp <= 0) {
                this.hp = 0;
                this.lives--;
                this.state = 'knockdown';
                this.stateTimer = 0;
                this.active = false;
                this.respawnTimer = 2.0;
                playKO();
            } else {
                if (amount >= 15) {
                    this.state = 'knockdown';
                    this.vx = fromX < this.x ? 100 : -100;
                } else {
                    this.state = 'hurt';
                    this.vx = fromX < this.x ? 50 : -50;
                }
                this.stateTimer = 0;
            }
        }

        getDrawY() {
            return this.y + (this.jumpY || 0);
        }

        draw(gfx, cameraX) {
            if (!this.active) return;
            const sx = this.x - cameraX;
            const sy = this.getDrawY();
            // Shadow
            gfx.fillStyle(0x000000, 0.3);
            gfx.fillEllipse(sx, this.y + this.height / 2 + 2, this.width * 0.8, 8);
            // Figure
            drawBlockFigure(gfx, sx, sy, this.width, this.height, this.colors, this.state, this.facingRight, this.stateTimer, this.iframes > 0);
        }
    }

    // ==================== ENEMY CLASS ====================
    class Enemy {
        constructor(type, x, y) {
            this.type = type;
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = 0;
            this.facingRight = false;
            this.state = 'idle';
            this.stateTimer = 0;
            this.attackCooldown = 0;
            this.attackHitbox = null;
            this.attackHit = false;
            this.hitstun = 0;
            this.active = true;
            this.jumpY = 0;
            this.onGround = true;

            const stats = Enemy.STATS[type];
            this.hp = stats.hp;
            this.maxHp = stats.hp;
            this.speed = stats.speed;
            this.damage = stats.damage;
            this.width = stats.width;
            this.height = stats.height;
            this.colors = stats.colors;
            this.score = stats.score;
            this.attackRange = stats.attackRange || 40;
            this.aiTimer = Math.random() * 2;
            this.aiState = 'wander';
            this.targetPlayer = null;
        }

        update(dt, players, cameraX) {
            if (!this.active) return;

            this.stateTimer += dt;
            if (this.attackCooldown > 0) this.attackCooldown -= dt;
            if (this.hitstun > 0) {
                this.hitstun -= dt;
                this.x += this.vx * dt;
                this.vx *= 0.9;
                if (this.hitstun <= 0) {
                    this.state = 'idle';
                    this.vx = 0;
                }
                return;
            }

            // Gravity
            if (!this.onGround) {
                this.vy += GRAVITY * dt;
                this.jumpY += this.vy * dt;
                if (this.jumpY >= 0) {
                    this.jumpY = 0;
                    this.vy = 0;
                    this.onGround = true;
                }
            }

            // AI
            this.aiTimer -= dt;
            if (this.aiTimer <= 0) {
                this.aiTimer = 0.5 + Math.random() * 1.0;
                this.pickTarget(players);
            }

            if (this.state === 'punch' || this.state === 'kick') {
                this.vx = 0;
                if (this.stateTimer > 0.3) {
                    this.state = 'idle';
                    this.attackHitbox = null;
                    this.attackCooldown = 0.8 + Math.random() * 0.5;
                }
                return;
            }

            if (!this.targetPlayer || !this.targetPlayer.active) {
                this.pickTarget(players);
                if (!this.targetPlayer) {
                    this.state = 'idle';
                    this.vx = 0;
                    return;
                }
            }

            const tp = this.targetPlayer;
            const dx = tp.x - this.x;
            const dy = tp.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            this.facingRight = dx > 0;

            if (dist < this.attackRange && this.attackCooldown <= 0 && Math.abs(dy) < 30) {
                this.attack();
            } else {
                // Move toward player
                const spd = this.speed;
                if (dist > this.attackRange * 0.7) {
                    this.vx = (dx / dist) * spd;
                    const yMove = (dy / Math.max(Math.abs(dy), 1)) * spd * 0.5;
                    this.y += yMove * dt;
                    this.y = Phaser.Math.Clamp(this.y, GROUND_TOP, GROUND_BOTTOM);
                    this.state = 'walk';
                } else {
                    this.vx = 0;
                    this.state = 'idle';
                }
            }

            this.x += this.vx * dt;
            this.x = Phaser.Math.Clamp(this.x, cameraX + 10, cameraX + GAME_W - 10);
        }

        pickTarget(players) {
            const alive = players.filter(p => p.active);
            if (alive.length === 0) { this.targetPlayer = null; return; }
            // Pick closest or random
            if (Math.random() < 0.7) {
                alive.sort((a, b) => Math.abs(a.x - this.x) - Math.abs(b.x - this.x));
                this.targetPlayer = alive[0];
            } else {
                this.targetPlayer = alive[Math.floor(Math.random() * alive.length)];
            }
        }

        attack() {
            const atkType = (this.type === 'knife' || Math.random() < 0.6) ? 'punch' : 'kick';
            this.state = atkType;
            this.stateTimer = 0;
            this.vx = 0;
            this.attackHit = false;

            const dir = this.facingRight ? 1 : -1;
            const range = this.attackRange;
            this.attackHitbox = {
                x: this.x + dir * 10,
                y: this.y - this.height / 2,
                w: range,
                h: 20
            };
            if (!this.facingRight) this.attackHitbox.x -= range;
            this.attackDamage = this.damage;
        }

        takeDamage(amount, fromX) {
            this.hp -= amount;
            this.hitstun = 0.3;
            this.vx = fromX < this.x ? 120 : -120;
            this.state = 'hurt';
            this.stateTimer = 0;
            this.attackHitbox = null;
            playEnemyHurt();

            if (this.hp <= 0) {
                this.hp = 0;
                this.active = false;
                playKO();
            }
        }

        getDrawY() {
            return this.y + this.jumpY;
        }

        draw(gfx, cameraX) {
            if (!this.active) return;
            const sx = this.x - cameraX;
            const sy = this.getDrawY();

            // Shadow
            gfx.fillStyle(0x000000, 0.3);
            gfx.fillEllipse(sx, this.y + this.height / 2 + 2, this.width * 0.8, 8);

            // Figure
            drawBlockFigure(gfx, sx, sy, this.width, this.height, this.colors, this.state, this.facingRight, this.stateTimer, false);

            // Health bar above
            if (this.hp < this.maxHp) {
                const barW = 30;
                const barH = 4;
                const barX = sx - barW / 2;
                const barY = sy - this.height / 2 - 14;
                gfx.fillStyle(0x333333);
                gfx.fillRect(barX, barY, barW, barH);
                gfx.fillStyle(0xff0000);
                gfx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);
            }
        }
    }

    // ==================== GAME SCENE ====================
    class GameScene extends Phaser.Scene {
        constructor() { super({ key: 'GameScene' }); }

        init(data) {
            this.numPlayers = data.numPlayers || 1;
        }

        create() {
            this.gfx = this.add.graphics();
            this.score = 0;
            this.currentStage = 0;
            this.cameraX = 0;
            this.scrollLocked = false;
            this.scrollLockX = 0;
            this.encounterIndex = 0;
            this.enemies = [];
            this.particles = [];
            this.shakeTimer = 0;
            this.shakeIntensity = 0;
            this.stageTransition = false;
            this.stageTransitionTimer = 0;
            this.goArrowTimer = 0;
            this.gameOver = false;
            this.victory = false;

            this.highScore = parseInt(localStorage.getItem('beatEmUpHighScore') || '0');

            // Create players
            this.player1 = new Player(1, {
                left: 'A', right: 'D', up: 'W', down: 'S',
                punch: 'F', kick: 'G', special: 'R'
            }, { head: 0x4488ff, torso: 0x2266cc, arms: 0x3377dd, legs: 0x1155aa });

            this.player2 = new Player(2, {
                left: 'LEFT', right: 'RIGHT', up: 'UP', down: 'DOWN',
                punch: 'SEMICOLON', kick: 'QUOTES', special: 'PERIOD'
            }, { head: 0xff4444, torso: 0xcc2222, arms: 0xdd3333, legs: 0xaa1111 });

            this.player2.active = this.numPlayers >= 2;
            this.player2.dead = this.numPlayers < 2;

            this.players = [this.player1];
            if (this.numPlayers >= 2) this.players.push(this.player2);

            // Input
            this.allKeys = {};
            const addKey = (k) => { this.allKeys[k] = this.input.keyboard.addKey(k); };
            ['A', 'D', 'W', 'S', 'F', 'G', 'R',
             'LEFT', 'RIGHT', 'UP', 'DOWN', 'SEMICOLON', 'QUOTES', 'PERIOD'].forEach(addKey);

            this.loadStage(0);
            this.updateHUD();
        }

        loadStage(index) {
            this.currentStage = index;
            this.cameraX = 0;
            this.encounterIndex = 0;
            this.enemies = [];
            this.scrollLocked = false;
            this.stageTransition = false;

            // Reset player positions
            this.players.forEach((p, i) => {
                if (!p.dead) {
                    p.x = 80 + i * 60;
                    p.y = 380;
                    p.state = 'idle';
                    p.vx = 0;
                    p.onGround = true;
                    p.jumpY = 0;
                }
            });

            document.getElementById('stageDisplay').textContent = `Stage ${index + 1}: ${STAGES[index].name}`;
        }

        update(time, delta) {
            const dt = delta / 1000;

            if (this.gameOver || this.victory) return;

            // Stage transition
            if (this.stageTransition) {
                this.stageTransitionTimer -= dt;
                if (this.stageTransitionTimer <= 0) {
                    if (this.currentStage + 1 < STAGES.length) {
                        this.loadStage(this.currentStage + 1);
                    } else {
                        this.victory = true;
                        playLevelComplete();
                        this.time.delayedCall(2000, () => {
                            this.scene.start('GameOverScene', {
                                score: this.score, victory: true, highScore: this.highScore
                            });
                        });
                    }
                }
                return;
            }

            const stage = STAGES[this.currentStage];

            // Player input and update
            this.players.forEach(p => {
                p.handleInput(this.allKeys, dt, this);
                p.update(dt, this.cameraX, stage.width);
            });

            // Check encounters
            if (!this.scrollLocked && this.encounterIndex < stage.encounters.length) {
                const enc = stage.encounters[this.encounterIndex];
                const rightmostPlayer = Math.max(...this.players.filter(p => p.active).map(p => p.x));
                if (rightmostPlayer >= enc.triggerX + this.cameraX * 0) {
                    // Actually check against world position
                    if (rightmostPlayer >= enc.triggerX) {
                        this.scrollLocked = true;
                        this.scrollLockX = this.cameraX;
                        // Spawn enemies
                        enc.enemies.forEach(e => {
                            this.enemies.push(new Enemy(e.type, e.x, e.y));
                        });
                        this.encounterIndex++;
                    }
                }
            }

            // Check if scroll should unlock
            if (this.scrollLocked) {
                const allDead = this.enemies.every(e => !e.active);
                if (allDead) {
                    this.scrollLocked = false;
                    // Check if stage complete
                    if (this.encounterIndex >= stage.encounters.length) {
                        playLevelComplete();
                        this.stageTransition = true;
                        this.stageTransitionTimer = 2.5;
                    }
                }
            }

            // Update enemies
            this.enemies.forEach(e => e.update(dt, this.players, this.cameraX));

            // Combat: player attacks hit enemies
            this.players.forEach(p => {
                if (!p.active || !p.attackHitbox) return;
                if (p.attackHit) return;
                this.enemies.forEach(e => {
                    if (!e.active || e.hitstun > 0) return;
                    if (this.hitboxOverlap(p.attackHitbox, e)) {
                        e.takeDamage(p.attackDamage, p.x);
                        p.attackHit = true;
                        p.special = Math.min(p.special + 8, SPECIAL_MAX);

                        // Particles
                        this.spawnHitParticles(e.x, e.getDrawY() - e.height / 2);

                        if (p.state === 'punch') playPunchHit();
                        else playKickHit();

                        if (!e.active) {
                            this.score += e.score;
                            this.spawnKOParticles(e.x, e.y);
                        }

                        // Screen shake on heavy hits
                        if (p.attackDamage >= 15) {
                            this.shakeTimer = 0.15;
                            this.shakeIntensity = Math.min(p.attackDamage / 10, 4);
                        }
                    }
                });
            });

            // Combat: enemy attacks hit players
            this.enemies.forEach(e => {
                if (!e.active || !e.attackHitbox || e.attackHit) return;
                this.players.forEach(p => {
                    if (!p.active || p.iframes > 0) return;
                    if (this.hitboxOverlap(e.attackHitbox, p)) {
                        p.takeDamage(e.attackDamage || e.damage, e.x);
                        e.attackHit = true;
                        this.spawnHitParticles(p.x, p.getDrawY() - p.height / 2);
                    }
                });
            });

            // Camera
            if (!this.scrollLocked) {
                const alivePlayers = this.players.filter(p => p.active);
                if (alivePlayers.length > 0) {
                    const rightmost = Math.max(...alivePlayers.map(p => p.x));
                    const targetCam = rightmost - GAME_W * 0.4;
                    this.cameraX = Phaser.Math.Linear(this.cameraX, targetCam, 0.05);
                }
            }
            this.cameraX = Phaser.Math.Clamp(this.cameraX, 0, stage.width - GAME_W);

            // Go arrow timer
            if (!this.scrollLocked && this.encounterIndex < stage.encounters.length) {
                this.goArrowTimer += dt;
            } else {
                this.goArrowTimer = 0;
            }

            // Particles
            this.particles.forEach(p => {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
            });
            this.particles = this.particles.filter(p => p.life > 0);

            // Shake
            if (this.shakeTimer > 0) this.shakeTimer -= dt;

            // Check game over
            if (this.players.every(p => p.dead)) {
                this.gameOver = true;
                playGameOver();
                this.time.delayedCall(2000, () => {
                    this.scene.start('GameOverScene', {
                        score: this.score, victory: false, highScore: this.highScore
                    });
                });
            }

            // Update HUD
            this.updateHUD();

            // Draw everything
            this.draw();
        }

        hitboxOverlap(hitbox, entity) {
            const ex = entity.x - entity.width / 2;
            const ey = entity.y - entity.height;
            const ew = entity.width;
            const eh = entity.height;
            // Also check depth (Y proximity)
            const yDist = Math.abs(entity.y - (hitbox.y + hitbox.h / 2 + entity.height / 2));
            if (yDist > 35) return false;
            return hitbox.x < ex + ew && hitbox.x + hitbox.w > ex &&
                   hitbox.y < ey + eh && hitbox.y + hitbox.h > ey;
        }

        spawnHitParticles(x, y) {
            for (let i = 0; i < 6; i++) {
                this.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 200,
                    vy: (Math.random() - 0.5) * 200,
                    size: 2 + Math.random() * 3,
                    color: Math.random() < 0.5 ? 0xffff00 : 0xffffff,
                    life: 0.3 + Math.random() * 0.2
                });
            }
        }

        spawnKOParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                this.particles.push({
                    x, y: y - 20,
                    vx: (Math.random() - 0.5) * 300,
                    vy: -100 - Math.random() * 200,
                    size: 3 + Math.random() * 4,
                    color: [0xff0000, 0xff8800, 0xffff00][Math.floor(Math.random() * 3)],
                    life: 0.5 + Math.random() * 0.3
                });
            }
        }

        draw() {
            const g = this.gfx;
            g.clear();

            const stage = STAGES[this.currentStage];
            const shakeX = this.shakeTimer > 0 ? (Math.random() - 0.5) * this.shakeIntensity * 2 : 0;
            const shakeY = this.shakeTimer > 0 ? (Math.random() - 0.5) * this.shakeIntensity * 2 : 0;

            // Sky
            g.fillStyle(stage.skyColor);
            g.fillRect(shakeX, shakeY, GAME_W, GAME_H);

            // Parallax far buildings
            this.drawBackground(g, stage, shakeX, shakeY);

            // Ground
            g.fillStyle(stage.groundColor);
            g.fillRect(shakeX, GROUND_TOP + 60 + shakeY, GAME_W, GAME_H - GROUND_TOP - 60);

            // Ground line
            g.lineStyle(2, 0x666666);
            g.strokeLineShape(new Phaser.Geom.Line(0, GROUND_TOP + 60 + shakeY, GAME_W, GROUND_TOP + 60 + shakeY));

            // Collect all entities for depth sorting
            const entities = [];
            this.players.forEach(p => {
                if (p.active) entities.push({ type: 'player', obj: p, sortY: p.y });
            });
            this.enemies.forEach(e => {
                if (e.active) entities.push({ type: 'enemy', obj: e, sortY: e.y });
            });
            entities.sort((a, b) => a.sortY - b.sortY);

            // Draw sorted entities
            entities.forEach(ent => {
                g.save();
                g.setPosition(shakeX, shakeY);
                ent.obj.draw(g, this.cameraX);
                g.setPosition(0, 0);
                g.restore();
            });

            // Particles
            this.particles.forEach(p => {
                const sx = p.x - this.cameraX;
                g.fillStyle(p.color, p.life * 3);
                g.fillRect(sx + shakeX - p.size / 2, p.y + shakeY - p.size / 2, p.size, p.size);
            });

            // "GO!" arrow
            if (!this.scrollLocked && this.encounterIndex < STAGES[this.currentStage].encounters.length) {
                const alpha = Math.sin(this.goArrowTimer * 4) * 0.3 + 0.7;
                g.fillStyle(0xffff00, alpha);
                const ax = GAME_W - 50;
                const ay = GAME_H / 2;
                g.fillTriangle(ax, ay - 15, ax, ay + 15, ax + 20, ay);
                // "GO" text drawn as simple blocks
                g.fillRect(ax - 30, ay - 8, 12, 16);
                g.fillRect(ax - 30, ay - 8, 6, 6);
                g.fillRect(ax - 30, ay + 2, 6, 6);
                g.fillRect(ax - 24, ay + 2, 6, 6);
            }

            // Stage transition overlay
            if (this.stageTransition) {
                const alpha = Math.min(this.stageTransitionTimer > 1.5 ? 0 : (1.5 - this.stageTransitionTimer) / 1.5, 1);
                g.fillStyle(0x000000, alpha);
                g.fillRect(0, 0, GAME_W, GAME_H);
            }

            // Scroll lock indicator (red barriers)
            if (this.scrollLocked) {
                g.fillStyle(0xff0000, 0.15);
                g.fillRect(0, 0, 4, GAME_H);
                g.fillRect(GAME_W - 4, 0, 4, GAME_H);
            }

            // Game over / victory overlay
            if (this.gameOver) {
                g.fillStyle(0x000000, 0.6);
                g.fillRect(0, 0, GAME_W, GAME_H);
            }
            if (this.victory) {
                g.fillStyle(0x000000, 0.4);
                g.fillRect(0, 0, GAME_W, GAME_H);
            }
        }

        drawBackground(g, stage, sx, sy) {
            const parallax1 = this.cameraX * 0.2;
            const parallax2 = this.cameraX * 0.5;

            // Far layer - big buildings
            const colors1 = stage.buildingColors;
            for (let i = 0; i < 12; i++) {
                const bx = i * 120 - parallax1 % 120 - 60 + sx;
                const bh = 80 + (i * 37 % 60);
                const by = GROUND_TOP + 60 - bh + sy;
                g.fillStyle(colors1[i % colors1.length], 0.6);
                g.fillRect(bx, by, 80, bh);
                // Windows
                g.fillStyle(0xffff66, 0.2);
                for (let wy = by + 10; wy < by + bh - 10; wy += 15) {
                    for (let wx = bx + 8; wx < bx + 72; wx += 18) {
                        if (Math.sin(wx * 7 + wy * 3) > 0) {
                            g.fillRect(wx, wy, 8, 6);
                        }
                    }
                }
            }

            // Near layer - smaller structures
            for (let i = 0; i < 8; i++) {
                const bx = i * 180 - parallax2 % 180 - 90 + sx;
                const bh = 40 + (i * 53 % 30);
                const by = GROUND_TOP + 60 - bh + sy;
                g.fillStyle(colors1[(i + 1) % colors1.length], 0.8);
                g.fillRect(bx, by, 60, bh);
                // Door
                g.fillStyle(0x111111);
                g.fillRect(bx + 22, by + bh - 18, 16, 18);
            }

            // Streetlights
            for (let i = 0; i < 6; i++) {
                const lx = i * 250 - parallax2 % 250 + sx;
                g.fillStyle(0x666666);
                g.fillRect(lx, GROUND_TOP + 10 + sy, 3, 50);
                g.fillStyle(0xffff88, 0.4);
                g.fillCircle(lx + 1, GROUND_TOP + 10 + sy, 5);
            }
        }

        updateHUD() {
            document.getElementById('score').textContent = this.score;
            document.getElementById('p1Health').style.width = (this.player1.hp / PLAYER_MAX_HP * 100) + '%';
            document.getElementById('p1Special').style.width = (this.player1.special / SPECIAL_MAX * 100) + '%';
            document.getElementById('p1Lives').textContent = '♥'.repeat(Math.max(0, this.player1.lives));

            if (this.numPlayers >= 2) {
                document.getElementById('p2Health').style.width = (this.player2.hp / PLAYER_MAX_HP * 100) + '%';
                document.getElementById('p2Special').style.width = (this.player2.special / SPECIAL_MAX * 100) + '%';
                document.getElementById('p2Lives').textContent = '♥'.repeat(Math.max(0, this.player2.lives));
            } else {
                document.getElementById('p2Health').style.width = '0%';
                document.getElementById('p2Special').style.width = '0%';
                document.getElementById('p2Lives').textContent = '';
            }

            if (this.score > this.highScore) {
                this.highScore = this.score;
                localStorage.setItem('beatEmUpHighScore', this.highScore);
            }
        }
    }

    // ==================== GAME OVER SCENE ====================
    class GameOverScene extends Phaser.Scene {
        constructor() { super({ key: 'GameOverScene' }); }

        init(data) {
            this.finalScore = data.score || 0;
            this.isVictory = data.victory || false;
            this.highScore = data.highScore || 0;
        }

        create() {
            this.gfx = this.add.graphics();
            this.gfx.fillStyle(0x0a0a1e);
            this.gfx.fillRect(0, 0, GAME_W, GAME_H);

            if (this.isVictory) {
                this.add.text(GAME_W / 2, 100, 'VICTORY!', {
                    fontSize: '48px', fontFamily: 'monospace', fontStyle: 'bold',
                    color: '#ffcc00', stroke: '#000', strokeThickness: 6
                }).setOrigin(0.5);

                this.add.text(GAME_W / 2, 160, 'You saved the city!', {
                    fontSize: '20px', fontFamily: 'monospace', color: '#aaa'
                }).setOrigin(0.5);
            } else {
                this.add.text(GAME_W / 2, 100, 'GAME OVER', {
                    fontSize: '48px', fontFamily: 'monospace', fontStyle: 'bold',
                    color: '#ff4444', stroke: '#000', strokeThickness: 6
                }).setOrigin(0.5);
            }

            this.add.text(GAME_W / 2, 230, `Score: ${this.finalScore}`, {
                fontSize: '28px', fontFamily: 'monospace', color: '#fff'
            }).setOrigin(0.5);

            const best = Math.max(this.finalScore, this.highScore);
            localStorage.setItem('beatEmUpHighScore', best);

            this.add.text(GAME_W / 2, 270, `High Score: ${best}`, {
                fontSize: '20px', fontFamily: 'monospace', color: '#ff8800'
            }).setOrigin(0.5);

            this.blinkTimer = 0;
            this.pressText = this.add.text(GAME_W / 2, 370, 'PRESS ENTER TO RETRY', {
                fontSize: '18px', fontFamily: 'monospace', color: '#ff0'
            }).setOrigin(0.5);

            this.menuText = this.add.text(GAME_W / 2, 410, 'PRESS ESC FOR MENU', {
                fontSize: '14px', fontFamily: 'monospace', color: '#888'
            }).setOrigin(0.5);

            this.enterKey = this.input.keyboard.addKey('ENTER');
            this.escKey = this.input.keyboard.addKey('ESC');
        }

        update(time, delta) {
            this.blinkTimer += delta / 1000;
            this.pressText.setAlpha(Math.sin(this.blinkTimer * 4) > 0 ? 1 : 0.3);

            if (Phaser.Input.Keyboard.JustDown(this.enterKey)) {
                playMenuSelect();
                this.scene.start('MenuScene');
            }
            if (Phaser.Input.Keyboard.JustDown(this.escKey)) {
                playMenuSelect();
                this.scene.start('MenuScene');
            }
        }
    }

    // ==================== PHASER CONFIG ====================
    const config = {
        type: Phaser.AUTO,
        width: GAME_W,
        height: GAME_H,
        parent: 'game-container',
        backgroundColor: '#0a0a1e',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [MenuScene, GameScene, GameOverScene],
        input: {
            keyboard: {
                capture: ['W', 'A', 'S', 'D', 'F', 'G', 'R',
                          'UP', 'DOWN', 'LEFT', 'RIGHT',
                          'SEMICOLON', 'QUOTES', 'PERIOD',
                          'ENTER', 'ESC']
            }
        }
    };

    const game = new Phaser.Game(config);

    // Restart button
    document.getElementById('restartBtn').addEventListener('click', () => {
        game.scene.scenes.forEach(s => {
            if (s.scene.isActive()) s.scene.start('MenuScene');
        });
    });
    </script>
    <script src="../nav.js"></script>
</body>
</html>
